уг имеет свои государственные органы, которые действуют четко в пределах своего округа и подчинены руководи...", "content": "Статья 62\n\nКаждый округ имеет свои государственные органы, которые действуют четко в пределах своего округа и подчинены руководителям муниципалитетов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-63", "number": "63", "title": "Окружные государственные органы могут вести совместную деятельность в случае чрезвычайного или военного положения, а ...", "content": "Статья 63\n\nОкружные государственные органы могут вести совместную деятельность в случае чрезвычайного или военного положения, а также по распоряжению глав всех округов.\nНа территории города Лос-Сантос действуют: Полицейский Департамент города Лос-Сантос и Центральный Госпиталь Экстренной Медицинской Службы штата Сан-Андреас.\nНа территории округа Блэйн действуют: Департамент шерифа округа Блэйн и Окружной Госпиталь Экстренной Медицинской Службы штата Сан-Андреас.\nНа территории острова Кайо-Перико действует: Полицейский Департамент города Лос-Сантос, Департамент шерифа округа Блэйн.\nНа территории всего штата Сан-Андреас действуют: Национальная Гвардия, региональный офис Федерального Расследовательского Бюро, региональное отделение Секретной Службы Соединенных Штатов Америки в штате Сан-Андреас, а также Департамент Национальной Безопасности штата Сан-Андреас.\n\nГлава 8. Средства массовой информации", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-64", "number": "64", "title": "Свобода слова и свободное выражение своих мыслей гарантируются.", "content": "Статья 64\n\nСвобода слова и свободное выражение своих мыслей гарантируются.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-65", "number": "65", "title": "Сотрудники СМИ имеют право свободно и независимо искать, получать, фиксировать, хранить, использовать и распространят...", "content": "Статья 65\n\nСотрудники СМИ имеют право свободно и независимо искать, получать, фиксировать, хранить, использовать и распространять информацию. Эти права могут быть ограничены только в случаях, когда такие ограничения необходимы и пропорциональны в интересах национальной безопасности, общественного порядка или для защиты законных прав и репутации других лиц. При этом, любые ограничения должны быть четко определены законом и применяться в строгом соответствии с установленными процедурами. Ограничения должны быть основаны на конкретных доказательствах необходимости и не должны чрезмерно ограничивать свободу прессы. Запрещается ограничение прав СМИ в случаях, когда это препятствует законной деятельности, направленной на раскрытие значимой информации для общества.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-66", "number": "66", "title": "Средства массовой информации не могут быть использованы для:", "content": "Статья 66\n\nСредства массовой информации не могут быть использованы для:\n\nа) Призыва к насильственным действиям, которые создают непосредственную и явную угрозу общественному порядку или безопасности;\nб) Подстрекательства к ненависти или насилию на основании расы, национальности, религии или других признаков, если такое подстрекательство представляет собой непосредственную угрозу насильственным действиям;\nв) Призыва к уголовно наказуемым деяниям, если такие призывы могут непосредственно привести к совершению этих деяний;\nСМИ не должны быть ограничены в их праве сообщать о фактах коррупции, превышения полномочий или других нарушениях закона со стороны государственных должностных лиц и учреждений. Журналисты имеют право публиковать такие материалы, основываясь на доступных доказательствах, при условии, что они действовали добросовестно и с соблюдением профессиональных стандартов.\nПраво общества на получение информации должно быть приоритетом. Введение ограничений на освещение определенных событий или вопросов должно быть оправдано необходимостью предотвращения непосредственной угрозы общественной безопасности или правопорядку и должно быть установлено только на временной основе с обязательным пересмотром.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-67", "number": "67", "title": "Правомочия СМИ регулируются Конституцией штата Сан-Андреас и законами.", "content": "Статья 67\n\nПравомочия СМИ регулируются Конституцией штата Сан-Андреас и законами.\n\nГлава 9. Налогообложение", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-68", "number": "68", "title": "Вся собственность в штате Сан-Андреас, в соответствии с законами США, облагаются налогом пропорционально его стоимости.", "content": "Статья 68\n\nВся собственность в штате Сан-Андреас, в соответствии с законами США, облагаются налогом пропорционально его стоимости.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-69", "number": "69", "title": "Налог на прибыль может оцениваться и взиматься с лиц, корпораций, акционерных обществ или налоговых резидентов, котор...", "content": "Статья 69\n\nНалог на прибыль может оцениваться и взиматься с лиц, корпораций, акционерных обществ или налоговых резидентов, которые занимаются бизнесом в штате в соответствии с его законодательством.\n\nГлава 10. Военное время", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-70", "number": "70", "title": "В период военного положения, чрезвычайного положения, чрезвычайных ситуаций вооруженные силы штата подчиняются Губерн...", "content": "Статья 70\n\nВ период военного положения, чрезвычайного положения, чрезвычайных ситуаций вооруженные силы штата подчиняются Губернатору штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-71", "number": "71", "title": "Утратила силу.", "content": "Статья 71\n\nУтратила силу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-72", "number": "72", "title": "Утратила силу.", "content": "Статья 72\n\nУтратила силу.\n\nГлава 11. Иерархия нормативно-правовых актов", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-73", "number": "73", "title": "Иерархия нормативно-правовых актов – это структура, которая основывается на юридической силе нормативных актов госуда...", "content": "Статья 73\n\nИерархия нормативно-правовых актов – это структура, которая основывается на юридической силе нормативных актов государственной власти.\nКонституция штата Сан Андреас является основным законом штата, особый нормативный правовой акт, имеющий высшую юридическую силу. Ни один закон или подзаконный акт не может противоречить или отменять положения Конституции. Если имеется такой закон, который вводит противоречие с Конституцией, то выполняется положение Конституции, а положения закона не выполняются. Все неконституционные законы рассматривает и приостанавливает Верховный суд.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-74", "number": "74", "title": "Ступени иерархии нормативно-правовых актов штата Сан-Андреас:", "content": "Статья 74\nСтупени иерархии нормативно-правовых актов штата Сан-Андреас:\nа) Конституция штата Сан-Андреас;\nб) Конституционные законы;\nв) Кодексы и законы;\nг) Постановления Сената;\nд) Нормативные акты Губернатора и Вице-Губернатора штата Сан-Андреас;\nе) Нормативные акты Глав департаментов и их заместителей;\nё) Нормативные акты государственных органов;\nж) Локальные нормативные акты государственных органов (уставы).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-75", "number": "75", "title": "Конституционные Законы имеют юридическую силу выше, чем законы (кодексы). Если закон противоречит положениям каких-ли...", "content": "Статья 75\n\nКонституционные Законы имеют юридическую силу выше, чем законы (кодексы). Если закон противоречит положениям каких-либо конституционных законов, то такие положения закона не должны выполняться и должны быть отменены.\nЕсли имеется такой конституционный закон который вводит противоречие с Конституцией, то выполняется положение Конституции, а положения конституционного закона не выполняются и должны быть отменены.\nЗаконы имеют юридическую силу выше, чем подзаконные акты. Если положения подзаконного акта противоречит положениям каких-либо законов, то такой подзаконный акт не должен выполняться и должен быть отменен.\nЕсли имеется такой закон который вводит противоречие с Конституцией, то выполняется положение Конституции, а положения закона не выполняются.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-76", "number": "76", "title": "Внутренние правила и приказы внутри государственных органах и частных организаций не могут противоречить законам и Ко...", "content": "Статья 76\n\n\nВнутренние правила и приказы внутри государственных органах и частных организаций не могут противоречить законам и Конституции. Если такие внутренние правила есть, они не имеют юридическую силу, не должны выполняться и должны быть отменены руководителем соответствующего ведомства или главой департамента с соответствующей юрисдикцией. В случае с частными организациями подобные правила и приказы должны быть отменены руководителем организации, на которого таковая зарегистрирована либо органом надзора.\nВнутренние правила и приказы руководства государственных органов распространяются только на сотрудников и не могут распространяться на граждан.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-77", "number": "77", "title": "Внутренние правила и приказы государственных органов и частных организаций распространяются только на сотрудников эти...", "content": "Статья 77\n\nВнутренние правила и приказы государственных органов и частных организаций распространяются только на сотрудников этих государственных органов и частных организаций и не могут распространяться на граждан.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-78", "number": "78", "title": "Законы и подзаконные акты могут дополнять и расширять положения Конституции, но не должны противоречить ей.", "content": "Статья 78\n\n\nЗаконы и подзаконные акты могут дополнять и расширять положения Конституции, но не должны противоречить ей.\n\nГлава 12. Конституционные поправки и пересмотр конституции", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-79", "number": "79", "title": "Инициативу о пересмотре конституции имеют сенаторы. Пересмотр конституции осуществляется через голосование в Сенате ш...", "content": "Статья 79\n\nИнициативу о пересмотре конституции имеют сенаторы. Пересмотр конституции осуществляется через голосование в Сенате штата Сан-Андреас, где должно набраться не менее 2/3 голосов.\nДалее Конституция отправляется на одобрение в Верховный суд штата Сан-Андреас. После одобрения Верховным судом, Губернатор подписывает конституцию и дается 1 день на промульгацию и вступление в силу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-80", "number": "80", "title": "Губернатор имеет право вето на любые решения, принятые Сенатом, включая решения о пересмотре Конституции.", "content": "Статья 80\nГубернатор имеет право вето на любые решения, принятые Сенатом, включая решения о пересмотре Конституции.\nРешение, на которое Губернатором наложено вето, немедленно утрачивает юридическую силу и не подлежит повторному рассмотрению Сенатом без письменного согласия Губернатора.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-81", "number": "81", "title": "Главы 1, 2, 3, 5, 6, 12 возможно изменить лишь с помощью процедуры пересмотра Конституции.", "content": "Статья 81\n\nГлавы 1, 2, 3, 5, 6, 12 возможно изменить лишь с помощью процедуры пересмотра Конституции.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-82", "number": "82", "title": "Инициативу об изменении статей в главах, не указанных в статье 81, имеют сенаторы, Губернатор и Председатель Верховно...", "content": "Статья 82\n\nИнициативу об изменении статей в главах, не указанных в статье 81, имеют сенаторы, Губернатор и Председатель Верховного Суда.\nИзменение статей осуществляется через голосование Сената, где должно набраться не менее 2/3 голосов.\n\nГлава 13. Внесение изменений в Конституционные законы", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-83", "number": "83", "title": "Инициативу о внесение проектов изменений в конституционные законы имеют сенаторы, губернатор и Председатель Верховног...", "content": "Статья 83\n\nИнициативу о внесение проектов изменений в конституционные законы имеют сенаторы, губернатор и Председатель Верховного Суда. Пересмотр положений конституционных законов осуществляется через голосование в Сенате штата Сан-Андреас, где должно набраться не менее 2/3 голосов.\nДалее проект о внесении изменений в конституционный закон отправляется на одобрение в Верховный суд штата Сан-Андреас. После одобрения Верховным судом, Губернатор подписывает изменения в конституционный закон и дается 1 день на промульгацию и вступление в силу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-84", "number": "84", "title": "Губернатор имеет право вето на любые решения, принятые Сенатом, включая пересмотр и внесение изменений в конституцион...", "content": "Статья 84\n\nГубернатор имеет право вето на любые решения, принятые Сенатом, включая пересмотр и внесение изменений в конституционные законы.\nРешение, на которое Губернатором наложено вето, немедленно утрачивает юридическую силу и не подлежит повторному рассмотрению Сенатом без письменного согласия Губернатора.\n\nПоправки к Конституции штата Сан-Андреас\n\nПоправка 1. Граждане, вне зависимости от их цвета кожи, имеют все гражданские и политические права.\n\nПоправка 2. Дееспособные граждане штата Сан-Андреас имеют право на хранение и ношение оружия, порядок оборота которого устанавливаются законодательством и нормативно-правовыми актами штата Сан-Андреас.\n\nПоправка 3. Граждане имеют право на самооборону от преступных посягательств, в том числе и с помощью оружия.\n\nПоправка 4. Осуществления и введения особого статуса чрезвычайного и военного положения, ограничивающие Конституционные права и свободы граждан, может быть осуществлено Губернатором при наличии причин, явно требующих введения чрезвычайного или военного положения.\n\nПоправка 5. Право народа на охрану личности, жилища, бумаг и имущества от необоснованных обысков и арестов не должно нарушаться. Ни один ордер не должен выдаваться иначе, как при наличии достаточного основания; при этом ордер должен содержать подробное описание места, подлежащего обыску, лиц или предметов, субъекта ордера.\n\nПоправка 6. Ни один солдат не должен в мирное время размещаться на постой в каком-либо доме без согласия владельца; в военное время это возможно, но лишь в порядке, установленном законом.\n\nПоправка 7.Каждый гражданин имеет право подать прошение о помиловании губернатору штата Сан-Андреас при наличии одного или нескольких из следующих оснований:\n\nа) обнаружение новых или вновь открывшихся доказательств, которые могут свидетельствовать о судебной ошибке, ошибке следствия;\nб) наличие исключительных или смягчающих обстоятельств, не учтенных судом, следствием при вынесении приговора, решения;\nв) проявление образцового поведения в период отбывания наказания, свидетельствующего о полном исправлении;\nг) иные обстоятельства, позволяющие обоснованно считать дальнейшее исполнение наказания чрезмерным или нецелесообразным с точки зрения интересов правосудия;\nд) деятельное раскаяние обвиняемого;\nе) затянутое судебное разбирательство;\nж) положительная характеристика личности обвиняемого.\n\nОднако, губернатор не имеет права без согласования с верховным судом, помиловать гражданина, который был осужден по решению Верховного суда до отбытия назначенного им наказания.\n\nВ случае, если приговор был вынесен Верховным судом штата Сан-Андреас, помилование допускается только при наличии согласия данного суда, оформленного в виде письменного заключения.\n\nПомилование осуществляется на безвозмездной основе и не может быть обусловлено какими-либо встречными требованиями или обязательствами со стороны лица, в отношении которого оно предоставляется.\n\nНи одна норма настоящей Конституции штата Сан-Андреас, а также законы штата, не могут быть истолкованы как ограничивающие полномочия губернатора по принятию решения о помиловании в пределах, определённых настоящей поправкой.\n\nПоправка 8. Человек обладает правами в штате Сан-Андреас. К их числу относятся право на жизнь; право на достоинство личности; право на свободу и личную неприкосновенность; право на неприкосновенность частной жизни, личную и семейную тайну, защиту чести и доброго имени; право на тайну переписки, телефонных переговоров, почтовых, телеграфных и иных сообщений; право на неприкосновенность жилища; право свободно определять и указывать свою национальную принадлежность; право свободно передвигаться, выбирать место пребывания и жительства; свобода совести и вероисповедания; свобода мысли и слова; право на охрану здоровья и медицинскую помощь; право на образование; судебная защита прав и свобод; право на получение высококвалифицированной юридической помощи и другие.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "proj": [{"id": "proj-1.1", "number": "1.1", "title": "На проекте действует прецедентная система правил. (Если игрок совершил правонарушение, которое не описано ни в каких ...", "content": "1.1 На проекте действует прецедентная система правил. (Если игрок совершил правонарушение, которое не описано ни в каких правилах проекта, то он может быть наказан с разрешения ГА. Сделано это не с целью выдумывать правила \"на ходу\" и наказывать по ним, а потому, что все мы люди, могли что-то и забыть или не учесть).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-1.2", "number": "1.2", "title": "Проект позиционирует себя как русскоязычный, все диалоги должны происходить на русском языке.", "content": "1.2 Проект позиционирует себя как русскоязычный, все диалоги должны происходить на русском языке. | Mute 60-240 минут.\nИсключение: отдельные слова и фразы для отыгровки роли своего персонажа.", "punishment": "Mute 60-240 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-1.3", "number": "1.3", "title": "Администрация не компенсирует средства, услуги, предметы и т.д., которые были утрачены в силу функционального воздейс...", "content": "1.3 Администрация не компенсирует средства, услуги, предметы и т.д., которые были утрачены в силу функционального воздействия / задумки системы.\nПояснение: подразумеваемое изъятие предметов происходит без участия администрации, либо других лиц, все функциональные системы автономны. Например, если Вы не успели забрать вовремя предметы после покупки на маркетплейсе, то они у Вас пропадут.\nПример: пропажа предметов со склада маркетплейса и т.п.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-1.4", "number": "1.4", "title": "На проекте существуют различные виды наказаний; исходя из обстоятельств ситуации, а также грубости и многократности н...", "content": "1.4 На проекте существуют различные виды наказаний; исходя из обстоятельств ситуации, а также грубости и многократности нарушения игрок может получить:\n\n- PermBan — глобальная блокировка на всем проекте.\n- HardBan — блокировка аккаунта на определенном сервере без возможности игры на других персонажах / аккаунтах в рамках данного сервера.\n- Ban — блокировка определенного персонажа при возможности игры на другом в рамках одного сервера.\n- Demorgan — ограничение свободы в виде своеобразной игровой тюрьмы, которую невозможно покинуть до истечения срока.\n- GunBan — блокировка использования оружия пользователем.\n- Mute — блокировка использования голосового и текстового чатов пользователем.\n- Warn — внутриигровое предупреждение, снимающееся за MCoins.\n\n\nПоложение об аккаунте и персонаже\n\n\nПоложение об аккаунте:", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.1", "number": "2.1", "title": "Максимальное количество разрешенных аккаунтов на одного человека - один.", "content": "2.1 Максимальное количество разрешенных аккаунтов на одного человека - один. | Блокировка всех аккаунтов на 30 дней / PermBan.", "punishment": "Блокировка всех аккаунтов на 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.2", "number": "2.2", "title": "Запрещено передавать аккаунт 3-м лицам.", "content": "2.2 Запрещено передавать аккаунт 3-м лицам. | PermBan.", "punishment": "PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.3", "number": "2.3", "title": "Администрация не несет ответственности за аккаунт игрока в случае его передачи, взлома, обмана и т.д.", "content": "2.3 Администрация не несет ответственности за аккаунт игрока в случае его передачи, взлома, обмана и т.д.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.4", "number": "2.4", "title": "Запрещена продажа / обмен игровых аккаунтов.", "content": "2.4 Запрещена продажа / обмен игровых аккаунтов. | PermBan.", "punishment": "PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.5", "number": "2.5", "title": "Запрещено одновременно состоять несколькими персонажами во фракции / семье.", "content": "2.5 Запрещено одновременно состоять несколькими персонажами во фракции / семье. | WARN персонажей.\nИсключение: при покупке третьего персонажа можно вступать в любые две фракции / семьи (все три персонажа должны быть созданы).\nПояснение: какой именно персонаж находится во фракции / семье (1 и 3, 2 и 3, либо 1 и 2) не имеет никакого значения.\nПримечание: запрещено находится на старших / руководящих рангах в обеих фракциях.", "punishment": "WARN персонажей.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.6", "number": "2.6", "title": "Ограничения по участию в различного рода мероприятиях накладываются на персонажа, вне зависимости от его фракции/семьи.", "content": "2.6 Ограничения по участию в различного рода мероприятиях накладываются на персонажа, вне зависимости от его фракции/семьи. | WARN / HardBan 7 дней.\nПример: игрок А находясь в семье и фракции не может участвовать 4 раза в перехвате поставки, лимит нападений для игрока А составляет 2, вне зависимости от того нападает он с фракцией или с семьей.\n\nПоложение об игровом имуществе:", "punishment": "WARN / HardBan 7 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.7", "number": "2.7", "title": "Запрещено владеть имуществом без игровой активности.", "content": "2.7 Запрещено владеть имуществом без игровой активности. | Изъятие имущества.\nИгровая активность - это активность персонажа, которая присуща каждому игроку во время игры (перестрелки, игровые покупки, игра в азартные игры и т.п.)\nИгровой активностью не считается:\nОплата налогов\nОплата заказов\nАФК\nЕзда на автомобиле без конкретных целей (езда по кругу, чтоб начислялось зарплата, чтоб сделать видимость игровой активности и т.п.)\nДля сохранения своего имущества необходимо минимум 1-2 часа в день игровой активности (либо более продолжительное время в другие дни, при отсутствии возможности игры).\nМинимальная активность в неделю - 4 часа, в месяц - 30 часов.\nИсключение: решение ГА; в случае возникновения уважительных причин отсутствия активности возможно предупреждение ГА, с дальнейшим исключением и не изъятием имущества (только при одобрении и согласовании с ГА сервера).", "punishment": "Изъятие имущества.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.8", "number": "2.8", "title": "Запрещено иметь более 1 бизнеса на аккаунте.", "content": "2.8 Запрещено иметь более 1 бизнеса на аккаунте. | Изъятие бизнесов.\nПояснение: банкоматы не относятся к бизнесам.\n", "punishment": "Изъятие бизнесов.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.9", "number": "2.9", "title": "Персонажу запрещено иметь nonRP \"Имя Фамилия\", к nonRP никнеймам относятся:", "content": "2.9 Персонажу запрещено иметь nonRP \"Имя Фамилия\", к nonRP никнеймам относятся:\nИмена / фамилии, которых не существует в реальности или имеющие несуразное звучание.\nИмена, похожие на ники администраторов.\nНикнеймы несущие в себе скрытый смысл / звучание.\nЛюбые Имена / Фамилии политических деятелей, а также людей как-либо связанных с политической активностью.\n\nЗа подобный ряд никнеймов выдается demorgan до смены никнейма.\nВ случае получения игроком наказания за nonRP никнейм, дальнейшей его смены, а затем возврата идентичного или такого же nonRP никнейма, игрок получает 150 минут demorgan'a.\nГлавный администратор сервера имеет право отклонить никнейм без каких-либо обоснований или пояснений.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-2.10", "number": "2.10", "title": "Запрещено играть за персонажа противоположного Вам пола.", "content": "2.10 Запрещено играть за персонажа противоположного Вам пола. | Demorgan до смены внешности персонажа.\nПримечание: в случае получения игроком наказания за внешность, дальнейшей ее смены, а затем возврата идентичной или такой же внешности, игрок получает 150 минут demorgan'a.\nМодерация платформ\n", "punishment": "Demorgan до смены внешности персонажа.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.1", "number": "3.1", "title": "Администрация сервера вправе вынести наказания по зафиксированному нарушению с модерируемых платформ.", "content": "3.1 Администрация сервера вправе вынести наказания по зафиксированному нарушению с модерируемых платформ.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.2", "number": "3.2", "title": "Под модерацией находятся следующие платформы:", "content": "3.2 Под модерацией находятся следующие платформы:\nИгровые сервера проекта.\nОфициальные дискорд каналы проекта.\nTwitch / Youtube каналы медиа-партнеров.\nВидеоматериалы и скриншоты игроков проекта расположенных на доступных видео и фото хостингах.\nЛичные сообщения между администратором и игроком.\nФорум проекта.\nВнутриигровые функциональные системы.\nПример: автомобильные номера, ID карта, удостоверение, маркетплейс, диалоги с ботами, в которых интегрированы ИИ и т.п.\nПояснение: в подобных системах запрещено любое нарушение правил сервера, начиная от запрещенных слов / контента, заканчивая оскорблением родных.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.3", "number": "3.3", "title": "Наказание по зафиксированным нарушением выдается согласно общему регламенту проекта.", "content": "3.3 Наказание по зафиксированным нарушением выдается согласно общему регламенту проекта.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.4", "number": "3.4", "title": "Сообщения между игроками не входят в зону модерации администрацией.", "content": "3.4 Сообщения между игроками не входят в зону модерации администрацией.\nИсключение: распространение / угрозы распространения личной информации, покупка / продажа игрового имущества за реальные деньги, распространение закрытой информации, использование / распространение / продажа запрещенного ПО, угрозы в реальной жизни и др. грубые нарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.5", "number": "3.5", "title": "В случае грубого нарушения человек, оформляющий жалобу, может воспользоваться любым видеоматериалом из перечисленных ...", "content": "3.5 В случае грубого нарушения человек, оформляющий жалобу, может воспользоваться любым видеоматериалом из перечисленных платформ, дабы доказать нарушение игрока.\nПример: распространение / угрозы распространения личной информации, покупка / продажа игрового имущества за реальные деньги, распространение закрытой информации, использование / распространение / продажа запрещенного ПО и др. грубые нарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.6", "number": "3.6", "title": "Запрещено использовать запрещенные стримерской платформой (twitch, youtube и др.) слова, высказывания, предложения и ...", "content": "3.6 Запрещено использовать запрещенные стримерской платформой (twitch, youtube и др.) слова, высказывания, предложения и прочее. | Mute 60-120 минут / Ban 3-10 дней / HardBan 15-30 дней / PermBan.", "punishment": "Mute 60-120 минут / Ban 3-10 дней / HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.7.1", "number": "3.7.1", "title": "Запрещен намеренный \"стрим-снайп\".", "content": "3.7.1 Запрещен намеренный \"стрим-снайп\". | Ban 7-30 дней / HardBan 15-30 дней.\nПояснение: помеха стримерам / ютуберам, порча им игрового процесса, слишком навязчивая помощь без надобности / просьб и т.п.", "punishment": "Ban 7-30 дней / HardBan 15-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-3.7.2", "number": "3.7.2", "title": "Запрещено оказывать помощь стримерам, передавать деньги, подарки, предлагать рукопожатия и т.п. действия.", "content": "3.7.2 Запрещено оказывать помощь стримерам, передавать деньги, подарки, предлагать рукопожатия и т.п. действия. | Kick / Demorgan 15 минут / HardBan 7 дней.\nИсключение: просьба / инициатива самого стримера.\n\n\n\nИгровые чаты\n\nЗапрещено нарушение общих положений игрового чата:", "punishment": "Kick / Demorgan 15 минут / HardBan 7 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.1", "number": "4.1", "title": "Текстовый и голосовой чат является исключительно IC чатом, где запрещено любое общение по OOC.", "content": "4.1 Текстовый и голосовой чат является исключительно IC чатом, где запрещено любое общение по OOC. | Mute 30-90 минут / Demorgan 5 минут.\nИсключение: текстовые чаты /b (и подобные), обоюдное согласие при наличии не более 4 игроков, присутствие рядом администрации (с функциональной \"короной\"), разговоры в функциональных зеленых зонах, где преимущественное большинство игроков не против (более 75%).\nПримечание: вся OOC информация передается исключительно через /b, /fb, /gb и /cb чаты.", "punishment": "Mute 30-90 минут / Demorgan 5 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.2", "number": "4.2", "title": "Запрещено завуалированное оскорбление или упоминание родственников в оскорбительном, либо шуточном характере.", "content": "4.2 Запрещено завуалированное оскорбление или упоминание родственников в оскорбительном, либо шуточном характере. | Ban 5-30 дней / HardBan 15 дней.", "punishment": "Ban 5-30 дней / HardBan 15 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.3", "number": "4.3", "title": "Запрещено прямое оскорбление родственников.", "content": "4.3 Запрещено прямое оскорбление родственников. | HardBan 30-60 дней.", "punishment": "HardBan 30-60 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.4", "number": "4.4", "title": "Запрещен спам, флуд сообщениями или текстом в любые текстовые чаты.", "content": "4.4 Запрещен спам, флуд сообщениями или текстом в любые текстовые чаты. | Mute 10-60 минут.", "punishment": "Mute 10-60 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.5", "number": "4.5", "title": "Запрещено использование программ для изменения тональности голоса.", "content": "4.5 Запрещено использование программ для изменения тональности голоса. | Mute 10-60 минут.", "punishment": "Mute 10-60 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.6", "number": "4.6", "title": "Запрещено издавать громкие или мешающие звуки.", "content": "4.6 Запрещено издавать громкие или мешающие звуки. | Mute 10-120 минут.", "punishment": "Mute 10-120 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.7", "number": "4.7", "title": "Запрещена OOC травля и/или оскорбления игроков.", "content": "4.7 Запрещена OOC травля и/или оскорбления игроков. | Demorgan 15-60 минут / Ban 3-10 дней.\n\nПравила глобальных чатов (/dep, /gnews, /wnews, /mark):", "punishment": "Demorgan 15-60 минут / Ban 3-10 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.8", "number": "4.8", "title": "Запрещены оскорбления в грубой форме, а также использование матерной брани.", "content": "4.8 Запрещены оскорбления в грубой форме, а также использование матерной брани. | WARN.\nИсключение: использование голосовой рации.", "punishment": "WARN.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.9", "number": "4.9", "title": "Запрещена MG / OOC информация.", "content": "4.9 Запрещена MG / OOC информация. | WARN.", "punishment": "WARN.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.10", "number": "4.10", "title": "Запрещены сообщения / диалоги не несущие смысловую нагрузку.", "content": "4.10 Запрещены сообщения / диалоги не несущие смысловую нагрузку. | Mute 240 минут / WARN.\nИсключение: отдельные каналы в рации, в котором участники данного канала не возражают.", "punishment": "Mute 240 минут / WARN.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.11", "number": "4.11", "title": "Запрещено использование CapsLock.", "content": "4.11 Запрещено использование CapsLock. | Mute 120-240 минут.\nПример: \"САНГ, НА СВЯЗЬ\".", "punishment": "Mute 120-240 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-4.12", "number": "4.12", "title": "Запрещен спам / флуд нажатием включения рации.", "content": "4.12 Запрещен спам / флуд нажатием включения рации. | Mute 120 минут.\n\nRole Play процесс\n\nRole Play - это отыгровка выбранной роли в игровом процессе, через моделирование реального мира.\nИгровой процесс предполагает, что вы при игре за вашего персонажа, будете опираться на реальные человеческие качества и качественно отыгрывать свою роль.\n\nЗапрещено нарушение основных правил RolePlay:", "punishment": "Mute 120 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.1", "number": "5.1", "title": "DM (Deathmatch - прямое убийство / нанесение урона / стрельба по игроку, а также транспортному средству где сидит игр...", "content": "5.1 DM (Deathmatch - прямое убийство / нанесение урона / стрельба по игроку, а также транспортному средству где сидит игрок (включая дроны и др. подобные функциональные предметы), без IC причины и IC диалога). | GunBan 6 часов / Demorgan 120 минут / WARN / Ban 3-30 дней.\nИсключение: IC диалог не является обязательным фактором в следующих ситуациях:\nУгроза жизни персонажу / его союзникам (игроки из фракции, семьи), а именно: прицеливание оружием в сторону игроков, нанесение ударов, намеренный наезд на персонажа / союзников транспортом.\nГрубые оскорбления персонажа / его союзников (игроки из фракции, семьи). Грубым оскорблением считается: оскорбление / упоминание родственников, нации, этноса; нецензурные (матерные) оскорбления.\nУгон личного и/или семейного транспортного средства.\nОграбление бизнеса (разрешено убийство причастных к ограблению, запрещено убийство мимо проезжающих рабочих и т.п.).\nОграбление личного/семейного дома (запрещено убийство игроков непричастных к ограблению).\nТочки расположения контрабанды *распространяется только на игроков, которые взаимодействовали или взаимодействуют с контрабандой.\nПролет на дроне в опасных местах (местах скопления вооруженных людей, ограбления бизнесов, поставок, перестрелке и т.п.)\nОтключение камер игроками криминальных структур.\nМероприятие захват цехов / дилеров (разрешено убийство причастных к мероприятиям, запрещено убийство мимо проезжающих рабочих и т.п.)\nНарушение правил PG от игрока.\nПоднятие предметов во время перестрелки.", "punishment": "GunBan 6 часов / Demorgan 120 минут / WARN / Ban 3-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.2", "number": "5.2", "title": "DB (DriveBy - целенаправленный / умышленный наезд на игрока транспортом).", "content": "5.2 DB (DriveBy - целенаправленный / умышленный наезд на игрока транспортом). | Demorgan 30-90 минут / WARN / Ban 3-30 дней.", "punishment": "Demorgan 30-90 минут / WARN / Ban 3-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.3", "number": "5.3", "title": "NonRP.", "content": "5.3 NonRP. | Demorgan 15-90 минут / WARN / Ban / HardBan 3-30 дней.\nПоведение (действия, которые идут вразрез с РП логикой).\nDrive - вождение транспорта в невозможных для этого условиях.\nПример: заезд в интерьеры зданий, езда по горам, воде, рекам, езда по встречной полосе более 750 м / 15 секунд (в зависимости от ситуации), таран авто, таран легковым автомобилем более тяжелого и т.д.\nПримечание: наличие внедорожного транспорта (hummer, g63amg6x6, xclass, xclass monster-track, ram, f150, Buckingham XK, dubsta3, caracara, everon, bruiser 1/2/3, mesa3, marshall, monster, rebel, sandking SWB, guardian, sandking XL, contender, kamacho, draugur, warthog, snowshark) даёт возможность ездить по соответствующей местности, оценивая обстановку вокруг.\nFly - управление воздушным средством в невозможных для этого условиях.\nПример: низкие полеты над землей при большой скорости, близкие полеты около деревьев, пролеты под мостами. А так же совершать посадку вне предназначенных для этого местах: склоны более 40%, камни, дороги на которых в данный момент происходит оживленное движение транспортных средств и т.д.", "punishment": "Demorgan 15-90 минут / WARN / Ban / HardBan 3-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.4", "number": "5.4", "title": "NLR (New Life Rule - правила новой жизни) - после получения критических повреждений запрещено возвращение на место ги...", "content": "5.4 NLR (New Life Rule - правила новой жизни) - после получения критических повреждений запрещено возвращение на место гибели, нанесение урона, убийство игрока, за то что он нанёс урон/убил вас, посредством мести. | Demorgan 90 минут / WARN.\nПояснение: после смерти персонажа, он забывает последние 15 минут своей жизни и не может использовать данную информацию.", "punishment": "Demorgan 90 минут / WARN.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.5", "number": "5.5", "title": "PG (Power gaming) - преувеличение возможностей своего персонажа. Поведение игрока, которое он не смог бы себе позволи...", "content": "5.5 PG (Power gaming) - преувеличение возможностей своего персонажа. Поведение игрока, которое он не смог бы себе позволить в реальной жизни. | Demorgan 35-90 минут / WARN / Ban 2-7 дней.\nПримечание: правило PG работает по принципу 1x1. 2x3 - не будет являться нарушением, 1х2 и более - PG.\nИсключение: на сотрудников государственных силовых структур правило работает по принципу 1х2, 2х4, но только при наличии бронежилета; п.2.2 игровых зон; п. 1.13.1 и 1.13.2 правил ограблений и похищений.", "punishment": "Demorgan 35-90 минут / WARN / Ban 2-7 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.6", "number": "5.6", "title": "SK (Spawn kill) - стрельба по игрокам, нанесение урона, убийство на месте появления / базирования определенной группы...", "content": "5.6 SK (Spawn kill) - стрельба по игрокам, нанесение урона, убийство на месте появления / базирования определенной группы лиц или человека. | GunBan 8 часов / Ban 2-5 дней / HardBan 2-7 дней.\nИсключение: функциональное ограбление дома.\n\nСпойлер: Территории респавнов банд и особняков семей\n", "punishment": "GunBan 8 часов / Ban 2-5 дней / HardBan 2-7 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.7", "number": "5.7", "title": "TK (Team kill) - намеренное нанесение урона, убийство игроков / напарников, которые состоят с вами в одной организаци...", "content": "5.7 TK (Team kill) - намеренное нанесение урона, убийство игроков / напарников, которые состоят с вами в одной организации / семье. | GunBan 2-6 часов / Demorgan 50-120 минут / WARN / Ban 3-10 дней.\nИсключение: самооборона.", "punishment": "GunBan 2-6 часов / Demorgan 50-120 минут / WARN / Ban 3-10 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.8", "number": "5.8", "title": "MG (Meta Gaming) - использование OOC информации, которую ваш персонаж не знает \"по RP\".", "content": "5.8 MG (Meta Gaming) - использование OOC информации, которую ваш персонаж не знает \"по RP\". | Demorgan 20-90 минут / WARN / Ban 2-5 дней.", "punishment": "Demorgan 20-90 минут / WARN / Ban 2-5 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.9", "number": "5.9", "title": "Уход от RP.", "content": "5.9 Уход от RP. | WARN / HardBan 4-8 дней.\nПримечание: уход в АФК во время RP процесса, выход из игры, уход в воду / закрытый интерьер / использование дрона во время погони, так же приравнивается к уходу от RP, игнорирование отыгровок (в /do и т.д.) с упоминанием игрока через @dynamicID, использование вертикальной лестницы с целью уйти от погони.\nИсключение: согласие обеих сторон.", "punishment": "WARN / HardBan 4-8 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.10", "number": "5.10", "title": "Любые криминальные действия по отношению к сотрудникам EMS в рабочее время.", "content": "5.10 Любые криминальные действия по отношению к сотрудникам EMS в рабочее время. | Demorgan 90 минут / WARN всем участникам процесса.\nПримечание: на сотрудников EMS так же распространяются правила PG, они обязаны учитывать все обстоятельства.\nИсключение: PG со стороны сотрудника EMS.\n[Изменена мера наказания]", "punishment": "Demorgan 90 минут / WARN всем участникам процесса.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.11", "number": "5.11", "title": "Поднимать предметы во время перестрелки.", "content": "5.11 Поднимать предметы во время перестрелки. | Demorgan 35 минут / WARN.", "punishment": "Demorgan 35 минут / WARN.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.12", "number": "5.12", "title": "Запрещен вызов гос. структур с целью провокации или дальнейших криминальных действий в сторону гос. сотрудников, а та...", "content": "5.12 Запрещен вызов гос. структур с целью провокации или дальнейших криминальных действий в сторону гос. сотрудников, а также вызовы не несущие смысловой нагрузки. | Demorgan 15 - 60 минут / Ban 2 дня.", "punishment": "Demorgan 15 - 60 минут / Ban 2 дня.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.13", "number": "5.13", "title": "Провоцировать игроков на нарушение правил сервера.", "content": "5.13 Провоцировать игроков на нарушение правил сервера. | Demorgan 35-90 минут / Ban 3-30 дней / HardBan 15-30 дней.", "punishment": "Demorgan 35-90 минут / Ban 3-30 дней / HardBan 15-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.14", "number": "5.14", "title": "Запрещены любые виды, а также попытки обмана на имущество (OOC сделки, IC сделки с дальнейшим обманом и т.п.), а такж...", "content": "5.14 Запрещены любые виды, а также попытки обмана на имущество (OOC сделки, IC сделки с дальнейшим обманом и т.п.), а также создание лотерей без одобрения старшего серверного состава (лотереи, кейсы, \"мистерибоксы\" и т.п.) | HardBan 30 дней / PermBan + обнуление (в т.ч. сообщникам).\nПояснение: все сделки должны проводиться с помощью функционала сервера, не прибегая к составлению сторонних IC / OOC договоров; пострадавшая сторона не получает возврата потерянного имущества.\nПример: игра в кости на имущество, игра в кости на сумму, которую не позволяет функционал проекта (10.000.001 и более), обмен имущества на 2 и более транспорта и т.п.", "punishment": "HardBan 30 дней / PermBan + обнуление (в т.ч. сообщникам).", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.15", "number": "5.15", "title": "Запрещены любые увольнения / повышения / понижения / премирование / снятие / пополнение средств / выдача предупрежден...", "content": "5.15 Запрещены любые увольнения / повышения / понижения / премирование / снятие / пополнение средств / выдача предупреждений / выдача штрафа / ЧС организации / освобождение из КПЗ игроков с некорректной причиной и т.д. | Demorgan 60 минут / WARN / Ban 3-7 дней.", "punishment": "Demorgan 60 минут / WARN / Ban 3-7 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.16", "number": "5.16", "title": "В случае намеренного нарушения игроком(-ами) правил сервера в функциональных зеленых зонах, разрешено игнорировать си...", "content": "5.16 В случае намеренного нарушения игроком(-ами) правил сервера в функциональных зеленых зонах, разрешено игнорировать ситуацию / действия.\nПояснение: под игнорированием подразумевается полное отсутствие какой-либо реакции на действия/ситуацию, запрещены провокации и агрессивные действия, в ином случае может быть выдано наказание.\n\n\nЗапрещено нарушать правила отыгровок:", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.17", "number": "5.17", "title": "Запрещены любые оскорбительные и неуместные отыгровки в \"/me, /do, /try\".", "content": "5.17 Запрещены любые оскорбительные и неуместные отыгровки в \"/me, /do, /try\". | Demorgan 10-35 минут.\nПояснение: если игрок отыгрывает команды некорректно то его отыгровки не считаются действительными.\nПример: игрок в /do задает вопрос о состоянии человека, человек отвечает с маленькой буквы и без точки в конце, люди \"не видят\" данную отыгровку (так как она некорректная), в следствии чего игроку выдается наказание за уход от РП.", "punishment": "Demorgan 10-35 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.18", "number": "5.18", "title": "Запрещены отыгровки в свою пользу.", "content": "5.18 Запрещены отыгровки в свою пользу. | Demorgan 15-35 минут.\nПример: задавать вопросы в /do следующего характера - /do Человек является работником LSPD?", "punishment": "Demorgan 15-35 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.19", "number": "5.19", "title": "Разрешено игнорирование отыгровок /do не несущих смысловую нагрузку либо, не дающую никаких RP последствий, либо идущ...", "content": "5.19 Разрешено игнорирование отыгровок /do не несущих смысловую нагрузку либо, не дающую никаких RP последствий, либо идущие в разрез функционалу проекта.\nПример: /do Что у человека находится при себе? (есть функциональный обыск), /do VIN номер авто закрашен; /do Номера замазаны грязью; /do Документы утеряны, любые /do отыгровки связанные с угнанным транспортом (не даёт никаких RP последствий и/или идет в разрез функционалу).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-5.20", "number": "5.20", "title": "Разрешено не отыгрывать функциональные действия, сопровождающиеся автоматической отыгровкой.", "content": "5.20 Разрешено не отыгрывать функциональные действия, сопровождающиеся автоматической отыгровкой.\n\n\nЗапрещено\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.1", "number": "6.1", "title": "Запрещена любая помеха работе администрации.", "content": "6.1 Запрещена любая помеха работе администрации. | Kick / Mute 10-60 минут / Demorgan 10-100 минут / WARN / Ban 3-30 дней.\nАдминистратор / хелпер - OOC персонаж, его цель всячески помогать игрокам и решать различные конфликтные / спорные игровые ситуации;\nВсе, что происходит в присутствии администратора со знаком над головой, является OOC процессом;\nПеребивать администратора, препятствовать решению ситуации абсолютно в любом виде - запрещено;\nЗапрещены любые нарушения правил OOC / IC процесса, например DM, во время разбора ситуации администратором;\nЗа нарушение выдается наказание в соответствии с регламентом пункта правил, и исключительно на усмотрение самого администратора.\n\nЗапрещено:", "punishment": "Kick / Mute 10-60 минут / Demorgan 10-100 минут / WARN / Ban 3-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.2", "number": "6.2", "title": "Скрывать от администрации баги и уязвимости системы, а так же распространять.", "content": "6.2 Скрывать от администрации баги и уязвимости системы, а так же распространять. | Ban 7-30 дней / PermBan.", "punishment": "Ban 7-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.3", "number": "6.3", "title": "Скрывать от администрации злоумышленников.", "content": "6.3 Скрывать от администрации злоумышленников. | HardBan 15-30 дней / PermBan.", "punishment": "HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.4", "number": "6.4", "title": "Оскорбление, неуважительное отношение, унижение и неуважительное общение к администрации сервера, серверу и/или проекту.", "content": "6.4 Оскорбление, неуважительное отношение, унижение и неуважительное общение к администрации сервера, серверу и/или проекту. | Ban 5-30 дней / HardBan 10-60 дней.", "punishment": "Ban 5-30 дней / HardBan 10-60 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.5", "number": "6.5", "title": "Выдавать себя за администратора сервера.", "content": "6.5 Выдавать себя за администратора сервера. | Ban 7-30 дней.", "punishment": "Ban 7-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.6", "number": "6.6", "title": "При подаче жалобы в игре, запрещено удалять доказательства нарушения, если прошло менее 48 часов.", "content": "6.6 При подаче жалобы в игре, запрещено удалять доказательства нарушения, если прошло менее 48 часов. | Ban 2 дня.\nПримечание: автору видео(жалобы) необходимо указывать в названии видео: свой static, static нарушителя, время и дату.", "punishment": "Ban 2 дня.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.7", "number": "6.7", "title": "Нанесение вреда экономике сервера.", "content": "6.7 Нанесение вреда экономике сервера. | Ban 30 дней / HardBan 30 дней / PermBan.", "punishment": "Ban 30 дней / HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.8", "number": "6.8", "title": "Использовать уязвимости системы и баги.", "content": "6.8 Использовать уязвимости системы и баги. | Demorgan 35 минут / WARN / Ban 3-30 дней / HardBan 3-30 дней / Permban.", "punishment": "Demorgan 35 минут / WARN / Ban 3-30 дней / HardBan 3-30 дней / Permban.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.9", "number": "6.9", "title": "Переносить конфликты из OOC в IC и наоборот.", "content": "6.9 Переносить конфликты из OOC в IC и наоборот. | Ban 5-30 дней / HardBan 15-30 дней / PermBan.", "punishment": "Ban 5-30 дней / HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.10", "number": "6.10", "title": "Любые угрозы в реальной жизни.", "content": "6.10 Любые угрозы в реальной жизни. | Ban 10-30 дней / HardBan 15-30 дней / PermBan.", "punishment": "Ban 10-30 дней / HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.11", "number": "6.11", "title": "Обходить систему Anti-AFK.", "content": "6.11 Обходить систему Anti-AFK. | Ban 5-30 дней / HardBan 15-30 дней.", "punishment": "Ban 5-30 дней / HardBan 15-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.12", "number": "6.12", "title": "Действия, направленные на возбуждение ненависти, либо вражды, в IC и OOC на почве разногласия о гендерной, социальной...", "content": "6.12 Действия, направленные на возбуждение ненависти, либо вражды, в IC и OOC на почве разногласия о гендерной, социальной и т.п. принадлежности. | Demorgan 90 минут / Ban 3-15 дней / HardBan 3-15 дней.", "punishment": "Demorgan 90 минут / Ban 3-15 дней / HardBan 3-15 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.13", "number": "6.13", "title": "Любые завуалированные оскорбление вероисповедания, религии и нации, а также действия, направленные на возбуждение нен...", "content": "6.13 Любые завуалированные оскорбление вероисповедания, религии и нации, а также действия, направленные на возбуждение ненависти, либо вражды, в IC и OOC на почве разногласия о расовой, национальной, этнической, языковой принадлежности. | Ban 15-30 дней / HardBan 15-30 дней / Permban.\nПримечание: запрещены оскорбления на любых языках, а так же оскорбительные \"сленги\".", "punishment": "Ban 15-30 дней / HardBan 15-30 дней / Permban.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.14", "number": "6.14", "title": "Запрещены прямые оскорбления вероисповедования, религии, нации, а так же угнетения по какому-либо признаку или принад...", "content": "6.14 Запрещены прямые оскорбления вероисповедования, религии, нации, а так же угнетения по какому-либо признаку или принадлежности. | HardBan 30-60 дней / PermBan.", "punishment": "HardBan 30-60 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.15", "number": "6.15", "title": "Совершать многочисленные нарушения правил сервера.", "content": "6.15 Совершать многочисленные нарушения правил сервера. | Ban 15-30 дней / HardBan 15-30 дней / PermBan.", "punishment": "Ban 15-30 дней / HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.16", "number": "6.16", "title": "Использование постороннего ПО для получения игрового преимущества.", "content": "6.16 Использование постороннего ПО для получения игрового преимущества. | PermBan.\nПримечание: администрация имеет право сделать проверку ПК подозрительного игрока, в случае обнаружения какого-либо стороннего ПО выдается бан как за его использование. Отказ от проверки / выход во время проверки воспринимается как наличие стороннего ПО.", "punishment": "PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.17", "number": "6.17", "title": "Использование файлов/утилит для получения игрового преимущества.", "content": "6.17 Использование файлов/утилит для получения игрового преимущества. | HardBan 30 дней / PermBan.", "punishment": "HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.18", "number": "6.18", "title": "Какой-либо обход наказаний.", "content": "6.18 Какой-либо обход наказаний. | Permban.\nПримечание: при первом обходе наказания игроку выдается ЧС сервера, на котором было совершено нарушение, при втором обходе наказания игроку выдается ЧС проекта.", "punishment": "Permban.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.19", "number": "6.19", "title": "Реклама посторонних ресурсов.", "content": "6.19 Реклама посторонних ресурсов. | HardBan 15-30 дней / PermBan.\nПример: сторонние ссылки, проекты GTA V, неофициальные дискорды и т.п.", "punishment": "HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.20", "number": "6.20", "title": "Пользоваться уязвимостью правил сервера.", "content": "6.20 Пользоваться уязвимостью правил сервера. | Ban 5-30 дней / HardBan 5-30 дней.", "punishment": "Ban 5-30 дней / HardBan 5-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.21", "number": "6.21", "title": "Запрещены любые финансовые операции / договоренности, связанные с продажей игровой валюты, ценностей или услуг за реа...", "content": "6.21 Запрещены любые финансовые операции / договоренности, связанные с продажей игровой валюты, ценностей или услуг за реальные деньги / имущество. | PermBan.\nПримечание: запрещена любая заинтересованность. | HardBan 15-30 дней.\nПояснение: любые транзакции должны происходить исключительно через официальный сайт или через F2 - Магазин, в игре.", "punishment": "PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.22", "number": "6.22", "title": "Трансфер имущества между серверами.", "content": "6.22 Трансфер имущества между серверами. | HardBan 30 дней / PermBan + аннулирование сделки.", "punishment": "HardBan 30 дней / PermBan + аннулирование сделки.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.23", "number": "6.23", "title": "Распространение информации или материалов касающихся работы администрации проекта.", "content": "6.23 Распространение информации или материалов касающихся работы администрации проекта. | HardBan 30 дней / PermBan.\nПримечание: к данной информации относятся: закрытые голосовые каналы / чаты администрации, видеозаписи работы администрации от его лица и т.п.", "punishment": "HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.24", "number": "6.24", "title": "Распространение / угрозы распространения личной информации игроков / администрации и их родственников.", "content": "6.24 Распространение / угрозы распространения личной информации игроков / администрации и их родственников. | HardBan 30 дней / PermBan.", "punishment": "HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.25", "number": "6.25", "title": "Вредительство проекту, серверу, форуму, официальным Discord серверам проекта, а также репутации администрации, сервер...", "content": "6.25 Вредительство проекту, серверу, форуму, официальным Discord серверам проекта, а также репутации администрации, сервера или проекта. | HardBan 30 дней / PermBan.", "punishment": "HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.26", "number": "6.26", "title": "Вводить в заблуждения / обманывать администрацию проекта.", "content": "6.26 Вводить в заблуждения / обманывать администрацию проекта. | Ban 10-30 дней / HardBan 10-30 дней / PermBan.", "punishment": "Ban 10-30 дней / HardBan 10-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.27", "number": "6.27", "title": "Злоупотребление функционалом сервера.", "content": "6.27 Злоупотребление функционалом сервера. | WARN / Ban 3-30 дней / HardBan 10-30 дней.", "punishment": "WARN / Ban 3-30 дней / HardBan 10-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.28", "number": "6.28", "title": "Обход функционала сервера.", "content": "6.28 Обход функционала сервера. | Ban 3-30 дней / HardBan 10-30 дней.", "punishment": "Ban 3-30 дней / HardBan 10-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.29", "number": "6.29", "title": "Помеха РП процессу.", "content": "6.29 Помеха РП процессу. | Ban 2-5 дней.", "punishment": "Ban 2-5 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.30", "number": "6.30", "title": "Намеренно подставлять лидера, для дальнейшего получения им выговора / снятия.", "content": "6.30 Намеренно подставлять лидера, для дальнейшего получения им выговора / снятия. | Ban 5-30 дней / HardBan 15-30 дней.", "punishment": "Ban 5-30 дней / HardBan 15-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.31", "number": "6.31", "title": "Создавать помехи игрокам, выполняющим задания в деморгане.", "content": "6.31 Создавать помехи игрокам, выполняющим задания в деморгане. | WARN / Ban 2-5 дней.\nПример: бить другого игрока выполняющего задание, преграждать открытие клетки и т.п.", "punishment": "WARN / Ban 2-5 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.32.1", "number": "6.32.1", "title": "Нарушение правил сервера с целью получения / сохранения спец. средств (вооружения и т.д).", "content": "6.32.1 Нарушение правил сервера с целью получения / сохранения спец. средств (вооружения и т.д). | HardBan 10-20 дней + изъятие предметов.\nИсключение: свап, выход из игры в наручниках (оружие изымается системой).", "punishment": "HardBan 10-20 дней + изъятие предметов.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.32.2", "number": "6.32.2", "title": "В случае дальнейшей реализации выбитых спец. средств с нарушением п.32.1 игрок получает HardBan 999 дней / PermBan.", "content": "6.32.2 В случае дальнейшей реализации выбитых спец. средств с нарушением п.32.1 игрок получает HardBan 999 дней / PermBan.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.33", "number": "6.33", "title": "Активная реклама личных промокодов, соц. сетей и т.п. ресурсов.", "content": "6.33 Активная реклама личных промокодов, соц. сетей и т.п. ресурсов. | Удаление промокода + Ban 5-30 дней.\nПример: реклама промокода на спавне новичков.", "punishment": "Удаление промокода + Ban 5-30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.34", "number": "6.34", "title": "Внутриигровые обмены донат-услуг на имущество.", "content": "6.34 Внутриигровые обмены донат-услуг на имущество. | Ban 30 дней / HardBan 30 дней.\nПример: обмен виртуальной валюты на подарочный опыт боевого пропуска; покупка уровней боевого пропуска другому игроку с целью наград, которые получит игрок и т.п..", "punishment": "Ban 30 дней / HardBan 30 дней.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.35", "number": "6.35", "title": "Взлом игровых аккаунтов / имущества, а также соучастие во взломе.", "content": "6.35 Взлом игровых аккаунтов / имущества, а также соучастие во взломе. | HardBan 30 дней / PermBan.", "punishment": "HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "proj-6.36", "number": "6.36", "title": "Любые договорённости, сговоры и участие в аукционных торгах за имущество с целью получения его по заниженной стоимости.", "content": "6.36 Любые договорённости, сговоры и участие в аукционных торгах за имущество с целью получения его по заниженной стоимости. | Изъятие полученного имущества.\nПример: договорённости по распределению бизнесов и отсутствие борьбы за другие лоты, разделение бизнесов между участниками аукциона и так далее.\nПояснение: нарушением считается, если участники аукциона, имея финансовую возможность и экономически рациональное решение об участии в аукционе, намеренно упускает такую возможность с целью победы другого игрока и дальнейшего его приобретения по заниженной стоимости.", "punishment": "Изъятие полученного имущества.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}], "family": [{"id": "family-1.1", "number": "1.1", "title": "На участников семей распространяются все правила, которые действуют на обычных игроков.", "content": "1.1 На участников семей распространяются все правила, которые действуют на обычных игроков.\nПримечание: наказание в виде выговоров лидерам заменяется на часы/дни заморозки семей.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.2", "number": "1.2", "title": "При совершении криминальных действий на игроков семьи распространяются все основные правила проекта, присущи любому м...", "content": "1.2 При совершении криминальных действий на игроков семьи распространяются все основные правила проекта, присущи любому мероприятию / действию.\nПояснение: общие правила проекта и основных мероприятий, правила криминальных организаций, правила государственных организаций.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.3", "number": "1.3", "title": "Запрещено сливать склад/баланс/имущество семьи.", "content": "1.3 Запрещено сливать склад/баланс/имущество семьи. | Demorgan 60-100 минут / Ban 3-30 дней / HardBan 15-30 дней / PermBan.", "punishment": "Demorgan 60-100 минут / Ban 3-30 дней / HardBan 15-30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.4", "number": "1.4", "title": "Разрешено иметь 4 союза с другими семьями.", "content": "1.4 Разрешено иметь 4 союза с другими семьями.\nПримечание: при заключении / разрыве союзной или враждебной дипломатии она должна быть отписана в discord-канале Families, иначе она считается недействительной. Cообщение не может быть подвергнуто редакции или изменениям. Все новые союзы или их разрывы, должны быть написаны новым сообщением.\nПример: семья1 заключила союз с семья2 / семья1 разорвала союз с семья2; семья1 объявила войну семья2 / семья1 разорвала враждебную дипломатию с семья2.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.5", "number": "1.5", "title": "Запрещено использовать склад фракций для нужд семейных организаций.", "content": "1.5 Запрещено использовать склад фракций для нужд семейных организаций. | HardBan 30 дней / PermBan.", "punishment": "HardBan 30 дней / PermBan.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.6", "number": "1.6", "title": "В случае массовых нарушений состава семейной организации к ней могут быть применены санкции, вплоть до расформирования.", "content": "1.6 В случае массовых нарушений состава семейной организации к ней могут быть применены санкции, вплоть до расформирования.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.7", "number": "1.7", "title": "Респавном семьи является дом / офис, который был оформлен на семейную организацию.", "content": "1.7 Респавном семьи является дом / офис, который был оформлен на семейную организацию.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.8", "number": "1.8", "title": "Государственные организации вправе сделать рейд на семейный дом (респавн) или семейный склад при наличии весомых дока...", "content": "1.8 Государственные организации вправе сделать рейд на семейный дом (респавн) или семейный склад при наличии весомых доказательств, а также одобренного документа (ордера) администрацией сервера и правительством.\nПримечание: см. правила рейдов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.9", "number": "1.9", "title": "Семейные организации вправе захватывать другой семейный дом (респавн), при наличии весомых доказательств, а также одо...", "content": "1.9 Семейные организации вправе захватывать другой семейный дом (респавн), при наличии весомых доказательств, а также одобренного документа (кейс-файла) администрацией сервера.\nПримечание: см. правила захвата особняков.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.10", "number": "1.10", "title": "Если игрок состоит во фракции и семейной организации, то цвет при криминальных действиях определяется характером дейс...", "content": "1.10 Если игрок состоит во фракции и семейной организации, то цвет при криминальных действиях определяется характером действий (фракционные / семейные). | Demorgan 35-60 минут.\nПример: игрок состоит во фракции Ballas Gang и состоит в семье, у которой основной цвет - белый, совершая криминальные действия с фракцией игрок должен соблюдать дресс-код фракции Ballas Gang, а именно фиолетовый, если ограбления происходит исключительно в составе семьи, то цвет при криминальных действиях должен быть белый.", "punishment": "Demorgan 35-60 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.11", "number": "1.11", "title": "Запрещен трансфер состава на любые семейные мероприятия, включая капты.", "content": "1.11 Запрещен трансфер состава на любые семейные мероприятия, включая капты. | Заморозка семьи на 2-7 дней / HardBan 15-30 дней / Понижение на один уровень семьи, в/из которых произошел трансфер.", "punishment": "Заморозка семьи на 2-7 дней / HardBan 15-30 дней / Понижение на один уровень семьи, в/из которых произошел трансфер.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.12", "number": "1.12", "title": "Запрещено принимать участие в мероприятиях, которые функционально закрыты у семейной организации.", "content": "1.12 Запрещено принимать участие в мероприятиях, которые функционально закрыты у семейной организации. | Заморозка семьи на 3-5 дней / HardBan 5-10 дней / Понижение на 1 уровень семьи.\nПример: участие на ВЗА, ФЗ или поставках, когда функционально семья не имеет еще доступ к ним.", "punishment": "Заморозка семьи на 3-5 дней / HardBan 5-10 дней / Понижение на 1 уровень семьи.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.13", "number": "1.13", "title": "Запрещена покупка/продажа/передача материалов, а также скрафченных предметов между разными типами организаций.", "content": "1.13 Запрещена покупка/продажа/передача материалов, а также скрафченных предметов между разными типами организаций. | HardBan 15-30 / Заморозка семьи на 5-10 дней + откат сделки.\nПример: запрещен обмен материалов семья-фракция (и наоборот), разрешено обменивать материалы семья-семья.", "punishment": "HardBan 15-30 / Заморозка семьи на 5-10 дней + откат сделки.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.14", "number": "1.14", "title": "Семье запрещено иметь оскорбительное/неуместное название.", "content": "1.14 Семье запрещено иметь оскорбительное/неуместное название. | Заморозка cемьи до смены названия / Расформирование семьи.\nПримечание: ГА/главный куратор имеют право отклонить название семьи без объяснения причин.", "punishment": "Заморозка cемьи до смены названия / Расформирование семьи.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.15", "number": "1.15", "title": "При рассекречивании лидера семьи путем РП-расследования, семья получает функциональную заморозку сроком на 5 дней, а ...", "content": "1.15 При рассекречивании лидера семьи путем РП-расследования, семья получает функциональную заморозку сроком на 5 дней, а также сотрудники государственных фракций могут задерживать игроков в течении 14 дней с целью досмотра на нелегальные предметы.\nПояснение: игрок определяется дресс-кодом, который был рассекречен и указан в кейсе, в случае не обнаружения у игрока нелегальных предметов он должен быть освобожден.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "family-1.16", "number": "1.16", "title": "Запрещено любое стороннее вмешательство в систему рейтинга / очков влиятельности.", "content": "1.16 Запрещено любое стороннее вмешательство в систему рейтинга / очков влиятельности. | Заморозка на 21 - 30 дней / Обнуление рейтинга семьи.\ ение: в случае, если фракция, заказывающая материалы, намеренно игнорирует запросы о помощи / сопровождении от SANG, то наказание по данному пункту не выдается.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "kaio-3.4", "number": "3.4", "title": "От сотрудников SANG требуется вести минимум 2 видеозаписи с поставки материалов.", "content": "3.4 От сотрудников SANG требуется вести минимум 2 видеозаписи с поставки материалов. | Выговор лидеру.\nПримечание: на видео должен быть момент загрузки матовозок, оригинальный звук, качество не менее 720p, участники обязаны хранить видеозапись с поставки 72 часа и предоставить её по первому требованию администрации.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "kaio-3.5", "number": "3.5", "title": "Поставку материалов необходимо осуществлять в порядке очереди доступных заказов.", "content": "3.5 Поставку материалов необходимо осуществлять в порядке очереди доступных заказов. | Выговор лидеру.\n\n\nПравила для криминальных фракций / семей\n", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "kaio-4.1", "number": "4.1", "title": "Данный подраздел правил распространяется на все поставки, включая перехваты поставок криминальных организаций.", "content": "4.1 Данный подраздел правил распространяется на все поставки, включая перехваты поставок криминальных организаций.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "kaio-4.2", "number": "4.2", "title": "Все поставки, а также их перехват должен осуществляться на фракционном / семейном / личном транспорте окрашенным в цв...", "content": "4.2 Все поставки, а также их перехват должен осуществляться на фракционном / семейном / личном транспорте окрашенным в цвет фракции / семьи. | Demorgan 35 минут.\nПримечание: цвет фракции определяется по цвету фракционного транспорта, цвет
