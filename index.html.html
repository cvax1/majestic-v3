вителя, за исключением случаев, преду смотренных частью четвертой настоящей статьи, и подлежат прекращению в связи с примирением потерпевшего с обвиняемым. Примирение сторон допускается до направления уголовного дела в суд.\n\nч. 3. Уголовные дела частно-публичного обвинения возбуждаются не иначе как по заявлению потерпевшего или его законного представителя, но прекращению в связи с примирением потерпевшего с обвиняемым не подлежат. К уголовным делам частно-публичного обвинения относятся уголовные дела о преступлениях, предусмотренных ст. ст. 6.1 ч.1 8.1 ч. 1, 8.2, 8.3, 10.1 ч. 1, 10.2, 10.2.1, 10.3, 10.5, 10.6, 10.7 Уголовного кодекса штата Сан-Андреас.\n\nч. 4. Следователь, прокурор возбуждают уголовное дело о любом преступлении, указанном в частях второй и третьей настоящей статьи, в том числе при отсутствии заявления потерпевшего или его законного представителя, если данное преступление совершено в отношении лица, которое в силу зависимого или беспомощного состояния либо по иным причинам не может защищать свои права и законные интересы. К иным причинам относится также случай совершения преступления лицом, данные о котором не известны.\n\nч. 5. Уголовные дела, за исключением уголовных дел, указанных в частях второй и третьей настоящей статьи, считаются уголовными делами публичного обвинения.\n\nСтатья. 76 Обвинительное заключение\n\nч. 1. В обвинительном заключении следователь указывает:\n\nа) фамилии, имена обвиняемого или обвиняемых;\nб) данные о личности каждого из них;\nв) существо обвинения, место и время совершения преступления, его способы, мотивы, цели, последствия и другие обстоятельства, имеющие значение для данного уголовного дела;\nг) формулировку предъявленного обвинения с указанием пункта, части, статьи Уголовного кодекса штата Сан-Андреас, предусматривающих ответственность за данное преступление;\nд) перечень доказательств, подтверждающих обвинение, и краткое изложение их содержания;\nе) обстоятельства, смягчающие и отягчающие наказание;\nл) данные о потерпевшем, характере и размере вреда, причиненного ему преступлением;\n\nч. 2. Обвинительное заключение подписывается следователем с указанием места и даты его составления.\n\nч. 3. К обвинительному заключению прилагается список подлежащих вызову в судебное заседание лиц со стороны обвинения с указанием их места жительства.\n\nч. 4. После подписания следователем обвинительного заключения уголовное дело немедленно направляется Генеральному Прокурору штата Сан-Андреас и(или) его заместителям или советникам генерального прокурора.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-77", "number": "77", "title": "Решение прокурора по уголовному делу", "content": "Статья 77. Решение прокурора по уголовному делу\n\nч. 1 Генеральный Прокурор и(или) его заместители и(или) советники генерального прокурора рассматривают поступившее от следователя, прокурора уголовное дело с обвинительным заключением и в течение суток принимает по нему одно из следующих решений:\n\nа) об утверждении обвинительного заключения и о направлении уголовного дела в суд;\nб) о возвращении уголовного дела следователю для производства дополнительного следствия, изменения объема обвинения либо квалификации действий обвиняемых или пересоставления обвинительного заключения и устранения выявленных недостатков со своими письменными указаниями;\nв) об утверждении обвинительного заключения и авторизации ордера на арест.\n\nч. 2 В случае сложности или большого объема уголовного дела срок, установленный ч. 1 настоящей статьи, может быть продлен до 3 суток.\n\nч. 3 В случае, предусмотренного пунктом б части первой, настоящей статьи, прокурор рассматривающий уголовное дело выносит мотивированное постановление.\n\nГлава XVII. Направление уголовного дела в суд", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-78", "number": "78", "title": "Направление уголовного дела в суд", "content": "Статья 78. Направление уголовного дела в суд\nч. 1. После утверждения обвинительного заключения, если не авторизован ордер на арест, прокурор направляет уголовное дело в суд, о чем уведомляет обвиняемого, его защитника, потерпевшего, и (или) представителей.\nч. 2. Копия обвинительного заключения с приложениями вручается прокурором обвиняемому. Копии обвинительного заключения вручаются также защитнику и потерпевшему, если они ходатайствуют об этом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-78.1", "number": "78.1", "title": "Обстоятельства, исключающие участие в производстве по уголовному делу", "content": "Статья 78.1. Обстоятельства, исключающие участие в производстве по уголовному делу\n\nч. 1. Прокурор, следователь не может участвовать в производстве по уголовному делу, если он:\n1) является потерпевшим по делам частного и частно-публичного обвинения, гражданским истцом, гражданским ответчиком по данному уголовному делу;\n2) участвовал в качестве присяжного заседателя, эксперта, специалиста, переводчика, понятого, помощника судьи, секретаря судебного заседания, защитника, законного представителя подозреваемого, обвиняемого, представителя потерпевшего, гражданского истца или гражданского ответчика;\n3) является близким родственником или родственником любого из участников производства по данному уголовному делу.\n\nч. 2. Лица, указанные в части первой настоящей статьи, не могут участвовать в производстве по уголовному делу также в случаях, если имеются иные обстоятельства, дающие основание полагать, что они лично, прямо или косвенно, заинтересованы в исходе данного уголовного дела.\n\nч. 3. Наличие информации о внепроцессуальном обращении, поступившем прокурору или следователю по уголовному делу, находящемуся в его производстве, само по себе не может рассматриваться в качестве основания для отвода.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-78.2", "number": "78.2", "title": "Недопустимость участия в производстве по уголовному делу лиц, подлежащих отводу", "content": "Статья 78.2. Недопустимость участия в производстве по уголовному делу лиц, подлежащих отводу\nч. 1. При наличии оснований для отвода, предусмотренных настоящей главой, прокурор, следователь обязаны устраниться от участия в производстве по уголовному делу.\n\nч. 2. В случае, если лица, указанные в части первой настоящей статьи, не устранились от участия в производстве по уголовному делу, отвод им может быть заявлен подозреваемым, обвиняемым, его законным представителем, защитником, а также государственным обвинителем, потерпевшим, гражданским истцом, гражданским ответчиком или их представителями.\n\nч. 3. В случае отказа в удовлетворении заявления об отводе подача повторного заявления об отводе тем же лицом и по тем же основаниям не допускается.\n\nч. 4. Решение об отказе в удовлетворении заявления об отводе, принятое в ходе досудебного производства по уголовному делу, не является препятствием для последующей подачи заявления об отводе тем же лицом в отношении того же лица и по тем же основаниям в ходе судебного производства по уголовному делу.\n\nч. 5. Вопрос об отводе следователя, прокурора разрешается ими же немедленно после поступления соответствующего заявления. В случае несогласия сторон с решением об отказе в удовлетворении отвода, заявитель вправе обратиться с жалобой в суд либо в Офис Генерального Прокурора для проверки законности и обоснованности принятого решения.\n\nГлава XVIII. Терминология", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-79", "number": "79", "title": "Основные понятия, используемые в настоящем Кодексе", "content": "Статья 79. Основные понятия, используемые в настоящем Кодексе\n\nч. 1. Если не оговорено иное, основные понятия, используемые в настоящем Кодексе, имеют следующие значения:\nАлиби — нахождение подозреваемого или обвиняемого в момент совершения правонарушения в другом месте;\nАпелляционная инстанция — суд второй инстанции, рассматривающий в апелляционном порядке дела по жалобам, приговорам, определениям и постановлениям суда;\nБлизкие лица — иные, за исключением близких родственников и родственников, лица, состоящие в свойстве с потерпевшим, свидетелем, а также лица, жизнь, здоровье и благополучие которых дороги потерпевшему, свидетелю в силу сложившихся личных отношений;\nБлизкие родственники — супруг, супруга, родители, дети, усыновители, усыновленные, родные братья и родные сестры, дедушка, бабушка, внуки;\nВердикт — решение о виновности или невиновности подсудимого, вынесенное коллегией присяжных заседателей;\nГосударственный обвинитель — поддерживающее от имени государства обвинение в суде по делу должностное лицо Офиса Генерального прокурора;\nДосудебное производство — судопроизводство с момента получения сообщения о правонарушении до направления прокурором дела в суд для рассмотрения его по существу;\nЖилище — индивидуальный жилой дом с входящими в него жилыми и нежилыми помещениями, жилое помещение независимо от формы собственности, входящее в жилищный фонд и используемое для постоянного или временного проживания, а равно иное помещение или строение, не входящее в жилищный фонд, но используемое для временного проживания;\nЗаконная сила — обязательность и непреложность решения, акта или нормы права. Оно подразумевает, что данное решение или акт должны исполняться и признаются действительными до тех пор, пока не будут отменены или изменены в установленном законом порядке. Решение, вступившее в законную силу, не может быть обжаловано;\nЗадержание — мера процессуального принуждения, применяемая сотрудниками силовых структур на срок не более 1 часа с момента фактического задержания лица по подозрению в совершении правонарушения;\nОсмотр — это процесс визуального изучения места происшествия, местности, лиц, жилища, иных помещений, предметов и документов уполномоченным на то лицом, с целью обнаружения следов правонарушения или выяснения других обстоятельств, имеющих значение для дела. При осмотре не допускается применение физического воздействия к осматриваемым объектам и лицам.\n\nДосмотр — обследование вещей уполномоченным на то лицом, проводимое без нарушения их конструктивной целостности. Досмотр осуществляется в целях обнаружения потенциально опасных предметов (огнестрельного и иного оружия, специальных средств, колюще-режущих предметов и иных предметов, которые могут быть использованы в качестве оружия), а также в иных случаях, предусмотренных законом. При этом лицо. подвергаемое досмотру может отказаться от прохождения досмотра с условием, что оно будет выдворено с территории или не будет допущено на территорию, а в отдельно предусмотренных случаях - не будет выпущено с территории, для нахождения на которой или при пересечении границы которого прохождение досмотра является обязательным;\n\nОбыск — это следственное действие, состоящее в обследовании уполномоченным на то лицом, помещений либо лиц (личный\nобыск) в целях обнаружения предметов, имеющих какое-либо значение для уголовного или административного производства;\n\nКассационная инстанция — суд третьей инстанции, рассматривающий в кассационном порядке дела по жалобам, приговорам, определениям и постановлениям апелляционного суда;\n\nМомент фактического задержания — момент производимого в порядке, установленном настоящим Кодексом, фактического лишения свободы передвижения лица, подозреваемого в совершении правонарушения;\n\nНепричастность — неустановленная причастность либо установленная непричастность лица к совершению правонарушения;\n\nНочное время — промежуток времени с 22 до 6 часов по местному времени;\n\nОбвинение — утверждение о совершении определенным лицом деяния, запрещенного Уголовным кодексом или Кодексом об административных правонарушениях, выдвинутое в порядке, установленном настоящим Кодексом;\n\nОпределение — любое решение, вынесенное судами первой и апелляционной инстанций, за исключением приговора.\n\nПостановление — любое решение, за исключением приговора, вынесенное судьей; решение прокурора, следователя.\n\nПредседательствующий — судья, который руководит судебным заседанием при коллегиальном рассмотрении дела, а также судья, рассматривающий дело единолично;\n\nПриговор — решение о невиновности или виновности подсудимого и назначении ему наказания либо об освобождении его от наказания, вынесенное судом первой или апелляционной инстанции;\n\nПрисяжный заседатель — лицо, привлеченное в установленном законом порядке для участия в судебном разбирательстве и вынесения вердикта;\n\nПроцессуальное действие — следственное, судебное или иное действие, предусмотренное настоящим Кодексом;\n\nПромежуточное судебное решение — все определения и постановления суда, за исключением итогового судебного решения;\n\nСвидетельский иммунитет — право лица не давать показания против себя и своих близких родственников, а также в иных случаях, предусмотренных настоящим Кодексом;\n\nСледователь — служащий правоохранительных органов, уполномоченный в пределах компетенции, предусмотренной действующим законодательством, осуществлять следствие по уголовному делу или делу об административном правонарушении;\n\nСудебное заседание — процессуальная форма осуществления правосудия в ходе досудебного и судебного производства по делу;\n\nСудебное разбирательство — судебное заседание судов первой и второй инстанций;\n\nСуд первой инстанции — суд, рассматривающий дело по существу и правомочный выносить приговор, а также принимать решения в ходе досудебного производства по делу;\n\nСуд второй инстанции — суд апелляционной инстанции;(апелляция);\n\nСуд третьей инстанции — суд кассационной инстанции (кассация)\n\nСудебное решение — приговор, определение, постановление, вынесенные при производстве по делу в судах первой и второй инстанций.\n\nИтоговое судебное решение — приговор, иное решение суда, вынесенное в ходе судебного разбирательства, которым дело разрешается по существу;\n\nВнепроцессуальное обращение — поступившее обращение в письменной или устной форме не являющихся участниками судебного разбирательства государственного органа, органа местного самоуправления, иного органа, организации, должностного лица или гражданина, либо обращение в не предусмотренной процессуальным законодательством форме участников судебного и досудебного разбирательства;\n\nПриказ — вид акта управления, волевое властное официальное распоряжение руководителя, командира или начальника, отданное в пределах его должностных полномочий и обязательное для исполнения подчиненными.\n\nЗаконное требование государственного служащего — распоряжение, указание, поручение или запрос, предъявленные при исполнении служебных обязанностей, в пределах компетенции, на основании настоящего Кодекса, иного нормативно-правового акта, судебного решения, ордера, постановления или акта уполномоченного лица.\nПримечание: Требование должно быть конкретным, исполнимым и направленным на достижение законной цели в соответствии со статьей 8.1 настоящего Кодекса.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "court": [{"id": "court-1", "number": "1", "title": "О судебной системе", "content": "Статья 1. О судебной системе\n\nч. 1 Судебная система штата Сан-Андреас устанавливается Конституцией штата Сан-Андреас и настоящим Законом.\n\nч. 2 Настоящий Закон состоит из норм материального и процессуального права.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-2", "number": "2", "title": "Основные понятия, используемые в настоящем Законе", "content": "Статья 2. Основные понятия, используемые в настоящем Законе\n\nч. 1 Если в правовой норме настоящего Закона не оговорено иное, либо это не предусмотрено Законом, то:\n\nа) под штатом понимается штат Сан-Андреас;\nб) под судом понимаются Окружной Суд штата Сан-Андреас, Апелляционный Суд штата Сан-Андреас, Верховный Суд штата Сан-Андреас, Федеральный суд;\nв) под судьей понимаются Окружной Судья, Верховный Судья, заместитель Председателя Окружного Суда, Председатель Окружного Суда, Апелляционный Судья, заместитель Председателя Апелляционного Суда, Председатель Апелляционного Суда, заместитель Председателя Верховного Суда, Председатель Верховного Суда;\nг) под делом понимается принятое к производству исковое заявление, жалоба, уголовное дело или дело об административном правонарушении;\nд) под правонарушением понимаются уголовные преступления, административные правонарушения и дисциплинарные проступки;\nе) под высокопоставленными лицами понимаются лица, занимающие высшие государственные должности в государственных органах. К высокопоставленным лицам относятся: губернатор штата Сан-Андреас, главы государственных структур (шеф полицейского департамента города Лос-Сантоса, шериф округа Блейн, директор Федерального расследовательского бюро штата Сан-Андреас, главный врач экстренной медицинской службы штата Сан-Андреас, генерал Национальной гвардии штата Сан-Андреас).\n\nч. 2 Определения, используемые в настоящем Законе:\n\nСудья - лицо, наделенное согласно Конституции штата и Закону полномочиями по осуществлению правосудия, действующее от имени суда.\nИстец - лицо, обратившееся в суд за защитой своего нарушенного права или охраняемого законом интереса в гражданском или административном судопроизводстве путем подачи искового заявления или жалобы.\nОтветчик - лицо, против которого подано исковое заявление или жалоба в гражданском или административном судопроизводстве.\nПредставитель истца или ответчика - лицо, представляющее интересы истца или ответчика в гражданском или административном судопроизводстве. Может быть государственным или частным адвокатом при наличии договора на юридическую помощь, а для юридических лиц — также сотрудником организации с соответствующими полномочиями.\nГосударственный обвинитель - должностное лицо офиса Генерального прокурора штата Сан-Андреас, поддерживающее обвинение в уголовном процессе.\nСледователь - сотрудник государственной структуры, проводивший досудебное расследование в уголовном или административном судопроизводстве. Может быть вызван в суд по усмотрению суда или по ходатайству сторон.\nОбвиняемый - лицо, в отношении которого предъявлено обвинение в совершении правонарушения в уголовном судопроизводстве.\nПотерпевший - лицо, которому правонарушением причинен физический, моральный или имущественный вред, признанное таковым государственным обвинителем или судом в уголовном или административном судопроизводстве.\nПредставитель потерпевшего - лицо, представляющее интересы потерпевшего в административном или уголовном судопроизводстве. Может быть только государственным или частным адвокатом при наличии договора на юридическую помощь.\nЗащитник - лицо, осуществляющее защиту прав и интересов обвиняемого в уголовном или административном судопроизводстве. Может быть только государственным или частным адвокатом при наличии договора на юридическую помощь.\nСторона обвинения - потерпевший, следователь и государственный обвинитель в уголовном или административном судопроизводстве.\nСторона защиты - обвиняемый и защитник в уголовном или административном судопроизводстве.\nСвидетель - лицо, которому известны сведения об обстоятельствах, имеющих значение для дела, и приглашенное в суд по ходатайству сторон или их представителей.\nСтороны - в гражданском судопроизводстве: истец, ответчик и их представители; в уголовном и административном судопроизводстве: сторона обвинения и сторона защиты.\nСпециалист - лицо, обладающее специальными знаниями, привлекаемое для разъяснения вопросов, входящих в его профессиональную компетенцию, в гражданском, уголовном или административном судопроизводстве.\nЭксперт - лицо, обладающее специальными знаниями, привлеченное судом для проведения экспертизы и дачи заключения в гражданском, уголовном или административном судопроизводстве.\nСудебный пристав - сотрудник Секретной Службы, обеспечивающий порядок судебного заседания и исполняющий распоряжения суда. В редких случаях могут привлекаться служащие иных государственных структур.\nСудебный секретарь - сотрудник судейского корпуса, проверяющий явку участников, контролирующий фиксацию заседания, ведущий протокол и выполняющий иные поручения суда.\nСудейский корпус - совокупность органов суда и должностных лиц (судебные секретари, старший судебный секретарь, глава судебного секретариата, судьи), относящихся к Судебной власти.\nСудебный акт - официальный документ, вынесенный судебным органом в пределах его компетенции.\nСудебный запрос - судебный акт, принимаемый для истребования доказательств по ходатайству сторон или для восполнения недостатка информации, необходимой для решения дела.\nСудебное постановление - судебный акт, принятый в рамках рассмотрения дела, за исключением постановлений о назначении/освобождении судей и секретарей, а также по вопросам судебных толкований и практики.\nСудебный штраф - имущественная санкция, применяемая судом к гражданам, должностным лицам или организациям за неисполнение или ненадлежащее исполнение судебных актов, нарушение обязательств или запретов законодательства.\nСудопроизводство - установленная Конституцией и Законом деятельность суда по рассмотрению и разрешению дел.\n\nч. 3 Суд вправе проводить производство и привлечение к ответственности неприкосновенных лиц без приостановления, снятия либо лишения ранее указанного особого правового статуса.\n\nч. 4 Термины и понятия, используемые в разных отраслях права, которые по своей сути обозначают схожие правовые институты либо понятия, могут толковаться и применяться с учетом их взаимозаменяемости.\n\nч. 5 Председатель Верховного Суда штата Сан-Андреас вправе устанавливать формы и требования к подаче исковых заявлений, ходатайств, отводов и иных процессуальных документов. Ранее указанные формы и требования имеют силу закона и могут являться основанием для принятия судом соответствующих решений.\n\nч. 6 Определения указанные в настоящей статье могут различаться в отдельно взятых случаях, перечень не является полноценным.\n\n\nГЛАВА 2. ПРИНЦИПЫ ДЕЯТЕЛЬНОСТИ СУДОВ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-3", "number": "3", "title": "Принцип равенства перед законом", "content": "Статья 3. Принцип равенства перед законом\n\nч. 1 Принцип равенства перед законом – это одинаковое применение положений, закрепленных в законодательстве ко всем государственным и негосударственным организациям, должностным лицам, гражданам и другим лицам, которые вовлекаются в судопроизводство.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-4", "number": "4", "title": "Принцип законности", "content": "Статья 4. Принцип законности\n\nч. 1 Принцип законности подразумевает под собой обоснованность, мотивированность, окончательность судебного акта и является основополагающим принципом деятельности судов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-5", "number": "5", "title": "Принцип справедливости", "content": "Статья 5. Принцип справедливости\n\nч. 1 Принцип справедливости подразумевает возможность учета обстоятельств каждого дела, чтобы достичь взвешенного результата, и принцип уважения суда, подразумевающий, что суду можно доверить применение норм с не до конца определенным содержанием.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-6", "number": "6", "title": "Презумпция невиновности", "content": "Статья 6. Презумпция невиновности\n\nч. 1 Презумпция невиновности подразумевает, что каждый обвиняемый в совершении правонарушения считается невиновным, пока его виновность не будет доказана в предусмотренном законом порядке и установлена решением суда. При этом неустранимые сомнения в виновности обвиняемого и/или подсудимого надлежит толковать в пользу такового (обвиняемого).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-7", "number": "7", "title": "Принцип состязательности и равноправия сторон", "content": "Статья 7. Принцип состязательности и равноправия сторон\n\nч. 1 Состязательным судопроизводство может считаться, когда участвующие в производстве по делу стороны в состоянии активно и на равных спорить, доказывать свою правоту, собирать и представлять доказательства, излагать свободно свои доводы, давать свое толкование фактов и событий, доказательств, связанных с рассматриваемым делом, соответствующих законов или иных правовых актов и тем самым помогать поиску правды, истины, обеспечению законности, обоснованности и справедливости акта правосудия.\n\n\nРАЗДЕЛ II. СУДОУСТРОЙСТВО ШТАТА САН-АНДРЕАС\nГЛАВА 3. ОБЩИЕ ПОЛОЖЕНИЯ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-8", "number": "8", "title": "Судебная власть", "content": "Статья 8. Судебная власть\n\nч. 1 Судебная власть в штате осуществляется только судом в лице назначенных в установленном законом порядке судей. Никакие другие государственные органы и должностные лица не вправе принимать на себя функции по отправлению правосудия, за исключением случаев и процедур, предусмотренных Процессуальным кодексом штата Сан-Андреас.\n\nч. 2 Судебная власть самостоятельна и действует независимо от исполнительной и законодательной властей и подчиняется только Конституции и законам.\n\nч. 3 Судебная власть осуществляется посредством уголовного, административного, гражданского и конституционного судопроизводства.\n\nч. 4 В штате не могут приниматься законы и нижестоящие нормативные правовые акты, отменяющие или умаляющие самостоятельно и независимость суда.\n\nч. 5 Судебные акты, предписывающие действия, предусмотренные ордерами, приравниваются к ордерам согласно закону \"О системе ордеров штата Сан-Андреас\".", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-9", "number": "9", "title": "Суды в штате Сан-Андреас", "content": "Статья 9. Суды в штате Сан-Андреас\n\nч. 1 Правосудие в штате Сан-Андреас осуществляется только судами, учрежденными в соответствии с Конституцией штата Сан-Андреас и настоящим Законом. Создание чрезвычайных судов и судов, не предусмотренных настоящим Законом, не допускается.\n\nч. 2 В штате Сан-Андреас действуют Окружной Суд, Апелляционный Суд, Верховный Суд и Федеральный суд.\n\nч. 3 В состав Верховного Суда штата Сан-Андреас входят Председатель Верховного Суда штата Сан-Андреас, заместитель Председателя Верховного Суда штата Сан-Андреас и судьи Верховного Суда штата Сан-Андреас.\n\nч. 4 В состав Апелляционного Суда штата Сан-Андреас входят Председатель Апелляционного Суда штата Сан-Андреас, заместители Председателя Апелляционного Суда штата Сан-Андреас и судьи Апелляционного Суда штата Сан-Андреас.\n\nч. 5 В состав Окружного Суда штата Сан-Андреас входят Председатель Окружного Суда штата Сан-Андреас, заместители Председателя Окружного Суда штата Сан-Андреас и судьи Окружного Суда штата Сан-Андреас.\n\nч. 6 В судебный корпус также входят помощники судей и судебный секретариат штата Сан-Андреас, состоящий из главы судебного секретариата и судебных секретарей.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-10", "number": "10", "title": "Обязательность судебных актов", "content": "Статья 10. Обязательность судебных актов\n\nч. 1 Судебные акты, принимаемые судом, обязательны для всех физических и юридических лиц, государственных и иных организаций, и всех должностных лиц.\n\nч. 2 Неисполнение судебных актов, а равно проявление неуважения к суду, влекут ответственность, предусмотренную действующим законодательством.\n\nч. 3 Суд может истребовать доказательства путем направления судебных запросов как на основании ходатайств сторон, так и по собственной инициативе в целях восполнения недостатка информации, необходимой суду для принятия решения.\n\nч. 4 Преюдиция. Обстоятельства, установленные вступившим в законную силу приговором, либо иным вступившим в законную силу решением суда, принятым в рамках гражданского или административного судопроизводства, признаются судом, прокурором, следователем без дополнительной проверки. При этом такие приговор или решение не могут предрешать виновность лиц, не участвовавших ранее в рассматриваемом уголовном деле.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-11", "number": "11", "title": "Равенство всех перед законом и судом", "content": "Статья 11. Равенство всех перед законом и судом\n\nч. 1 Настоящим Законом гарантируется соблюдение принципа равенства перед законом и судом, который заключается в обеспечении равных правовых возможностей как материального, так и процессуального характера для реализации и защиты одинаковых по содержанию и объему прав и свобод.\n\nч. 2 Суды не отдают предпочтения каким-либо органам, лицам, участвующим в процессе сторонам по признакам их государственной, социальной, половой, расовой, национальной, языковой или политической принадлежности либо в зависимости от их происхождения, имущественного и должностного положения, места жительства, места рождения, отношения к религии, убеждений, принадлежности к общественным объединениям, а равно и по другим не предусмотренным законом основаниям.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-12", "number": "12", "title": "Источники закона, применяемые судом", "content": "Статья 12. Источники закона, применяемые судом\n\nч. 1 Суд разрешает дела в соответствии с Конституцией и законами штата Сан-Андреас.\n\nч. 2 Суд применяет иные нормативно-правовые акты, принятые соответствующим органом на основе, в рамках полномочий и в порядке, определяемом Конституцией и законами штата Сан-Андреас.\n\nч. 3 Если суд приходит к выводу, что закон, кодекс или иной нормативно-правовой акт противоречит Конституции, суд не применяет таковой Закон, Кодекс или иной нормативно-правовой акт, а применяет нормы Конституции в качестве норм прямого действия.\n\nч. 4 В случае отсутствия закона регулирующего правовые отношения, суд применяет закон регулирующий подобные правоотношения, а в отсутствие такового закона суд руководствуется конституционными принципами и общими принципами права. Применение закона о криминальной ответственности по аналогии запрещено.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-13", "number": "13", "title": "Гласность в деятельности судов", "content": "Статья 13. Гласность в деятельности судов\n\nч. 1 Законом гарантируется принцип гласной деятельности судов, однако, судебные решения, постановления и иные нормативно правовые акты суда содержащие государственную тайну, либо сведения о лице, событии, а также информации иного характера наделенной статуса государственной тайны подлежат засекречиванию, не допускается публичная огласка таковой, за исключением случаев, когда субъект по итогам рассмотрения теряет статус наделения государственной тайны, а также в иных случаях предусмотренных законодательством.\n\nч. 2 Заседание проходит в открытом или закрытом формате.\n\nч. 3 В открытое судебное заседание допускаются зрители. После начала судебного заседания допуск возможен только с разрешения судьи.\n\nч. 4 Закрытое судебное заседание допускается в случаях, когда в материалах дела содержится информациях, облагаемая государственной тайной. В закрытое судебное заседание допускаются только участники судебного разбирательства, иные лица могут быть допущены с разрешения председательствующего.\n\nч. 5 Суд вправе провести закрытое судебное заседание, если ранее в открытом судебном заседании были установлены существенные нарушения общественного порядка.\n\n\nГЛАВА 4. ОСНОВЫ СТАТУСА СУДЕЙ И СУДЕБНЫХ РАБОТНИКОВ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-14", "number": "14", "title": "Судьи", "content": "Статья 14. Судьи\n\nч. 1 Судьями являются лица, наделенные в соответствии с Конституцией штата Сан-Андреас и настоящим Законом полномочиями осуществлять правосудие и исполняющие свои обязанности на профессиональной основе.\n\nч. 2 Судьей может быть назначен гражданин США, не имеющий действующих судимостей, не состоящий на учете в экстренной медицинской службе в связи с лечением от алкоголизма, наркомании, токсикомании, хронических и затяжных психических расстройств и не имеющий иных причин, препятствующих осуществлению полномочий судьи.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-15", "number": "15", "title": "Единство статуса судей", "content": "Статья 15. Единство статуса судей\n\nч. 1 Все судьи штата обладают единым статусом и различаются между собой только полномочиями и компетенцией, за исключением отдельных положений, предусмотренных Конституцией и настоящим Законом.\n\nч. 2 Все судьи обладают статусом неприкосновенности.\n\nч. 3 Судья не может быть привлечен к какой-либо ответственности за выраженное им при отправлении правосудия мнение или принятое судом решение, если только вступившим в законную силу приговором суда не будет установлена виновность судьи в преступном злоупотреблении либо вынесении заведомо неправосудного судебного акта.\n\nч. 4 Судья не может быть привлечен к ответственности в рамках апелляционного, кассационного или надзорного обжалования судебного акта.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-16", "number": "16", "title": "Порядок наделения полномочиями судей", "content": "Статья 16. Порядок наделения полномочиями судей\n\nч. 1 Председатель Верховного Суда штата Сан-Андреас назначается и освобождается от занимаемой должности Федеральным правительством.\n\nч. 2 Судьи Верховного Суда штата Сан-Андреас назначаются и освобождаются от должности Председателем Верховного Суда штата Сан-Андреас или его заместителем.\n\nч. 3 Судьи Апелляционного Суда штата Сан-Андреас назначаются и освобождаются Председателем Верховного Суда штата Сан-Андреас, Председателем Апелляционного Суда штата Сан-Андреас, заместителем Председателя Апелляционного Суда штата Сан-Андреас.\n\nч. 4 Судьи Окружного Суда штата Сан-Андреас назначаются и освобождаются Председателем Верховного Суда штата Сан-Андреас, Председателем Окружного Суда штата Сан-Андреас, заместителем Председателя Окружного Суда штата Сан-Андреас.\n\nч. 5 Председатель Окружного Суда штата Сан-Андреас и Председатель Апелляционного Суда штата Сан-Андреас назначаются и освобождаются от занимаемой должности Председателем Верховного Суда штата Сан-Андреас.\n\nч. 6 Заместители Председателя Окружного Суда штата Сан-Андреас и заместители Председателя Апелляционного Суда штата Сан-Андреас назначаются и освобождаются от занимаемой должности Председателем Окружного Суда штата Сан-Андреас, Председателем Апелляционного Суда штата Сан-Андреас соответственно или Председателем Верховного Суда штата Сан-Андреас.\n\nч. 7 Полномочия судей не ограничены определенным сроком за исключением случая, только если таковые не будут определены актом уполномоченного лица о назначении на должность судьи.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-16.1", "number": "16.1", "title": "Председатель Верховного Суда штата Сан-Андреас", "content": "Статья 16.1 Председатель Верховного Суда штата Сан-Андреас\n\nч. 1 Председатель Верховного Суда штата Сан-Андреас осуществляет руководство судебной системой наряду с осуществлением полномочий судьи Верховного Суда штата Сан-Андреас.\n\nч. 2 Председатель Верховного Суда штата Сан-Андреас вправе:\n\n1) привлекать судей всех судов к дисциплинарной ответственности, предусмотренной Кодексом судейской этики;\n2) издавать хозяйственно-распорядительные приказы, обязательные к исполнению всеми судами в штате Сан-Андреас;\n3) принимать локальные нормативные правовые акты, регулирующие деятельность судов;\n4) устанавливать отдельные полномочия руководителям судов и их заместителям, связанные с особенностями их деятельности;\n5) учреждать должности в аппарате судов;\n6) осуществлять иные полномочия, предусмотренные законодательством штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-17", "number": "17", "title": "Несменяемость судьи", "content": "Статья 17. Несменяемость судьи\n\nч. 1 Председатель Верховного Суда штата Сан-Андреас несменяем. Он не может быть назначен (избран) на другую должность или в другой суд без его согласия.\n\nч. 2 Основания для освобождения от занимаемой должности Председателя Верховного Суда штата Сан-Андреас:\n\nа) Прошение об отставке по собственному желанию;\nб) Пропажа без вести или смерть;\nв) Признание виновным в совершении преступления, предусмотренного Уголовным кодексом штата Сан-Андреас.\n\nч. 3 Основания для освобождения от занимаемой должности председателей судов и их заместителей, судей Окружного, Апелляционного Судов штата Сан-Андреас, судей Верховного Суда штата Сан-Андреас, заместителя Председателя Верховного Суда штата Сан-Андреас:\n\nа) Прошение об отставке с занимаемой должности по собственному желанию;\nб) Пропажа без вести или смерть;\nв) Признание виновным в совершении преступления и/или административного правонарушения, предусмотренного законодательством штата Сан-Андреас;\nг) Признание виновным в совершении проступка, умаляющего авторитет судебной власти;\nд) Возникновение обстоятельств, препятствующих дальнейшему осуществлению полномочий судьи;\nе) Утрата доверия.\n\nч. 4 Судья прекращает свои полномочия как судья в случае ухода в отставку, смерти или освобождения от занимаемой должности.\n\nч. 5 Судьи как работники вступают в трудовые отношения со штатом Сан-Андреас, от имени которого в качестве работодателя действует Председатель Верховного суда штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-17.1", "number": "17.1", "title": "Кодекс судейской этики", "content": "Статья 17.1 Кодекс судейской этики\n\nч. 1 Кодекс судейской этики принимается и утверждается Председателем Верховного Суда штата Сан-Андреас.\n\nч. 2 Внесение изменений в Кодекс судейской этики осуществляется приказом Председателя Верховного Суда штата Сан-Андреас.\n\nч. 3 Кодекс судейской этики устанавливает правила поведения судей, их запреты, права и обязанности.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-17.2", "number": "17.2", "title": "Судебные работники", "content": "Статья 17.2 Судебные работники\n\nч. 1 Все судебные работники, не являющиеся судьями, председателями судов или их заместителями, обладают правовой защитой.\n\nПри исполнении судебными работниками служебных обязанностей не допускаются их привод, задержание, личный обыск и обыск их вещей, а также обыск личного и используемого им транспорта. Кроме случаев, когда ввиду своего наркотического, психического или иного другого состояния незаконные действия судебного работника несут непосредственную угрозу жизни окружающим людям, а также при наличии ордера правомочного лица или государственного органа, решения суда.\n\n\nГЛАВА 5. СУДЫ ШТАТА", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-18", "number": "18", "title": "Окружной Суд штата Сан-Андреас", "content": "Статья 18. Окружной Суд штата Сан-Андреас\n\nч. 1 Окружной Суд штата Сан-Андреас является судом первой инстанции, рассматривающий дела в рамках уголовного, административного и гражданского судопроизводства, за исключением дел исключительной подсудности Верховного Суда штата Сан-Андреас.\n\nч. 2 Постановления Окружного Суда штата Сан-Андреас могут быть обжалованы в Апелляционном Суде штата Сан-Андреас путем подачи апелляционной жалобы, представления в течение 72 часов с момента вынесения обжалуемого постановления.\n\nч. 3 Окружной Суд штата Сан-Андреас при наличии оснований, предусмотренных законом, осуществляет выдачу любых ордеров сотрудникам правоохранительных органов.\n\nч. 4 Окружной Суд штата Сан-Андреас вправе требовать выполнения любых законных действий, необходимых при рассмотрении дела. Окружной Суд штата Сан-Андреас при рассмотрении дел вправе давать казуальное толкование нормам права.\n\nч. 5 Окружной Суд штата Сан-Андреас действует в следующем составе:\n\n1) Судебная коллегия по административным делам Окружного Суда штата Сан-Андреас;\n2) Судебная коллегия по уголовным делам Окружного Суда штата Сан-Андреас;\n3) Судебная коллегия по делам военнослужащих Окружного Суда штата Сан-Андреас.\n\nч. 6 Председатель Окружного Суда штата Сан-Андреас, его заместитель вправе направлять представления в Окружной Суд штата Сан-Андреас о пересмотре категорий дел, отдельных дел в связи с вновь открывшимися обстоятельствами.\n\nч. 7 По итогам рассмотрения представления Председателя Окружного Суда штата Сан-Андреас, его заместителя о пересмотре категорий дел, отдельных дел в связи с вновь открывшимися обстоятельствами Окружной Суд удовлетворяет его и направляет дело на новое рассмотрение в связи с вновь открывшимися обстоятельствами или отказывает в его удовлетворении.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-19", "number": "19", "title": "Апелляционный Суд штата Сан-Андреас", "content": "Статья 19. Апелляционный Суд штата Сан-Андреас\n\nч. 1 Апелляционный Суд штата Сан-Андреас является судом апелляционной инстанции, рассматривающим апелляционные жалобы, представления на постановления Окружного Суда штата Сан-Андреас.\n\nч. 2 Апелляционные жалобы, представления в Апелляционный Суд штата Сан-Андреас рассматриваются единолично либо коллегиально судьями Апелляционного Суда штата Сан-Андреас.\n\nч. 3 Постановления Апелляционного Суда штата Сан-Андреас могут быть обжалованы в Верховный Суд штата Сан-Андреас путем подачи кассационной жалобы, представления в течение 72 часов с момента вынесения обжалуемого постановления.\n\nч. 4 Апелляционный Суд штата Сан-Андреас вправе требовать выполнения любых законных действий, необходимых при рассмотрении дела. Апелляционный Суд штата Сан-Андреас при рассмотрении дел вправе давать казуальное толкование нормам права.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-20", "number": "20", "title": "Верховный Суд штата Сан-Андреас", "content": "Статья 20. Верховный Суд штата Сан-Андреас\n\nч. 1 Верховный Суд штата Сан-Андреас является судом кассационной инстанции, рассматривающей как суд первой инстанции категории дел следующей подсудности:\n\nа) административные, гражданские и переданные уголовные дела, дела об административных правонарушениях в отношении высокопоставленных лиц, предусмотренных пунктом «е» части 1 статьи 2 настоящего Закона;\n\nб) уголовные дела и дела об административных правонарушениях в отношении Генерального прокурора штата Сан-Андреас, вице-губернатора штата Сан-Андреас, судей штата Сан-Андреас\n\nв) поданные обращения о несоответствии нижестоящих нормативных правовых актов вышестоящим государственных органов, должностных лиц;\n\nг) дела особой государственной важности.\n\nч. 2 Постановления Верховного Суда штата Сан-Андреас могут быть обжалованы в Президиум Верховного Суда штата Сан-Андреас в течение 96 часов со дня вынесения обжалуемого постановления.\n\nч. 3 Постановления Председателя Верховного Суда штата Сан-Андреас могут быть обжалованы в Федеральный суд штата Сан-Андреас посредством подачи жалобы в течение 48 часов с момента вынесения обжалуемого постановления.\n\nч. 4 Верховный Суд штата Сан-Андреас при наличии оснований, предусмотренных законом, осуществляет выдачу любых ордеров сотрудникам правоохранительных органов на соответствующие законные действия.\n\nч. 5 Пленум судебной системы штата Сан-Андреас рассматривает материалы анализа и обобщения судебной практики и дает органам государственной власти разъяснения по вопросам судебной, иной правоприменительной практики в целях обеспечения единообразного применения законодательства штата Сан-Андреас.\n\nч. 7 В качестве суда кассационной инстанции рассматривает кассационные жалобы на постановления Апелляционного Суда штата Сан-Андреас.\n\nч. 8 Верховный Суд штата Сан-Андреас действует в следующем составе:\n\n1) Пленум судебной системы штата Сан-Андреас;\n\n2) Президиум Верховного Суда штата Сан-Андреас;\n\n3) Научно-консультативный совет при Верховном Суде штата Сан-Андреас;\n\n4) Судебная коллегия по административным делам Верховного Суда штата Сан-Андреас;\n\n5) Судебная коллегия по гражданским делам Верховного Суда штата Сан-Андреас;\n\n6) Судебная коллегия по уголовным делам Верховного Суда штата Сан-Андреас;\n\n7) Судебная коллегия по экономическим спорам Верховного Суда штата Сан-Андреас;\n\n8) Судебная коллегия по делам военнослужащих Верховного Суда штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-20.1", "number": "20.1", "title": "Пленум судебной системы штата Сан-Андреас", "content": "Статья 20.1 Пленум судебной системы штата Сан-Андреас\n\nч. 1 Пленум судебной системы штата Сан-Андреас действует в составе Председателя Верховного Суда штата Сан-Андреас, заместителя Председателя Верховного Суда штата Сан-Андреас.\n\nч. 2 Пленум судебной системы штата Сан-Андреас обеспечивает правильное и единообразное применение законов судами и дает разъяснения и толкования норм права путем принятия постановлений.\n\nч. 3 В заседаниях Пленума судебной системы штата Сан-Андреас по приглашению Председателя Верховного Суда штата Сан-Андреас вправе принимать участие Генеральный прокурор штата Сан-Андреас, губернатор штата Сан-Андреас, их заместители и любые иные лица.\n\nч. 4 Пленум судебной системы штата Сан-Андреас:\n\n1) рассматривает материалы анализа и обобщения судебной практики и дает судам разъяснения по вопросам судебной практики в целях обеспечения единообразного применения законодательства штата Сан-Андреас;\n\n2) решает вопросы, связанные с осуществлением в соответствии с пунктом «б» части 1 статьи 57 Конституции штата Сан-Андреас принадлежащего Верховному Суду штата Сан-Андреас права законодательной инициативы;\n\n3) избирает по представлению Председателя Верховного Суда штата Сан-Андреас секретаря Пленума судебной системы штата Сан-Андреас из числа членов Пленума судебной системы штата Сан-Андреас на бессрочной основе;\n\n4) утверждает в связи с представлением уполномоченных органов заключение о наличии в действиях Генерального прокурора штата Сан-Андреас, губернатора штата Сан-Андреас, Председателя Верховного Суда штата Сан-Андреас, директора Федерального расследовательского бюро штата Сан-Андреас, генерала Национальной Гвардии штата Сан-Андреас, шерифа департамента шерифа округа Блэйн, главного врача Экстренной медицинской службы штата Сан-Андреас, шефа полицейского департамента города Лос-Сантос признаков преступления для принятия окончательного решения о возбуждении уголовного дела в отношении указанных лиц либо для принятия решения о привлечении их в качестве обвиняемых по уголовному делу, если уголовное дело было возбуждено в отношении других лиц или по факту совершения деяния, содержащего признаки преступления;\n\n5) заслушивает сообщения о работе членов Пленума судебной системы штата Сан-Андреас;\n\n6) утверждает Регламент Пленума судебной системы штата Сан-Андреас;\n\n7) рассматривает заявления кандидатов на должности присяжных заседателей, главы судебного секретариата штата Сан-Андреас, судебного секретаря, помощника судьи, судьи Окружного Суда штата Сан-Андреас, заместителя Председателя Окружного Суда штата Сан-Андреас, Председателя Окружного Суда штата Сан-Андреас, судьи Апелляционного Суда штата Сан-Андреас, заместителя Председателя Апелляционного Суда штата Сан-Андреас, Председателя Апелляционного Суда штата Сан-Андреас, судьи Верховного Суда штата Сан-Андреас и представляет председателю соответствующего суда и (или) Председателю Верховного Суда штата Сан-Андреас свои заключения;\n\n8) назначает кандидатов на пост присяжных заседателей всех составов присяжных заседателей Окружного Суда штата Сан-Андреас включая председателей составов присяжных заседателей;\n\n9) объявляет в средствах массовой информации об открытии вакантных должностей присяжных заседателей, главы судебного секретариата штата Сан-Андреас, судебного секретаря, помощника судьи, судьи Окружного Суда штата Сан-Андреас, заместителя Председателя Окружного Суда штата Сан-Андреас, Председателя Окружного Суда штата Сан-Андреас, судьи Апелляционного Суда штата Сан-Андреас, заместителя Председателя Апелляционного Суда штата Сан-Андреас, Председателя Апелляционного Суда штата Сан-Андреас, судьи Верховного Суда штата Сан-Андреас с указанием времени и места приема и рассмотрения документов;\n\n10) приостанавливает, возобновляет либо прекращает полномочия судей (за исключением прекращения полномочий судей, достигших предельного возраста пребывания в должности судьи), а также приостанавливает, возобновляет либо прекращает отставку присяжных заседателей, главы судебного секретариата штата Сан-Андреас, судебного секретаря, судьи Окружного Суда штата Сан-Андреас, заместителя Председателя Окружного Суда штата Сан-Андреас, Председателя Окружного Суда штата Сан-Андреас, судьи Апелляционного Суда штата Сан-Андреас, заместителя Председателя Апелляционного Суда штата Сан-Андреас, Председателя Апелляционного Суда штата Сан-Андреас, судьи Верховного Суда штата Сан-Андреас;\n\n11) осуществляет квалификационную аттестацию судей, по итогам которой присваивает квалификационный класс судьи;\n\n12) утверждает и ведет Единый государственный реестр судей штата Сан-Андреас;\n\n13) принимает решения о представлении граждан к награждению государственными наградами штата Сан-Андреас и присвоении им почетных званий штата Сан-Андреас, связанных с отправлением правосудия;\n\n14) по представлению прокурора дает заключение о даче согласия на возбуждение уголовного дела в отношении действующего судьи, судьи в отставке вне зависимости от прошедшего срока оставления судьей своих полномочий;\n\n15) утверждает перечень почетных званий и наград штата Сан-Андреас, связанных с отправлением правосудия;\n\n16) осуществляет иные полномочия в соответствии с законодательством штата Сан-Андреас.\n\nч. 6 Секретарь пленума – член Пленума судебной системы штата Сан-Андреас, избирающийся на свою должность путем проведения голосования на заседании Пленума судебной системы штата Сан-Андреас в соответствии с Регламентом Пленума судебной системы штата Сан-Андреас. В случае отсутствия Председателя Верховного Суда штата Сан-Андреас, секретарь Пленума судебной системы штата Сан-Андреас исполняет все его обязанности и полномочия, связанные с Пленумом судебной системы штата Сан-Андреас, а также имеет все те же запреты, что и Председатель Верховного Суда штата Сан-Андреас. Иные полномочия секретаря Пленума определяются Регламентом Пленума судебной системы штата Сан-Андреас.\n\nч. 7 Регламент Пленума судебной системы штата Сан-Андреас утверждается Председателем Верховного Суда штата Сан-Андреас и имеет силу, соразмерную внутреннему нормативному акту государственного органа.\n\nч. 8 Пленум судебной системы штата Сан-Андреас вправе давать толкования законодательства своим постановлением, принятым посредством обсуждения и голосования членами Пленума судебной системы штата Сан-Андреас по соответствующей теме на заседании Пленума судебной системы штата Сан-Андреас.\n\nч. 9 Заседание Пленума судебной системы штата Сан-Андреас является закрытым. Акты, издаваемые Пленумом судебной системы штата Сан-Андреас, являются открытыми и каждый гражданин имеет открытый доступ к их ознакомлению.\n\nч. 10 Пленум судебной системы штата Сан-Андреас является коллегиальным органом всех судов штата Сан-Андреас и приравнивается по значимости и правовому положению к суду.\n\nч. 11 Список членов Пленума судебной системы штата Сан-Андреас не ограничен. Каждый судья, избранный на свою должность в соответствии с положениями Конституции штата Сан-Андреас и настоящего Конституционного Закона, является действующим членом Пленума судебной системы штата Сан-Андреас вплоть до оставления своих полномочий судьи.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-20.2", "number": "20.2", "title": "Президиум Верховного Суда штата Сан-Андреас", "content": "Статья 20.2 Президиум Верховного Суда штата Сан-Андреас\n\nч. 1 В состав Президиума Верховного Суда штата Сан-Андреас входят Председатель Верховного Суда штата Сан-Андреас, заместитель Председателя Верховного Суда штата Сан-Андреас и члены Президиума Верховного Суда штата Сан-Андреас, назначаемые и освобождаемые от должности Пленумом судебной системы штата Сан-Андреас по представлению Председателя Верховного Суда штата Сан-Андреас.\n\nЧленом Президиума Верховного Суда штата Сан-Андреас может быть судья штата Сан-Андреас, избранный на должность в установленном законном порядке.\n\nч. 2 Президиум Верховного Суда штата Сан-Андреас:\n\n1) в соответствии с процессуальным законодательством штата Сан-Андреас и в целях обеспечения единства судебной практики и законности проверяет в порядке надзора, в порядке возобновления производства по новым или вновь открывшимся обстоятельствам вступившие в силу судебные акты;\n\n2) осуществляет конституционное производство в отсутствие заявлений, жалоб лиц по инициативе одного или нескольких членов Президиума Верховного Суда штата Сан-Андреас по нормам, касающимся деятельности судов, судебной практики или иным законоположениям;\n\n3) обеспечивает координацию деятельности судебных коллегий Верховного Суда штата Сан-Андреас и аппарата Верховного Суда штата Сан-Андреас;\n\n4) утверждает положения и регламенты, регулирующие деятельность Верховного Суда штата Сан-Андреас, его структуру и штатное расписание;\n\n5) возлагает исполнение обязанностей Председателя Верховного Суда штата Сан-Андреас на одного из членов Президиума Верховного Суда штата Сан-Андреас в случае отсутствия Председателя Верховного Суда штата Сан-Андреас;\n\n6) рассматривает отдельные вопросы судебной практики;\n\n7) осуществляет иные полномочия в соответствии с конституционными законами и законами.\n\nч. 3 Порядок рассмотрения на заседании Президиума Верховного Суда штата Сан-Андреас в порядке надзора дел по проверке вступивших в законную силу судебных актов определяется процессуальным законодательством штата Сан-Андреас.\n\nч. 4 Порядок рассмотрения на заседании Президиума Верховного Суда штата Сан-Андреас вопросов, не связанных с рассмотрением судебных дел, определяется законодательством штата Сан-Андреас.\n\nч. 5 Судебные акты Президиума Верховного Суда штата Сан-Андреас могут быть обжалованы в Федеральный суд.\n\n\nРАЗДЕЛ III. СУДОПРОИЗВОДСТВА\nГЛАВА 6. ОБЩИЕ ПОЛОЖЕНИЯ СУДОПРОИЗВОДСТВ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-21", "number": "21", "title": "Принятие дел к производству суда", "content": "Статья 21. Принятие дел к производству суда\n\nч. 1 Исковое заявление, жалоба подается в защиту интересов лица с целью восстановления нарушенных прав и свобод.\n\nч. 2 Судья разрешает вопрос о принятии искового заявления к производству в течение 48 часов с момента его поступления. О принятии или об отказе в принятии искового заявления к производству судья выносит соответствующее определение.\n\nч. 3 Исковое заявление может быть подано представителем истца в защиту его интересов.\n\nч. 4 Судья назначает судебное заседание не позднее, чем за 12 часов. О назначении судебного заседания судья выносит определение с указанием даты и времени начала заседания, месте проведения заседания и формате заседания. Судья может пренебречь процессуальными сроками при наличии согласия сторон к назначению такого заседания.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-21.1", "number": "21.1", "title": "Прекращение производства по делу", "content": "Статья 21.1 Прекращение производства по делу\n\nч. 1 Возбужденное у суда производство по делу может быть прекращено в случае если:\n\nа) заявитель не явился на судебное заседание и не уведомил суд об уважительности отсутствия;\nб) предвидится, что заявленные требования подлежат отказу за отсутствием доказательств или по иным причинам;\nв) заявителем не исполнены определенные указания суда;\nг) установлены обстоятельства, препятствующие надлежащему рассмотрению дела.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-22", "number": "22", "title": "Открытый суд", "content": "Статья 22. Открытый суд\n\nч. 1 Открытый суд – это суд, на котором могут присутствовать все желающие, занявшие сидячие места задних рядов до начала судебного заседания и не нарушающие порядок его проведения.\n\nч. 2 В случае неповиновения требованию председательствующего либо коллегии судей судебный пристав вправе применить меры государственного принуждения используя специальные средства, а также физическую силу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-23", "number": "23", "title": "Закрытый суд", "content": "Статья 23. Закрытый суд\n\nч. 1 Закрытый суд – это суд, на котором могут присутствовать следующие лица: состав суда, привлеченные к судебному заседанию участники, судебный секретарь, судебные приставы, а также иные лица на усмотрение суда\n\nч. 2 Присутствие на закрытом судебном заседании возможно лишь с разрешения суда.\n\nч. 3 Решение об объявлении закрытого суда может быть принято при назначении судебного заседания, либо непосредственно в ходе судебного заседания. Закрытый суд может объявляться на усмотрение суда.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-24", "number": "24", "title": "Коллегиальное и единоличное рассмотрение исковых заявлений, жалоб, уголовных дел и дел об административных правонаруш...", "content": "Статья 24. Коллегиальное и единоличное рассмотрение исковых заявлений, жалоб, уголовных дел и дел об административных правонарушениях\n\nч. 1 Дела рассматриваются судьей единолично или коллегиально.\n\nч. 2 В случае рассмотрения исковых заявлений, жалоб, переданных уголовных дел или дел об административных правонарушениях коллегией, состав таковой всегда должен быть нечетным, ведение основной документации возлагается на председательствующего, решение в коллегии принимается большинством.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-25", "number": "25", "title": "Особенности гражданского и административного судопроизводства", "content": "Статья 25. Особенности гражданского и административного судопроизводства\n\nч. 1 В случае, если при рассмотрении дела в рамках гражданского или административного судопроизводства судом выявлены признаки совершенного преступления по факту поданного искового заявления или жалобы, суд, при вынесении окончательного решения по делу, может передать материалы в офис Генерального прокурора штата Сан-Андреас или другой орган досудебного расследования для проведения оперативно-розыскных мероприятий, расследования и последующей передачи уголовного дела в суд при поддержке обвинения в суде.\n\nч. 2 Общий срок исковой давности составляет 48 часов, если законом не установлено иное.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-26", "number": "26", "title": "Обязанность предоставления информации и материалов", "content": "Статья 26. Обязанность предоставления информации и материалов\n\nч. 1 Государственные органы, правоохранительные структуры и их должностные, гражданские и юридические лица обязаны представить суду любую запрошенную информацию, документы, фото-, видео- или иные материалы, относящиеся к делу, в течение срока.\n\nч. 2 Запрос суда направляется через официальные каналы связи или иным способом, установленным Председателем Верховного Суда штата Сан-Андреас.\n\nч. 3 Отказ от представления запрошенных материалов или предоставление заведомо ложной информации влечет ответственность, предусмотренную законодательством штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-26.1", "number": "26.1", "title": "Извещение о судебных актах", "content": "Статья 26.1. Извещение о судебных актах\n\nч. 1 Лицо, подающее заявление в суд, обязано самостоятельно ознакамливаться с актами суда по ходу судебного дела на портале штата.\n\nч. 2 Лицо, единожды уведомленное по делу, обязано самостоятельно ознакамливаться с дальнейшими актами суда по данному делу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-27", "number": "27", "title": "Прецедентное право суда", "content": "Статья 27. Прецедентное право суда\n\nч. 1 Судебным прецедентом является решение суда по конкретному делу, имеющее силу источника права и внесенное в обзор судебной практики Президиумом Верховного Суда штата Сан-Андреас. Прецедентом являются решения, вынесенные по аналогичному делу, разрешенному в рамках аналогичного производства.\n\nч. 2 Прецедент относится к судебному решению, которое считается обоснованным для разрешения последующих дел, связанных с идентичными или сходными фактами или аналогичными юридическими вопросами.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-28", "number": "28", "title": "Процессуальные права и обязанности лиц, участвующих в деле", "content": "Статья 28. Процессуальные права и обязанности лиц, участвующих в деле\n\nч. 1 Лица, участвующие в деле вправе ознакамливаться со всеми материалами дела, материалы содержащие охраняемую законом тайну могут предоставляется только по решению суда, давать объяснения, представлять доказательства, заявлять ходатайства и отводы, пользоваться юридической помощью представителя, а также иными процессуальными правами в соответствии с настоящим Кодексом.\n\nч. 2 Лица, участвующие в деле, должны добросовестно пользоваться всеми принадлежащими им процессуальными правами. Злоупотребление процессуальными правами лицами, участвующими в деле, не допускается. В случае, если вступившим в законную силу актом суда будет признано злоупотребление своими процессуальными правами от одного или нескольких участников судебного разбирательства, такие лица могут быть отстранены от судебного разбирательства, либо же, в случае, если такое лицо – заявитель по делу, то суд вправе отказать в дальнейшем производстве по делу и прекратить его.\n\nч. 3 В отношении лиц, участвующих в судебном процессе, действует положение о конфиденциальности (государственная тайна, врачебная тайна, тайна личной жизни и т.д.). Лица, участвующие в судебном процессе обязаны раскрыть свою личность и иную необходимую для суда информацию во время судебного заседания, либо до его начала. Судья и иные лица, получившие персональные данные от такого лица, несут ответственность за их конфиденциальность в соответствии с действующим законодательством штата Сан-Андреас.\n\nч. 4 Лица, участвующие в деле, должны добросовестно пользоваться всеми принадлежащими им процессуальными правами.\n\nч. 5 Недобросовестное заявление неосновательного административного иска, противодействие, в том числе систематическое, лиц, участвующих в деле, правильному и своевременному рассмотрению и разрешению административного дела, а также злоупотребление процессуальными правами в иных формах влечет за собой наступление для этих лиц последствий, предусмотренных настоящим Кодексом.\n\nч. 6 Лица, участвующие в деле, после получения первого судебного акта по рассматриваемому делу самостоятельно предпринимают меры по получению информации о движении и результатах рассмотрения дела с использованием любых источников такой информации и любых средств связи, а также несут риск наступления неблагоприятных последствий в результате непринятия мер по получению информации о движении дела, если суд располагает информацией о том, что указанные лица надлежащим образом извещены о начавшемся процессе.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-28.1", "number": "28.1", "title": "Частное определение", "content": "Статья 28.1 Частное определение\n\nч. 1 Если судом установлены обстоятельства, не относящиеся к предмету рассмотрения на прямую, содержащие в себе признаки правонарушения, суд вправе вынести частное определение о направлении материалов дела в следственный орган для проведения расследования. Суд вправе вынести частное определение или постановление и в других случаях, если признает это необходимым.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-29", "number": "29", "title": "Участие представителей в судебном заседании", "content": "Статья 29. Участие представителей в судебном заседании\n\nч. 1 Стороны вправе в соответствии с законодательством допустить к участию в судебном заседании представителя.\n\nч. 2 Процесс и порядок допуска представителя (защитника) устанавливается законодательством штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-30", "number": "30", "title": "Особое производство по отдельным категориям уголовных дел", "content": "Статья 30. Особое производство по отдельным категориям уголовных дел\n\nч. 1 Основанием для возбуждения особого производства является:\n\nа) Неисполнение следственным органом постановления суда о проведении необходимых досудебных проверок, вследствие создавая угрозу нарушения прав заявителя.\nб) Вмешательство в судебный процесс третьих лиц, без допуска суда.\nв) Проявление давления на участника судопроизводства, другим участником или иным лицом.\nг) Появление обстоятельств, препятствующих проведению дальнейшего расследования по делу, случившихся не по вине заявителя.\nд) Проявление судьей нижестоящей инстанции должностной халатности, вследствие повлекшее нарушение прав сторон судебного процесса.\n\nч. 2 Особое производство может быть возбуждено судьей по собственной инициативе или по ходатайству участника судебного процесса.\n\nч. 3 Целью особого производства является достижение высшей справедливости, применяя особые действия по защите прав сторон судебного процесса.\n\nч. 4 Полномочия судьи особого процесса:\n\nа) Судья особого процесса вправе вынести постановление о применении необходимых временных мер, направленных на защиту прав сторон судебного процесса.\n\nб) Судья особого производства вправе наложить в отношении участника судебного процесса юридический иммунитет, защищающий гражданина от каких либо процессуальных или дисциплинарных действий в отношении него, согласно постановлению судьи.\n\nв) Судья специального производства в случае неисполнения офисом Генерального прокурора штата Сан-Андреас постановлений суда, вправе привлечь к производству иной следственный орган для исполнения им необходимых для суда действий по судебному процессу. В этом случае определением суда процессуальный статус государственного обвинителя может перейти к должностному лицу, производящему расследование по требованию суда.\n\nг) В случае проявления давления на участников судебного процесса, судья особого производства может постановить о назначении государственной охраны того или иного лица для осуществления его безопасности. Правоохранительные органы должны незамедлительно реагировать на все заявления лица об угрозах, производя все необходимые меры, для обеспечения его безопасности.\n\nч. 5 Специальный государственный обвинитель – должностное лицо следственного отдела, назначенное судом в рамках особого производства, для осуществления действий по досудебному расследованию и поддержке обвинения.\n\nч. 6 Права, обязанности и полномочия специального государственного обвинителя устанавливаются постановлением судьи особого производства. Права, обязанности и полномочия не должны выходить за рамки судебного производства.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-30.1", "number": "30.1", "title": "Контемпт суда", "content": "Статья 30.1 Контемпт суда\n\nч. 1 Контемпт суда – понятие, обозначающее поведение, которое нарушает или умаляет авторитет, порядок или должностные полномочия суда. Контемпт суда может проявляться в различных формах и может иметь различные виды последствий.\n\nч. 2 Суд имеет право принимать меры для поддержания своей власти и порядка. В случаях, когда лицо явно не исполняет судебное решение или иное определение, суд может действовать автономно по своей инициативе.\n\nч. 3 Если суд установит, проявление неуважения к суду или судебным постановлениям, суд вправе квалифицировать это как контемпт и выдать соответствующий ордер на арест или применить иные санкции.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-31", "number": "31", "title": "Мировое соглашение", "content": "Статья 31. Мировое соглашение\n\nч. 1 Стороны вправе заключить мировое соглашение до времени назначенного судебного заседания.\n\nч. 2 Мировое соглашение направляется в суд не позднее чем за пять часов до назначенного судебного заседания для утверждения. Если мировое соглашение направлено позже, то это может послужить основанием для оставления судом такого соглашения без рассмотрения, а судебное разбирательство продолжится в общем порядке.\n\nч. 3 Суд утверждает мировое соглашение, если его условия не противоречат закону и не ставят одну из сторон в заведомо невыгодное положение. Постановление суда об утверждении мирового соглашения считается судебным актом, разрешающим дело по существу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-31.1", "number": "31.1", "title": "Обжалование судебных постановлений", "content": "Статья 31.1. Обжалование судебных постановлений\n\nч. 1 В соответствии с требованиями настоящего Закона решения суда первой и апелляционной инстанций могут быть обжалованы в суды апелляционной и кассационной инстанций соответственно.\n\nч. 2 Определения или постановления о порядке исследования доказательств, об удовлетворении или отклонении ходатайств участников судебного разбирательства и другие судебные решения, вынесенные в ходе судебного разбирательства, обжалуются в апелляционном и кассационном порядке одновременно с обжалованием итогового судебного решения по делу, за исключением судебных решений, указанных в части третьей настоящей статьи.\n\nч. 3 До вынесения итогового судебного решения апелляционному и кассационному обжалованию подлежат частные определения и определения о возвращении уголовного дела прокурору, о привлечении к административному делу государственного обвинителя, постановления о прекращении производства по делу, о наложении судебного штрафа.\n\nч. 4 Государственный обвинитель в уголовном производстве обжалует судебные постановления в апелляционном и кассационном порядке апелляционным и кассационным представлением соответственно.\n\nч. 5 Прокурор, участвующий в административном или гражданском деле в качестве эксперта, обжалует судебные постановления в апелляционном и кассационном порядке апелляционным и кассационным представлением соответственно.\n\nч. 6 Лицам, пропустившим установленный законом процессуальный срок по причинам, признанным судом уважительными, пропущенный срок может быть восстановлен.\n\nч. 7 Ходатайство о восстановлении пропущенного процессуального срока подается в суд, в котором надлежало совершить процессуальное действие. В ходатайстве указываются причины пропуска процессуального срока, к ходатайству прилагаются документы или иные доказательства, подтверждающие уважительность этих причин.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-31.2", "number": "31.2", "title": "Досудебные меры урегулирования спора", "content": "Статья 31.2. Досудебные меры урегулирования спора\n\nч. 1 Одна или несколько из сторон могут направить другой досудебную претензию об исполнении законных обязательств в досудебном порядке.\n\nч. 2 Суд вправе по итогам судебного разбирательства наложить судебный штраф в случае отказа стороны или сторон к исполнению досудебной претензии в добровольном порядке.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-31.3", "number": "31.3", "title": "Эксперт и специалист в судебном разбирательстве", "content": "Статья 31.3 Эксперт и специалист в судебном разбирательстве\n\nч. 1 Эксперт обязан принять к производству порученную ему судом экспертизу и провести полное исследование представленных материалов и документов; дать обоснованное и объективное заключение по поставленным перед ним вопросам и направить его в суд, назначивший экспертизу; явиться по вызову суда для личного участия в судебном заседании и ответить на вопросы, связанные с проведенным исследованием и данным им заключением.\n\nВ случае, если поставленные вопросы выходят за пределы специальных знаний эксперта либо материалы и документы непригодны или недостаточны для проведения исследований и дачи заключения, эксперт обязан направить в суд, назначивший экспертизу, мотивированное сообщение в письменной форме о невозможности дать заключение.\n\nЭксперт обеспечивает сохранность представленных ему для исследования материалов и документов и возвращает их в суд вместе с заключением или сообщением о невозможности дать заключение.\n\nВ случае невыполнения требования суда, назначившего экспертизу, о направлении заключения эксперта в суд в срок, установленный в определении о назначении экспертизы, при отсутствии мотивированного сообщения эксперта или судебно-экспертного учреждения о невозможности своевременного проведения экспертизы либо о невозможности проведения экспертизы по причинам, указанным в абзаце втором настоящей части, судом на руководителя экспертного учреждения или виновного в указанных нарушениях эксперта налагается судебный штраф в порядке и в размере, которые установлены настоящим Законом.\n\nЭксперт не вправе самостоятельно собирать материалы для проведения экспертизы; вступать в личные контакты с участниками процесса, если это ставит под сомнение его незаинтересованность в исходе дела; разглашать сведения, которые стали ему известны в связи с проведением экспертизы, или сообщать кому-либо о результатах экспертизы, за исключением суда, ее назначившего.\n\nЭксперт, поскольку это необходимо для дачи заключения, имеет право знакомиться с материалами дела, относящимися к предмету экспертизы; просить суд о предоставлении ему дополнительных материалов и документов для исследования; задавать в судебном заседании вопросы лицам, участвующим в деле, и свидетелям; ходатайствовать о привлечении к проведению экспертизы других экспертов.\n\nч. 2 Эксперт дает заключение в письменной форме.\n\nЗаключение эксперта должно содержать подробное описание проведенного исследования, сделанные в результате его выводы и ответы на поставленные судом вопросы. В случае, если эксперт при проведении экспертизы установит имеющие значение для рассмотрения и разрешения дела обстоятельства, по поводу которых ему не были поставлены вопросы, он вправе включить выводы об этих обстоятельствах в свое заключение.\n\nЗаключение эксперта для суда необязательно и оценивается судом по правилам, установленным настоящим Законом. Несогласие суда с заключением должно быть мотивировано в решении или определении суда.\n\nНа время проведения экспертизы производство по делу может быть приостановлено.\n\nч. 3 Специалист – лицо, обладающее специальными знаниями, привлекаемое к участию в процессуальных действиях в порядке, установленном настоящим Законом, для содействия в обнаружении, закреплении и изъятии предметов и документов, применении технических средств в исследовании материалов дела, для постановки вопросов эксперту, а также для разъяснения сторонам и суду вопросов, входящих в его профессиональную компетенцию.\n\nВызов специалиста и порядок его участия в следственных и иных процессуальных действиях, судебных заседаниях определяются настоящим Законом.\n\nСтороне защиты не может быть отказано в удовлетворении ходатайства о привлечении к участию в производстве по делу в порядке, установленном настоящим Законом, специалиста для разъяснения вопросов, входящих в его профессиональную компетенцию, за исключением случаев, предусмотренных настоящим Законом.\n\nч. 4 Специалист вправе:\n\n1) отказаться от участия в производстве по делу, если он не обладает соответствующими специальными знаниями;\n\n2) задавать вопросы участникам следственного действия с разрешения прокурора, следователя и суда;\n\n3) знакомиться с протоколом следственного действия, в котором он участвовал, и делать заявления и замечания, которые подлежат занесению в протокол;\n\n4) приносить жалобы на действия (бездействие) и решения прокурора и суда, ограничивающие его права.\n\nСпециалист не вправе уклоняться от явки по вызовам прокурора, следователя или в суд, а также разглашать данные предварительного расследования, ставшие ему известными в связи с участием в производстве по делу в качестве специалиста, если он был об этом заранее предупрежден в порядке, установленном настоящим Законом.\n\nч. 5 Специалист и (или) эксперт привлекаются к участию в судебном разбирательстве по ходатайству или по собственной инициативе суда, рассматривающего уголовное, гражданское или административное дело.\n\n\nГЛАВА 7. АДМИНИСТРАТИВНОЕ СУДОПРОИЗВОДСТВО", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-32", "number": "32", "title": "Административное судопроизводство", "content": "Статья 32. Административное судопроизводство\n\nч. 1 Административное судопроизводство – это установленное Конституцией, настоящим Законом и иными законами производства суда по рассмотрению и разрешению административных дел с целью восстановления нарушенных прав и законных интересов заявителя.\n\nч. 2 Суды рассматривают административные дела:\n\nа) об оспаривании нормативных правовых актов сотрудников государственных органов полностью или в части;\n\nб) об оспаривании актов, содержащих разъяснения законодательства и обладающих нормативными свойствами, за исключением актов Федерального суда;\n\nв) об оспаривании решений, действий (бездействия) органов государственной власти, органов местного самоуправления, иных органов, организаций, наделенных отдельными государственными или иными публичными полномочиями, должностных лиц, государственных и муниципальных образований;\n\nг) иные дела, предусмотренные законодательством штата Сан-Андреас.\n\nч. 3 В случае оспаривания правовых актов полностью или в части, актов, содержащих разъяснения законодательства и обладающих нормативными свойствами и (или) решений, действий (бездействия) органов государственной власти, иных государственных органов, должностных лиц, государственных и муниципальных служащих в рамках административных правоотношений в рамках административного судопроизводства, не подлежат рассмотрению по существу требования заявителя или его представителя о привлечении ответчика или иных лиц к дисциплинарной, административной или уголовной ответственности.\n\nч. 4 Гражданин вправе обжаловать действия сотрудников государственных органов в рамках административного судопроизводства в течение 48 часов с момента произошедших обстоятельств.\n\nч. 5 Обязательными участниками в административном судопроизводстве являются административный истец и административный ответчик. Представители административного ответчика и административного истца, а также иные лица могут быть допущены по ходатайству сторон.\n\nч. 6 Если гражданин подал жалобу (обжалование) на решение, действие (бездействие) сотрудника государственного органа, должностное лицо или орган, чье решение обжалуется, выступает со стороны защиты и обязан доказать обоснованность принятого решения.\n\nч. 7 Требования о возмещении вреда, причиненного противоправными решениями, действиями или бездействием
