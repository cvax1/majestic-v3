 субъекта властных полномочий, или иным нарушением прав, свобод и интересов субъектов публично-правовых отношений рассматриваются судом, если они заявлены в одном производстве с требованием решить публично-правовой спор. В противном случае такие требования решаются судами в порядке гражданского дела в отдельном судебном производстве.\n\nч. 8 Суд в рамках административного судопроизводства вправе:\n\nа) отменить обжалуемое решение;\n\nб) обязать орган, должностное или юридическое лицо исправить нарушения в течение определенного срока.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-33", "number": "33", "title": "Отказ в принятии к производству искового заявления, жалобы или административного дела", "content": "Статья 33. Отказ в принятии к производству искового заявления, жалобы или административного дела\n\nч. 1 Суд отказывает в принятии к производству искового заявления, жалобы или административного дела по следующим основаниям:\n\nа) административное исковое заявление или жалоба подана с нарушением правил и (или) формы подачи таковых;\nб) административное исковое заявление подано по истечении 48 часов с момента обжалуемого решения;\nв) отсутствуют документы, подтверждающие оплату судебной пошлины, а также использование этих документов в другом исковом заявлении;\nг) нарушена подсудность при подаче искового заявления, жалобы или административного дела;\nд) в требованиях административного искового заявления содержится требование о привлечении административного ответчика к уголовной ответственности.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-34", "number": "34", "title": "Привлечение государственного обвинителя к административному делу", "content": "Статья 34. Привлечение государственного обвинителя к административному делу\n\nч. 1 Судья вправе привлечь к участию в судебном разбирательстве служащего офиса Генерального прокурора штата Сан-Андреас в рамках административного судопроизводства в случае необходимости по заявленному ходатайству или по собственной инициативе. Необходимость привлечения оценивается судьей.\nПри привлечении к участию в судопроизводстве служащего офиса Генерального прокурора штата Сан-Андреас он вступает в дело в качестве государственного обвинителя или эксперта, дающего заключение.\n\nч. 2 Судья вправе возложить на привлеченного к административному делу государственного обвинителя обязанность по проведению расследования обстоятельств административного дела в случае, если установит такую необходимость.\n\nч. 3 Прокурор вправе самостоятельно вступить в дело для дачи заключения и представления своей позиции по административному делу. Прокурор при вступлении в дело по собственной инициативе осуществляет полномочия эксперта. Для вступления в административное дело прокурор направляет в суд ходатайство о вступлении в административное дело в качестве эксперта.\n\n\nГЛАВА 8. УГОЛОВНОЕ СУДОПРОИЗВОДСТВО", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-35", "number": "35", "title": "Уголовное судопроизводство", "content": "Статья 35. Уголовное судопроизводство\n\nч. 1 Уголовное судопроизводство – это установленная Конституцией, настоящим Законом и иными законами деятельность суда по рассмотрению и разрешению уголовных дел.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-36", "number": "36", "title": "Уполномоченные органы на поддержание обвинения", "content": "Статья 36. Уполномоченные органы на поддержание обвинения\n\nч. 1 Уполномоченным органом на поддержку обвинения в совершении преступлений в суде от лица государства является офис Генерального прокурора штата Сан-Андреас.\n\nч. 1.2 Офис Генерального прокурора штата Сан-Андреас направляет в суд все свои уголовные дела и дела об административном правонарушении.\n\nч. 2 Иные правоохранительные органы, оперативно-следственные подразделения не имеют полномочий на передачу уголовного дела в суд для начала уголовного судопроизводства. Уголовные дела от таких органов и подразделений должны быть направлены в офис Генерального прокурора штата Сан-Андреас для утверждения обвинительного акта и последующей их передачей в суд от офиса Генерального прокурора штата Сан-Андреас. Должностное лицо, производившее досудебное следствие по рассматриваемому судом уголовному делу, признается следователем. В случае, если следствие проводила оперативно-следственная группа состоящая более чем из одного должностного лица, настоящим Законом как следователь признается глава таковой, судом также могут быть вызваны и заслушаны мнения остальных участников. Следователь может быть вызван в судебное заседание в случае удовлетворения заявленного ходатайства от офиса Генерального прокурора штата Сан-Андреас, либо в случае, когда суд сочтет необходимым по собственной инициативе.\n\nч. 3 Обязательными участниками в уголовном судопроизводстве являются государственный обвинитель, потерпевший и обвиняемый. Адвокат при наличии соответствующего договора может быть допущен как защитник обвиняемого по его ходатайству. Также потерпевший вправе допустить адвоката при наличии соответствующего договора к процессу путем подачи в суд ходатайства.\n\nч. 4 По факту направления уголовного дела суд рассматривает его и принимает решение о его принятии к производству и назначении судебного заседания, либо об отказе в принятии к производству уголовного дела.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-37", "number": "37", "title": "Определение границ уголовного разбирательства", "content": "Статья 37. Определение границ уголовного разбирательства\n\nч. 1 Судебное разбирательство в уголовном процессе проводится только в отношении лица или группы лиц, которому (которым) предъявлено обвинение, и только в пределах предъявленного обвинения в соответствии с обвинительным актом, кроме случаев, предусмотренных настоящей статьей.\n\nч. 2 Если в ходе судебного разбирательства установлены новые фактические обстоятельства уголовного преступления, в совершении которого обвиняется лицо, во время судебного разбирательства государственный обвинитель может изменить обвинение, выдвинуть дополнительное обвинение, отказаться от поддержания государственного обвинения.\n\nч. 2.1 В случае получения сведений о возможном совершении обвиняемым другого уголовного преступления, в отношении которого обвинение не выдвигалось и которое тесно связано с первоначальным, и их отдельное рассмотрение невозможно, либо таковые сведения были открыты во время судебного заседания, прокурор вправе обратиться с мотивированным ходатайством о рассмотрении дополнительных обвинений в одном производстве с первоначальным обвинением.\n\nч. 3 Суд не вправе изменить обвинение и квалифицировать действия (бездействие) подсудимого по другой статье уголовного закона, по которой подсудимому не было предъявлено обвинение.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-37.1", "number": "37.1", "title": "Принятие или отказ в принятии уголовного дела к производству", "content": "Статья 37.1 Принятие или отказ в принятии уголовного дела к производству\n\nч. 1 Судья принимает к производству уголовное дело определением, возбудив производство по судебному делу и назначив дату судебного разбирательства.\n\nч. 2 По поступившему в суд уголовному делу судья должен выяснить в отношении каждого из обвиняемых следующее:\n\n1) подсудно ли уголовное дело данному суду;\n2) вручены ли копии обвинительного заключения или обвинительного акта;\n3) подлежат ли удовлетворению заявленные ходатайства и поданные жалобы.\n\nч. 3 Судья вправе возвратить уголовное дело государственному обвинителю в случаях:\n\n1) некорректно указаны данные обвиняемых;\n2) уголовное дело неподсудно данному суду;\n3) копии обвинительного заключения или обвинительного акта не вручены обвиняемым;\n4) наличие нарушений норм материального и (или) процессуального права при расследовании уголовного дела.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-37.2", "number": "37.2", "title": "Вынесение приговора", "content": "Статья 37.2 Вынесение приговора\n\nч. 1 Приговор суда может быть оправдательным или обвинительным.\n\nч. 2 Оправдательный приговор постановляется в случаях, если:\n\nа) отсутствует событие преступления;\nб) отсутствует состав преступления в действиях (бездействии) подсудимого;\nв) подсудимый не причастен к совершению преступления;\nг) в отношении подсудимого коллегией присяжных заседателей вынесен оправдательный вердикт.\n\n\nГЛАВА 9. ГРАЖДАНСКОЕ СУДОПРОИЗВОДСТВО", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-38", "number": "38", "title": "Гражданское судопроизводство", "content": "Статья 38. Гражданское судопроизводство\n\nч. 1 Гражданское судопроизводство – это установленная Конституцией, настоящим Законом и иным законодательством деятельность суда по рассмотрению и разрешению гражданских дел.\n\nч. 2 В гражданском судопроизводстве не подлежат рассмотрению по существу требования истца или его представителя о привлечении ответчика или иных лиц к дисциплинарной, административной или уголовной ответственности.\n\nч. 3 Обязательными участниками в гражданском судопроизводстве являются истец и ответчик. Представители ответчика и истца, а также иные лица могут быть привлечены по ходатайству сторон.\n\nч. 4 Суды рассматривают гражданские дела:\n\nа) гражданские исковые заявления с участием граждан, организаций, органов государственной власти, органов местного самоуправления о защите нарушенных или оспариваемых прав, свобод и законных интересов, по спорам, возникающим из гражданских, семейных, трудовых, жилищных, земельных, экологических и иных правоотношений;\n\nб) дела по корпоративным спорам, связанные с созданием юридического лица, управлением им или участием в юридическом лице, являющемся некоммерческой организацией, за исключением некоммерческих организаций, дела по корпоративным спорам, которые законом отнесены к подсудности федеральных судов;\n\nв) гражданские исковые заявления о взыскании компенсации морального вреда и (или) материального ущерба, восстановлении и очищении репутации, прав, ликвидации негативных последствий, записей, а также другого ущерба и издержек;\n\nг) иные гражданские дела, предусмотренные Гражданским кодексом штата Сан-Андреас.\n\nч. 5 Суд отказывает в принятии к производству искового заявления, жалобы или гражданского дела по следующим основаниям:\n\nа) гражданское исковое заявление или жалоба подана с нарушением правил и (или) формы подачи таковых;\nб) гражданское исковое заявление подано по истечении 48 часов с момента события обстоятельств, на которых истец основывает свои исковые требования;\nв) отсутствуют документы, подтверждающие оплату судебной пошлины, а также использование этих документов в другом деле;\nг) нарушена подсудность при подаче искового заявления, жалобы или гражданского дела.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-38.1", "number": "38.1", "title": "Участие в гражданском деле прокурора", "content": "Статья 38.1 Участие в гражданском деле прокурора\n\nч. 3 Прокурор вправе самостоятельно вступить в дело для дачи заключения и представления своей позиции по гражданскому делу. Прокурор при вступлении в дело по собственной инициативе осуществляет полномочия эксперта. Для вступления в гражданское дело прокурор направляет в суд ходатайство о вступлении в административное дело в качестве эксперта.\n\n\nГЛАВА 10. КОНСТИТУЦИОННОЕ СУДОПРОИЗВОДСТВО", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-39", "number": "39", "title": "Конституционное судопроизводство", "content": "Статья 39. Конституционное судопроизводство\n\nч. 1 Конституционное судопроизводство – это установленная Конституцией, настоящим Кодексом и иными законами деятельность суда по рассмотрению конституционных вопросов, включая толкование Конституции, контроль за соответствием законов и других нормативных правовых актов Конституции, а также разрешение конституционных споров и урегулирование конституционных конфликтов.\n\nч. 2 Правом на обращение в Верховный Суд штата Сан-Андреас с индивидуальной или коллективной жалобой на нарушение конституционных прав и свобод обладают граждане, юридические лица и муниципальные образования в лице органов местного самоуправления, чьи права и свободы, по их мнению, нарушаются примененными в конкретном деле конкретным законодательством штата Сан-Андреас. Также допускаются отдельные жалобы на неконституционность нормативных правовых актов в отсутствие правоотношений. Целью такого обращения может быть исключительно пересмотр на предмет противоречия Конституции штата Сан-Андреас либо обнаружение коллизионных положений в правовых нормах законодательства.\n\nч. 3 Жалоба на нарушение конституционных прав и свобод, а также обращение должно соответствовать правилам и (или) форме подачи, установленным законодательством штата Сан-Андреас.\n\nч. 4 Конституционное судопроизводство осуществляет Верховный Суд штата Сан-Андреас.\n\nч. 5 Верховный Суд штата Сан-Андреас в рамках конституционного судопроизводства имеет право:\n\nа) приостановить действие неконституционных нормативных правовых актов или отменить их;\n\nб) разрешить вопрос о соответствии Конституции штата Сан-Андреас и вышестоящим нормативным правовым актам нижестоящих;\n\nв) дать толкование Конституции штата Сан-Андреас и иным Законам штата Сан-Андреас;\n\nг) разрешать вопрос об отмене или приостановлении положений нормативно-правового акта штата Сан-Андреас, обладающего меньшей юридической силой;\n\nд) обязать законодательный орган внести в действующее правовое регулирование необходимые изменения.\n\nч. 6 Верховный Суд штата Сан-Андреас вправе по заявленному ходатайству или по собственной инициативе приостановить действие оспариваемого законоположения или нормативного акта.\n\nч. 7 При рассмотрении жалобы на неконституционность, несоответствие нижестоящего нормативного правового акта вышестоящему Верховный Суд штата Сан-Андреас выносит определение о принятии к производству жалобы либо об отказе в принятии к производству жалобы.\n\nч. 8 Основаниями для отказа в принятии к производству жалобы на неконституционность, несоответствие нижестоящего нормативного правового акта вышестоящему являются:\n\nа) нарушение формы и (или) правил подачи жалоб на неконституционность, несоответствие нижестоящего нормативного правового акта вышестоящему;\n\nб) разрешение вопроса, поставленного в обращении, не подведомственно Верховному Суду штата Сан-Андреас;\n\nв) акт, конституционность которого оспаривается, был отменен или утратил силу, за исключением случаев, когда он продолжает применяться к правоотношениям, возникшим в период его действия;\n\nг) по предмету обращения Верховным Судом штата Сан-Андреас ранее было вынесено постановление, сохраняющее свою силу;\n\nд) неуплата государственной пошлины;\n\nе) при предварительной проверке выявлено отсутствие неконституционности, несоответствия нижестоящего нормативного правового акта вышестоящему.\n\n\nГЛАВА 11. СУД ПРИСЯЖНЫХ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-40", "number": "40", "title": "Суд присяжных", "content": "Статья 40. Суд присяжных\n\nч. 1 Суд присяжных – открытый или закрытый суд, на котором коллегия присяжных является совещательным органом для судьи.\n\nч. 2 Решение о слушании дела в суде присяжных может быть принято на усмотрение суда при назначении судебного заседания как по ходатайству лиц, участвующих в деле, так и по собственной инициативе. При этом, рассмотрение дела судом присяжных допускается исключительно в Окружном Суде штата Сан-Андреас.\n\nч. 3 Количество участвующих на суде присяжных – от трех до девяти человек.\n\nч. 4 До начала судебного заседания суд назначает председателя из общего числа присяжных. Председатель организует работу коллегии присяжных и в конце судебного разбирательства оглашает совместное решение всех присяжных в формате вердикта.\n\nч. 5 На суде присяжных судья обязан прислушаться к мнению и вердикту присяжных заседателей, но оставляет за собой право самостоятельно выносить окончательное решение, но не противоречащее вердикту коллегии присяжных.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-41", "number": "41", "title": "Присяжный", "content": "Статья 41. Присяжный\n\nч. 1 Присяжный - случайно отобранное лицо, не имеющее никаких связей со стороной обвинения и защиты, уполномоченное в составе коллегии вынести собственное решение по делу.\n\nч. 2 Требования к присяжным заседателям, порядок их отбора и формирования их реестра определяется Председателем Верховного Суда штата Сан-Андреас.\n\n\nГЛАВА 12. ПРАВИЛА ПОВЕДЕНИЯ В СУДЕБНОМ ЗАСЕДАНИИ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-42", "number": "42", "title": "Правила поведения в судебном заседании и обязанности присутствующих", "content": "Статья 42. Правила поведения в судебном заседании и обязанности присутствующих\n\nч. 1 Фото-, видеосъемка и аудиозапись может вестись только в открытом судебном заседании, если судом прямо не установлен запрет на съемку. Фото-, видеосъемка и аудиозапись может быть ограничена по времени судом. Фото-, видеосъемка и аудиозапись может быть прекращена по распоряжению суда, если она мешает ходу судебного заседания.\n\nч. 2 Лица, присутствующие на суде, обязаны относится к друг другу с уважением, запрещено сквернословить, рукоприкладствовать, повышать голос, перебивать, разговаривать без разрешения суда, издавать лишние звуки, перемещаться по залу. Лицам, присутствующим на судебном заседании в качестве слушателей, запрещено вмешиваться в ход судебного заседания и иным образом нарушать порядок заседания. К суду все присутствующие обязаны обращаться \"Ваша Честь\" или \"Уважаемый суд\", не называя при этом личных данных судьи.\n\nч. 3 Все участники судебного заседания обращаются к суду, дают показания, делают заявления и выслушивают решение суда стоя, отступление от этого правила может быть допущено с разрешения суда.\n\nч. 4 Запрещено опаздывать на судебное заседание, а участвующим в деле лицам - также не являться на судебное заседание, если их явка признана судом обязательной, и лицо не уведомило суд об уважительности отсутствия.\n\nч. 5 Запрещено использование мобильных телефонов и иных технических приборов любым лицом, присутствующим в зале без одобрения суда.\n\nч. 6 Запрещено нахождение домашних животных в зале суда.\n\nч. 7 Никто не вправе, в том числе неприкосновенные лица, проносить любые виды огнестрельного и холодного оружия в суд, за исключением сотрудников, на которых судом возложена функция судебных приставов.\n\nч. 8 Судебные приставы имеют полное право на обыск всех лиц, присутствующих в зале суда, вне зависимости от должности и статуса неприкосновенности. В случае обнаружения у присутствующих лиц любых видов огнестрельного и холодного оружия судебный пристав вправе потребовать гражданина покинуть зал суда.\n\nч. 9 Запрещено нахождение в неприемлемом виде в зале суда. Запрещено нахождение в маске, в мотоциклетном шлеме в зале суда.\nИсключение: Сотрудники, на которых судом возложена функция судебных приставов.\n\nч. 10 Суд вправе давать предупреждения за нарушение настоящего регламента и привлекать всех присутствующих в зале суда к ответственности в соответствии с законодательством штата Сан-Андреас. Одно предупреждение приравнивается к незначительному. За два или более предупреждения суд вправе избрать более значимую меру наказания.\n\nч. 11 Председательствующий судья может в разумном порядке самостоятельно изменять регламент и правила поведения в судебном заседании. За нарушение правил поведения в судебном заседании лица могут быть выведены из зала суда судебным приставом по распоряжению суда или привлечены к уголовной или административной ответственности в соответствии законодательством штата Сан-Андреас.\n\n\nГЛАВА 13. ПОРЯДОК ПРОВЕДЕНИЯ СУДЕБНОГО ЗАСЕДАНИЯ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-43", "number": "43", "title": "Начало судебного заседания", "content": "Статья 43. Начало судебного заседания\n\nч. 1 Заседание суда начинается не позднее 30 минут после назначенного времени с объявлением судом судебного заседания.\n\nч. 2 Судья или по его поручению судебный секретарь, обязан вести аудио-видеофиксацию (протоколирование) судебного разбирательства.\n\nч. 3 Секретарь судебного заседания по поручению председательствующего проверяет явку в суд лиц, которые должны участвовать в судебном заседании.\n\nч. 4 Судебный секретарь не вправе совершать действия, влекущие за собой возникновение, изменение либо прекращение прав или обязанностей лиц, участвующих в деле, и других участников судебного процесса.\n\nч. 5 Судебный секретарь оказывает помощь судье в подготовке и организации судебного процесса. Помощник судьи не вправе выполнять функции по осуществлению правосудия.\n\nч. 6 До начала вступительного слова судьи, суд или по его поручению пристав или судебный секретарь устанавливает личность фигурантов, выясняя их фамилию, имя, номер паспорта посредством проверки документов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-44", "number": "44", "title": "Заявление и разрешение ходатайств", "content": "Статья 44. Заявление и разрешение ходатайств\n\nч. 1 Председательствующий опрашивает стороны, имеются ли у них ходатайства. Лицо, заявившее ходатайство, должно его обосновать.\n\nч. 2 Суд, выслушав мнения участников судебного разбирательства, разрешает каждое заявленное ходатайство и удовлетворяет его либо отказывает в целом или в части в удовлетворении на самом заседании – устно.\n\nч. 3 Лицо, которому судом отказано в удовлетворении ходатайства, вправе заявить его вновь в ходе дальнейшего судебного разбирательства.\n\nч. 4 Ходатайство может быть подано как в процессе рассмотрения дела на судебном заседании, так и в электронном виде на портале штата до начала судебного заседания. Форма и правила подачи ходатайств в электронном виде устанавливается Председателем Верховного Суда штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-45", "number": "45", "title": "Обязанность сторон и разрешение дела в случае неявки сторон", "content": "Статья 45. Обязанность сторон и разрешение дела в случае неявки сторон\n\nч. 1 Стороны обязаны подготовиться к судебному заседанию. В случае необходимости, не позднее, чем за пять часов до начала судебного заседания стороны должны предоставить суду ходатайства о допуске свидетелей и иных участников судебного процесса, а также приобщении материалов к делу. При нарушении установленного срока суд вправе оставить ходатайство без рассмотрения.\n\nч. 2 Неявка одного или нескольких участников судебного процесса может служить причиной для переноса судебного заседания. Необходимость переноса судебного процесса оценивается судом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-46", "number": "46", "title": "Судебная присяга", "content": "Статья 46. Судебная присяга\n\nч. 1 Каждый участник вызванный в суд находится под присягой, принятие которой происходит путем произнесения следующей клятвы “клянусь говорить правду и ничего кроме правды”.\n\nч. 2 Нарушение присяги влечет ответственность согласно законодательству штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-47", "number": "47", "title": "Начало судебного разбирательства", "content": "Статья 47. Начало судебного разбирательства\n\nч. 1 Во время проведения заседания, судья по очереди предоставляет слово одной и другой стороне сторонам в целях установления обстоятельств по делу в следующем порядке:\n\nа) Вступительная речь государственного обвинителя с целью ознакомления присутствующих с кратким обзором дела, утверждениями и доказательствами, которые государственный обвинитель представляет в процессе с целью обвинить подсудимого;\n\nб) Вступительная речь стороны обвинения, истца и/или его представителя с целью уточнения собственных исковых требований;\n\nв) Вступительная речь стороны защиты, ответчика и/или его представителя с целью выражения согласия или несогласия с предъявленными обвинениями полностью или в части;\n\nг) Допрос истца стороной гособвинения, обвинения, защиты.\n\nд) Допрос ответчика стороной гособвинения, обвинения, защиты.\n\nе) Вызов свидетелей и экспертов из списка, сначала со стороны гособвинения, затем со стороны обвинения, после со стороны защиты;\n\nж) Судья вправе задавать свои вопросы допрашиваемым лицам как по установленному порядку, так и без него;\n\nз) Во время судебного разбирательства, после окончания стадии вступительного слова и до стадии заключительного слова, стороны имеют право возразить (заявить протест) относительно доводов и объяснений иных участвующих в деле лиц, после разрешения суда объяснив суть возражения;\n\nи) Судья имеет право принять возражение (протест) или отклонить его, объяснив свои мотивы;\n\nк) Заключительное слово стороны гособвинения (дает краткое резюме собранным и обязательно исследованным в суде доказательствам. Также дает обвинительное или оправдательное заключение).\n\nл) Заключительное слово стороны обвинения, истца и/или его представителя;\n\nм) Заключительное слово стороны защиты, ответчика и/или его представителя;\n\nч. 2 Председательствующий судья заседание вправе отойти от вышеописанного регламента.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-48", "number": "48", "title": "Принятие решения", "content": "Статья 48. Принятие решения\n\nч. 1 По окончании выступления сторон, суд удаляется в совещательную комнату для принятия решения.\n\nч. 2 Суд оценивает доказательства по своему внутреннему убеждению, основанному на высоких нравственных ценностях и профессионализме. Суд выносит решение на основе полной совокупности исследованных доказательств, с учетом всех обстоятельств дела.\n\nч. 3 Во время судебного разбирательства, в совещательной комнате могут присутствовать только судьи, рассматривающие дело и Председатель Верховного Суда штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-49", "number": "49", "title": "Приговор или решение суда", "content": "Статья 49. Приговор или решение суда\n\nч. 1 После принятия решения, судья либо коллегия судей, возвращается в зал заседания и зачитывает резолютивную часть решения, содержащую результат рассмотрения дела по требованиям, заявленным сторонами.\n\nч. 2 При необходимости суд имеет право отложить вынесение резолютивной части решения, уведомив участников процесса о том, что решение будет опубликовано на портале штата. Такое решение должно быть вынесено в срок, не позднее 72 часов с момента уведомления участников процесса о том, что решение будет опубликовано на портале штата.\n\nч. 3 Суд выносит полное мотивированное решение после проведенного заседания либо в течение 72 часов с момента его окончания.\n\nч. 4 Решение должно содержать перечень установленных судом фактов и изложение причин, по которым суд принял решение, с оценкой приведенных сторонами доводов и доказательств.\n\nч. 5 Если решением суда назначено наказание, связанное с лишением свободы, его исполнение осуществляется судебными приставами после оглашения резолютивной части решения немедленно в зале суда.\n\nч. 6 Мотивировочная часть решения должна содержать перечень установленных судом фактов и изложение причин, по которым суд принял решение, с оценкой приведенных сторонами аргументов и доказательств.\n\nч. 7 Если решением суда назначено наказание, связанное с лишением свободы, его исполнение осуществляется судебными приставами после оглашения резолютивной части решения немедленно в зале суда.\n\n\nГЛАВА 14. ЗАОЧНОЕ ПРОИЗВОДСТВО", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-50", "number": "50", "title": "Заочное производство", "content": "Статья 50. Заочное производство\n\nч. 1 В случае неявки в судебное заседание одного из фигурантов дела, извещенного о времени и месте судебного заседания, не сообщившего об уважительных причинах неявки и не просившего о рассмотрении дела в его отсутствие, дело может быть рассмотрено в судебном заседании без проведения слушания сторон.\n\nч. 2 Суд без проведения слушания исследует доказательства и письменные показания сторон, на основании которых выносит решение.\n\nч. 3 В случае неявки заявителя на судебное слушание, надлежащим образом извещенного о месте и времени проведения судебного слушания, суд вправе прекратить производство по делу.\n\nч. 4 Суд имеет право, принимая иск к производству, самостоятельно оценивать и рассматривать все представленные сторонами доказательства.\n\nч. 5 Суд вправе без проведения дополнительного расследования и судебного заседания вынести решение по существу дела на основании представленных доказательств.\n\n\nРАЗДЕЛ IV ОБСТОЯТЕЛЬСТВА, ИСКЛЮЧАЮЩИЕ УЧАСТИЕ В СУДОПРОИЗВОДСТВЕ, ХОДАТАЙСТВА, ОТВОДЫ.\nГЛАВА 15. ОБСТОЯТЕЛЬСТВА, ИСКЛЮЧАЮЩИЕ УЧАСТИЕ В СУДОПРОИЗВОДСТВЕ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-51", "number": "51", "title": "Обстоятельства, исключающие участие в судопроизводстве", "content": "Статья 51. Обстоятельства, исключающие участие в судопроизводстве\n\nч. 1 Судья, государственный обвинитель или эксперт не может участвовать в судебном разбирательстве, если он:\n\n1) Является потерпевшим, истцом, ответчиком по делу;\n2) Является родственником или свойственником любого из участников судебного разбирательства;\n3) Проявляет, вопреки интересам правосудия, личную заинтересованность в исходе судебного разбирательства.\n\nч. 2 При наличии оснований для отвода, предусмотренных частью 1 настоящей статьи, судья, государственный обвинитель или эксперт обязаны устраниться от участия в судебном разбирательстве. Судья, государственный обвинитель или эксперт вправе заявить самоотвод от участия в деле в одностороннем порядке.\n\nч. 3 В случае, если лица, указанные в части 1 настоящей статьи, не устранились от участия в судебном разбирательстве, отвод им может быть заявлен стороной защиты или стороной обвинения. Государственный обвинитель также вправе заявить отвод судье и эксперту.\n\nч. 4 Отвод может быть заявлен до начала судебного заседания.\n\nч. 5 Заявление отвода после начала судебного заседания допускается лишь в случае, когда основание для отвода стало известно после начала заседания.\n\nч. 6 Отвод разрешается судьей единолично без удаления в совещательную комнату.\n\nч. 7 При коллегиальном рассмотрении дела, отвод одному из судей разрешается остальными членами коллегии в его отсутствие в совещательной комнате.\n\nч. 8 Отвод, заявленный всему составу коллегии, разрешается коллегией в полном составе с удалением в совещательную комнату.\n\nч. 9 В случае отказа в удовлетворении отвода, заявление отвода по тем же основаниям не допускается.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-50.1", "number": "50.1", "title": "Ходатайства", "content": "Статья 50.1 Ходатайства\n\nч. 1 Ходатайства могут быть заявлены без судопроизводства в отдельных случаях, предусмотренных настоящим Законом, или на любой стадии производства по делу любым правомочным участником производства по делу, а также лицом (лицами), чьи права и законные интересы затрагиваются в связи с рассмотрением дела.\n\nч. 2 Ходатайства, разрешаемые в судебном заседании, не подлежат документированию в материалах дела.\n\nч. 3 Ходатайства, заявленные в рамках производства вне судебного заседания, разрешаются судьей или судебной коллегией определением.\n\nч. 4 Ходатайства, заявленные до определения о принятии к производству и возбуждения дела при подаче искового заявления, жалобы или дела, подлежат возвращению заявителю в случае отказа в принятии к производству искового заявления, жалобы или дела.\n\n\nРАЗДЕЛ V СУДЕБНЫЙ ШТРАФ.\nГЛАВА 16. СУДЕБНЫЙ ШТРАФ, АРЕСТ, ОБЕСПЕЧЕНИЕ ИСКА", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-52", "number": "52", "title": "Судебный штраф", "content": "Статья 52. Судебный штраф\n\nч. 1 Судебный штраф может быть применен судом или судьей как в рамках рассмотрения дела, так и без него. Судебный штраф накладывается в виде постановления суда.\n\nч. 2 Размер судебного штрафа, налагаемого на граждан, не может превышать $300 000, на должностных лиц не может превышать $500 000, на юридических лиц либо органов государственной власти не ограничен.\n\nч. 3 Судебный штраф оплачивается через судебный корпус штата Сан-Андреас или Правительство штата Сан-Андреас. При наложении судебного штрафа судья или суд указывает о порядке уплаты отдельно.\n\nч. 4 По факту уплаты штрафа, документы, подтверждающие его оплату должны быть представлены суду или судье, который назначил судебный штраф. В случае неуплаты штрафа в установленный срок, суд или судья может вынести решение о принудительном взыскании денежных средств на исполнение правоохранительным органам.\n\nч. 5 Судебный штраф не является мерой уголовной или административной ответственности и не является наказанием за правонарушение. Это мера воздействия, обеспечивающая соблюдение запретов и надлежащее исполнение обязательств в рамках судопроизводства.\n\nч. 6 За злостное неисполнение судебного акта лицо может быть привлечено к ответственности согласно законам штата Сан-Андреас.\n\nч. 7 Лицо, в отношении которого судом вынесено постановление о назначении штрафа, может ходатайствовать суду об отсрочке уплаты штрафа в разумный срок.\n\nч. 8 Основанием для отсрочки уплаты штрафа является недостаточность получаемых лицом доходов для его своевременной уплаты, что подтверждается соответствующими справками о доходах. Отсутствие денежных средств на момент назначения штрафа, при условии, что лицо имеет достаточный для уплаты штрафа уровень дохода не может быть основанием для отсрочки уплаты.\n\n\nРАЗДЕЛ VI ПЕРЕСМОТР АКТОВ СУДА\nГЛАВА 17. ПРОИЗВОДСТВО В АПЕЛЛЯЦИОННОЙ ИНСТАНЦИИ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-53", "number": "53", "title": "Суд апелляционной инстанции по итогам апелляционного производства", "content": "Статья 53. Суд апелляционной инстанции по итогам апелляционного производства\n\nч. 1 По итогам апелляционного производства суд апелляционной инстанции вправе:\n\nа) оставить апелляционную жалобу, представление без удовлетворения, а судебное постановление – без изменения;\nб) отменить судебное постановление полностью или в части и принять новое судебное постановление в соответствующей части или изменить его, либо направить дело в суд первой инстанции на новое рассмотрение с любой стадии судебного производства;\nв) отменить судебное постановление полностью или в части и в соответствующей части прекратить производство по делу.\n\nч. 2 Правом подачи апелляционной жалобы обладают участвующие в деле лица, не являющиеся государственным обвинителем, прокурором, и лица, чьи права и законные интересы затрагиваются судебным постановлением. Государственный обвинитель, прокурор направляет в суд апелляционное представление.\n\nч. 3 По итогам рассмотрения апелляционной жалобы, представления по гражданским, административным и уголовным делам и делам об административных правонарушениях суд апелляционной инстанции выносит определение.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-53.1", "number": "53.1", "title": "Принятие или отказ в принятии апелляционной жалобы, представления", "content": "Статья 53.1 Принятие или отказ в принятии апелляционной жалобы, представления\n\nч. 1 Суд апелляционной инстанции принимает апелляционную жалобу, представление к производству определением.\n\nч. 2 Основаниями для отказа в принятии апелляционной жалобы, представления к производству являются:\n\nа) апелляционная жалоба, представление подана с нарушением правил и (или) формы подачи таковых;\nб) апелляционная жалоба, представление подана по истечении 72 часов с момента обжалуемого судебного постановления;\nв) отсутствуют документы, подтверждающие оплату судебной пошлины, а также использование этих документов в другом исковом заявлении;\nг) нарушена подсудность при подаче апелляционной жалобы, представления;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-54", "number": "54", "title": "Основания для отмены или изменения судебного постановления судом апелляционной инстанции", "content": "Статья 54. Основания для отмены или изменения судебного постановления судом апелляционной инстанции\n\nч. 1 Основанием для отмены или изменении судебного постановления при рассмотрении дела в суде апелляционной инстанции являются:\nа) Несоответствие выводов суда первой инстанции, изложенных в постановлении суда, обстоятельствам дел;\nб) Необоснованность назначенного наказания в порядке, предусмотренном законодательством штата Сан-Андреас;\nв) Неприменение или неправильное применение нижестоящими судами норм материального или процессуального права, которые повлияли на исход дела и без устранения которых невозможны восстановление и защита нарушенных прав, свобод, законных интересов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-55", "number": "55", "title": "Несоответствие выводов суда первой инстанции фактическим обстоятельствам производства", "content": "Статья 55. Несоответствие выводов суда первой инстанции фактическим обстоятельствам производства\n\nч. 1 Судебное постановление признается несоответствующим фактическим обстоятельствам дела, если:\n\nа) выводы суда не подтверждаются доказательствами, изученными во время судебного рассмотрения;\nб) суд не принял во внимание доказательства, которые могли существенно повлиять на его выводы;\nв) при наличии спорных доказательств, которые имеют существенное значение для решений суда, в судебном решении не указано почему суд взял во внимание одни доказательства и признал ничтожность других;\nг) выводы суда, изложенные в судебном решении, содержат существенные противоречия.\n\nч. 2 Судебное постановление подлежит отмене или изменению по указанным основаниям только тогда, когда несоответствие выводов суда фактическим обстоятельствам производства повлияло или могло повлиять на решение вопроса о виновности или невиновности обвиняемого, на правильность применения законов штата Сан-Андреас.\n\n\nГЛАВА 18. ПРОИЗВОДСТВО В КАССАЦИОННОЙ ИНСТАНЦИИ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-56", "number": "56", "title": "Суд кассационной инстанции по итогам кассационного производства", "content": "Статья 56. Суд кассационной инстанции по итогам кассационного производства\n\nч. 1 В кассационном порядке могут быть обжалованы постановления суда апелляционной инстанции, если такое постановление вступило в законную силу и с момента его вынесения не прошло 72 часов.\n\nч. 2 Постановление суда апелляционной инстанции может быть обжаловано в кассационном порядке лицами, имеющими право на подачу апелляционной жалобы, за исключением государственного обвинителя, прокурора, и лицами, чьи права и законные интересы затрагиваются этим судебным постановлением. Государственный обвинитель, прокурор направляет в суд кассационное представление.\n\nч. 3 Постановления суда кассационной инстанции могут быть обжалованы в порядке, предусмотренном статьей 59 настоящего Закона.\n\nч. 4 Кассационная жалоба обязана содержать в себе мотивированные и обоснованные действующим законодательством аргументы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-57", "number": "57", "title": "Полномочия суда кассационной инстанции по итогам рассмотрения кассационной жалобы, представления", "content": "Статья 57. Полномочия суда кассационной инстанции по итогам рассмотрения кассационной жалобы, представления\n\nч. 1 Суд кассационной инстанции по итогам рассмотрения кассационной жалобы, представления вправе:\n\nа) оставить судебные постановления судов первой и (или) апелляционной инстанций без изменений, а жалобу, представление без удовлетворения;\nб) отменить судебные постановления судов первой и (или) апелляционной инстанций полностью или в части и передать дело полностью или частично на новое рассмотрение или для продолжения рассмотрения с любой стадии судебного производства;\nв) отменить судебные постановления судов первой и (или) апелляционной инстанций полностью или в части и принять новое решение в соответствующей части или изменить постановление.\n\nч. 2 По итогам рассмотрения кассационной жалобы, представления по гражданским, административным делам и делам об административных правонарушениях суд кассационной инстанции выносит определение. По итогам рассмотрения кассационной жалобы, представления по уголовным делам суд кассационной инстанции выносит постановление.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-58", "number": "58", "title": "Основания для отмены или изменения судебного постановления судом кассационной инстанции", "content": "Статья 58. Основания для отмены или изменения судебного постановления судом кассационной инстанции\n\nч. 1 Основанием для отмены или изменении судебного постановления при рассмотрении дела в суде кассационной инстанции являются:\n\nа) Неприменение или неправильное применение нижестоящими судами норм материального или процессуального права, которые повлияли на исход дела и без устранения которых невозможны восстановление и защита нарушенных прав, свобод, законных интересов;\nб) Грубое нарушение судами нижестоящих инстанций порядка проведения судебных слушаний, а равно, грубое нарушение норм процессуального права, которые повлияли на исход дела и без устранения которых невозможны восстановление и защита нарушенных прав, свобод, законных интересов;\nв) Несоответствие выводов нижестоящих судов фактическим обстоятельствам дела.\n\n\nГЛАВА 19. ПРОИЗВОДСТВО В НАДЗОРНОЙ ИНСТАНЦИИ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-59", "number": "59", "title": "Пересмотр судебных актов порядке надзора", "content": "Статья 59. Пересмотр судебных актов порядке надзора\n\nч. 1 Вступившие в законную силу судебные акты, указанные в части второй настоящей статьи, могут быть пересмотрены в порядке надзора Президиумом Верховного Суда штата Сан-Андреас по жалобам лиц, участвующих в деле, и других лиц, если их права, свободы и законные интересы нарушены этими судебными актами.\n\nч. 2 Утратила силу.\n\nч. 3 В Президиум Верховного Суда штата Сан-Андреас обжалуются вступившие в законную силу постановления Верховного Суда штата Сан-Андреас, принятые как в качестве суда первой инстанции, так и в качестве суда апелляционной и кассационной инстанций.\n\nч. 4 Право на обращение в Президиум Верховного Суда штата Сан-Андреас с надзорным представлением о пересмотре судебных постановлений, указанных в части третьей настоящей статьи, если в рассмотрении дела участвовал прокурор, имеют Генеральный прокурор штата Сан-Андреас и его заместители.\n\nч. 5 Надзорные жалоба, представление подаются непосредственно в Верховный Суд штата Сан-Андреас.\n\nч. 6 Судебные постановления, указанные в части третьей настоящей статьи, могут быть обжалованы в порядке надзора в течение пяти дней со дня их вступления в законную силу.\n\nч. 7 Срок подачи надзорных жалобы, представления, пропущенный по причинам, признанным судом уважительными, может быть восстановлен судьей Верховного Суда штата Сан-Андреас по заявлению заинтересованного лица.\n\nч. 8 Надзорные жалоба, представление должны содержать:\n\n1) наименование суда, в который они подаются;\n\n2) наименование лица, подающего жалобу или представление, его процессуальное положение в деле;\n\n3) наименования других лиц, участвующих в деле;\n\n4) указание на суды, рассматривавшие дело по первой, апелляционной или кассационной инстанции, и содержание принятых ими решений;\n\n5) указание на основания для пересмотра судебного постановления в порядке надзора с приведением доводов, свидетельствующих о наличии таких оснований;\n\n7) просьбу лица, подающего жалобу или представление.\n\nч. 9 В надзорной жалобе лица, не принимавшего участия в деле, должно быть указано, какие права, свободы или законные интересы этого лица нарушены вступившим в законную силу судебным постановлением.\n\nч. 10 Надзорная жалоба должна быть подписана лицом, подающим жалобу, или его представителем. К жалобе, поданной представителем, прилагается договор об оказании юридических услуг или другой документ, удостоверяющий полномочия представителя. Надзорное представление должно быть подписано Генеральным прокурором штата Сан-Андреас или его заместителем.\n\nч. 11 К надзорной жалобе должны быть приложены документ, подтверждающий уплату государственной пошлины в установленных законом случаях, порядке и размере либо ходатайство об освобождении от уплаты государственной пошлины, об уменьшении ее размера или о предоставлении отсрочки, рассрочки ее уплаты.\n\nч. 12 Надзорные жалоба, представление, поданные в соответствии с правилами, установленными, изучаются судьей Верховного Суда штата Сан-Андреас.\n\nСудья Верховного Суда штата Сан-Андреас изучает надзорные жалобу, представление по материалам, приложенным к жалобе, представлению, либо по материалам истребованного дела. В случае истребования дела им может быть вынесено определение о приостановлении исполнения решения суда до окончания производства в суде надзорной инстанции при наличии просьбы об этом в надзорных жалобе, представлении прокурора или ином ходатайстве.\n\nч. 13 По результатам изучения надзорных жалобы, представления судья Верховного Суда штата Сан-Андреас выносит определение:\n\n1) об отказе в передаче надзорных жалобы, представления для рассмотрения в судебном заседании Президиума Верховного Суда штата Сан-Андреас, если отсутствуют основания для пересмотра судебных актов в порядке надзора.\n\n2) о передаче надзорных жалобы, представления с делом для рассмотрения в судебном заседании Президиума Верховного Суда штата Сан-Андреас.\n\nч. 14 Председатель Верховного Суда штата Сан-Андреас вправе не согласиться с определением судьи Верховного Суда штата Сан-Андреас об отказе в передаче надзорных жалобы, представления для рассмотрения в судебном заседании Президиума Верховного Суда штата Сан-Андреас и до истечения срока подачи надзорных жалобы, представления на обжалуемое судебное постановление вынести постановление об отмене данного определения и о передаче надзорных жалобы, представления для рассмотрения в судебном заседании Президиума Верховного Суда штата Сан-Андреас. Время рассмотрения этих жалобы, представления в Верховном Суде штата Сан-Андреас при исчислении данного срока не учитывается.\n\nч. 15 Надзорные жалоба, представление рассматриваются в Верховном Суде штата Сан-Андреас не более чем недели.\n\nч. 15.1 Председатель Верховного Суда штата Сан-Андреас в случае истребования дела с учетом его сложности может продлить срок рассмотрения надзорных жалобы, представления, но не более чем на 3 дня.\n\nч. 16 Судебные постановления, указанные в части третьей настоящей статьи, подлежат отмене или изменению, если при рассмотрении дела в порядке надзора Президиум Верховного Суда штата Сан-Андреас установит, что соответствующее обжалуемое судебное постановление нарушает:\n\n1) права и свободы человека и гражданина, гарантированные Конституцией штата Сан-Андреас;\n\n2) права и законные интересы неопределенного круга лиц или иные публичные интересы;\n\n3) единообразие в толковании и применении судами норм права.\n\nч. 17 Президиум Верховного Суда штата Сан-Андреас принимает дело к рассмотрению на основании определения судьи Верховного Суда штата Сан-Андреас о передаче надзорных жалобы, представления с делом для рассмотрения в судебном заседании Президиума Верховного Суда штата Сан-Андреас.\n\nч. 17.1 Надзорные жалоба, представление с делом рассматриваются Президиумом Верховного Суда штата Сан-Андреас в судебном заседании не более чем шести дней со дня вынесения судьей определения.\n\nч. 17.2 В случае, если прокурор является лицом, участвующим в рассмотрении дела, в судебном заседании Президиума Верховного Суда штата Сан-Андреас принимает участие Генеральный прокурор штата Сан-Андреас или его заместитель.\n\nч. 17.3 Надзорные жалоба, представление с делом, рассматриваемые в порядке надзора в Президиуме Верховного Суда штата Сан-Андреас, докладываются судьей Верховного Суда штата Сан-Андреас.\n\nч. 17.4 Судья-докладчик излагает обстоятельства дела, содержание судебных постановлений, принятых по делу, доводы надзорных жалобы, представления, послужившие основаниями для передачи надзорных жалобы, представления с делом для рассмотрения в судебном заседании Президиума Верховного Суда штата Сан-Андреас.\n\nч. 17.5 По результатам рассмотрения надзорных жалобы, представления с делом Президиум Верховного Суда штата Сан-Андреас принимает постановление.\n\nч. 17.6 При рассмотрении надзорных жалобы, представления с делом в надзорном порядке все вопросы решаются большинством голосов. При равном количестве голосов, поданных за пересмотр дела и против его пересмотра, надзорные жалоба, представление считаются отклоненными. Однако, голос Председателя Верховного Суда штата Сан-Андреас является решающим.\n\nч. 18 Президиум Верховного Суда штата Сан-Андреас, рассмотрев надзорные жалобу, представление с делом в порядке надзора, вправе:\n\n1) оставить постановления суда первой, апелляционной или кассационной инстанции без изменения, надзорные жалобу, представление без удовлетворения;\n\n2) отменить постановления суда первой, апелляционной или кассационной инстанции полностью либо в части и направить дело на новое рассмотрение в соответствующий суд. При направлении дела на новое рассмотрение Президиум Верховного Суда штата Сан-Андреас может указать на необходимость рассмотрения дела в ином составе судей;\n\n3) отменить постановления суда первой, апелляционной или кассационной инстанции полностью либо в части и оставить заявление без рассмотрения либо прекратить производство по делу;\n\n4) оставить в силе одно из принятых по делу судебных постановлений;\n\n5) отменить либо изменить постановления суда первой, апелляционной или кассационной инстанции и принять новое судебное постановления, не передавая дело на новое рассмотрение, если допущена ошибка в применении и толковании норм материального и (или)процессуального права;\n\nч. 19 При рассмотрении дела в надзорном порядке Президиум Верховного Суда штата Сан-Андреас проверяет правильность применения и толкования норм материального права и норм процессуального права судами, рассматривавшими дело, независимо от пределов доводов надзорных жалобы, представления. В интересах законности Президиум Верховного Суда штата Сан-Андреас вправе выйти за пределы доводов надзорных жалобы, представления.\n\nч. 20 Постановление Президиума Верховного Суда штата Сан-Андреас подписывается председательствующим в заседании Президиума Верховного Суда штата Сан-Андреас.\n\nч. 21 Указания Президиума Верховного Суда штата Сан-Андреас о толковании закона являются обязательными для суда, вновь рассматривающего дело.\n\n\nРАЗДЕЛ VII. ЗАКЛЮЧИТЕЛЬНЫЕ ПОЛОЖЕНИЯ\nГЛАВА 20. ГОСУДАРСТВЕННЫЕ ПОШЛИНЫ И СУММЫ КОМПЕНСАЦИЙ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-60", "number": "60", "title": "Государственная пошлина", "content": "Статья 60. Государственная пошлина\n\nч. 1 При обращении в суд, истец обязан уплатить государственную пошлину в целях финансирования деятельности судейского состава.\n\nч. 2 От уплаты государственных пошлин по уголовным делам, делам об административных правонарушениях, гражданских исковых заявлений в защиту граждан освобождается офис Генерального прокурора штата Сан-Андреас.\n\nч. 3 Государственная пошлина уплачивается заявителем в безналичной форме при подаче искового заявления или жалобы. К заявлению прилагаются документы об оплате пошлины.\n\nч. 4 Государственная пошлина в наличной форме уплачивается путем перевода денежных средств на лицевой счет действующего Председателя Верховного Суда штата Сан-Андреас.\n\nФакт уплаты государственной пошлины в безналичной форме подтверждается письменным уведомлением банка о списании денежных средств.\n\nч. 5 Срок действия документов, подтверждающих оплату государственной пошлины составляет 48 часов.\n\nч. 6 По делам, рассматриваемым судами в штате Сан-Андреас, государственная пошлина составляет не более 100 000$.\n\nч. 7 Государственная пошлина при подаче надзорной жалобы составляет 80 000$.\n\nч. 8 Председатель Верховного Суда штата Сан-Андреас утверждает сумму государственных пошлин по всем делам, рассматриваемым судами штата Сан-Андреас.\n\nч. 9 Порядок предоставления отсрочки или освобождения от уплаты государственной пошлины устанавливаются в соответствии с законодательством штата Сан-Андреас.\n\nч. 10 Судья вправе предоставить отсрочку, освободить от уплаты государственной пошлины государственные организации, должностных, юридических и физических лиц по заявленному ходатайству.\n\nч. 11 Порядок предоставления отсрочки или освобождения от уплаты государственной пошлины устанавливаются в соответствии с законодательством штата Сан-Андреас о налогах и сборах.\n\nч. 12 Ходатайство об отсрочке, освобождении от уплаты государственной пошлины может подлежать удовлетворению в случае:\n\nа) подтверждения заявителем своего имущественного положения, не позволяющего уплатить государственную пошлину;\nб) подачи искового заявления в защиту интересов государства;\nв) лица, имеющие государственные награды и звания штата Сан-Андреас;\nг) иные случаи, признанные уважительными судом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "court-61", "number": "61", "title": "Компенсация", "content": "Статья 61. Компенсация\n\nч. 1 Стороне, в пользу которой состоялось решение суда, суд присуждает возместить с другой стороны расходы по уплате судебной пошлины, а также все иные понесенные по делу судебные расходы в разумных размерах, за исключением случаев, когда судебные расходы появились по инициативе суда, в таком случае их выплата производится из федерального бюджета. В случае, если иск удовлетворен частично, указанные в настоящей статье судебные расходы присуждаются истцу пропорционально размеру удовлетворенных судом исковых требований, а ответчику пропорционально той части исковых требований, в которой истцу отказано.\n\nч. 2 Правила, изложенные в части первой настоящей статьи, относятся также к распределению судебных расходов, понесенных сторонами в связи с ведением дела в апелляционной инстанции.\n\nч. 3 Истец в гражданском, административном судопроизводстве, а также потерпевший в уголовном и административном судопроизводстве, при наличии оснований полагать, что вред причинен ему непосредственно правонарушением, может заявить требование о компенсации морального вреда, другого ущерба и издержек, совокупный размер которых не может превышать 1 000 000$. В отдельных случаях суд вправе отступить от ограничений по выплатам. Решение об удовлетворении в выплате моральной компенсации, а также о самом размере компенсации принимается судом исходя из обстоятельств дела.\n\nч. 4 Обязанность по выплате компенсации закрепляется за организацией, в которой находился на момент преступления/правонарушения сотрудник, действия которого признаны незаконными, либо за лицом, принявшим противоправное решение (действие или бездействие), а также в соответствии с ч. 1 настоящей статьи.\n\nч. 4.1 Представители организации вправе обратиться в суд с исковым заявлением о взыскании компенсации с физического лица, действия (бездействие) которого признаны незаконными, в случае, если судом обязанность по выплате денежных средств была возложена на эту организацию.\n\nч. 5 Выплата компенсации также допускается из казны правительства Сан-Андреас, в этом случае суд может обязать губернатора штата Сан-Андреас или государственного казначея штата Сан-Андреас по определенным реквизитам и в установленный срок осуществить безналичный перевод компенсируемой суммы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "labor": [{"id": "labor-1", "number": "1", "title": "Цели и задачи трудового законодательства", "content": "Статья 1. Цели и задачи трудового законодательства\n\nч. 1 Целями трудового законодательства являются установление государственных гарантий трудовых прав и свобод граждан, создание благоприятных условий труда, защита прав и интересов работников и работодателей.\n\n\nч. 2 Основными задачами трудового законодательства являются создание необходимых правовых условий для достижения оптимального согласования интересов сторон трудовых отношений, интересов государства, а также правовое регулирование трудовых отношений и иных непосредственно связанных с ними отношений по:\n\n\nа) организации труда и управлению трудом;\nб) трудоустройству у данного работодателя;\nв) ответственности работодателей и работников в сфере труда;\nг) государственному контролю (надзор) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-2", "number": "2", "title": "Основные принципы правового регулирования трудовых отношений и иных непосредственно связанных с ними отношений", "content": "Статья 2. Основные принципы правового регулирования трудовых отношений и иных непосредственно связанных с ними отношений\n\nч. 1 Исходя из общепризнанных принципов и норм права и в соответствии с Конституцией Штата Сан-Андреас основными принципами правового регулирования трудовых отношений и иных непосредственно связанных с ними отношений признаются:\n\nа) свобода труда, включая право на труд, который каждый свободно выбирает или на который свободно соглашается, право распоряжаться своими способностями к труду, выбирать профессию и род деятельности;\nб) запрещение принудительного труда и дискриминации в сфере труда;\nв) обеспечение права каждого работника на справедливые условия труда, в том числе на условия труда, отвечающие требованиям безопасности и гигиены, права на отдых, включая ограничение рабочего времени, предоставление ежедневного отдыха, выходных и нерабочих праздничных дней, оплачиваемого ежегодного отпуска;\nг) равенство прав и возможностей работников;\nд) обеспечение права каждого работника на своевременную и в полном размере выплату справедливой заработной платы, обеспечивающей достойное человека существование для него самого и его семьи;\nе) обеспечение равенства возможностей работников без всякой дискриминации на продвижение по работе с учетом производительности труда, квалификации и стажа работы по специальности, а также на подготовку и дополнительное профессиональное образование;\nж) сочетание государственного и договорного регулирования трудовых отношений и иных непосредственно связанных с ними отношений;\nз) обязательность возмещения вреда, причиненного работнику в связи с исполнением им трудовых обязанностей;\nи) установление государственных гарантий по обеспечению прав работников и работодателей, осуществление государственного контроля (надзора) за их соблюдением;\nк) обеспечение права каждого на защиту государством его трудовых прав и свобод, включая судебную защиту;\nл) обеспечение права на разрешение индивидуальных трудовых споров в порядке, установленном настоящим Кодексом и иными законами;\nм) обязанность сторон трудового договора соблюдать условия заключенного договора, включая право работодателя требовать от работников исполнения ими трудовых обязанностей и бережного отношения к имуществу работодателя и право работников требовать от работодателя соблюдения его обязанностей по отношению к работникам, трудового законодательства и иных актов, содержащих нормы трудового права;\nн) обеспечение права работников на защиту своего достоинства в период трудовой деятельности;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-3", "number": "3", "title": "Запрещение дискриминации в сфере труда", "content": "Статья 3. Запрещение дискриминации в сфере труда\n\n\nч. 1 Каждый имеет равные возможности для реализации своих трудовых прав.\n\n\n\n\n\nНикто не может быть ограничен в трудовых правах и свободах или получать какие-либо преимущества в зависимости от пола, расы, цвета кожи, национальности, языка, происхождения, имущественного, семейного, социального и должностного положения, возраста, места жительства, отношения к религии, убеждений, принадлежности или непринадлежности к общественным объединениям или каким-либо социальным группам, а также от других обстоятельств, не связанных с деловыми качествами работника.\n\n\n\n\n\nч. 2 Не являются дискриминацией установление различий, исключений, предпочтений, а также ограничение прав работников, которые определяются свойственными данному виду труда требованиями, установленными законом, либо обусловлены особой заботой государства о лицах, нуждающихся в повышенной социальной и правовой защите, либо установлены настоящим Кодексом или в случаях и в порядке, которые им предусмотрены, в целях обеспечения национальной безопасности, поддержания оптимального баланса трудовых ресурсов, содействия в приоритетном порядке трудоустройству граждан и в целях решения иных задач внутренней и внешней политики государства.\n\n\n\n\n\nч. 3 Лица, считающие, что они подверглись дискриминации в сфере труда, вправе обратиться в суд с заявлением о восстановлении нарушенных прав, возмещении материального вреда и компенсации морального вреда.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-4", "number": "4", "title": "Запрещение принудительного труда", "content": "Статья 4. Запрещение принудительного труда\n\n\nч. 1 Принудительный труд запрещен.\n\n\n\n\n\nч. 2 Принудительный труд - выполнение работы под угрозой применения какого-либо наказания (насильственного воздействия), в том числе:\n\n\n\n\n\nа) в целях поддержания трудовой дисциплины;\n\n\nб) в качестве средства мобилизации и использования рабочей силы для нужд экономического развития;\n\n\nв) в качестве меры наказания за наличие или выражение политических взглядов или идеологических убеждений, противоположных установленной политической, социальной или экономической системе;\n\n\nг) в качестве меры дискриминации по признакам расовой, социальной, национальной или религиозной принадлежности.\n\n\n\nч. 3 К принудительному труду также относится работа, которую работник вынужден выполнять под угрозой применения какого-либо наказания (насильственного воздействия), в то время как в соответствии с настоящим Кодексом или иными законами он имеет право отказаться от ее выполнения, в том числе в связи с:\n\n\n\nа) нарушением установленных сроков выплаты заработной платы или выплатой ее не в полном размере;\n\n\nб) возникновением непосредственной угрозы для жизни и здоровья работника вследствие нарушения требований охраны труда, в частности необеспечения его средствами коллективной или индивидуальной защиты в соответствии с установленными нормами.\n\n\n\n\n\nч. 4 Для целей настоящего Кодекса принудительный труд не включает в себя:\n\n\n\n\n\nа) работу, выполнение которой обусловлено введением чрезвычайного или военного положения в порядке, установленном законодательством Штата Сан-Андреас;\n\n\nб) работу, выполняемую в условиях чрезвычайных обстоятельств, то есть в случае бедствия или угрозы бедствия (пожары, наводнения, голод, землетрясения, эпидемии или эпизоотии) и в иных случаях, ставящих под угрозу жизнь или нормальные жизненные условия всего населения или его части;\n\n\nв) работу, выполняемую вследствие вступившего в законную силу приговора суда под надзором государственных органов, ответственных за соблюдение законодательства при исполнении судебных приговоров.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-5", "number": "5", "title": "Трудовое законодательство и иные акты, содержащие нормы трудового права", "content": "Статья 5. Трудовое законодательство и иные акты, содержащие нормы трудового права\n\n\n\nч. 1 Регулирование трудовых отношений и иных непосредственно связанных с ними отношений в соответствии с Конституцией Штата Сан-Андреас и законодательством Штата Сан-Андреас осуществляется:\n\n\n\n\n\nа) трудовым законодательством (включая законодательство об охране труда), состоящим из настоящего Кодекса, и иных законов, содержащих нормы трудового права;\n\n\nб) иными нормативными правовыми актами, содержащими нормы трудового права:\n\n\nв) указами Глав департаментов Штата Сан-Андреас;\n\n\nг) постановлениями Правительства Штата Сан-Андреас;\n\n\n\n\n\nч. 2 Трудовые отношения и иные непосредственно связанные с ними отношения регулируются также договорами, соглашениями и локальными нормативными актами (уставами организаций или предприятий), содержащими нормы трудового права.\n\n\n\n\n\nч. 3 Нормы трудового права, содержащиеся в иных законах, должны соответствовать настоящему Кодексу. В случае противоречий между настоящим Кодексом и иными нормативными и правовыми актами, содержащим нормы трудового права, применяется настоящий Кодекс.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-6", "number": "6", "title": "Полномочия Правительства Штата Сан-Андреас в области трудовых отношений", "content": "Статья 6. Полномочия Правительства Штата Сан-Андреас в области трудовых отношений\n\nч. 1 К ведению Правительства Штата Сан-Андреас в сфере трудовых отношений и иных непосредственно связанных с ними отношений относится принятие обязательных для применения на всей территории Штата Сан-Андреас законов и иных нормативных правовых актов, устанавливающих:\n\n\nа) основные направления государственной политики в сфере трудовых отношений и иных непосредственно связанных с ними отношений;\n\n\nб) основы правового регулирования трудовых отношений и иных непосредственно связанных с ними отношений (включая определение правил, процедур, критериев и нормативов, направленных на сохранение жизни и здоровья работников в процессе трудовой деятельности);\n\n\nв) обеспечиваемый государством уровень трудовых прав, свобод и гарантий работникам (включая дополнительные гарантии отдельным категориям работников);\n\n\nг) порядок заключения, изменения и расторжения трудовых договоров;\n\n\nд) порядок разрешения трудовых споров;\n\n\nе) порядок осуществления государственного контроля (надзора) за соблюдением трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права;\n\n\nж) систему и порядок проведения специальной оценки условий труда и государственной экспертизы условий труда, организацию контроля качества проведения специальной оценки условий труда;\n\n\nз) виды дисциплинарных взысканий и порядок их применения;\n\n\nи) систему государственной статистической отчетности по вопросам труда и охраны труда;\n\n\n\n\n\nч. 2 К ведению Офиса Генерального прокурора Штата Сан-Андреас относится надзор за соблюдением трудового законодательства в сфере трудовых отношений и иных непосредственно связанных с ними отношений. Надзор осуществляется также иными уполномоченными ими должностными лицами, которые обязаны активно участвовать в урегулировании споров и конфликтов, происходящих из трудовых взаимоотношений.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-7", "number": "7", "title": "Локальные нормативные акты, содержащие нормы трудового права", "content": "Статья 7. Локальные нормативные акты, содержащие нормы трудового права\n\n\n\nч. 1 Работодатели принимают локальные уставные нормативные акты, содержащие нормы трудового права (далее - уставы), в пределах своей компетенции в соответствии с трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, трудовыми договорами, соглашениями.\n\n\n\n\n\nч. 2 Нормы уставов, ухудшающие положение работников по сравнению с установленным трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, не подлежат применению. В таких случаях применяются трудовое законодательство и иные нормативные правовые акты, содержащие нормы трудового права.\n\n\n\n\n\nч. 3 В соответствии с трудовым законодательством регулирование трудовых отношений и иных непосредственно связанных с ними отношений может осуществляться путем заключения, изменения, дополнения работодателями уставов.\n\n\n\n\n\nч. 4 Уставы не могут содержать условий, ограничивающих права или снижающих уровень гарантий работников по сравнению с установленными трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права. Если такие условия включены в устав, то они не подлежат применению.\n\n\n\n\n\nч. 5 В случае обнаружения надзорными органами несоответствия локальных нормативных актов законодательству Штата Сан-Андреас, соответствующими органами может быть издано предписание для исправления противоречий. Неисполнение работодателем таковых предписаний приравнивается к халатности.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-8", "number": "8", "title": "Действие трудового законодательства и иных актов, содержащих нормы трудового права", "content": "Статья 8. Действие трудового законодательства и иных актов, содержащих нормы трудового права\n\n\nч. 1 Трудовым законодательством и иными актами, содержащими нормы трудового права, регулируются трудовые отношения и иные непосредственно связанные с ними отношения.\n\n\n\n\n\nч. 2 Трудовое законодательство и иные акты, содержащие нормы трудового права, также применяются к другим отношениям, связанным с использованием личного труда, если это предусмотрено настоящим Кодексом или иным законом.\n\n\n\n\n\nч. 3 Все работодатели (независимо от их организационно-правовых форм и форм собственности) в трудовых отношениях и иных непосредственно связанных с ними отношениях с работниками обязаны руководствоваться положениями трудового законодательства и иных актов, содержащих нормы трудового права.\n\n\n\n\n\nч. 4 На государственных служащих и муниципальных служащих действие трудового законодательства и иных актов, содержащих нормы трудового права, распространяется с особенностями, предусмотренными законами и иными нормативными правовыми актами Штата Сан-Андреас.\n\n\n\n\n\nч. 5 Законы и иные нормативные правовые акты Штата Сан-Андреас, содержащие нормы трудового права, действуют на всей территории Штата Сан-Андреас, если в этих законах и иных нормативных правовых актах не предусмотрено иное.\n\n\n\n\n\nч. 6 Принимаемые работодателем акты, содержащие нормы трудового права (уставы) действуют в отношении работников данного работодателя независимо от места выполнения ими работы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-9", "number": "9", "title": "Исчисление сроков", "content": "Статья 9. Исчисление сроков\n\n\nч. 1 Течение сроков, с которыми настоящий Кодекс связывает возникновение трудовых прав и обязанностей, начинается с календарной даты, которой определено начало возникновения указанных прав и обязанностей.\n\n\n\n\n\nч. 2 Течение сроков, с которыми настоящий Кодекс связывает прекращение трудовых прав и обязанностей, начинается на следующий день после календарной даты, которой определено окончание трудовых отношений.\n\n\n\n\n\nч. 3 Сроки, исчисляемые годами, месяцами, неделями, истекают в соответствующее число последнего года, месяца или недели срока. В срок, исчисляемый в календарных неделях или днях, включаются и нерабочие дни.\n\n\n\n\n\nч. 4 Если последний день срока приходится на нерабочий день, то днем окончания срока считается ближайший следующий за ним рабочий день.\n\n\n\n\n\n\n\nГлава II. Трудовые отношения, стороны трудовых отношений,\nоснования возникновения трудовых отношений", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-10", "number": "10", "title": "Трудовые отношения", "content": "Статья 10. Трудовые отношения\n\n\nч. 1 Трудовые отношения - отношения, основанные на соглашении между работником и работодателем о личном выполнении работником за плату трудовой функции (работы по должности в соответствии со штатным расписанием, профессии, конкретного вида поручаемой работнику работы) в интересах, под управлением и контролем работодателя, подчинении работника правилам внутреннего устава при обеспечении работодателем условий труда, предусмотренных трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, трудовым договором.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-11", "number": "11", "title": "Основания возникновения, приостановления и прекращения трудовых отношений", "content": "Статья 11. Основания возникновения, приостановления и прекращения трудовых отношений\n\n\n\nч. 1 Трудовые отношения возникают между работником и работодателем на основании трудового договора, заключаемого ими в соответствии с настоящим Кодексом.\n\n\n\n\n\nч. 2 В случаях и порядке, которые установлены трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, или уставом (положением) организации, трудовые отношения возникают на основании трудового договора в результате:\n\n\n\n\n\nа) избрания на должность - возникают, если избрание на должность предполагает выполнение работником определенной трудовой функции;\n\n\nб) назначения на должность или утверждения в должности - трудовые отношения возникают на основании трудового договора в результате назначения на должность или утверждения в должности в случаях, предусмотренных трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, или уставом организации;\n\n\nв) направления на работу уполномоченными в соответствии с законодательством органами - возникают, в результате направления на работу уполномоченными органами;\n\n\n\n\n\nч. 3 Трудовые отношения между работником и работодателем возникают также на основании фактического допущения работника к работе с ведома или по поручению работодателя или его уполномоченного на это представителя в случае, когда трудовой договор не был надлежащим образом оформлен.\n\n\n\n\n\nч. 4 Фактическое допущение работника к работе без ведома или поручения работодателя либо его уполномоченного на это представителя запрещается.\n\n\n\n\n\nч. 5 Трудовые отношения между работником и работодателем должны быть приостановлены или прекращены в соответствии с приостановкой или прекращением трудового договора.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-12", "number": "12", "title": "Стороны трудовых отношений", "content": "Статья 12. Стороны трудовых отношений\n\n\nч. 1 Сторонами трудовых отношений являются работник и работодатель.\n\n\n\n\n\nа) Работник - физическое лицо, вступившее в трудовые отношения с работодателем.\n\n\n\n\n\nЕсли иное не предусмотрено настоящим Кодексом, другими законами, вступать в трудовые отношения в качестве работников имеют право совершеннолетние граждане Соединённых Штатов Америки.\n\n\n\n\n\nб) Работодатель - физическое лицо либо юридическое лицо (организация), вступившее в трудовые отношения с работником. В случаях, предусмотренных законами, в качестве работодателя может выступать иной субъект, наделенный правом заключать трудовые договоры.\n\n\n\n\n\nч. 2 Права и обязанности работодателя в трудовых отношениях осуществляются: физическим лицом, являющимся работодателем; органами управления юридического лица (организации) или уполномоченными ими лицами.\n\n\n\nГлава III. Основные права и обязанности сторон трудовых отношений", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-13", "number": "13", "title": "Основные права и обязанности работника", "content": "Статья 13. Основные права и обязанности работника\n\n\n\nч. 1 Работник имеет право на:\n\n\n\n\n\nа) заключение и расторжение трудового договора в порядке и на условиях, которые установлены действующим законодательством;\n\n\nб) предоставление ему работы, обусловленной трудовым договором;\n\n\nв) рабочее место, соответствующее государственным нормативным требованиям охраны труда и условиям, предусмотренным трудовым договором;\n\n\nг) своевременную и в полном объеме выплату заработной платы в соответствии со своей квалификацией, сложностью труда, количеством и качеством выполненной работы;\n\n\nд) отдых, обеспечиваемый установлением нормальной продолжительности рабочего времени, сокращенного рабочего времени для отдельных профессий и категорий работников, предоставлением еженедельных выходных дней, нерабочих праздничных дней, оплачиваемых ежегодных отпусков;\n\n\nе) полную достоверную информацию об условиях труда и требованиях охраны труда на рабочем месте;\n\n\nж) защиту своих трудовых прав, свобод и законных интересов всеми не запрещенными законом способами;\n\n\nз) возмещение вреда, причиненного ему в связи с исполнением трудовых обязанностей, и компенсацию морального вреда в порядке, установленном настоящим Кодексом.\n\n\n\n\n\nч. 2 Работник обязан:\n\n\n\n\n\nа) добросовестно исполнять свои трудовые обязанности, возложенные на него трудовым договором;\n\n\nб) соблюдать правила внутреннего трудового распорядка;\n\n\nв) соблюдать трудовую дисциплину;\n\n\nг) выполнять установленные нормы труда;\n\n\nд) соблюдать требования по охране труда и обеспечению безопасности труда;\n\n\nе) бережно относиться к имуществу работодателя (в том числе к имуществу третьих лиц, находящемуся у работодателя, если работодатель несет ответственность за сохранность этого имущества) и других работников;\n\n\nж) незамедлительно сообщить работодателю либо непосредственному руководителю о возникновении ситуации, представляющей угрозу жизни и здоровью людей, сохранности имущества работодателя (в том числе имущества третьих лиц, находящегося у работодателя, если работодатель несет ответственность за сохранность этого имущества).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-14", "number": "14", "title": "Основные права и обязанности работодателя", "content": "Статья 14. Основные права и обязанности работодателя\n\n\n\nч. 1 Работодатель имеет право:\n\n\n\n\n\nа) заключать и расторгать трудовые договоры с работниками в порядке и на условиях, которые установлены настоящим Кодексом, иными законами;\n\n\nб) поощрять работников за добросовестный эффективный труд;\n\n\nв) требовать от работников исполнения ими трудовых обязанностей и бережного отношения к имуществу работодателя (в том числе к имуществу третьих лиц, находящемуся у работодателя, если работодатель несет ответственность за сохранность этого имущества) и других работников, соблюдения правил внутреннего трудового распорядка;\n\n\nг) привлекать работников к дисциплинарной и материальной ответственности в порядке, установленном настоящим Кодексом;\n\n\nд) принимать локальные нормативные акты (за исключением работодателей - физических лиц);\n\n\n\n\n\nч. 2 Работодатель обязан:\n\n\n\n\n\nа) соблюдать трудовое законодательство и иные нормативные правовые акты, содержащие нормы трудового права, уставы, условия трудовых договоров;\n\n\nб) предоставлять работникам работу, обусловленную трудовым договором;\n\n\nв
