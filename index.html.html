х мероприятиях, проводимых Офисом Генерального прокурора в целях оценки знаний нормативно-правовой базы и контроля ведения обязательной документации, в установленный срок.\nНаказание: штраф на организацию в размере в размере от 50.000$ до 350.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-9.5", "number": "9.5", "title": "Нарушение территориальной юрисдикции государственным служащим без оснований, предусмотренных законом,", "content": "Статья 9.5 Нарушение территориальной юрисдикции государственным служащим без оснований, предусмотренных законом,\nНаказание: штраф в размере от 20.000 до 50.000$\n\nГЛАВА 10. ПРАВОНАРУШЕНИЯ ПРОТИВ ПОРЯДКА УПРАВЛЕНИЯ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-10.1", "number": "10.1", "title": "Незаконная агитационная деятельность", "content": "Статья 10.1. Незаконная агитационная деятельность\nч. 1 Осуществление агитационной деятельности в местах большого скопления людей , адресованную неограниченному кругу лиц без согласования с Администрацией Муниципалитета (Округа);\nНаказание: штраф в размере от 25.000$ до 50.000$\n\nч. 2 Осуществление агитационной деятельности на территории государственной структуры без согласования с непосредственном правительственным начальством (в зависимости от непосредственного руководства структуры - см. закон о таковой структуре)\nНаказание: штраф в размере от 30.000$ до 60.000$\n\nч. 3 Повторное совершение деяния предусмотренного частью 1 или частью 2 \nНаказание: штраф в размере от 30.000$ до 70.000$\n\nГЛАВА 11. ПРАВОНАРУШЕНИЯ ПРОТИВ СВОБОДЫ, ЧЕСТИ И ДОСТОИНСТВА ЛИЧНОСТИ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-11.1", "number": "11.1", "title": "Оскорбление", "content": "Статья 11.1 Оскорбление\n\nч. 1 Оскорбление, то есть унижение чести и достоинства другого лица, в том числе заключающееся в негативной оценке личности либо внешно оящему Кодексу, принимают решение в соответствии с настоящим Кодексом.\n\nч. 3. Определения суда, постановления судьи, следователя, прокурора должны быть законными, обоснованными и мотивированными.\n\nч. 4. Суд, прокурор, следователь обязаны мотивировать свои доводы. Так официальные ответы об отказе в принятии жалоб, заявлений, ходатайств, обращений должны содержать причины отказа. Официальные ответы уведомительного характера о ходе производства также должны содержать мотивированную часть о дальнейшем ходе дела.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-3", "number": "3", "title": "Уважение чести и достоинства личности", "content": "Статья 3. Уважение чести и достоинства личности\n\nч. 1. Запрещаются осуществление действий и принятие решений, унижающих честь человека, а также обращение, унижающее его человеческое достоинство либо создающее опасность для его жизни и здоровья.\n\nч. 2. Никто не может подвергаться насилию, пыткам, другому жестокому или унижающему человеческое достоинство обращению.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-4", "number": "4", "title": "Неприкосновенность жилища", "content": "Статья 4. Неприкосновенность жилища\n\nч. 1. Осмотр жилища производится только с согласия проживающих в нем лиц или на основании судебного акта.\n\nч. 2. Обыск жилища производится также при наличии судебного решения, судебного ордера, ордера Генерального Прокурора и его Заместителей. В исключительных случаях, когда обыск жилища не терпит отлагательства, указанные следственные действия могут быть произведены на основании решения сотрудника правоохранительных органов без ордера Генерального Прокурора, решения суда или судебного ордера. В этом случае сотрудники правоохранительных органов не позднее 1 часа с момента начала производства следственного действия уведомляет прокурора о производстве следственного действия.\n\nч. 3. Выдача ордеров на обыск нежилого помещения, является исключительной компетенцией суда, генерального прокурора, заместителя генерального прокурора. Обыск нежилого помещения и находящегося в нем имущества может быть произведен на основании ордера.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-5", "number": "5", "title": "Тайна переписки, телефонных и иных переговоров, почтовых, телеграфных и иных сообщений", "content": "Статья 5. Тайна переписки, телефонных и иных переговоров, почтовых, телеграфных и иных сообщений\n\nч. 1. Ограничение права гражданина на тайну переписки, телефонных и иных переговоров, почтовых, телеграфных и иных сообщений допускается только на основании судебного акта.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-6", "number": "6", "title": "Презумпция невиновности", "content": "Статья 6. Презумпция невиновности\n\nч. 1. Обвиняемый считается невиновным, пока его виновность в совершении правонарушения не будет доказана в предусмотренном настоящим Кодексом.\n\nч. 2. Подозреваемый или обвиняемый не обязан доказывать свою невиновность. Бремя доказывания обвинения и опровержения доводов, приводимых в защиту подозреваемого или обвиняемого, лежит на стороне обвинения.\n\nч. 3. Все сомнения в виновности обвиняемого, которые не могут быть устранены в порядке, установленном настоящим Кодексом, толкуются в пользу обвиняемого.\n\nч. 4. Обвинительный приговор не может быть основан на предположениях.\n\nПримечание: автоматически выданная запись в боло-розыске в полном объеме доказывает вину разыскиваемого. В данном случае обвиняемому необходимо будет доказать свою невиновность.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-7", "number": "7", "title": "Свобода оценки доказательств", "content": "Статья 7. Свобода оценки доказательств\n\nч. 1. Судья, присяжные заседатели, прокурор, а также государственные служащие оценивают доказательства по своему внутреннему убеждению, основанному на совокупности имеющихся в деле доказательств, руководствуясь при этом законом и совестью.\n\nч. 2. Никакие доказательства не имеют заранее установленной силы.\n\nИсключение: автоматически выданная запись в боло-розыске.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-8", "number": "8", "title": "Охрана прав и свобод человека и гражданина", "content": "Статья 8. Охрана прав и свобод человека и гражданина\n\nч. 1. Суд, прокурор, государственные служащие обязаны разъяснять подозреваемому, обвиняемому, потерпевшему, а также другим участникам расследования или судопроизводства, обязанности и ответственность и обеспечивать возможность осуществления этих прав.\n\nч. 2. При наличии достаточных данных о том, что потерпевшему, свидетелю или иным участникам расследования или судопроизводства, а также их близким родственникам угрожают убийством, применением насилия, правоохранительные органы принимают в пределах своей компетенции в отношении указанных лиц все меры безопасности которые возможно.\n\nч. 3. Суд, прокурор, государственные служащие обязаны немедленно освободить всякого незаконно задержанного, или лишенного свободы человека.\n\nч. 4. Лицо, в отношении которого в качестве меры пресечения избрано заключение под стражу, а также лицо, которое задержано по подозрению в совершении правонарушения, должно содержаться в условиях, исключающих угрозу его жизни и здоровью.\n\nч. 5. Органы государственной власти, должностные лица обязаны обеспечить каждому возможность ознакомления с документами и материалами, непосредственно затрагивающими его права и свободы, если иное не предусмотрено законом", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-8.1", "number": "8.1", "title": "Законное требование государственного служащего", "content": "Статья 8.1. Законное требование государственного служащего\n\nч. 1. Законное требование государственного служащего — это обращенное к гражданину, должностному лицу, организации, сотруднику государственного органа либо иному лицу обязательное к исполнению распоряжение, указание или запрос, предъявленные государственным служащим в пределах компетенции при исполнении служебных обязанностей, установленных настоящим Кодексом или иным нормативно-правовым актом. .\n\nч. 2. К законным требованиям относятся требования сотрудников правоохранительных органов, надзорных органов, а также иных государственных служащих, если такие требования предъявлены в пределах их компетенции и связаны с:\n\nа) пресечением, выявлением или фиксацией правонарушения;\nб) обеспечением общественного порядка и общественной безопасности;\nв) проведением задержания, ареста, обыска, досмотра, осмотра, выемки, допроса, проверки, расследования или иных процессуальных действий;\nг) исполнением судебного решения, ордера, постановления, распоряжения уполномоченного лица либо законного поручения;\nд) осуществлением надзора за соблюдением законности государственными служащими;\nе) обеспечением безопасности граждан, государственных служащих, охраняемых лиц, объектов, помещений, территорий или имущества;\nж) иными случаями, прямо предусмотренными законодательством.\n\nч. 3. Требование государственного служащего является законным и обязательным к исполнению, если:\n\nа) оно предъявлено государственным служащим при исполнении служебных обязанностей и в пределах его компетенции;\n\nб) оно основано на законодательстве штата, настоящем Кодексе, судебном решении, ордере, постановлении, распоряжении либо поручении уполномоченного лица;\n\nв) оно выражено в ясной форме и определяет конкретное действие, которое лицо должно совершить либо от которого должно воздержаться;\n\nг) государственный служащий идентифицировал себя, предъявив удостоверение, жетон, нашивку или иной идентификационный знак, либо находится в форменном обмундировании с видимыми знаками различия установленного образца.\n\nч. 4. Требование может быть предъявлено в устной, письменной или электронной форме, если иное не предусмотрено настоящим Кодексом или иными нормативными правовыми актами.\n\nч. 5. Устное требование допускается при непосредственном взаимодействии с лицом, если требуется немедленное исполнение, в том числе при пресечении правонарушения, задержании, обеспечении безопасности, проведении процессуальных действий, осуществлении надзора либо регулировании порядка нахождения лиц на месте происшествия, в государственном органе, на охраняемой территории или ином месте исполнения служебных обязанностей.\n\nч. 6. Письменное или электронное требование применяется, если исполнение не является немедленным либо связано с предоставлением документов, сведений, предметов, материалов фиксации, объяснений, доступа к помещению, территории, транспортному средству, имуществу, информационным данным либо совершением действий в установленный срок.\n\nч. 7. Письменное или электронное требование должно содержать:\n\nа) наименование органа и должностное лицо, предъявившее требование;\n\nб) адресата;\n\nв) правовое основание;\n\nг) конкретное действие, которое необходимо совершить или от которого воздержаться;\n\nд) срок и порядок исполнения;\n\nе) предупреждение об ответственности за неисполнение.\n\nПримечание: Требование, не содержащее сведений, указанных в пунктах «а», «в» и «г», не является законным.\"\n\nч. 8. Требования, ограничивающие неприкосновенность жилища, тайну переписки, телефонных и иных переговоров, а также связанные с обыском, выемкой, контролем и записью переговоров или иным ограничением прав и свобод лица, допускаются только в случаях и порядке, предусмотренных настоящим Кодексом, судебным решением, ордером либо иным предусмотренным законом актом.\n\nч. 9. Не является законным требование, которое:\n\nа) предъявлено лицом, не обладающим соответствующей компетенцией;\nб) явно выходит за пределы компетенции или полномочий государственного служащего;\nв) не связано с исполнением служебных обязанностей;\nг) не имеет правового или фактического основания;\nд) требует совершения незаконного действия либо отказа лица от прав, предусмотренных настоящим Кодексом;\nе) противоречит судебному решению, ордеру, постановлению либо иному акту, имеющему законную силу;\nж) подменяет установленный порядок задержания, обыска, досмотра, выемки, ареста, допроса или иного процессуального действия;\n\nч. 10. Лицо обязано исполнить законное требование государственного служащего. Неисполнение законного требования может повлечь ответственность, предусмотренную законодательством.\n\nч. 11. Лицо не подлежит ответственности за отказ от исполнения требования, если оно является очевидно незаконным, явно выходит за пределы компетенции государственного служащего либо требует совершения незаконного действия.\n\nч. 12. Исполнение требования не лишает лицо права обжаловать требование, действия или бездействие государственного служащего в порядке, предусмотренном настоящим Кодексом. Подача жалобы не освобождает от исполнения законного требования, если иное не установлено судом, прокурором, вышестоящим руководителем либо настоящим Кодексом.\n\nч. 13. При рассмотрении жалобы обязанность подтвердить законность, обоснованность и пределы требования возлагается на государственного служащего или государственный орган, от имени которого оно было предъявлено.\n\nч. 14. Если настоящим Кодексом предусмотрена обязательная видеофиксация действий государственного служащего, предъявление и исполнение требования также подлежат фиксации. Отсутствие обязательной фиксации толкуется в пользу лица, которому было предъявлено требование, если государственный служащий не докажет невозможность ее ведения по объективным причинам.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-9", "number": "9", "title": "Право на обжалование процессуальных действий и решений", "content": "Статья 9. Право на обжалование процессуальных действий и решений\n\nч. 1. Действия (бездействие) и решения суда, прокурора могут быть обжалованы в порядке, установленном законодательством.\n\nч. 2. Каждый осужденный имеет право на пересмотр приговора вышестоящим судом.\n\nч. 3. Гражданин вправе обжаловать действия государственного служащего подав жалобу на сотрудника руководителю соответствующего ведомства. Руководитель вправе взыскать дисциплинарную, административную и уголовную ответственность со своего сотрудника и отменить решения вынесенные таким сотрудником.\n\nч. 4. Гражданин вправе обратиться с жалобой на государственного служащего в Офис Генерального прокурора, после чего инициируется прокурорская проверка в отношении сотрудника.\n\nч. 5. Гражданам дается 72 часа с момента задержания или вынесения наказания для обжалования действий государственного служащего, после чего решения вынесенные сотрудником правоохранительных органов вступают в законную силу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-10", "number": "10", "title": "Неприкосновенность личности.", "content": "Статья 10. Неприкосновенность личности.\n\nч. 1. Никто не может быть задержан по подозрению в совершении правонарушения, арестован или заключен под стражу при отсутствии на то законных оснований, предусмотренных настоящим Кодексом.\n\nРаздел II. Доказательства и доказывание\n\nГлава II. Доказательства", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-11", "number": "11", "title": "Доказательства", "content": "Статья 11. Доказательства\n\nч. 1. Доказательствами по делу являются любые сведения, на основе которых суд, прокурор в порядке, определенном настоящим Кодексом, устанавливает наличие или отсутствие обстоятельств, подлежащих доказыванию при производстве по делу, а также иных обстоятельств, имеющих значение для дела.\n\nч. 2 В качестве доказательств допускаются:\n\nа) показания подозреваемого, обвиняемого;\nб) показания потерпевшего, свидетеля;\nв) заключение и показания эксперта или специалиста;\nг) вещественные доказательства;\nд) протоколы следственных и судебных действий;\nе) иные документы;\nж) автоматически выданная запись в боло-розыске.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-12", "number": "12", "title": "Недопустимые доказательства", "content": "Статья 12. Недопустимые доказательства\n\nч. 1. Доказательства, полученные с нарушением требований настоящего Кодекса, являются недопустимыми. Недопустимые доказательства не имеют юридической силы и не могут быть положены в основу обвинения, а также использоваться для доказывания любого из обстоятельств.\n\nч. 2. К недопустимым доказательствам относятся:\n\nа) любая информация, полученная от задержанного в ходе допроса до того, как ему были зачитаны его права, даже если есть звуко или видеозапись где обвиняемый дает показания против себя.\nб) показания потерпевшего, свидетеля, основанные на догадке, предположении, слухе, а также показания свидетеля, который не может указать источник своей осведомленности;\nв) улики добытые незаконным путем, когда были нарушены положения действующих нормативно-правовых актов (изъятие орудия без ордера на обыск личного транспорта, изъятие незаконных вещей у лица с неприкосновенностью без судебного решения или ордера Генерального Прокурора о снятии неприкосновенности и т.д.)\nг) доказательства, сведения, документы, предметы, материалы видеофиксации и иные данные, полученные в результате исполнения незаконного требования государственного служащего либо требования, предъявленного с существенным нарушением статьи 8.1 настоящего Кодекса.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-13", "number": "13", "title": "Доказывание", "content": "Статья 13. Доказывание\n\nч. 1. Доказывание состоит в собирании, проверке и оценке доказательств в целях установления всех обстоятельств по делу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-13.1", "number": "13.1", "title": "Обстоятельства, подлежащие доказыванию", "content": "Статья 13.1 Обстоятельства, подлежащие доказыванию\n\nч. 1. В рамках расследования подлежат доказыванию:\n\nа) событие правонарушения (время, место, способ и другие обстоятельства совершения правонарушения);\nб) виновность лица в совершении правонарушения, форма его вины и мотивы;\nв) характер и размер вреда, причиненного правонарушением;\nг) обстоятельства, исключающие противоправность и наказуемость деяния;\nд) обстоятельства, смягчающие и отягчающие наказание;\nе) обстоятельства, которые могут повлечь за собой освобождение от ответственности и наказания;\n\nч. 2 Подлежат выявлению также обстоятельства, способствовавшие совершению правонарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-14", "number": "14", "title": "Правила оценки доказательств", "content": "Статья 14. Правила оценки доказательств\n\nч. 1. Каждое доказательство подлежит оценке с точки зрения относимости, допустимости, достоверности, а все собранные доказательства в совокупности - достаточности для разрешения дела.\n\nРаздел III. Меры процессуального принуждения\n\nГлава III. Процесс задержания", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-15", "number": "15", "title": "Задержание", "content": "Статья 15. Задержание\n\nч. 1. Задержание - это мера кратковременного (на срок до 1 часа) лишения человека права на свободу, осуществляемая сотрудниками правоохранительных органов, сотрудниками специальных подразделений Национальной Гвардии, предусмотренных Законом “О Национальной Гвардии штата Сан-Андреас”, на основании ст. 16 настоящего Кодекса. Задержание не считается мерой наказания, оно носит исключительно внесудебный характер и в совокупности с другими предусмотренными законом средствами и методами позволяет сотрудникам правоохранительных органов собрать необходимые сведения (достаточную доказательственную базу) для решения вопроса о возможности или невозможности применения к лицу какой-либо ответственности. а также сотрудниками Weazel News в случаях, предусмотренных законом.\nПримечание к ст. 15: Ограничение свободы сотрудниками Weazel News не может превышать 15 минут до момента передачи сотрудникам силовых структур.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-16", "number": "16", "title": "Задержание подозреваемого", "content": "Статья 16. Задержание подозреваемого\n\nч. 1. Лицо может быть задержано по подозрению в совершении правонарушения, за которое может быть назначено наказание в виде лишения свободы или иных санкций, предусмотренных законом.\n\nч. 2. Лицо может быть задержано при наличии хотя бы одного из следующих оснований:\n\nа) Когда лицо застигнуто в момент совершения правонарушения или непосредственно после его совершения, государственным служащим;\nб) Когда на подозреваемом или его одежде, при нем или в его жилище будут обнаружены явные следы правонарушения;\nв) Когда 3 и более свидетелей указывают на данное лицо как на совершившее правонарушения;*\nПримечание: Свидетелями не могут быть родственники, знакомые, коллеги и другие заинтересованные лица;\nг) Когда есть фото или видео фиксация совершенного правонарушения этим лицом;\nд) Если имеется ордер, изданный в установленном законом порядке, указывающий на необходимость задержания этого лица;\nе) В соответствии с отданным Губернатором, генеральным прокурором или его заместителями требованием;\nж) Когда имеется ориентировка на транспортное средство или данное лицо;\nз) Если лицо находится в боло-розыске.\nи) Когда поступил вызов о взломе, повреждении, несанкционированном отключении или ином вмешательстве в работу камер видеонаблюдения\n\nч. 3. Если лицо находится в маске, капюшоне, шлеме либо ином предмете, скрывающем лицо, то уполномоченное должностное лицо имеет право потребовать снятия такого предмета с целью визуального установления личности.\n\nОтказ выполнить данное требование или отказ предъявить документы, удостоверяющие личность, влечёт за собой необходимость инициирования процедуры установления личности, порядок которой описан ниже:\n\nа) Надеть наручники на задержанного\nб) Разъяснить задержанному основания для установления личности\nв) Предпринять все законные меры для оперативного установления личности задержанного, включая обращение к базам данных, а так же досмотреть документы задержанного.\nг) Сверить лицо задержанного с фотороботом.\nд) Провести личный обыск задержанного, в случае обнаружения нелегальных предметов - провести процесс задержания регламентированный статьей 17 настоящего Кодекса.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-17", "number": "17", "title": "Порядок задержания правомочным лицом.", "content": "Статья 17. Порядок задержания правомочным лицом.\n\nч. 1. Задержание лица при ведении следствия производится в следующей последовательности: \n\nа) Надеть наручники на подозреваемого;\nб) Предъявить свой документ удостоверяющий служебное положение, нашивку, жетон, служебный бейджик или иной идентификационный знак, подтверждающий принадлежность к органам государственной власти;\n\nв) На усмотрение сотрудника, проводящего задержание, провести первичный обыск;\nг) Разъяснить квалификацию правонарушения, инкриминируемой задержанному и зачитать правило Миранды для ознакомления задержанного со своими правами согласно ч. 3 ст. 17, ст. 22 настоящего Кодекса;\nд) Провести идентификацию личности задержанного, проверку на предмет наличия его данных в базе федерального розыска и проверку на принадлежность задержанного к государственным органам;\nе) Доставить подозреваемого в полицейский участок, департамент шерифа, штаб-квартиру FIB или иное место следствия при необходимости (для проведения допроса, экспертизы и пр.);\nж) Реализовать права задержанного. В случае, если задержанный является государственным служащим, исполнения штрафных санкций.\n\nч. 1. В случае назначения административного или уголовного штрафа, лицо обязано произвести его оплату в порядке, установленном законодательством штата.\n\nч. 2. В случае если у лица, в отношении которого вынесено решение о мере наказания в виде штрафа, отсутствует при себе достаточная сумма денежных средств, сотрудник, вынесший решение о мере наказания в виде штрафа, обязан:\n\nа) сопроводить гражданина к ближайшему банкомату или банковскому отделению для снятия наличных средств с личного счета для оплаты штрафа;\nб) удостовериться, что гражданин произвел оплату штрафа и зафиксировать факт оплаты в установленном порядке.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-22", "number": "22", "title": "Права задерживаемого", "content": "Статья 22. Права задерживаемого\n\nч. 1. У подозреваемого имеются следующие права:\n\nа) Подозреваемый имеет право на один телефонный звонок в присутствии сотрудника до начала процесса ареста, сотрудник обязан предоставить телефонный звонок задержанному по его запросу. Длительность звонка не должна превышать 3-х минут;\nб) Подозреваемый имеет право на адвоката;\nв) Подозреваемый имеет право сохранять молчание;\nг) Подозреваемый имеет право возбуждать ходатайства, а также заявлять отводы;\nд) Подозреваемый вправе требовать конфиденциальной встречи с адвокатом, длительность которой не превышает 10 минут", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-23", "number": "23", "title": "Обязанности государственного служащего выполняющего задержание", "content": "Статья 23. Обязанности государственного служащего выполняющего задержание\n\nч. 1. Государственный служащий, выполняющий задержание обязан:\n\nа) Вести видеозапись задержания;\nб) Разъяснить адвокату, прокурору причины задержания;\nв) Разъяснить адвокату и, в случае, предусмотренном ст. 19 настоящего Кодекса, руководству причины задержания, а также по тр равонарушениях\n\nч. 2. Сотрудники правоохранительных органов, находящиеся под прикрытием (оперативное внедрение), после задержания подозреваемого, обязаны передать его уполномоченным лицам.\n\nГлава V. Процесс ареста", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-26", "number": "26", "title": "Арест", "content": "Статья 26. Арест\n\nч. 1. Арест – это разновидность уголовного наказания, при котором лицо лишается права на свободу на срок от 1 года. Аресту подвергаются лица, совершившие преступление, предусмотренное особенной частью Уголовного Кодекса - статьями региональной, федеральной, финансовой или военной юрисдикции.\n\nч. 2. В случае, если гражданину вменяется несколько преступлений, наказание в виде лишения свободы избирается из наиболее тяжкой санкции. Полное или частичное сложение наказания возможно только на основании приговора суда.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-27", "number": "27", "title": "Порядок ареста", "content": "Статья 27. Порядок ареста\n\nч. 1. Порядок ареста проводится строго в следующем порядке:\n\nа) Совершить вторичный обыск;\nб) Изъять все нелегальные предметы у гражданина, подвергнутого аресту;\nв) Установить соответствующий уровень боло-розыска в соотношении 1 год к 1 уровню;\nг) Разъяснить задержанному причину ареста;\nд) Поместить его в КПЗ на срок, установленный уголовным кодексом \n\nч. 2. Сотрудники правоохранительных органов, находящиеся под прикрытием (оперативное внедрение), после задержания подозреваемого, обязаны передать его уполномоченным лицам.\n\nГлава VI. Обыск\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-29", "number": "29", "title": "Личный обыск и личный досмотр", "content": "Статья 29. Личный обыск и личный досмотр\n\nч. 1. Подозреваемый может быть подвергнут личному обыску только во время задержания и (или) ареста, либо в случае, если у уполномоченного лица имеется подозрение о наличии у гражданина запрещенных предметов, веществ, опасных для окружающих при нахождении на территории государственного органа.\n\nч. 2. Граждане могут быть подвергнуты личному досмотру при пересечении границы (контрольно-пропускных пунктов) мест дислокации войск национальной гвардии.\n\nч. 3. Граждане могут быть подвергнуты личному досмотру по требованию сотрудников Секретной Службы при посещении здания Капитолия и зала Суда г.Лос-Сантос, а также в случае нахождения в непосредственной близости к охраняемому сотрудниками Секретной Службы лицу.\n\nПримечание: Сотрудники Секретной Службы не вправе требовать у государственных служащих при исполнении ими должностных обязанностей, а также неприкосновенных лиц прохождения личного досмотра при посещении здания здания Капитолия и зала Суда г.Лос-Сантос.\n\nч. 4. Подозреваемый может быть подвергнут личному обыску сотрудниками правоохранительных и военных органов в случае, если он находится в боло-розыске.\n\nч. 5. Требования прохождения личного досмотра в иных случаях, чем предусмотрены настоящей статьёй, являются незаконными.\n\nч. 6. Вторичный обыск - это урегулированное уголовно-процессуальным правом, обеспеченное государственным принуждением действие, заключающееся в непосредственном обследовании тела обыскиваемого, в том числе находящейся на нем одежды и при нем — ручной поклажи в целях нахождения и изъятия предметов, имеющих значение для уголовного дела, а также свидетельств их принадлежности конкретному лицу. В процессе ареста при вторичном обыске должны быть изъяты все нелегальные предметы, нелегальные биоресурсы, найденные в ходе вторичного обыска у задержанного, а также колющие, режущие предметы, огнестрельное оружие, спец. средства, боеприпасы, независимо от законности хранения данных предметов.\n\nИсключение: не допускается изъятие у задержанного дефибриллятора и эпинефрина без государственного серийного номера, если у задержанного на момент ареста имеется действующая лицензия парамедика.\n\nч. 7. Если служебная собака среагировала на гражданина, указав на возможное наличие при нём запрещённых веществ или предметов (в том числе посредством поведенческой реакции на запах), это является самостоятельным законным основанием для проведения личного обыска.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-30", "number": "30", "title": "Обыск и осмотр транспортного средства", "content": "Статья 30. Обыск и осмотр транспортного средства\n\nч. 1. Обыск транспортного средства может производится в следующих случаях:\nа) В случае выявления нарушения УК СА подозреваемым;\n\nч. 2. Осмотр транспортного средства — это визуальное обследование автомобиля или перевозимого груза.\n\nч. 2.1. Осмотр транспортного средства производится при наличии следующих оснований:\n\nа) когда имеется ориентировка, иная информация об использовании транспорта или груза в противоправных целях, в том числе, если в транспортном средстве находятся без разрешения предметы или вещи, изъятые из оборота или ограниченные в обороте, предметы правонарушения.\n\nч. 2.2. Для реализации мер, указанных в ч. 2.1 настоящей статьи, сотрудники правоохранительных органов вправе осуществлять вскрытие ТС, в том числе проникновение в него, требовать предоставления беспрепятственного доступа к обследованию автомобиля и перевозимого груза.\n\nГлава VII. Иные меры процессуального принуждения", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-31", "number": "31", "title": "Основания применения иных мер процессуального принуждения", "content": "Статья 31. Основания применения иных мер процессуального принуждения\n\nч. 1. В целях обеспечения установленного настоящим Кодексом порядка судопроизводства, надлежащего исполнения приговора прокурор или суд вправе применить к подозреваемому или обвиняемому следующие меры процессуального принуждения:\n\nа) обязательство о явке;\nб) привод;\nв) временное отстранение от должности;\n\nч. 2. В случаях, предусмотренных настоящим Кодексом, прокурор или суд вправе применить к потерпевшему, свидетелю, гражданскому истцу, гражданскому ответчику, эксперту, специалисту, переводчику и (или) понятому следующие меры процессуального принуждения:\n\nа) обязательство о явке;\nб) привод;\nв) денежное взыскание.\n\nРаздел IV. Иные положения\n\nГлава VIII. Фото и видео фиксация", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-32", "number": "32", "title": "Осуществление фиксации", "content": "Статья 32. Осуществление фиксации\n\nч. 1. Государственный служащий или его напарник обязаны вести видеофиксацию во время пресечения правонарушения со стороны гражданских и (или) государственных служащих в любой форме, а также во время проведения процессуальных действий с зафиксированным фактом правонарушения.\n\nИсключение: Во время реализации права задержанного на адвоката для представления доказательств правонарушения гражданина, сотрудник вправе приостановить запись на это время. Также сотрудник вправе приостановить запись на момент разбирательства с Офисом генерального прокурора и (или) руководством задержанного в случае, если задержанный является государственным служащим.\n\nч. 2. Сотрудник Офиса Генерального Прокурора обязан вести видеофиксацию во время рассмотрения дела в рамках задержания государственного служащего.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-33", "number": "33", "title": "Сроки хранения фиксации", "content": "Статья 33. Сроки хранения фиксации\n\nч. 1. Государственный служащий обязан хранить видеофиксацию на защищенных серверах государственного органа, в котором он проходит службу, или SD-карте на протяжении 72 часов с момента записи.\nч. 1.1 В случае получения информации о подаче искового заявления в суд или жалобы в прокуратуру, срок хранения материалов продлевается до окончательного завершения соответствующего процесса.\n\nч. 1.2 Неисполнение обязанности по хранению видеофиксации в течение указанного срока является основанием для признания действий сотрудника незаконными.\n\nч. 2. Если в отношении государственного служащего подано исковое заявление и (или) обращение в Офис Генерального прокурора, то такой сотрудник не имеет право удалять какие-либо записи или иные доказательства по делу, на время доследственной проверки, расследования.\n\nКомментарий: сотрудник Офиса Генерального прокурора после принятия обращения в производство и(или) возбуждения уголовного дела, в соответствии с законодательством обязан уведомить сотрудника, в отношении которого было подано обращение в Офис Генерального прокурора, и(или) возбуждено уголовное дело любыми законными средствами. Секретариат судейского корпуса обязан уведомить сотрудника, в отношении которого было подано исковое заявление.\n\nГлава IX. Выпуск граждан под залог", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-34", "number": "34", "title": "Выпуск под залог", "content": "Статья 34. Выпуск под залог\n\nч. 1. Граждане имеют право выйти под залог, сумма которого регулируется сотрудниками правоохранительных органов, но не менее 25.000$.\n\nч. 2. За каждый уровень розыска стоимость выхода под залог увеличивается на 25.000$ ((+25.000$ за каждую ★))\n\nГлава X. Подследственность и Компетенция", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-35", "number": "35", "title": "Компетенция", "content": "Статья 35. Компетенция\n\nКомпетенция — это установленный законом, нормативным актом или внутренним регламентом объём прав, обязанностей и полномочий, предоставленных конкретному органу, должностному лицу или организации в рамках определённых правоотношений.\n\nч. 1 Компетенция определяет:\n- Место органа или должностного лица в системе государственной и административной власти;\n- Круг вопросов, по которым орган или должностное лицо вправе действовать;\n- Пределы полномочий в рамках допустимых процедур и задач.\nч. 2 Процессуальные действия, совершаемые органами или должностными лицами вне их установленной компетенции, запрещаются, если иное не предусмотрено настоящим Кодексом.\n\nИсключение: Одобрен запрос на предоставление компетенции от уполномоченного органа и уполномоченного лица на проведение предварительное следствия, следствия и иных процессуальных действий.\n\nч. 2.1. Требования, распоряжения, поручения и запросы государственного служащего, предъявленные вне установленной компетенции, не являются законными и не влекут обязанности их исполнения, за исключением случаев, когда компетенция была предоставлена в порядке, предусмотренном настоящим Кодексом.\nч.3 Получение доступа к полномочиям, выходящим за пределы установленной компетенции:\n\nСотрудники региональных правоохранительных органов вправе на отработку статей, относящихся к федеральной компетенции, только по одобрению запроса старшим составом Федерального Расследовательского Бюро.\nСотрудники федеральных ведомств вправе на отработку статей региональной компетенции только по одобрению запроса старшим составом регионального органа.\nСотрудники федеральных и региональных ведомств вправе вправе на отработку статей военной компетен\nции только по одобрению запроса старшим составом военного органа.\nСотрудники федеральных и региональных ведомств вправе вправе на отработку статей финансовой компетенции только по одобрению запроса старшим составом Секретной Службы Соединенных Штатов Америки.\n\nч. 4 Сотрудники ведомств, не обладающих установленной компетенцией по конкретным статьям, обязаны направить запрос на проведение процессуальных действий в уполномоченный орган либо уполномоченному должностному лицу, обладающему правом делегирования компетенции.\n\nч. 5 Такой запрос может быть направлен до начала предварительного следствия, следствия и иных процессуальных действий или в процессе их осуществления, при условии обязательного уведомления и последующего получения разрешения в установленном порядке.\n\nПримечание: отсутствие предварительного либо последующего разрешения исключает возможность проведения процессуальных действий по статье, находящейся вне компетенции запрашивающего ведомства. Такие действия являются недопустимыми.\n\nч. 6 Сотрудники Офиса Генерального Прокурора имеют право на проведение предварительного следствия, следственных и иных процессуальных действий на территории всего штата Сан-Андреас, вне зависимости от категории уголовной или административной статьи в рамках своих полномочий.\n\nПримечание: Сотрудникам Офиса Генерального Прокурора недопустимо использование наручников и иных специальных средств при проведении процессуальных действий, а равно самостоятельно инициировать задержание с использованием силы или специальных средств.\n\nч. 7 Генеральный прокурор или его Заместители вправе своим распоряжением (как устным, так и письменным) расширить компетенцию на проведение предварительного следствия, следственных и процессуальных действий в отношении определенной правоохранительной структуры или должностного лица.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-36", "number": "36", "title": "Компетенция ведомств", "content": "Статья 36. Компетенция ведомств\n\nч. 1. Предварительное следствие, следствие и иные процессуальные действия органов исполнительной власти осуществляются в зависимости от категории статьи, установленной уголовным кодексом, и разделяются по ведомственной компетенции:\n\n[Региональная] — осуществляется региональными правоохранительными органами штата Сан-Андреас при расследовании преступлений, не затрагивающих интересы федерального уровня.\n\n[Федеральная] — осуществляется Федеральным Расследовательским Бюро и Секретной Службой США по делам, отнесённым к юрисдикции федеральных органов.\n\n[Финансовая] — осуществляется Секретной Службой США по делам, связанным с финансовыми преступлениями, нарушениями в банковской сфере, подделкой валюты и операциями, представляющими угрозу финансовой стабильности штата.\n\n[Военная] — осуществляется Национальной Гвардией штата Сан-Андреас по делам, связанным с военнослужащими, военными объектами либо в пределах территории военного значения.\n\nПримечание: В случае наличия смешанной компетенции, сотрудники соответствующих ведомств вправе осуществлять совместное предварительное следствие, следствие и иные процессуальные действия в пределах предоставленных полномочий.\n\nИсключение: Секретная Служба Соединённых Штатов Америки обладает исключительным правом доступа к компетенции любого ведомства.\n\nИсключение: При отсутствии лица на должности действующего Директора Федерального Расследовательского Бюро, сотрудники региональных правоохранительных органов вправе самостоятельно осуществлять предварительное следствие, следствие и процессуальные действия по статье 7.1 Уголовного Кодекс без необходимости получения разрешения от федеральных органов.\n\nГлава XI. Утратила силу\n\nГлава XII. Стадии применения силы", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-37", "number": "37", "title": "Стадии применения силы", "content": "Статья 37. Стадии применения силы\n\nч. 1. Стадии применения силы - стандарты, классифицирующие допустимый уровень применения силы в отношении нарушителей законодательства штата SA, со стороны государственного служащего.\n\nПримечание: Каждый государственный служащий обязан опираться на стадии применения силы и на процессуальный кодекс при прямом взаимодействии с лицом. Каждый сотрудник, применяющий определённую стадию силы должен отдавать отчётность своим действиям, а также быть готовым к тому, что ненадлежащее исполнение своих обязанностей приведёт к уголовной ответственности. Все стадии применения силы должны соблюдаться в строгом иерархическом порядке от первой до пятой.\n\nИсключение: В случае когда государственный служащий стал свидетелем правонарушения, сотруднику разрешается игнорировать первую, вторую и третью стадии применения силы и перейти сразу к четвертой; если сотрудникам гос. структур или гражданским лицам угрожает опасность, большое скопление вооруженных людей, в таком случае можно предпринять пятую стадию без предшествующих стадий.\n\nч. 2. Законодательство предусматривает пять стадий применения силы:\n\nа) Первая стадия - Присутствие;\nб) Вторая стадия - Приказ;\nв) Третья стадия - Применение физической силы;\nг) Четвертая стадия - Применение специальных средств;\nд) Пятая стадия - Применение огнестрельного оружия.\n\nПримечание: Присутствие государственного служащего при исполнении своих служебных обязанностей. В некоторых ситуациях, одного присутствия будет достаточно для выполнения законных требований и прекращения мелких правонарушений. В зависимости от обстановки и количества лиц в определенном месте, этот уровень применения силы может потребовать присутствия нескольких государственных служащих для полного контроля ситуации. В некоторых ситуациях расстегивание сотрудником силовой структуры кобуры и даже извлечение им оружия или спецсредств подпадают под этот уровень применения силы. При стадии присутствия, а также при последующих стадиях, сотрудник должен иметь идентификационные знаки и предъявлять их при первом гласном обращении к лицу и если его идентификация помогает делу в котором он несёт непосредственное участие. Если первой стадии недостаточно, опираясь на ситуацию, сотрудник может применять вторую стадию.\n\nПримечание: Требования либо распоряжения, исходящие от государственных служащих, должны быть исполнимыми и законными, то есть их возможность должна быть предусмотрена существующими законодательными актами. Кроме того, требования государственных служащих должны иметь в качестве цели - охрану общественного порядка и обеспечение общественной безопасности. Государственный служащий имеет право дополнять свои распоряжения предупреждениями о последствиях за неисполнение законных требований. Если второй стадии недостаточно, опираясь на ситуацию, сотрудник может применять третью стадию.\n\nПримечание: применение физической силы считается стадией, при которой государственный служащий использует физическое воздействие в сторону лица. К этой стадии относятся заламывание рук, удержание гражданина на месте с применением силы. Также сюда же может относиться применение дубинок и слезоточивых аэрозолей. Если третьей стадии недостаточно, опираясь на ситуацию, сотрудник может применять четвертую стадию.\n\nПримечание: применение специальных средств считается стадией, при которой государственный служащий использует спец. средства в сторону лица. К этой стадии относится применение наручников, электрошоковых устройств, резиновых пуль. В некоторых ситуациях к этой стадии может относиться применение дубинок и слезоточивых аэрозолей. Запрещено использовать спец. средство, как меру предупреждения (предупредительные выстрелы/удары запрещены). Государственный служащий может применить специальные средства в отношении лица, способные нанести ущерб его здоровью, лишь в том случае, когда применение иных специальных средств невозможно. Если четвёртой стадии недостаточно, опираясь на ситуацию, сотрудник может применять пятую стадию.\n\nПримечание: применение огнестрельного оружия считается стадией, при которой государственный служащий использует оружие в сторону лица. Под этой стадией воздействия применяется огнестрельное оружие, автомобиль или любое подручное оружие, обладающее необходимыми свойствами. На этой стадии очень вероятно причинение смерти или нанесение тяжкого вреда здоровью лица. Если сотрудник применяет огнестрельное оружие, он обязан использовать его строго по назначению, предупредительные выстрелы запрещены. Запрещено применять огнестрельное оружие при значительном скоплении граждан, если в результате его применения могут пострадать случайные лица. Не запрещено использовать оружие для остановки транспортного средства путем его повреждения, если управляющее им лицо отказывается выполнить неоднократные требования сотрудника, а также для разрушения запирающих устройств, элементов и конструкций препятствующих проникновению в жилые и иные помещения.\n\nПримечание: Требования либо распоряжения, исходящие от государственных служащих, должны быть исполнимыми и законными, то есть их возможность должна быть предусмотрена настоящим Кодексом, иными нормативно-правовыми актами либо актом уполномоченного лица. Требование государственного служащего должно соответствовать статье 8.1 настоящего Кодекса, иметь целью охрану общественного порядка, обеспечение общественной безопасности, пресечение правонарушения, проведение процессуальных действий либо осуществление надзора в пределах компетенции.Государственный служащий вправе предупредить лицо об ответственности за неисполнение законного требования. Применение мер воздействия при неисполнении осуществляется в соответствии со стадиями применения силы, установленными настоящим Кодексом. \n\nГлава XIII. Федеральный розыск и боло-розыск", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-38", "number": "38", "title": "Федеральный розыск.", "content": "Статья 38. Федеральный розыск.\n\nч. 1. Федеральный розыск - комплекс мер, направленный на установление местонахождения определенного человека, скрывающегося от правоохранительных органов, следствия, суда, а также без вести пропавших граждан на территории Штата Сан-Андреас.\n\nч. 2. Объявлять лицо в федеральный розыск разрешено за нарушение Уголовного кодекса Штата Сан-Андреас.\n\nч. 3. Лица объявляются в федеральный розыск на основании выданного ордера или решения суда.\n\nч. 4. Объявлять в федеральный розыск за нарушение УК СА имеют права следующие лица:\n\nа) Генеральный прокурор, Заместитель Генерального прокурора\nб) Судьи.\n\nч. 5. Объявлять лицо, пропавшее без вести, в федеральный розыск имеют право все лица, перечисленные в ч.4 настоящей статьи.\n\nПримечание: при необходимости объявить кого-либо в Федеральный розыск государственный служащий направляет соответствующее ходатайство на имя Генерального прокурора или его заместителя.\n\nч. 6. Сотрудник государственных силовых органов при проведения ареста граждан, находящихся в федеральном розыске, обязаны после проведения процессуальных действий незамедлительно, в срок до 3 часов, оставить отчет об аресте лица, находившегося в фед. розыске в специализированном канале связи сотрудников государственных органов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-39", "number": "39", "title": "Боло-розыск", "content": "Статья 39. Боло-розыск\n\nч. 1. Боло-розыск - комплекс мер, направленный на установление местонахождения определенного человека, скрывающегося от правоохранительных органов, следствия, суда на территории штата Сан-Андреас. \n\nч. 2. Выделяются 5 уровней (звезд) боло-розыска. Уровень боло-розыска устаналивается в зависимости от тяжести совершенного правонарушения или по подозрению в совершении такового, пропорционально возможной мере наказания в виде лишения свободы в соотношени 1 год к 1 звезде.\n\nч. 3. Для эффективности поиска лиц находящихся в федеральном розыске разрешается объявлять таковых в боло-розыск. При объявлении лица в боло-розыск находящегося в федеральном розыске,разрешается сразу устанавливать 5 уровень общественной опасности\n\nч. 4. Объявлять в боло-розыск за нарушение действующего законодательства могут сотрудники Полицейского Департамента г.Лос-Сантоса, Департамента Шерифа о.Блейн, Федерального Расследовательского Бюро, Секретной Службы США, Офиса Генерального Прокурора, а также Судьи всех категорий.\n\nч. 5. Государственным служащим уполномоченным объявлять в федеральный розыск разрешается вносить таковых в боло-розыск. \n\nч. 6. В случае внесения в боло-розыск лиц по ордеру/решению суда разрешается установить сразу последний уровень общественной опасности\n\nч. 7. Лицо может быть вынесено из боло-розыска сотрудниками Офиса Генерального Прокурора путем предостав судебного разбирательства обладает также государственный обвинитель.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-42", "number": "42", "title": "Заявление ходатайства", "content": "Статья 42. Заявление ходатайства\n\nч. 1. Ходатайство может быть заявлено в любой момент производства по делу. \n\nч. 2. Отклонение ходатайства не лишает заявителя права вновь заявить ходатайство", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-43", "number": "43", "title": "Сроки рассмотрения и разрешение ходатайства", "content": "Статья 43. Сроки рассмотрения и разрешение ходатайства\n\nч. 1. Ходатайство подлежит рассмотрению и разрешению непосредственно после его заявления. В случаях, когда немедленное принятие решения по ходатайству, заявленному в ходе предварительного расследования, невозможно, оно должно быть разрешено не позднее 3 суток со дня его заявления.\n\nч. 2. Об удовлетворении ходатайства либо о полном или частичном отказе в его удовлетворении уполномоченный сотрудник органа, осуществляющего следствие, судья выносят постановление. Решение по ходатайству может быть обжаловано в вышестоящую инстанцию суда или вышестоящему уполномоченному сотруднику органа, осуществляющего следствие или в Офисе Генерального Прокурора", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-44", "number": "44", "title": "Право обжалования", "content": "Статья 44. Право обжалования\n\nч. 1. Действия (бездействие) и решения следователя, прокурора и суда могут быть обжалованы в установленном настоящим Кодексом порядке участниками судопроизводства, а также иными лицами в той части, в которой производимые процессуальные действия и принимаемые процессуальные решения затрагивают их интересы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-45", "number": "45", "title": "Порядок рассмотрения обращения прокурором или следователем", "content": "Статья 45. Порядок рассмотрения обращения прокурором или следователем\n\nч. 1. В случае, если обжалуется действие (бездействие) и/или решения служащих, осуществляющих следствие, служащего офиса генерального прокурора, то участник судопроизводства вправе подать обращение вышестоящему сотруднику органа следствия и(или) Офиса Генерального Прокурора (во время досудебного или судебного производства) или в суд (во время судебного производства).\n\nч. 2. В случае подачи обращения в Офис Генерального Прокурора и(или) иной орган следствия в соответствии с ч.1 ст.45 текущего Кодекса, сотрудник Офиса Генерального Прокурора и(или) следователь, назначенный на рассмотрение обращения, обязан рассмотреть обращение в течение 1 дня с момента начала рассмотрения такового. В исключительных случаях, когда для проверки обращения необходимо истребовать дополнительные материалы либо принять иные меры, допускается рассмотрение обращения в срок до 3 суток. По результатам рассмотрения обращения, служащий Офиса Генерального Прокурора и(или) следователь выносит постановление о полном или частичном удовлетворении требований обращения либо об отказе в его удовлетворении.\n\nч. 3. Если жалоба подана в суд во время судебного производства, то суд в течении 3 суток рассматривает жалобу и выносит мотивированное постановление или определение о полном или частичном удовлетворении жалобы либо об отказе в ее удовлетворении.\n\nГлава XVI. Следствие", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-46", "number": "46", "title": "Следствие", "content": "Статья 46. Следствие\n\nч. 1. Следствие - это комплекс мер по выяснению обстоятельств, связанных с правонарушением, для установления обстановки и характера правонарушения, а также лиц, виновных в совершении правонарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-47", "number": "47", "title": "Начало производства следствия", "content": "Статья 47. Начало производства следствия\n\nч. 1. Если иное не оговорено, то следственные действия производятся только с момента возбуждения дела.\n\nч. 2. До возбуждения дела возможно проведение любого следственного действия, промедление с производством которого может привести к утрате доказательств, затруднить их обнаружение и закрепление, дать возможность лицу, совершившему правонарушение, скрыться или осложнить возмещение причиненного материального ущерба.\n\nч. 3. Сотрудник правоохранительных органов или иное уполномоченное лицо, установив, что дело ему не подследственно, производит следственные действия, описанные в ч. 2 настоящей статьи, после чего передает дело лицу, подследственному вести производство по делу в порядке ч. 1 ст. 49 настоящей главы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-48", "number": "48", "title": "Принципы ведения расследования", "content": "Статья 48. Принципы ведения расследования\n\nч. 1. Настоящим Кодексом предусмотрено два принципа ведения расследования, которые должны соблюдаться правоприменителем:\n\nа) Адекватность — сотрудник обязан действовать профессионально, не превышая свои должностные полномочия, и максимально точно разобраться в деле прежде чем делать умозаключения;\nб) Безотлагательность — сотрудник обязан отреагировать на правонарушение и начать действовать без необоснованных промедлений.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-49", "number": "49", "title": "Передача дела", "content": "Статья 49. Передача дела\n\nч. 1. В случае если сотрудник по объективным причинам не может или не уполномочен продолжать расследование, он обязан передать его уполномоченному сотруднику с подробным изложением всех известных ему обстоятельств дела. А также передать подозреваемого если он был задержан.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-50", "number": "50", "title": "Письменная отчетность", "content": "Статья 50. Письменная отчетность\n\nч. 1. Дело должно вестись с письменной отчетностью в случаях предусмотренными внутренним регламентом, или в случае необходимости передачи дела в суд.\n\nч. 2. Процессуальные документы могут быть выполнены типографским, электронным способами. В случае отсутствия бланков процессуальных документов, выполненных типографским, электронным, они могут быть написаны от руки.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-51", "number": "51", "title": "Следственные действия", "content": "Статья 51. Следственные действия\n\nч. 1. Перечень следственных действий:\n\nа) Допрос;\nб) Осмотр;\nв) Обыск;\nг) Выемка;\nд) Очная ставка;\nе) Опознание;\nё) Освидетельствование;\nж) Проверка показаний;\nз) Производство судебной экспертизы;\nи) Контроль и запись переговоров;\nй) Следственный эксперимент;\nк) Возбуждение дела (принятие заявления или фиксация нарушения);\nл) Оперативно-розыскные мероприятия;\nм) Задержание.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-52", "number": "52", "title": "Осмотр", "content": "Статья 52. Осмотр\n\nч. 1. Осмотр места происшествия, местности, жилища, иного помещения, предметов и документов производится в целях обнаружения следов правонарушения, выяснения других обстоятельств, имеющих значение для дела.\n\nч. 2. Осмотр места происшествия, документов и предметов может быть произведен до возбуждения дела.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-53", "number": "53", "title": "Следственный эксперимент", "content": "Статья 53. Следственный эксперимент\n\nч. 1. В целях проверки и уточнения данных, имеющих значение для дела, прокурор вправе произвести следственный эксперимент путем воспроизведения действий, а также обстановки или иных обстоятельств определенного события. При этом проверяется возможность восприятия каких-либо фактов, совершения определенных действий, наступления какого-либо события, а также выявляются последовательность происшедшего события и механизм образования следов. Производство следственного эксперимента допускается, если не создается опасность для здоровья участвующих в нем лиц.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-54", "number": "54", "title": "Обыск", "content": "Статья 54. Обыск\n\nч. 1. Основания и порядок производства обыска, предусмотрены главой VI настоящего Кодекса.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-55", "number": "55", "title": "Выемка", "content": "Статья 55. Выемка\n\nч. 1. При необходимости изъятия определенных предметов и документов, имеющих значение для дела, и если точно известно, где и у кого они находятся, производится их выемка.\n\nч. 2. Выемка производится на основании постановления прокурора, следователя или решения суда.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-56", "number": "56", "title": "Контроль и запись переговоров", "content": "Статья 56. Контроль и запись переговоров\n\nч. 1. При наличии достаточных оснований полагать, что телефонные и иные переговоры (в том числе сообщения) подозреваемого, обвиняемого и других лиц могут содержать сведения, имеющие значение для уголовного дела, их контроль и запись допускаются при производстве по уголовным делам. \n\nч. 2. Контроль и запись переговоров допускается только на основании судебного решения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-57", "number": "57", "title": "Допрос", "content": "Статья 57. Допрос\n\nч. 1. Свидетель, потерпевший, обвиняемый, подозреваемый вызывается на допрос повесткой, в которой указываются, кто и в каком качестве вызывается, к кому и по какому адресу, дата и время явки на допрос, а также последствия неявки без уважительных причин или может быть подвергнут процедуре допроса в ходе задержания.\n\nч. 2. Повестка вручается лицу, вызываемому на допрос, под расписку либо передается с помощью электронных средств связи. В случае временного отсутствия лица, вызываемого на допрос, повестка вручается совершеннолетнему члену его семьи либо передается руководителю по месту его работы или по поручению следователя или прокурора иным лицам и организациям, которые обязаны передать повестку лицу, вызываемому на допрос.\n\nч. 3. Лицо, вызываемое на допрос, обязано явиться в назначенный срок либо заранее уведомить следователя или прокурора о причинах неявки. В случае неявки без уважительных причин лицо, вызываемое на допрос, может быть подвергнуто приводу либо к нему могут быть применены иные меры процессуального принуждения.\n\nч. 4. Следователь и/или прокурор, привлекая к участию в допросе истца, заявителя, свидетеля, потерпевшего, подозреваемого, обвиняемого, представителя таких лиц, удостоверяется в их личности, разъясняет им права, ответственность, а также порядок производства соответствующего следственного действия. Если в производстве следственного действия участвует специалист, эксперт или переводчик, то он также предупреждается об ответственности, предусмотренной законодательством.\n\nч. 5. Должностное лицо, осуществляющее допрос, обязано уведомить допрашиваемое лицо о месте и времени проведения допроса, но не позднее 12-ти часов до его проведения.\n\nПримечание: Допрос может быть произведен с отступлением обязательных временных рамок от настоящей части при обоюдном согласии сторон (должностного лица, осуществляющего допрос, допрашиваемого лица).\n\nч. 6. Если допрашиваемое лицо явилось на допрос с адвокатом, приглашенным им для оказания юридической помощи, то адвокат присутствует при допросе и пользуется правами, предусмотренными . По окончании допроса адвокат вправе делать заявления о нарушениях прав и законных интересов клиента.\n\nч. 7. Следователь или прокурор, в ходе допроса обязаны обеспечить проведение аудио- и (или) видеозаписи, материалы которых хранятся при уголовном деле.\n\nч. 8. Допрос не может длится более 1 часа. Допрос проводимый по повестке, также не может проводиться в ночное время.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-58", "number": "58", "title": "Очная ставка", "content": "Статья 58. Очная ставка\n\nч. 1. Если в показаниях ранее допрошенных лиц имеются существенные противоречия, то прокурор или следователь вправе провести очную ставку. \n\nч. 2. Прокурор или следователь выясняет у лиц, между которыми проводится очная ставка, знают ли они друг друга и в каких отношениях находятся между собой. Допрашиваемым лицам поочередно предлагается дать показания по тем обстоятельствам, для выяснения которых проводится очная ставка. После дачи показаний прокурор или следователь может задавать вопросы каждому из допрашиваемых лиц. Лица, между которыми проводится очная ставка, могут с разрешения прокурора или следователя задавать вопросы друг другу.\n\nч. 3. В ходе очной ставки следователь или прокурор вправе предъявить вещественные доказательства и документы.\n\nч. 4. Во время производства очной ставки должен проводится аудио и (или) видео протокол.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-59", "number": "59", "title": "Предъявление для опознания", "content": "Статья 59. Предъявление для опознания\n\nч. 1. Следователь может предъявить для опознания лицо или предмет свидетелю, потерпевшему, подозреваемому или обвиняемому.\n\nч. 2. Опознающие предварительно допрашиваются об обстоятельствах, при которых они видели предъявленные для опознания лицо или предмет, а также о приметах и особенностях, по которым они могут его опознать.\n\nч. 3. Не может проводиться повторное опознание лица или предмета тем же опознающим и по тем же признакам.\n\nч. 4. Лицо предъявляется для опознания вместе с другими лицами, по возможности внешне сходными с ним. Общее число лиц, предъявляемых для опознания, должно быть не менее трех. Перед началом опознания опознаваемому предлагается занять любое место среди предъявляемых лиц, о чем в протоколе опознания делается соответствующая запись.\n\nч. 5. При невозможности предъявления лица опознание может быть проведено по его фотографии, предъявляемой одновременно с фотографиями других лиц, внешне сходных с опознаваемым лицом. Количество фотографий должно быть не менее трех.\n\nч. 6. Предмет предъявляется для опознания в группе однородных предметов в количестве не менее трех. При невозможности предъявления предмета его опознание проводится в порядке, установленном ч. 5 настоящей статьи.\n\nч. 7. Если опознающий указал на одно из предъявленных ему лиц или один из предметов, то опознающему предлагается объяснить, по каким приметам или особенностям он опознал данные лицо или предмет. Наводящие вопросы недопустимы.\n\nч. 8. В целях обеспечения безопасности опознающего предъявление лица для опознания по решению следователя может быть проведено в условиях, исключающих визуальное наблюдение опознающего опознаваемым. В этом случае понятые находятся в месте нахождения опознающего.\n\nч. 9. Опознание лица также производится следователем на основе имеющихся фотоматериалов в совокупности с документами гражданина.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-60", "number": "60", "title": "Проверка показаний на месте", "content": "Статья 60. Проверка показаний на месте\n\nч. 1. В целях установления новых обстоятельств, имеющих значение для дела, показания, ранее данные подозреваемым или обвиняемым, а также потерпевшим или свидетелем, могут быть проверены или уточнены на месте, связанном с исследуемым событием.\n\nч. 2. Проверка показаний на месте заключается в том, что ранее допрошенное лицо воспроизводит на месте обстановку и обстоятельства исследуемого события, указывает на предметы, документы, следы, имеющие значение для дела, демонстрирует определенные действия. Какое-либо постороннее вмешательство в ход проверки и наводящие вопросы недопустимы.\n\nч. 3. Не допускается одновременная проверка на месте показаний нескольких лиц.\n\nч. 4. Проверка показаний начинается с предложения лицу указать место, где его показания будут проверяться. Лицу, показания которого проверяются, после свободного рассказа и демонстрации действий могут быть заданы вопросы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-61", "number": "61", "title": "Освидетельствование", "content": "Статья 61. Освидетельствование\n\nч. 1. Для обнаружения на теле человека особых примет, следов правонарушения, телесных повреждений, выявления состояния опьянения или иных свойств и признаков, имеющих значение для дела, если для этого не требуется производство судебной экспертизы, может быть произведено освидетельствование подозреваемого, обвиняемого, потерпевшего, а также свидетеля с его согласия, за исключением случаев, когда освидетельствование необходимо для оценки достоверности его показаний. В случаях, не терпящих отлагательства, освидетельствование может быть произведено до возбуждения дела.\n\nч. 2. О производстве освидетельствования следователь может вынести постановление, которое является обязательным для освидетельствуемого лица.\n\nч. 3. Освидетельствование производится следователем. При необходимости следователь привлекает к участию в производстве освидетельствования врача или другого специалиста.\n\nч. 4. При освидетельствовании лица другого пола следователь не присутствует, если освидетельствование сопровождается обнажением данного лица. В этом случае освидетельствование производится врачом.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-62", "number": "62", "title": "Задержание", "content": "Статья 62. Задержание\n\nч. 1. Основания и порядок задержания, а также основания освобождения подозреваемого установлены в главе 4 Настоящего Кодекса.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-63", "number": "63", "title": "Оперативно-розыскные мероприятия", "content": "Статья 63. Оперативно-розыскные мероприятия\n\nч. 1. Оперативно-розыскные мероприятия регулируются отдельным законом “Об оперативно-розыскной деятельности”.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-64", "number": "64", "title": "Возбуждение дела", "content": "Статья 64. Возбуждение дела\n\nч. 1. Возбуждение дела и производство по нему регулируются гл. 17 настоящего кодекса.\n\nч. 2. Порядок производства следственных действий в отношении лиц, имеющих статус неприкосновенности, осуществляется с учетом закона \"Об обеспечении неприкосновенности государственных служащих\".", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-65", "number": "65", "title": "Окончание следствия", "content": "Статья 65. Окончание следствия\n\nч. 1 По окончании следствия сотрудник правоохранительных органов или иное уполномоченное лицо выносит решение:\n\n1) о прекращении дела - по основаниям, предусмотренным статьей ст. 73 настоящего Кодекса, а равно о признании лица не виновным в совершении правонарушения;\n2) о признании лица виновным в совершении правонарушения.\n3) о возвращении дела для производства дополнительного следствия, изменения объема обвинения либо квалификации действий обвиняемых или пересоставления обвинительного заключения и устранения выявленных недостатков со своими письменными указаниями. Задержанный подлежит освобождению.\n\nГЛАВА XVII. Уголовное производство и Уголовное преследование.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-66", "number": "66", "title": "Назначение уголовного производства.", "content": "Статья 66. Назначение уголовного производства.\n\nч. 1 Уголовное производство имеет своим назначением:\n\n1) защиту прав и законных интересов лиц и организаций, потерпевших от преступлений;\n2) защиту личности от незаконного и необоснованного обвинения, осуждения, ограничения ее прав и свобод.\n3) Уголовное преследование и назначение виновным справедливого наказания в той же мере отвечают назначению уголовного производства, что и отказ от уголовного преследования невиновных, освобождение их от наказания, реабилитация каждого, кто необоснованно подвергся уголовному преследованию.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-67", "number": "67", "title": "Назначение наказания в рамках уголовного дела", "content": "Статья 67. Назначение наказания в рамках уголовного дела\n\nч. 1. Наказания по уголовному делу в штате Сан-Андреас осуществляется уполномоченными государственными служащими, а также судом.\n\nч. 2. Никто не может быть признан виновным в совершении преступления и подвергнут уголовному наказанию иначе как в порядке, установленном действующим законодательством.\n\nч. 3. Лицо, которому было назначено наказание за совершенное преступление, не может быть лишено права на рассмотрение его уголовного дела в судебных органах и в праве обжаловать решения лиц, назначивших ему лицу наказание.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-68", "number": "68", "title": "Независимость судей", "content": "Статья 68. Независимость судей\n\nч. 1. При осуществлении правосудия по уголовным делам судьи независимы и подчиняются только Конституции и законам штата Сан-Андреас.\n\nч. 2. Судьи рассматривают и разрешают уголовные дела в условиях, исключающих противоправное воздействие на них. Вмешательство государственных органов, органов местного самоуправления, иных органов, организаций, должностных лиц или граждан в деятельность судей по осуществлению правосудия запрещается и влечет за собой установленную законом ответственность.\n\nч. 3. Информация о внепроцессуальных обращениях государственных органов, органов местного самоуправления, иных органов, организаций, должностных лиц или граждан, поступивших судьям по уголовным делам, находящимся в их производстве, подлежит преданию гласности и доведению до сведения участников судебного разбирательства путем размещения данной информации и не является основанием для проведения процессуальных действий или принятия процессуальных решений по уголовным делам.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-69", "number": "69", "title": "Состязательность сторон", "content": "Статья 69. Состязательность сторон\n\nч. 1. Уголовное судопроизводство осуществляется на основе состязательности сторон.\n\nч. 2. Суд не является органом уголовного преследования, не выступает на стороне обвинения или стороне защиты. Суд создает необходимые условия для исполнения сторонами их процессуальных обязанностей и осуществления предоставленных им прав.\n\nч. 3. Стороны обвинения и защиты равноправны перед судом.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-70", "number": "70", "title": "Обязанность осуществления уголовного преследования", "content": "Статья 70. Обязанность осуществления уголовного преследования\n\nч. 1. Уголовное преследование от имени государства по уголовным делам публичного и частно-публичного обвинения осуществляют прокурор, а также следователь.\n\nПримечание: Прокурор осуществляя расследования по уголовным делам, в порядке предусмотренном настоящим кодексом, осуществляет функции следователя\n\nч. 2. В каждом случае обнаружения признаков преступления прокурор и следователь принимают предусмотренные настоящим Кодексом меры по установлению события преступления, изобличению лица или лиц, виновных в совершении преступления\n\nч. 3. Следователь, а также прокурор в случаях, предусмотренных ч. 4 ст. 75 настоящего кодекса, вправе осуществлять уголовное преследование по уголовным делам независимо от волеизъявления потерпевшего.\n\nч. 4. Законные требования, поручения и запросы прокурора и/или следователя, предъявленные в рамках уголовного преследования, в пределах их компетенции и с соблюдением статьи 8.1 настоящего Кодекса, обязательны для исполнения всеми учреждениями, предприятиями, организациями, должностными лицами и гражданами.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-71", "number": "71", "title": "Право потерпевшего на участие в уголовном преследовании.", "content": "Статья 71. Право потерпевшего на участие в уголовном преследовании.\n\nч. 1. Потерпевший и представитель вправе участвовать в уголовном преследовании обвиняемого.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-72", "number": "72", "title": "Поводы и основание для возбуждения дела.", "content": "Статья 72. Поводы и основание для возбуждения дела.\n\nч. 1. Поводами для возбуждения дела служат:\n\n1) заявление о правонарушении;\n2) явка с повинной;\n3) сообщение о совершенном или готовящемся правонарушении, полученное из иных источников;\n4) непосредственное обнаружение должностными лицами, уполномоченными для проведения проверки и расследования, данных, указывающих на наличие события правонарушения.\n\nч. 2. Основанием для возбуждения дела является наличие достаточных данных, указывающих на признаки правонарушения.\n\nч. 3. Сотрудники правоохранительных органов обязаны принять, проверить сообщение либо собственную информацию, полученную в ходе осуществления своей служебной деятельности, о любом совершенном, совершаемом или готовящемся правонарушении. При проверке вышеуказанные сотрудники вправе получать объяснения, образцы для сравнительного исследования, истребовать документы, вещественные доказательства и предметы, изымать их в порядке, установленном настоящим Кодексом, назначать судебную экспертизу, принимать участие в ее производстве и получать заключение эксперта в разумный срок, производить осмотр места происшествия, документов, предметов, трупов, освидетельствование, требовать производства документальных проверок, ревизий, исследований документов, предметов, трупов, привлекать к участию в этих действиях специалистов, давать правоохранительным органам обязательное для исполнения письменное поручение о проведении оперативно-розыскных мероприятий.\n\nч. 4. Дело считается возбужденным с момента:\n\n1) фиксации правонарушения сотрудником силовых государственных структур или правоохранительных органов, в том числе сотрудником прокуратуры;\n2) вынесения постановления о возбуждении дела.\n\nч. 4.1. При ведении дела с письменной отчетностью в порядке ст. 50 настоящего Кодекса, его возбуждение производится в соответствии с п. 2 ч. 4 настоящей статьи.\n\nч. 5. Принятие и проверка сообщений либо информации о любом совершенном, совершаемом или готовящемся правонарушении производится как до возбуждения дела, так и в рамках возбужденного дела, в зависимости от отсутствия либо наличия признаков состава правонарушения соответственно.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-73", "number": "73", "title": "Основания отказа в возбуждении дела или прекращения дела", "content": "Статья 73. Основания отказа в возбуждении дела или прекращения дела\n\nч. 1. Дело не может быть возбуждено, а возбужденное дело подлежит прекращению по следующим основаниям:\n\n1) отсутствие события правонарушения;\n2) отсутствие в деянии состава правонарушения;\n3) истечение сроков давности уголовного или административного преследования;\n4) отсутствие заявления потерпевшего, если дело может быть возбуждено не иначе как по его заявлению;\n\nч. 2. Дело подлежит прекращению по основанию, предусмотренному пунктом 2 части первой настоящей статьи, в случае, когда до вступления приговора в законную силу противоправность и наказуемость этого деяния были устранены новым законом.\n\nч. 3. Прекращение дела влечет за собой одновременно прекращение уголовного или административного преследования.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-74", "number": "74", "title": "Решения, принимаемые по результатам рассмотрения (проверки) сообщения либо собственной информации, полученной в ходе ...", "content": "Статья 74. Решения, принимаемые по результатам рассмотрения (проверки) сообщения либо собственной информации, полученной в ходе осуществления служебной деятельности, о правонарушении\n\nч. 1. По результатам рассмотрения (проверки) сообщения либо собственной информации, полученной в ходе осуществления служебной деятельности, о любом совершенном, совершаемом или готовящемся правонарушении сотрудник правоохранительных органов или иное уполномоченное лицо принимает одно из следующих решений:\n\n1) о возбуждении дела при наличии поводов и оснований, предусмотренных ст. 72 настоящего Кодекса;\n2) об отказе в возбуждении дела по основаниям, предусмотренным ст. 73 настоящего Кодекса;\n3) о передаче сообщения или иных данных по подследственности в порядке, предусмотренном законодательством.\n\nч. 2. О принятом решении в кратчайшие сроки (не более 24-х часов) сотрудник правоохранительных органов сообщает заявителю. При этом заявителю разъясняются его право обжаловать данное решение и порядок обжалования.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "proc-75", "number": "75", "title": "Виды уголовного преследования", "content": "Статья 75. Виды уголовного преследования\n\nч. 1. В зависимости от характера и тяжести совершенного преступления уголовное преследование, включая обвинение в суде, осуществляется в публичном, частно-публичном и частном порядке.\n\nч. 2. Уголовные дела о преступлениях, предусмотренных статьей 6.6 Уголовного кодекса штата Сан-Андреас, считаются уголовными делами частного обвинения, возбуждаются не иначе как по заявлению потерпевшего, его законного предста
