<style>

  :root { --bg:#0d0d0f; --surface:#16161a; --surface2:#1e1e24; --border:#2a2a34; --accent:#c8a84b; --red:#c0392b; --text:#e8e6e0; --text-dim:#8a8880; --text-muted:#555350; }

  header { background:var(--surface); border-bottom:2px solid var(--accent); padding:0 1.5rem; display:flex; align-items:center; gap:1.5rem; height:60px; position:sticky; top:0; z-index:100; }
  .logo { font-family:"Oswald",sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:0.08em; color:var(--accent); text-transform:uppercase; white-space:nowrap; }

  .search-wrap input { flex:1; background:var(--bg); border:1.5px solid var(--border); border-right:none; color:var(--text); font-family:"Source Sans 3",sans-serif; font-size:0.97rem; padding:0.5rem 1rem; outline:none; transition:border-color 0.2s; border-radius:4px 0 0 4px; }

  .search-wrap input::placeholder { color:var(--text-muted); }
  .search-wrap button { background:var(--accent); border:none; color:#0d0d0f; font-family:"Oswald",sans-serif; font-weight:600; font-size:0.9rem; padding:0 1.2rem; cursor:pointer; border-radius:0 4px 4px 0; }
  .search-wrap button:hover { background:#e0bc5a; }

  .tabs { background:var(--surface); border-bottom:1px solid var(--border); display:flex; padding:0 1.5rem; overflow-x:auto; }
  .tab { display:flex; align-items:center; gap:0.5rem; padding:0.75rem 1rem; cursor:pointer; white-space:nowrap; font-size:0.78rem; color:var(--text-dim); border:none; background:none; border-bottom:3px solid transparent; transition:color 0.2s,border-color 0.2s; font-family:"Oswald",sans-serif; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; }
  .tab:hover { color:var(--text); }

  .main { max-width:1060px; margin:0 auto; padding:1.5rem; }

  .badge.regional { border-color:#4a6a3a; color:#7db96a; }

  .card-wrap:hover .popup, .card-wrap.pinned .popup { display:block; }
  .popup::-webkit-scrollbar { width:5px; }

  .empty { text-align:center; padding:3rem 2rem; color:var(--text-muted); }

  .tabs-wrapper{background:var(--surface);border-bottom:1px solid var(--border);}
  .tabs-row{display:flex;align-items:stretch;flex-wrap:wrap;}
  .tabs{background:transparent;border-bottom:none;display:flex;flex-wrap:wrap;padding:0 0 0 1.5rem;flex:1;}
  .tgwrap{position:relative;margin-left:auto;}
  .tgbtn{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.2rem;cursor:pointer;white-space:nowrap;font-size:.78rem;border:none;background:none;border-bottom:3px solid var(--accent);color:var(--accent);font-family:"Oswald",sans-serif;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
  .tgbtn:hover{color:#fff;}
  .tgarrow{font-size:.6rem;transition:transform .2s;display:inline-block;}
  .tgarrow.open{transform:rotate(180deg);}
  .tgmenu{display:none;position:absolute;top:100%;right:0;z-index:400;background:#13131a;border:1px solid var(--accent);border-top:2px solid var(--accent);min-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.85);max-height:75vh;overflow-y:auto;}
  .tgmenu.open{display:block;}
  .tgmenu button{display:block;width:100%;text-align:left;color:var(--text-dim);font-family:"Source Sans 3",sans-serif;font-size:.88rem;padding:.65rem 1.2rem;background:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s,color .15s;}
  .tgmenu button:last-child{border-bottom:none;}
  .tgmenu button:hover,.tgmenu button.tgactive{background:var(--surface2);color:var(--accent);}
  .tgmenu button::before{content:"→ ";color:var(--accent);font-size:.75rem;}

  banks2: { title:"Правила ограбления банков", icon:"🏦", color:"#5b9bd5", type:"rule" },
  biz2: { title:"Правила ограбления бизнесов", icon:"🏪", color:"#70c878", type:"rule" },

  zones: { title:"Правила игровых зон", icon:"🗺️", color:"#3498db", type:"rule" },
  martial: { title:"Правила военного положения", icon:"⚔️", color:"#e74c3c", type:"rule" },
  leaders: { title:"Правила для лидеров фракций", icon:"👑", color:"#f1c40f", type:"rule" },
  terror: { title:"Правила захватов / терактов", icon:"💣", color:"#e74c3c", type:"rule" },
  forum: { title:"Правила форума", icon:"💬", color:"#95a5a6", type:"rule" },
  cheat: { title:"Правила проверки на стороннее ПО", icon:"🖥️", color:"#7f8c8d", type:"rule" },
  admins: { title:"Правила и обязанности администраторов", icon:"🛡️", color:"#c8a84b", type:"rule" },
};

const DATA = {"uk": [{"id": "1.", "number": "1.", "title": "Уголовное законодательство Штата Сан-Андреас", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1. Уголовное законодательство Штата Сан-Андреас\n\nч. 1 Уголовное законодательство Штата Сан-Андреас состоит из настоящего Кодекса. Новые законы, предусматривающие уголовную ответственность, подлежат включению в настоящий Кодекс.\n\nч. 2 Настоящий Кодекс основывается на Конституции Штата Сан-Андреас и общепризнанных принципах и нормах международного права.", "type": "article"}, {"id": "1.1", "number": "1.1", "title": "Задачи Уголовного кодекса Штата Сан-Андреас", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.1 Задачи Уголовного кодекса Штата Сан-Андреас\n\nч. 1 Задачами настоящего Кодекса являются: охрана прав и свобод человека и гражданина, собственности, общественного порядка и общественной безопасности, окружающей среды, конституционного строя Штата Сан-Андреас от преступных посягательств, обеспечение мира и безопасности человечества, а также предупреждение преступлений.\n\nч. 2 Для осуществления этих задач настоящий Кодекс устанавливает основание и принципы уголовной ответственности, определяет, какие опасные для личности, общества или государства деяния признаются преступлениями, и устанавливает виды наказаний и иные меры уголовно-правового характера за совершение преступлений.", "type": "article"}, {"id": "1.2", "number": "1.2", "title": "Принцип законности", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.2 Принцип законности\n\nч. 1 Преступность деяния, а также его наказуемость и иные уголовно-правовые последствия определяются только настоящим Кодексом.\n\nч. 2 Применение уголовного закона по аналогии не допускается.", "type": "article"}, {"id": "1.3", "number": "1.3", "title": "Принцип равенства граждан перед законом.", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.3 Принцип равенства граждан перед законом.\n\nч. 1 Лица, совершившие преступления, равны перед законом и подлежат уголовной ответственности независимо от пола, расы, национальности, языка, происхождения, имущественного и должностного положения, места жительства, отношения к религии, убеждений, принадлежности к общественным объединениям, а также других обстоятельств.", "type": "article"}, {"id": "1.4", "number": "1.4", "title": "Принцип вины", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.4 Принцип вины\n\nч. 1 Лицо подлежит уголовной ответственности только за те общественно опасные действия (бездействие) и наступившие общественно опасные последствия, в отношении которых установлена его вина.\n\nч. 2 Объективное вменение, то есть уголовная ответственность за невиновное причинение вреда, не допускается.", "type": "article"}, {"id": "1.5", "number": "1.5", "title": "Принцип справедливости", "stars": "", "stars_count": 0, "category": "", "punishment": "и иные меры уголовно-правового характера, применяемые к лицу, совершившему преступление, должны быть справедливыми, то есть соответствовать характеру и степени общественной опасности преступления, обстоятельствам его совершения и личности виновного.​ ​", "content": "Статья 1.5 Принцип справедливости\n\nч. 1 Наказание и иные меры уголовно-правового характера, применяемые к лицу, совершившему преступление, должны быть справедливыми, то есть соответствовать характеру и степени общественной опасности преступления, обстоятельствам его совершения и личности виновного.\n\nч. 2 Никто не может нести уголовную ответственность дважды за одно и то же преступление.", "type": "article"}, {"id": "1.6", "number": "1.6", "title": "Принцип гуманизма", "stars": "", "stars_count": 0, "category": "", "punishment": "и иные меры уголовно-правового характера, применяемые к лицу, совершившему преступление, не могут иметь своей целью причинение физических страданий или унижение человеческого достоинства.​", "content": "Статья 1.6 Принцип гуманизма\n\nч. 1 Уголовное законодательство Штата San Andreas обеспечивает безопасность человека.\n\nч. 2 Наказание и иные меры уголовно-правового характера, применяемые к лицу, совершившему преступление, не могут иметь своей целью причинение физических страданий или унижение человеческого достоинства.", "type": "article"}, {"id": "1.7", "number": "1.7", "title": "Основание уголовной ответственности", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.7 Основание уголовной ответственности\n\nч. 1 Основанием уголовной ответственности является совершение деяния, содержащего все признаки состава преступления, предусмотренного настоящим Кодексом.", "type": "article"}, {"id": "1.8", "number": "1.8", "title": "Состав преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.8 Состав преступления\n\nч. 1 Состав преступления представляет собой совокупность объективных и субъективных признаков, которые в сумме определяют общественно опасное деяние как преступление. Признаки состава преступления закрепляются в нормах действующего законодательства. Их можно условно разделить на четыре подсистемы: признаки объекта, субъекта, объективной и субъективной стороны преступления.\n\nПризнак объекта - уголовно-правовая категория, которая используется для обозначения общественных порядков, которым причиняется ущерб вследствие совершения преступления\nПризнак субъекта - лицо, осуществляющее воздействие на объект уголовно-правовой охраны и способное нести за это ответственность.\nПризнак объективной стороны преступления - один из элементов состава преступления, включающий в себя признаки, характеризующие внешнее проявление преступления в реальной действительности, доступное для наблюдения и изучения.\nПризнак субъективной стороны преступления - это внутреннее психическое отношение лица к совершаемому им общественно опасному деянию.\nПримечание: Наличие в деянии всех признаков некоего состава преступления является основанием для признания его преступным; отсутствие хотя бы одного из них означает, что отсутствует и состав преступления в целом, а деяние при этом признается не преступным и не противоправным в том числе.\n\nч. 2 Виды составов преступления. Настоящим кодексом выделяется 3 вида состава преступления.\n\nа) Материальные составы - составы преступления, объективная сторона которых включает в себя наличие общественно опасных последствий.\nб) Формальные составы – составы преступления, объективная сторона которых включает только признаки, характеризующие общественно опасные деяния и не предусматривает наличие общественно опасных последствий.\nб.1) Усеченные составы - составы преступления, в которых момент их окончания перенесен на более раннюю стадию.\nПример: Покушение на совершение преступления, приготовление к преступлению.", "type": "article"}, {"id": "1.9", "number": "1.9", "title": "Судимость", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.9 Судимость\n\nч. 1 Судимость - правовой статус лица, обусловленный фактом осуждения и назначения ему наказания за совершенное преступление и влекущее при повторном совершении этим лицом преступления установленные уголовным законодательством правовые последствия. \n\nч. 2 Лицо, которому назначена мера наказания за совершение преступления, считается судимым со дня назначения наказания до момента погашения или снятия судимости в порядке, установленном Конституцией и законами штата.\n\nч. 3 При назначении меры наказания в виде уголовного штрафа, судимость у лица, которому была назначена такая мера, не возникает.\n\nч. 4 Правовое состояние судимости запрещает лицу находится на государственной службе.", "type": "article"}, {"id": "1.10", "number": "1.10", "title": "Действие уголовного закона во времени", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.10 Действие уголовного закона во времени\n\nч. 1. Преступность и наказуемость деяния определяются уголовным законом, действовавшим во время совершения этого деяния. \n\nч. 2. Временем совершения преступления признается время совершения общественно опасного действия (бездействия) независимо от времени наступления последствий.", "type": "article"}, {"id": "1.11", "number": "1.11", "title": "Обратная сила уголовного закона.", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 1.11 Обратная сила уголовного закона.\n\nч. 1. Уголовный закон, устраняющий преступность деяния, смягчающий наказание или иным образом улучшающий положение лица, совершившего преступление, имеет обратную силу, то есть распространяется на лиц, совершивших соответствующие деяния до вступления такого закона в силу, в том числе на лиц, отбывающих наказание или отбывших наказание, но имеющих судимость. Уголовный закон, устанавливающий преступность деяния, усиливающий наказание или иным образом ухудшающий положение лица, обратной силы не имеет. \n\nч. 2. Если новый уголовный закон смягчает наказание за деяние, которое отбывается лицом, то это наказание подлежит сокращению в пределах, предусмотренных новым уголовным законом.\n\n\nРАЗДЕЛ II. Преступление\nГЛАВА II. Понятие преступления, виды преступлений и вина", "type": "article"}, {"id": "2.", "number": "2.", "title": "Понятие преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2. Понятие преступления\n\nч. 1 Преступлением признается виновно совершенное общественно опасное деяние, запрещенное настоящим Кодексом под угрозой наказания.\n\nч. 2 Не является преступлением действие (бездействие), хотя формально и содержащее признаки какого-либо деяния, предусмотренного настоящим Кодексом, но в силу малозначительности не представляющее общественной опасности.", "type": "article"}, {"id": "2.1", "number": "2.1", "title": "Рецидив преступлений", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2.1 Рецидив преступлений\n\nч. 1 Рецидивом преступлений признается совершение умышленного преступления лицом, имеющим судимость за ранее совершенное умышленное преступление.\n\nч. 2 Рецидив преступлений влечет более строгое наказание на основании и в пределах, предусмотренных настоящим Кодексом, а также иные последствия, предусмотренные законодательством Штата Сан-Андреас.", "type": "article"}, {"id": "2.2", "number": "2.2", "title": "Формы вины", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2.2 Формы вины\n\nч. 1 Виновным в преступлении признается лицо, совершившее деяние умышленно или по неосторожности.\n\nч. 2 Деяние, совершенное только по неосторожности, признается преступлением лишь в случае, когда это специально предусмотрено статьей настоящего Кодекса.", "type": "article"}, {"id": "2.3", "number": "2.3", "title": "Преступление, совершенное умышленно", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2.3 Преступление, совершенное умышленно\n\nч. 1 Преступлением, совершенным умышленно, признается деяние, совершенное с прямым или косвенным умыслом.\n\nч. 2 Преступление признается совершенным с прямым умыслом, если лицо осознавало общественную опасность своих действий (бездействия), предвидело возможность или неизбежность наступления общественно опасных последствий и желало их наступления.\n\nч. 3 Преступление признается совершенным с косвенным умыслом, если лицо осознавало общественную опасность своих действий (бездействия), предвидело возможность наступления общественно опасных последствий, не желало, но сознательно допускало эти последствия либо относилось к ним безразлично.", "type": "article"}, {"id": "2.4", "number": "2.4", "title": "Преступление, совершенное по неосторожности", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2.4 Преступление, совершенное по неосторожности\n\nч. 1 Преступлением, совершенным по неосторожности, признается деяние, совершенное по легкомыслию или небрежности.\n\nч. 2 Преступление признается совершенным по легкомыслию, если лицо предвидело возможность наступления общественно опасных последствий своих действий (бездействия), но без достаточных к тому оснований самонадеянно рассчитывало на предотвращение этих последствий.\n\nч. 3 Преступление признается совершенным по небрежности, если лицо не предвидело возможности наступления общественно опасных последствий своих действий (бездействия), хотя при необходимой внимательности и предусмотрительности должно было и могло предвидеть эти последствия.", "type": "article"}, {"id": "2.5", "number": "2.5", "title": "Невиновное причинение вреда", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2.5 Невиновное причинение вреда\n\nч. 1 Деяние признается совершенным невиновно, если лицо, его совершившее, не осознавало и по обстоятельствам дела не могло осознавать общественной опасности своих действий (бездействия) либо не предвидело возможности наступления общественно опасных последствий и по обстоятельствам дела не должно было или не могло их предвидеть.\n\nч. 2 Деяние признается также совершенным невиновно, если лицо, его совершившее, хотя и предвидело возможность наступления общественно опасных последствий своих действий (бездействия), но не могло предотвратить эти последствия в силу несоответствия своих психофизиологических качеств требованиям экстремальных условий или нервно-психическим перегрузкам.", "type": "article"}, {"id": "2.6", "number": "2.6", "title": "Ответственность за преступление, совершенное с двумя формами вины", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 2.6 Ответственность за преступление, совершенное с двумя формами вины\n\nч. 1 Если в результате совершения умышленного преступления причиняются тяжкие последствия, которые по закону влекут более строгое наказание и которые не охватывались умыслом лица, уголовная ответственность за такие последствия наступает только в случае, если лицо предвидело возможность их наступления, но без достаточных к тому оснований самонадеянно рассчитывало на их предотвращение, или в случае, если лицо не предвидело, но должно было и могло предвидеть возможность наступления этих последствий. В целом такое преступление признается совершенным умышленно.\n\n\nГЛАВА III. Неоконченное преступление и соучастие в преступлении", "type": "article"}, {"id": "3.", "number": "3.", "title": "Оконченное и неоконченное преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3. Оконченное и неоконченное преступления\n\nч. 1 Преступление признается оконченным, если в совершенном лицом деянии содержатся все признаки состава преступления, предусмотренного настоящим Кодексом.\n\nч. 2 Неоконченным преступлением признаются приготовление к преступлению и покушение на преступление.\n\nч. 3 Уголовная ответственность за неоконченное преступление наступает по статье настоящего Кодекса, предусматривающей ответственность за оконченное преступление, со ссылкой на статью 3.1 настоящего Кодекса.", "type": "article"}, {"id": "3.1", "number": "3.1", "title": "Приготовление к преступлению и покушение на преступление", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.1 Приготовление к преступлению и покушение на преступление\n\nч. 1 Приготовлением к преступлению признаются приискание, изготовление или приспособление лицом средств или орудий совершения преступления, приискание соучастников преступления, сговор на совершение преступления либо иное умышленное создание условий для совершения преступления, если при этом преступление не было доведено до конца по не зависящим от этого лица обстоятельствам.\n\nч. 2 Покушением на преступление признаются умышленные действия (бездействие) лица, непосредственно направленные на совершение преступления, если при этом преступление не было доведено до конца по не зависящим от этого лица обстоятельствам.", "type": "article"}, {"id": "3.2", "number": "3.2", "title": "Добровольный отказ от преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.2 Добровольный отказ от преступления\n\nч. 1 Добровольным отказом от преступления признается прекращение лицом приготовления к преступлению либо прекращение действий (бездействия), непосредственно направленных на совершение преступления, если лицо осознавало возможность доведения преступления до конца.\n\nч. 2 Лицо не подлежит уголовной ответственности за преступление, если оно добровольно и окончательно отказалось от доведения этого преступления до конца.\n\nч. 3 Лицо, добровольно отказавшееся от доведения преступления до конца, подлежит уголовной ответственности в том случае, если фактически совершенное им деяние содержит иной состав преступления.\n\nч. 4 Организатор преступления и подстрекатель к преступлению не подлежат уголовной ответственности, если эти лица своевременным сообщением органам власти или иными предпринятыми мерами предотвратили доведение преступления исполнителем до конца. Пособник преступления не подлежит уголовной ответственности, если он предпринял все зависящие от него меры, чтобы предотвратить совершение преступления.\n\nч. 5 Если действия организатора или подстрекателя, предусмотренные частью четвертой настоящей статьи, не привели к предотвращению совершения преступления исполнителем, то предпринятые ими меры могут быть признаны смягчающими обстоятельствами при назначении наказания.", "type": "article"}, {"id": "3.3", "number": "3.3", "title": "Понятие соучастия в преступлении", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.3 Понятие соучастия в преступлении\n\nч. 1 Соучастием в преступлении признается умышленное совместное участие двух или более лиц в совершении умышленного преступления.", "type": "article"}, {"id": "3.4", "number": "3.4", "title": "Виды соучастников преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.4 Виды соучастников преступления\n\nч. 1 Соучастниками преступления наряду с исполнителем признаются организатор, подстрекатель и пособник.\n\nч. 2 Исполнителем признается лицо, непосредственно совершившее преступление либо непосредственно участвовавшее в его совершении совместно с другими лицами (соисполнителями), а также лицо, совершившее преступление посредством использования других лиц, не подлежащих уголовной ответственности в силу возраста, невменяемости или других обстоятельств, предусмотренных настоящим Кодексом.\n\nч. 3 Организатором признается лицо, организовавшее совершение преступления или руководившее его исполнением, а равно лицо, создавшее организованную группу или преступное сообщество (преступную организацию) либо руководившее ими.\n\nч. 4 Подстрекателем признается лицо, склонившее другое лицо к совершению преступления путем уговора, подкупа, угрозы или другим способом.\n\nч. 5 Пособником признается лицо, содействовавшее совершению преступления советами, указаниями, предоставлением информации, средств или орудий совершения преступления либо устранением препятствий, а также лицо, заранее обещавшее скрыть преступника, средства или орудия совершения преступления, следы преступления либо предметы, добытые преступным путем, а равно лицо, заранее обещавшее приобрести или сбыть такие предметы.", "type": "article"}, {"id": "3.5", "number": "3.5", "title": "Ответственность соучастников преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.5 Ответственность соучастников преступления\n\nч. 1 Ответственность соучастников преступления определяется характером и степенью фактического участия каждого из них в совершении преступления.\n\nч. 2 Соисполнители отвечают по статье Особенной части настоящего Кодекса за преступление, совершенное ими совместно, без ссылки на статью 3.4 настоящего Кодекса.\n\nч. 3 Уголовная ответственность организатора, подстрекателя и пособника наступает по статье, предусматривающей наказание за совершенное преступление, со ссылкой на статью 3.4 настоящего Кодекса, за исключением случаев, когда они одновременно являлись соисполнителями преступления.\n\nч. 4 Лицо, не являющееся субъектом преступления, специально указанным в соответствующей статье Особенной части настоящего Кодекса, участвовавшее в совершении преступления, предусмотренного этой статьей, несет уголовную ответственность за данное преступление в качестве его организатора, подстрекателя либо пособника.\n\nч. 5 В случае недоведения исполнителем преступления до конца по не зависящим от него обстоятельствам остальные соучастники несут уголовную ответственность за приготовление к преступлению или покушение на преступление. За приготовление к преступлению несет уголовную ответственность также лицо, которому по не зависящим от него обстоятельствам не удалось склонить других лиц к совершению преступления.", "type": "article"}, {"id": "3.6", "number": "3.6", "title": "Совершение преступления группой лиц, группой лиц по предварительному сговору, организованной группой или преступным сообществом (преступной организацией)", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.6 Совершение преступления группой лиц, группой лиц по предварительному сговору, организованной группой или преступным сообществом (преступной организацией)\n\nч. 1 Преступление признается совершенным группой лиц, если в его совершении совместно участвовали два или более исполнителя без предварительного сговора.\n\nч. 2 Преступление признается совершенным группой лиц по предварительному сговору, если в нем участвовали лица, заранее договорившиеся о совместном совершении преступления.\n\nч. 3 Преступление признается совершенным организованной группой, если оно совершено устойчивой группой лиц, заранее объединившихся для совершения одного или нескольких преступлений.\n\nч. 4 Преступление признается совершенным преступным сообществом (преступной организацией), если оно совершено структурированной организованной группой или объединением организованных групп, действующих под единым руководством, члены которых объединены в целях совместного совершения одного или нескольких тяжких либо особо тяжких преступлений для получения прямо или косвенно финансовой или иной материальной выгоды.\n\nч. 5 Лицо, создавшее организованную группу или преступное сообщество (преступную организацию) либо руководившее ими, подлежит уголовной ответственности за их организацию и руководство ими в случаях, предусмотренных статьями 12.12, 12.5 настоящего Кодекса, а также за все совершенные организованной группой или преступным сообществом (преступной организацией) преступления, если они охватывались его умыслом. Другие участники организованной группы или преступного сообщества (преступной организации) несут уголовную ответственность за участие в них в случаях, предусмотренных статьями 12.12, 12.5 настоящего Кодекса, а также за преступления, в подготовке или совершении которых они участвовали.\n\nч. 6 Создание организованной группы в случаях, не предусмотренных статьями Особенной части настоящего Кодекса, влечет уголовную ответственность за приготовление к тем преступлениям, для совершения которых она создана.\n\nч. 7 Совершение преступления группой лиц, группой лиц по предварительному сговору, организованной группой или преступным сообществом (преступной организацией) влечет более строгое наказание на основании и в пределах, предусмотренных настоящим Кодексом.", "type": "article"}, {"id": "3.7", "number": "3.7", "title": "Эксцесс исполнителя преступления", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 3.7 Эксцесс исполнителя преступления\n\nч. 1 Эксцессом исполнителя признается совершение исполнителем преступления, не охватывающегося умыслом других соучастников. За эксцесс исполнителя другие соучастники преступления уголовной ответственности не подлежат.\n\n\nГЛАВА IV. Обстоятельства, исключающие преступность деяния", "type": "article"}, {"id": "4.", "number": "4.", "title": "Необходимая оборона", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 4. Необходимая оборона\n\nч. 1 Не является преступлением причинение вреда посягающему лицу в состоянии необходимой обороны, то есть при защите личности и прав обороняющегося или других лиц, охраняемых законом интересов общества или государства от общественно опасного посягательства, если это посягательство было сопряжено с насилием, опасным для жизни обороняющегося или другого лица, либо с непосредственной угрозой применения такого насилия.\n\nч. 2 Защита от посягательства, не сопряженного с насилием, опасным для жизни обороняющегося или другого лица, либо с непосредственной угрозой применения такого насилия, является правомерной, если при этом не было допущено превышения пределов необходимой обороны, то есть умышленных действий, явно не соответствующих характеру и опасности посягательства.\n\nч. 2.1 Не являются превышением пределов необходимой обороны действия обороняющегося лица, если это лицо вследствие неожиданности посягательства не могло объективно оценить степень и характер опасности нападения.\n\nч. 2.2 Не являются превышением пределов необходимой обороны действия лица, направленные на защиту себя и своей семьи от насилия или угрозы применения насилия либо на защиту своего имущества против лица, незаконно проникшего в его жилище.\n\nч. 3 Положения настоящей статьи в равной мере распространяются на всех лиц независимо от их профессиональной или иной специальной подготовки и служебного положения, а также независимо от возможности избежать общественно опасного посягательства или обратиться за помощью к другим лицам или органам власти.", "type": "article"}, {"id": "4.1", "number": "4.1", "title": "Причинение вреда при задержании лица, совершившего преступление", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 4.1 Причинение вреда при задержании лица, совершившего преступление\n\nч. 1 Не является преступлением причинение вреда лицу, совершившему преступление, при его задержании для доставления органам власти и пресечения возможности совершения им новых преступлений, если иными средствами задержать такое лицо не представлялось возможным и при этом не было допущено превышения необходимых для этого мер.\n\nч. 2 Превышением мер, необходимых для задержания лица, совершившего преступление, признается их явное несоответствие характеру и степени общественной опасности совершенного задерживаемым лицом преступления и обстоятельствам задержания, когда лицу без необходимости причиняется явно чрезмерный, не вызываемый обстановкой вред. Такое превышение влечет за собой уголовную ответственность только в случаях умышленного причинения вреда.", "type": "article"}, {"id": "4.2", "number": "4.2", "title": "Крайняя необходимость", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 4.2 Крайняя необходимость\n\nч. 1 Не является преступлением причинение вреда охраняемым уголовным законом интересам в состоянии крайней необходимости, то есть для устранения опасности, непосредственно угрожающей личности и правам данного лица или иных лиц, охраняемым законом интересам общества или государства, если эта опасность не могла быть устранена иными средствами и при этом не было допущено превышения пределов крайней необходимости.\n\nч. 2 Превышением пределов крайней необходимости признается причинение вреда, явно не соответствующего характеру и степени угрожавшей опасности и обстоятельствам, при которых опасность устранялась, когда указанным интересам был причинен вред равный или более значительный, чем предотвращенный. Такое превышение влечет за собой уголовную ответственность только в случаях умышленного причинения вреда.", "type": "article"}, {"id": "4.3", "number": "4.3", "title": "Обоснованный риск", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 4.3 Обоснованный риск\n\nч. 1 Не является преступлением причинение вреда охраняемым уголовным законом интересам при обоснованном риске для достижения общественно полезной цели.\n\nч. 2 Риск признается обоснованным, если указанная цель не могла быть достигнута не связанными с риском действиями (бездействием) и лицо, допустившее риск, предприняло достаточные меры для предотвращения вреда охраняемым уголовным законом интересам.\n\nч. 3 Риск не признается обоснованным, если он заведомо был сопряжен с угрозой для жизни многих людей, с угрозой экологической катастрофы или общественного бедствия.", "type": "article"}, {"id": "4.4", "number": "4.4", "title": "Исполнение приказа или распоряжения", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 4.4 Исполнение приказа или распоряжения\n\nч. 1. Не является преступлением причинение вреда охраняемым уголовным законом интересам лицом, действующим во исполнение обязательных для него приказа или распоряжения. Уголовную ответственность за причинение такого вреда несет лицо, отдавшее незаконные приказ или распоряжение.\n\nч. 2. Лицо, совершившее умышленное преступление во исполнение заведомо незаконных приказа или распоряжения, несет уголовную ответственность на общих основаниях. Неисполнение заведомо незаконных приказа или распоряжения исключает уголовную ответственность.", "type": "article"}, {"id": "4.5", "number": "4.5", "title": "Физическое или психическое принуждение", "stars": "", "stars_count": 0, "category": "", "punishment": "ГЛАВА V. Виды и назначение наказаний, освобождение от уголовной ответственности​", "content": "Статья 4.5 Физическое или психическое принуждение\n\nч 1. Не является преступлением причинение вреда охраняемым уголовным законом интересам в результате физического принуждения, если вследствие такого принуждения лицо не могло руководить своими действиями (бездействием).\n\nч 2. Вопрос об уголовной ответственности за причинение вреда охраняемым уголовным законом интересам в результате психического принуждения, а также в результате физического принуждения, вследствие которого лицо сохранило возможность руководить своими действиями, решается с учетом положений статьи 4.2 настоящего Кодекса.\n\n\nРАЗДЕЛ III. Наказание\nГЛАВА V. Виды и назначение наказаний, освобождение от уголовной ответственности", "type": "article"}, {"id": "5.", "number": "5.", "title": "Виды наказаний", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5. Виды наказаний\n\nч. 1 Видами наказаний являются:\n\nа) Судебный штраф;\nб) Уголовный штраф;\nв) Лишение права занимать определенные должности или заниматься определенной деятельностью;\nг) Увольнение с государственной или военной службы, в том числе с лишением всех званий, наград и привилегий;\nд) Лишение свободы на определенный срок;\nе) Исправительные работы;\nё) Принудительные работы.\n\nч. 2 В результате судебного процесса по уголовному делу могут быть назначены следующие виды наказаний:\n\nа) Судебный штраф;\nб) Уголовный штраф;\nв) Лишение права занимать определенные должности или заниматься определенной деятельностью;\nг) Увольнение с государственной или военной службы, в том числе с лишением всех званий, наград и привилегий;\nд) Лишение свободы на определенный срок;\nе) Исправительные работы;\nё) Принудительные работы.\n\nч. 3 Судебные штрафы, предусмотренные статьями настоящего Кодекса, применяются исключительно в судебном порядке. Уголовные штрафы, предусмотренные статьями настоящего Кодекса, применяются исключительно сотрудниками Департамента Полиции города Лос-Сантос, Департамента Шерифа округа Блэйн и Секретной Службы, Федеральное Расследовательское Бюро, а также Офисом Генерального Прокурора и судом.\n\nч. 4 В результате расследования правоохранительными органами по уголовным статьям может быть назначено только лишение свободы на определенный срок и уголовный штраф.", "type": "article"}, {"id": "5.1", "number": "5.1", "title": "Исправительные работы", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.1 Исправительные работы\n\nч. 1 Исправительные работы назначаются осужденному, имеющему основное место работы, а равно не имеющему его. Осужденный, имеющий основное место работы, отбывает исправительные работы по основному месту работы. Осужденный, не имеющий основного места работы, отбывает исправительные работы в местах, определяемых Судом.\n\nч. 2 Срок исправительных работ устанавливается приговором суда.\n\nч. 3 В случае злостного уклонения осужденного от отбывания исправительных работ суд может заменить неотбытое наказание принудительными работами или лишением свободы.", "type": "article"}, {"id": "5.1.2", "number": "5.1.2", "title": "Принудительные работы", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.1.2 Принудительные работы\n\nч. 1 Принудительные работы применяются как альтернатива лишению свободы.\n\nч. 2 Если, назначив наказание в виде лишения свободы, суд придет к выводу о возможности исправления осужденного без реального отбывания наказания в местах лишения свободы, он постановляет заменить осужденному наказание в виде лишения свободы принудительными работами.\n\nч. 3 Принудительные работы заключаются в привлечении осужденного к труду в местах, определяемых судом.\n\nч. 4 Срок принудительных работ устанавливается приговором суда.\n\nч. 5 В случае уклонения осужденного от отбывания принудительных работ либо признания осужденного к принудительным работам злостным нарушителем порядка и условий отбывания принудительных работ неотбытая часть наказания заменяется лишением свободы.\n\nч. 6 Места, порядок и иные условия отбывания принудительных работ определяется Судом.", "type": "article"}, {"id": "5.2", "number": "5.2", "title": "Общие начала назначения наказания", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.2 Общие начала назначения наказания\n\nч. 1 Лицу, признанному виновным в совершении преступления, назначается справедливое наказание в пределах, предусмотренных соответствующей статьей Особенной части настоящего Кодекса, и с учетом положений Общей части настоящего Кодекса.\n\nч. 1.2 По решению суда или ордеру Офиса Генерального Прокурора лицу за совершение любого преступления, указанного в ч. 2 ст. 5.7 настоящего Кодекса, назначается справедливое наказание в пределах от минимальной санкции, предусмотренной применяемой нормой Особенной части настоящего Кодекса, и до 10 лет лишения свободы.\n\nч. 2 При назначении наказания учитываются характер и степень общественной опасности преступления и личность виновного, в том числе обстоятельства, смягчающие и отягчающие наказание.\n\nч. 3 При совокупности преступлений наказание назначается в пределах той статьи, которая предусматривает наиболее строгое наказание. При этом, суд и Офис Генерального Прокурора на основании ордера может назначить наказание отдельно за каждое совершенное преступление путем их полного или частичного сложения.", "type": "article"}, {"id": "5.2.1", "number": "5.2.1", "title": "Назначение наказания за неоконченное преступление", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.2.1 Назначение наказания за неоконченное преступление\n\nч. 1 При назначении наказания за неоконченное преступление учитываются обстоятельства, в силу которых преступление не было доведено до конца.\n\nч. 2 Срок или размер наказания за приготовление к преступлению не может превышать половины максимального срока или размера наиболее строгого вида наказания, предусмотренного соответствующей статьей Особенной части настоящего Кодекса за оконченное преступление.\n\nч. 3 Срок или размер наказания за покушение на преступление не может превышать трех четвертей максимального срока или размера наиболее строгого вида наказания, предусмотренного соответствующей статьей Особенной части настоящего Кодекса за оконченное преступление.", "type": "article"}, {"id": "5.3", "number": "5.3", "title": "Обстоятельства, смягчающие наказание", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.3 Обстоятельства, смягчающие наказание\n\nч. 1 Смягчающими обстоятельствами признаются:\n\nа) совершение преступления в результате физического или психического принуждения либо в силу материальной, служебной или иной зависимости;\nб) совершение преступления при нарушении условий правомерности необходимой обороны, задержания лица, совершившего преступление, крайней необходимости, обоснованного риска, исполнения приказа или распоряжения;\nв) противоправность или аморальность поведения потерпевшего, явившегося поводом для преступления;\nг) явка с повинной, активное способствование раскрытию и расследованию преступления, изобличению и уголовному преследованию других соучастников преступления;\nд) оказание медицинской и иной помощи потерпевшему после совершения преступления, добровольное возмещение имущественного ущерба и морального вреда, причиненных в результате преступления, иные действия, направленные на заглаживание вреда, причиненного потерпевшему;\nе) иные обстоятельства.", "type": "article"}, {"id": "5.4", "number": "5.4", "title": "Обстоятельства, отягчающие наказание", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.4 Обстоятельства, отягчающие наказание\n\nч. 1 Отягчающими обстоятельствами признаются:\n\nа) совершение преступления в составе группы лиц;\nб) совершение преступления по мотивам политической, идеологической, расовой, национальной или религиозной ненависти, или вражды либо по мотивам ненависти или вражды в отношении какой-либо социальной группы;\nв) совершение преступления из мести за правомерные действия других лиц, а также с целью скрыть другое преступление или облегчить его совершение;\nг) совершение преступления в отношении лица или его близких в связи с осуществлением данным лицом служебной деятельности или выполнением общественного долга;\nд) совершение преступления с особой жестокостью, садизмом, издевательством, а также мучениями для потерпевшего;\nе) совершение преступления с использованием доверия, оказанного виновному в силу его служебного положения или договора;\nё) совершение преступления с использованием форменной одежды или документов представителя власти;\nж) совершение преступления в состоянии алкогольного или наркотического опьянения;\nз) совершение преступления с использованием психического давления на потерпевшего;\nи) рецидивизм;\nй) совершение преступления в отношении потерпевшего, находящегося в отношении виновного в заведомо беспомощном положении.", "type": "article"}, {"id": "5.5", "number": "5.5", "title": "Назначение более мягкого наказания, чем предусмотрено за данное преступление", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.5 Назначение более мягкого наказания, чем предусмотрено за данное преступление\n\nч. 1 При наличии исключительных обстоятельств, связанных с целями и мотивами преступления, ролью виновного, его поведением во время или после совершения преступления, и других обстоятельств, существенно уменьшающих степень общественной опасности преступления, а равно при активном содействии участника группового преступления раскрытию этого преступления наказание может быть назначено ниже низшего предела, предусмотренного статьей Особенной части настоящего Кодекса, или суд может назначить более мягкий вид наказания, чем предусмотрен этой статьей, или не применить дополнительный вид наказания, предусмотренный в качестве обязательного.", "type": "article"}, {"id": "5.6", "number": "5.6", "title": "Освобождение от уголовной ответственности в связи с назначением судебного штрафа и (или) исправительных работ. А также в связи с примирением сторон", "stars": "", "stars_count": 0, "category": "", "punishment": "", "content": "Статья 5.6 Освобождение от уголовной ответственности в связи с назначением судебного штрафа и (или) исправительных работ. А также в связи с примирением сторон\n\nч. 1 Лицо, совершившее преступление, предусмотренное статьями: предель  своевременному обнаружению и отражению внезапного нападения на охраняемый объект либо по обеспечению его безопасности,\nНаказание: 3 года лишения свободы или штраф в размере 20.000$.", "type": "article"}, {"id": "18.5", "number": "18.5", "title": "Умышленные уничтожение или повреждение оружия, боеприпасов или предметов военной техники", "stars": "★★★", "stars_count": 3, "category": "Военная", "punishment": "3 года лишения свободы.", "content": "Статья 18.5 ★★★ [Военная] Умышленные уничтожение или повреждение оружия, боеприпасов или предметов военной техники,\nНаказание: 3 года лишения свободы.", "type": "article"}, {"id": "18.5.1", "number": "18.5.1", "title": "Уничтожение или повреждение по неосторожности оружия, боеприпасов или предметов военной техники, повлекшие тяжкие последствия", "stars": "★★★★", "stars_count": 4, "category": "Военная", "punishment": "4 года лишения свободы С созданием записи о судимости. или штраф в размере от 5.000$ до 15.000$.", "content": "Статья 18.5.1 ★★★★ [Военная] Уничтожение или повреждение по неосторожности оружия, боеприпасов или предметов военной техники, повлекшие тяжкие последствия,\nНаказание: 4 года лишения свободы С созданием записи о судимости. или штраф в размере от 5.000$ до 15.000$.", "type": "article"}, {"id": "18.6", "number": "18.6", "title": "Нарушение правил вождения или эксплуатации боевой, специальной или транспортной машины, повлекшее по неосторожности причинение тяжкого вреда здоровью человека", "stars": "★★★★", "stars_count": 4, "category": "Военная", "punishment": "4 года лишения свободы. С созданием записи о судимости.", "content": "Статья 18.6 ★★★★ [Военная]Нарушение правил вождения или эксплуатации боевой, специальной или транспортной машины, повлекшее по неосторожности причинение тяжкого вреда здоровью человека,\nНаказание: 4 года лишения свободы. С созданием записи о судимости.\n\n\nГлава XIX. Преступления против окружающей среды", "type": "article"}, {"id": "19.1", "number": "19.1", "title": "Браконьерст анием беспомощного состояния животного,\nНаказание: 2 года лишения свободы.\n\nч. 2 ★★ Изнасилование крупного рогатого скота, то есть половое сношение с применением насилия или с угрозой его применения к представителям рогатого скота с использованием беспомощного состояния животного,\nНаказание: 2 года лишения свободы.\nч. 3 ★★★ Деяния, предусмотренные частью первой и/или второй настоящей статьи, если они совершены:\nа) совершенное группой лиц, группой лиц по предварительному сговору или организованной группой;\nб) соединенное с угрозой убийством или причинением тяжкого вреда здоровью, а также совершенное с особой жестокостью по отношению к животному;\nв) повлекшее по неосторожности смерть животного,\nНаказание: 3 года лишения свободы.\n\nКОММЕНТАРИИ К УГОЛОВНОМУ КОДЕКСУ ШТАТА САН-АНДРЕАС\n\n\nКомментарий I. Комментарий к статье 12.7 настоящего Кодекса: Приложение к уголовному кодексу штата Сан-Андреас о закрытых и охраняемых территориях\n\nПодписано губернатором штата San Andreas Martin Hasler\n\n\nПоследнее редактирование: 26.05.2026", "type": "article"}], "admin": [{"id": "admin-1.1", "number": "1.1", "title": "Законодательство об административных правонарушениях", "content": "Статья 1.1. Законодательство об административных правонарушениях\n\nч. 1 Законодательство об административных правонарушениях состоит из настоящего Кодекса, Этического Кодекса штата Сан-Андреас и Дорожного Кодекса штата Сан-Андреас.\n\nч. 2 Настоящий Кодекс основывается на Конституции штата Сан-Андреас, общепризнанных принципах и нормах права.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.2", "number": "1.2", "title": "Задачи законодательства об административных правонарушениях", "content": "Статья 1.2. Задачи законодательства об административных правонарушениях\n\nч. 1 Задачами законодательства об административных правонарушениях являются защита личности, охрана прав и свобод человека и гражданина, охрана здоровья граждан, санитарно-эпидемиологического благополучия населения, защита общественной нравственности, охрана окружающей среды, установленного порядка осуществления государственной власти, общественного порядка и общественной безопасности, собственности, защита законных экономических интересов физических и юридических лиц, общества и государства от административных правонарушений, а также предупреждение административных правонарушений.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.3", "number": "1.3", "title": "Административный Кодекс штата Сан-Андреас", "content": "Статья 1.3. Административный Кодекс штата Сан-Андреас\n\nч. 1 Административный Кодекс штата Сан-Андреас - кодифицированный нормативный акт, регулирующий общественные отношения по привлечению к административной ответственности, а также устанавливающий общие начала, перечень всех административных правонарушений (который может быть дополнен на региональном уровне), органы, рассматривающие дела, порядок привлечения к административной ответственности и порядок исполнения решений по административным делам.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.4", "number": "1.4", "title": "Принцип равенства перед законом", "content": "Статья 1.4. Принцип равенства перед законом\n\nч. 1 Лица, совершившие административные правонарушения, равны перед законом. Физические лица подлежат административной ответственности независимо от пола, расы, национальности, языка, происхождения, имущественного и должностного положения, места жительства, отношения к религии, убеждений, принадлежности к общественным объединениям, а также других обстоятельств. Юридические лица подлежат административной ответственности независимо от места нахождения, организационно-правовых форм, подчиненности, а также других обстоятельств.\n\nч. 2 Особые условия применения мер обеспечения производства по делу об административном правонарушении и привлечения к административной ответственности должностных лиц, выполняющих определенные государственные функции, устанавливаются Конституцией и иным законодательством штата Сан-Андреас.\n\nч. 3 Особые условия применения мер административной ответственности в отношении некоммерческих организаций, а также являющихся субъектами малого и среднего предпринимательства лиц, осуществляющих предпринимательскую деятельность без образования юридического лица, и юридических лиц, а также руководителей и иных работников указанных юридических лиц, совершивших административные правонарушения в связи с выполнением организационно-распорядительных или административно-хозяйственных функций (далее - их работники), устанавливаются настоящим Кодексом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.5", "number": "1.5", "title": "Презумпция невиновности", "content": "Статья 1.5. Презумпция невиновности\n\nч. 1 Лицо подлежит административной ответственности только за те административные правонарушения, в отношении которых установлена его вина.\n\nч. 2 Лицо, в отношении которого ведется производство по делу об административном правонарушении, считается невиновным, пока его вина не будет доказана в порядке, предусмотренном настоящим Кодексом, и установлена вступившим в законную силу постановлением судьи, органа, должностного лица, рассмотревших дело.\n\nч. 3 Лицо, привлекаемое к административной ответственности, не обязано доказывать свою невиновность, за исключением случаев, когда обратное установлено нормой Особенной части настоящего Кодекса.\n\nч. 4 Неустранимые сомнения в виновности лица, привлекаемого к административной ответственности, толкуются в пользу этого лица.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.6", "number": "1.6", "title": "Обеспечение законности при применении мер административного принуждения", "content": "Статья 1.6. Обеспечение законности при применении мер административного принуждения\n\nч. 1 Лицо, привлекаемое к административной ответственности, не может быть подвергнуто административному наказанию и мерам обеспечения производства по делу об административном правонарушении иначе как на основаниях и в порядке, установленных законом.\n\nч. 2 Применение уполномоченными на то органом или должностным лицом административного наказания и мер обеспечения производства по делу об административном правонарушении осуществляется в пределах компетенции указанных органа или должностного лица в соответствии с законом.\n\nч. 3 При применении мер административного принуждения не допускаются решения и действия (бездействие), унижающие человеческое достоинство.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.7", "number": "1.7", "title": "Действие законодательства об административных правонарушениях во времени", "content": "Статья 1.7. Действие законодательства об административных правонарушениях во времени\n\nч. 1 Лицо, совершившее административное правонарушение, подлежит ответственности на основании закона, действовавшего во время совершения административного правонарушения.\n\nч. 2 Закон, смягчающий или отменяющий административную ответственность за административное правонарушение либо иным образом улучшающий положение лица, имеет обратную силу. Закон, устанавливающий или отягчающий административную ответственность, обратной силы не имеет.\n\nч. 2.1 В случае одновременного вступления в силу положений закона, отменяющих административную ответственность и устанавливающих уголовную ответственность, лицо подлежит административной ответственности на основании закона, действовавшего во время совершения административного правонарушения.\n\nч. 3 Производство по делу об административном правонарушении осуществляется на основании закона, действующего во время производства по делу.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-1.8", "number": "1.8", "title": "Действие законодательства об административных правонарушениях в пространстве", "content": "Статья 1.8. Действие законодательства об административных правонарушениях в пространстве\n\nч. 1 Лицо, совершившее административное правонарушение на территории штата Сан-Андреас, подлежит административной ответственности в соответствии с настоящим Кодексом.\n\n\nГЛАВА 2. АДМИНИСТРАТИВНОЕ ПРАВОНАРУШЕНИЕ И АДМИНИСТРАТИВНАЯ ОТВЕТСТВЕННОСТЬ\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-2.1", "number": "2.1", "title": "Административное правонарушение", "content": "Статья 2.1. Административное правонарушение\n\nч. 1 Административным правонарушением признается противоправное действие (бездействие) физического или юридического лица, за которое настоящим Кодексом или законами штата об административных правонарушениях установлена административная ответственность.\n\nч. 2 Юридическое лицо признается виновным в совершении административного правонарушения, если будет установлено, что у него имелась возможность для соблюдения правил и норм, за нарушение которых настоящим Кодексом предусмотрена административная ответственность, но данным лицом не были приняты все зависящие от него меры по их соблюдению.\n\nч. 3 Назначение административного наказания юридическому лицу не освобождает от административной ответственности за данное правонарушение виновное физическое лицо, равно как и привлечение к административной или уголовной ответственности физического лица не освобождает от административной ответственности за данное правонарушение юридическое лицо, за исключением случаев, предусмотренных частью 4 настоящей статьи.\n\nч. 4 Юридическое лицо не подлежит административной ответственности за совершение административного правонарушения, за которое должностное лицо или иной работник данного юридического лица привлечены к административной ответственности либо его единоличный исполнительный орган, имеющий статус юридического лица, привлечен к административной ответственности, если таким юридическим лицом были приняты все предусмотренные законодательством штата Сан-Андреас меры для соблюдения правил и норм, за нарушение которых предусмотрена административная ответственность.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-2.2", "number": "2.2", "title": "Подведомственность по административным делам и делам об административных правонарушениях. Порядок и условия привлечен...", "content": "Статья 2.2. Подведомственность по административным делам и делам об административных правонарушениях. Порядок и условия привлечения лиц к ответственности по делам об административных правонарушениях\n\nч. 1 Привлечение к административной ответственности возможно только сотрудниками LSPD, Sheriff Department, судебными органами и Офисом Генерального прокурора штата, главами правительственных департаментов и их заместителями, а также Спикером Сената в рамках проведения заседания и в соответствии с Законом «О Сенате штата Сан-Андреас».", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-2.3", "number": "2.3", "title": "Формы вины", "content": "Статья 2.3. Формы вины\n\nч. 1 Административное правонарушение признается совершенным умышленно, если лицо, его совершившее, осознавало противоправный характер своего действия (бездействия), предвидело его вредные последствия и желало наступления таких последствий или сознательно их допускало либо относилось к ним безразлично.\n\nч. 2 Административное правонарушение признается совершенным по неосторожности, если лицо, его совершившее, предвидело возможность наступления вредных последствий своего действия (бездействия), но без достаточных к тому оснований самонадеянно рассчитывало на предотвращение таких последствий либо не предвидело возможности наступления таких последствий, хотя должно было и могло их предвидеть.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-2.4", "number": "2.4", "title": "Крайняя необходимость", "content": "Статья 2.4. Крайняя необходимость\n\nч. 1 Не является административным правонарушением причинение лицом вреда охраняемым законом интересам в состоянии крайней необходимости, то есть для устранения опасности, непосредственно угрожающей личности и правам данного лица или других лиц, а также охраняемым законом интересам общества или государства, если эта опасность не могла быть устранена иными средствами и если причиненный вред является менее значительным, чем предотвращенный вред.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-2.5", "number": "2.5", "title": "Возможность освобождения от административной ответственности при малозначительности административного правонарушения", "content": "Статья 2.5. Возможность освобождения от административной ответственности при малозначительности административного правонарушения\n\nч. 1 При малозначительности совершенного административного правонарушения судья, орган, должностное лицо, уполномоченные решить дело об административном правонарушении, могут освободить лицо, совершившее административное правонарушение, от административной ответственности и ограничиться устным замечанием.\n\n\nГЛАВА 3. АДМИНИСТРАТИВНОЕ НАКАЗАНИЕ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.1", "number": "3.1", "title": "Цели административного наказания", "content": "Статья 3.1. Цели административного наказания\n\nч. 1 Административное наказание является установленной государством мерой ответственности за совершение административного правонарушения и применяется в целях предупреждения совершения новых правонарушений как самим правонарушителем, так и другими лицами.\n\nч. 2 Административное наказание не может иметь своей целью унижение человеческого достоинства физического лица, совершившего административное правонарушение, или причинение ему физических страданий, а также нанесение вреда деловой репутации юридического лица.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.2", "number": "3.2", "title": "Виды административных наказаний", "content": "Статья 3.2. Виды административных наказаний\n\nч. 1 Для целей настоящего Кодекса административными наказаниями признаются:\n\nа) предупреждение - мера административного наказания, выраженная в официальном порицании физического или юридического лица. Предупреждение выносится в устной форме;\nб) административный штраф - денежное взыскание в отношении лица, выраженное в определенной сумме;\nв) лишение специального права;\nг) конфискация орудия совершения или предмета административного правонарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.3", "number": "3.3", "title": "Исполнение штрафа", "content": "Статья 3.3. Исполнение штрафа\n\nч. 1 Административный штраф должен быть уплачен лицом, привлеченным к административной ответственности, незамедлительно либо в указанный (оглашенный) срок.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.4", "number": "3.4", "title": "Предупреждение", "content": "Статья 3.4. Предупреждение\n\nч. 1 Предупреждение - мера административного наказания, выраженная в официальном порицании лица. Предупреждение выносится в письменной или устной форме.\n\nч. 2 Предупреждение устанавливается за впервые совершенные административные правонарушения при отсутствии причинения вреда либо возникновения угрозы причинения вреда жизни и здоровью людей, объектам животного и растительного мира, окружающей среде, безопасности государства, угрозы чрезвычайных ситуаций природного и техногенного характера, а также при отсутствии имущественного ущерба.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.5", "number": "3.5", "title": "Административный штраф", "content": "Статья 3.5. Административный штраф\n\nч. 1 Административный штраф является денежным взысканием и выражается в долларах.\n\nч. 2 Если настоящим Кодексом не установлено иное, под штрафом понимается административный штраф.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.6", "number": "3.6", "title": "Конфискация орудия совершения или предмета административного правонарушения, а также изъятие вещей и документов", "content": "Статья 3.6. Конфискация орудия совершения или предмета административного правонарушения, а также изъятие вещей и документов\n\nч. 1 Конфискацией орудия совершения или предмета административного правонарушения является принудительное безвозмездное обращение в собственность штата Сан-Андреас не изъятых из оборота вещей. Конфискация назначается сотрудником, осуществляющим административное преследование.\n\nч. 2 Не является конфискацией изъятие из незаконного владения лица:\n\nа) подлежащих возврату их законному собственнику;\n\nб) изъятых из оборота либо находившихся в противоправном владении и подлежащих обращению в собственность государства или уничтожению.\n\nПримечание 1: Изъятие вещей и документов осуществляется уполномоченными лицами с применением видеозаписи.\n\nПримечание 2: Изъятие признается конфискацией только в случаях, прямо предусмотренных законом.\n\nч. 3 Конфискация не применяется к имуществу лица, не привлеченного к административной ответственности и не признанного виновным.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-3.7", "number": "3.7", "title": "Лишение специального права", "content": "Статья 3.7. Лишение специального права\n\nч. 1 Лишение специального права устанавливается за грубое или систематическое нарушение порядка пользования данным правом либо за уклонение от исполнения административного наказания и назначается судьей.\n\nч. 2 Срок лишения специального права не может быть менее двух лет и не может превышать тридцати лет.\n\n\nГЛАВА 4. НАЗНАЧЕНИЕ АДМИНИСТРАТИВНОГО НАКАЗАНИЯ\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-4.1", "number": "4.1", "title": "Общие правила назначения административного наказания", "content": "Статья 4.1. Общие правила назначения административного наказания\n\nч. 1 Административное наказание за совершение административного правонарушения назначается в пределах, установленных настоящим Кодексом.\n\nч. 2 При назначении административного наказания физическому лицу учитываются характер совершенного административного правонарушения, личность виновного, его имущественное положение, обстоятельства, смягчающие и отягчающие административную ответственность.\n\nч. 3 Назначение административного наказания не освобождает лицо от исполнения обязанности, за неисполнение которой административное наказание было назначено.\n\nч. 4 Никто не может нести административную ответственность дважды за одно и то же административное правонарушение.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-4.2", "number": "4.2", "title": "Замена административного наказания предупреждением", "content": "Статья 4.2. Замена административного наказания предупреждением\n\nч. 1 За впервые совершенное административное правонарушение административный штраф подлежит замене на предупреждение при наличии обстоятельств, предусмотренных частью 2 статьи 3.4 настоящего Кодекса.\n\nч. 2 Замена предупреждением является правом, а не обязанностью уполномоченного лица.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-4.3", "number": "4.3", "title": "Смягчение наказания", "content": "Статья 4.3. Смягчение наказания\n\nч. 1 Обстоятельствами, смягчающими административную ответственность, признаются:\n\nа) раскаяние лица;\nб) добровольное прекращение противоправного поведения;\nв) добровольное сообщение о правонарушении;\nг) содействие органу, осуществляющему производство;\nд) предотвращение вредных последствий;\nе) добровольное возмещение ущерба.\n\nч. 2 Суд может признать смягчающими и иные обстоятельства.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-4.4", "number": "4.4", "title": "Отягчение наказания", "content": "Статья 4.4. Отягчение наказания\n\nч. 1 Обстоятельствами, отягчающими административную ответственность, признаются:\n\nа) продолжение противоправного поведения;\nб) совершение правонарушения группой лиц;\nв) совершение правонарушения в чрезвычайных условиях;\nг) совершение правонарушения в состоянии опьянения.\n\n\nГЛАВА 5. ПРАВОНАРУШЕНИЯ, ПОСЯГАЮЩИЕ НА ОБЩЕСТВЕННЫЙ ПОРЯДОК И БЕЗОПАСНОСТЬ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.1", "number": "5.1", "title": "Мелкое хулиганство, то есть нарушение общественного порядка, выражающее явное неуважение к обществу,", "content": "Статья 5.1. Мелкое хулиганство, то есть нарушение общественного порядка, выражающее явное неуважение к обществу,\n\nч. 1 Действия, которые могут быть расценены хулиганскими :\n\nа) в общем порядке:\n– Оскорбительное приставание к гражданам;\n– Действия, несущие угрозу обществу (размахивания кулаками, ногами);\nНаказание: штраф в размере от 3.000$ до 7.000$\n\nб) в местах большого скопления людей, помещениях государственных учреждений и прилегающих к ним территориях, парках, скверах, пляжи, а также скопление людей от 7-ми человек:\n– Нецензурная брань;\n– Неприличные жесты;\nНаказание: штраф в размере от 10.000$ до 15.000$\n\nв) в помещениях государственных организациях и прилегающих к ним территориях:\n– Заниматься спортом, выполнять спортивные упражнения, танцевать; \n– Катать на спине, ползать, неоднократно свистеть, кричать;\n– Использование устройств, воспроизводящих музыку или другие звуки.\n\nИсключение: территории EMS, WN.\n\nг) иное поведение человека, противоречащие общепринятым нормам морали и нравственности.\n\nПримечание: общественные места – места большого скопления людей, а равно госучреждения, скверы, парки, пляжи, прилегающие территории гос организации. \nНаказание: штраф в размере от 15.000$ до 20.000$\n\nч. 2 Повторное совершение административного правонарушения, предусмотренного частью 1 настоящей статьи влечет,\nНаказание: штраф в размере от 5.000$ до 10.000$", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.2", "number": "5.2", "title": "Использование любых видов транспорта (мопед, автомобиль, мотоцикл, велосипеды и т.п.) внутри помещений государственны...", "content": "Статья 5.2. Использование любых видов транспорта (мопед, автомобиль, мотоцикл, велосипеды и т.п.) внутри помещений государственных учреждений,\nНаказание: штраф в размере 20.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.3", "number": "5.3", "title": "Нахождение в общественном месте в неприемлемом виде, а также в состоянии алкогольного или наркотического опьянения,", "content": "Статья 5.3. Нахождение в общественном месте в неприемлемом виде, а также в состоянии алкогольного или наркотического опьянения,\n\nч. 1 Нахождение без любого из элементов верхней одежды в местах большого скопления людей, а также в помещениях государственных организаций и прилегающим к ним территориям.\nИсключение: нахождение без любого из элементов верхней одежды допустимо в случае нахождения на территории пляжей, иных водоемов, магазинах одежды и почты, а так же в случае допустимости отсутствия таковых элементов\nНаказание: штраф в размере от 5.000$ до 30.000$.\n\nч. 2 Потребление (распитие) алкогольной продукции либо наркотических средств или психотропных веществ, новых потенциально опасных психоактивных веществ или одурманивающих веществ в местах большого скопления людей, равно как появление в алкогольном или наркотическом опьянении.\nИсключение: развлекательные, увеселительные учреждения.\nНаказание: штраф в размере от 5.000$ до 30.000$.\n\nч. 3 Нахождение мужчин в беговых шортах/трусах/купальниках, женщин в купальниках/трусах на территории государственных организаций. \nИсключение: Здания EMS и прилегающая территория. \nНаказание: штраф в размере от 5.000$ до 30.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.4", "number": "5.4", "title": "Ношение в открытом виде или использование не по назначению холодного оружия, инструментов и спортивного инвентаря в л...", "content": "Статья 5.4. Ношение в открытом виде или использование не по назначению холодного оружия, инструментов и спортивного инвентаря в людном месте,\nНаказание: штраф в размере 20.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.5", "number": "5.5", "title": "Нарушение установленного порядка организации либо проведения собрания или митинга.", "content": "Статья 5.5. Нарушение установленного порядка организации либо проведения собрания или митинга.\nч. 1 Нарушение организатором/участником публичного мероприятия установленного порядка организации либо проведения собрания или митинга,\nНаказание: штраф в размере 20.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.6", "number": "5.6", "title": "Водителю запрещено совершать безрассудное вождение", "content": "Статья 5.6. Водителю запрещено совершать безрассудное вождение\n\nч. 1 Деяние, предусмотренное соответствующей статьей Дорожного кодекса, совершение иных действий, которые в случаях опасного вождения угрожают жизни или здоровью окружающим людям.\nНаказание: штраф в размере от 20.000$ до 30.000$ с лишением водительской лицензии.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.7", "number": "5.7", "title": "Заведомо ложный вызов специализированных служб", "content": "Статья 5.7. Заведомо ложный вызов специализированных служб\n\nч. 1 Заведомо ложный вызов полиции, скорой медицинской помощи или иных специализированных служб, \nНаказание: влечет наложение административного штрафа в размере от 10.000$ до 25.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-5.8", "number": "5.8", "title": "Неуважение к Сенату штата Сан-Андреас, в том числе оскорбление участников сената,", "content": "Статья 5.8. Неуважение к Сенату штата Сан-Андреас, в том числе оскорбление участников сената,\nНаказание: штраф в размере от 10.000$ до 50.000$ или до 15 суток ограничения свободы.\n\nГЛАВА 6. ПРАВОНАРУШЕНИЯ, ПОСЯГАЮЩИЕ НА ПРАВА ГРАЖДАН И ИХ ИМУЩЕСТВО", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.1", "number": "6.1", "title": "Дискриминация", "content": "Статья 6.1. Дискриминация\n\nч. 1 Дискриминация, то есть нарушение прав, свобод и законных интересов человека и гражданина в зависимости от его пола, расы, цвета кожи, национальности, языка, происхождения, имущественного, семейного, социального и должностного положения, возраста, места жительства, отношения к религии, убеждений. Принадлежности или непринадлежности к общественным объединениям или каким-либо группам или меньшинствам,\nНаказание: штраф в размере от 10.000$ до 30.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.1.1", "number": "6.1.1", "title": "Дискриминация в сфере труда", "content": "Статья 6.1.1 Дискриминация в сфере труда\n\nч. 1 Никто не может быть ограничен в трудовых правах и свободах или получать какие-либо преимущества в зависимости от пола, расы, цвета кожи, национальности, языка, происхождения, имущественного, семейного, социального и должностного положения, возраста, места жительства, отношения к религии, убеждений, принадлежности или непринадлежности к общественным объединениям или каким-либо социальным группам, а также от других обстоятельств, не связанных с деловыми качествами работника,\nНаказание: штраф работодателю в размере 150.000$.\n\nКомментарий: Не являются дискриминацией установление различий, исключений, предпочтений, а также ограничение прав работников, которые определяются свойственными данному виду труда требованиями, либо в целях обеспечения национальной безопасности, поддержания оптимального баланса трудовых ресурсов, содействия в приоритетном порядке трудоустройству граждан и в целях решения иных задач внутренней и внешней политики государства.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.1.2", "number": "6.1.2", "title": "Нарушение государственных нормативных требований охраны труда, содержащихся в законах и иных нормативных правовых актах,", "content": "Статья 6.1.2. Нарушение государственных нормативных требований охраны труда, содержащихся в законах и иных нормативных правовых актах,\nНаказание: штраф в размере от 20.000 до 50.000$, юридическим лицам - от 50.000 до 100.000 $", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.2", "number": "6.2", "title": "Курение в общественных местах", "content": "Статья 6.2 Курение в общественных местах\n\nч. 1 Запрещено курение с использованием специальных приспособлений или без них табака, никотинсодержащей продукции или кальянов, на территории общественных мест вне специально отведенных территорий, государственных организаций, на расстоянии до 10 метров от любого из входов и выходов, органах государственной власти,\nНаказание: штраф в размере от 5.000$ до 20.000$\nИсключение: объекты, находящиеся в частной собственности, клубы, пляжи и улицы.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.3", "number": "6.3", "title": "Нанесение повреждений чужому имуществу.", "content": "Статья 6.3 Нанесение повреждений чужому имуществу.\n\nч. 1 Неосторожное нанесение повреждений чужому имуществу.\nНаказание: штраф в размере 15.000$, с возмещением ущерба потерпевшей стороне, в зависимости от масштаба нанесенного ущерба.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.4", "number": "6.4", "title": "Нарушение работодателем прав сотрудника на обеденный перерыв или отпуск,", "content": "Статья 6.4 Нарушение работодателем прав сотрудника на обеденный перерыв или отпуск,\n\nНаказание: штраф работодателю в размере 50.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.5", "number": "6.5", "title": "Несоответствие правил внутреннего трудового распорядка текущему законодательству,", "content": "Статья 6.5 Несоответствие правил внутреннего трудового распорядка текущему законодательству,\n\nНаказание: штраф работодателю в размере 30.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.6", "number": "6.6", "title": "Воспрепятствование законной профессиональной деятельности журналистов путем незаконного ограничения права поиска, пол...", "content": "Статья 6.6 Воспрепятствование законной профессиональной деятельности журналистов путем незаконного ограничения права поиска, получения, передачи, производства и распространения информации любым законным способом,\nНаказание: штраф в размере 20.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-6.7", "number": "6.7", "title": "Осуществление торговой деятельности в общественных местах", "content": "Статья 6.7 Осуществление торговой деятельности в общественных местах\n\nНаказание: штраф в размере от 30.000$ до 50.000$.\n\nГЛАВА 7. ПРАВОНАРУШЕНИЯ В СФЕРЕ РЫБОЛОВСТВА И ОХОТЫ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "admin-7.1", "number": "7.1", "title": "Браконьерство, то есть:", "content": "Статья 7.1 Браконьерство, то есть:\n– осуществление рыбалки
