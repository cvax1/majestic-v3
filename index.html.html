кам (с правильными и полными отыгровками, а так же обязательное наличие гитары / бумбокса).", "punishment": "Mute 30-60 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "zones-1.6", "number": "1.6", "title": "Если игрок находится в Green zone, а Вы нет, то любые запрещенные действия в Green zone с вашей стороны по отношению ...", "content": "1.6 Если игрок находится в Green zone, а Вы нет, то любые запрещенные действия в Green zone с вашей стороны по отношению к нему будут считаться нарушением правил Green zone.\nПример: игрок находится в магазине одежды который расположен в красной зоне, но имеет внутренний интерьер - Green zone, а вы находитесь вне территории магазина. В данном случае вам запрещено предпринимать к нему любые действия которые запрещены в Green zone.\n\nСписок территорий, относящихся к Green zone:\nГосударственные учреждения: здание мэрии, полицейский департамент, департамент шерифов, EMS, FIB, автошкола, News, Департамент в Сенди-Шорс, больница в Сенди-Шорс.\nРаботы: инкассатор, лесоруб, мусорная переработка, пожарный, электрик, строитель, таксопарк, точки погрузки/разгрузки (всех работ, ЗЗ только для работников), почтальон, ферма, грибник, контракты и все вытекающие точки (ЗЗ только для работников), кладоискатель (ЗЗ только для работников).\nПрочее: автосервисы, автомастерские, банкоматы, банки, аренды лодок и прилегающие к ним территории, прием транспорта на свалке, GunGame, казино и прилегающая к нему территория, метро, сцены, авианосец, пирс Дель-Перро, кинотеатр на пляже Дель-Перро, яхта, массовые мероприятия и наборы фракций, место появления новичков, места рыбалки; дом, квартира, офис, а также вход и прилегающая территория (в красной зоне без прилегающей территории); клубы, качалка, места сдачи закладок/автомобилей/мусора, церковь и прилегающая к ней территория, зоны игры в армрестлинг, семейные склады, маркетплейс и прилегающая к нему территория, Human Labs (исключением являются стычки за контрабанду), обсерватория, амфитеатр и прилегающая к ним территория.\nИсключение: в клубах разрешено включать музыку. Стяжки, а так же применение силы разрешено только работникам клуба.\n\nRed zone\n\nRed zone - криминальные ареалы игровой карты, в которых царит большое количество преступной деятельности. Разрешены любые преступные действия без использования масок.\nК территориям Red zone относятся:\nТерритория гетто\nРеспауны банд\nАэропорт в Сэнди-Шорс\nЭксклюзивная штаб-квартира организации (захваченные / активные (функционально) семейные особняки)\nОстров Кайо-Перико\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "zones-2.1", "number": "2.1", "title": "В Red zone с 17:00 до 10:00 разрешено наносить урон по вооруженным лицам (в т.ч. в быстром слоте) без предупреждения.", "content": "2.1 В Red zone с 17:00 до 10:00 разрешено наносить урон по вооруженным лицам (в т.ч. в быстром слоте) без предупреждения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "zones-2.2", "number": "2.2", "title": "В Red zone с 17:00 до 10:00 разрешено нарушать правила PG.", "content": "2.2 В Red zone с 17:00 до 10:00 разрешено нарушать правила PG.\nИсключение: территории (респавны) криминальных организаций и семейные особняки.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "zones-2.3", "number": "2.3", "title": "На острове Кайо-Перико (Red Zone) разрешено открывать огонь по вооруженным лицам (в т.ч. в быстром слоте) без предупр...", "content": "2.3 На острове Кайо-Перико (Red Zone) разрешено открывать огонь по вооруженным лицам (в т.ч. в быстром слоте) без предупреждения.\n\n\nGrey zone\n\nGrey zone - неокрашенная территория на карте является нейтральной, в ней разрешены криминальные действия с учетом всех правил сервера.\n\n\n\nКарта игровых зон\n\nGreen zone - окрашены зелёным цветом на карте.\nRed zone - окрашены красным цветом на карте.\nGrey zone - неокрашенная часть карты.\n\nhttps://wiki.majestic-rp.ru/en/map/game-zones?mapType=satellite", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}], "martial": [{"id": "martial-1", "number": "1", "title": "Общее положение", "content": "1. Общее положение\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.1", "number": "1.1", "title": "Режим военного положения вводится лидером Government, после публикации IC документации.", "content": "1.1 Режим военного положения вводится лидером Government, после публикации IC документации.\nПримечание: IC документацией является дело, в котором зафиксированы основные IC нарушения от игроков различных криминальных организаций / семей, в деле не должно быть грамматических ошибок, а так же нарушений правил сервера. Дело должно быть одобрено главным куратором гос. структур и ГА.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.2", "number": "1.2", "title": "Военное положение объявляется лишь по веским IC причинам.", "content": "1.2 Военное положение объявляется лишь по веским IC причинам. | Выговор лидеру.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.3", "number": "1.3", "title": "Военное положение вводится максимум на 12 часов.", "content": "1.3 Военное положение вводится максимум на 12 часов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.4", "number": "1.4", "title": "Разрешено вводить военное положение во время массовых беспорядков, террористических актах и иных веских IC причин.", "content": "1.4 Разрешено вводить военное положение во время массовых беспорядков, террористических актах и иных веских IC причин.\nПримечание: данное ВП отличает от военного положения вводимое на отдельные территории, это кратковременное оцепление небольшого участка, на котором происходят массовые беспорядки, террористические акты и другие мероприятия, вводимое для устранения данных проблем.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.5", "number": "1.5", "title": "При военном положении распространяются все общие правила сервера.", "content": "1.5 При военном положении распространяются все общие правила сервера.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.6", "number": "1.6", "title": "Запрещен таран перекрытия.", "content": "1.6 Запрещен таран перекрытия. | Demorgan 15 - 35 минут.\nИсключение: Insurgent, riot2 и другая тяжелая бронированная спец. техника.", "punishment": "Demorgan 15 - 35 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.7", "number": "1.7", "title": "Запрещен респавн фракционной техники.", "content": "1.7 Запрещен респавн фракционной техники. | WARN / Выговор лидеру.\nИсключение: одобрение куратора фракции.", "punishment": "WARN / Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-1.8", "number": "1.8", "title": "До окончания военного положения запрещено устраивать капты.", "content": "1.8 До окончания военного положения запрещено устраивать капты. | Demorgan 90 минут всем участникам / Выговор лидеру.\n", "punishment": "Demorgan 90 минут всем участникам / Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2", "number": "2", "title": "Правила для государственных организаций", "content": "2. Правила для государственных организаций\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.1", "number": "2.1", "title": "Разрешено устанавливать блокпосты на въездах/выездах с территории военного положения.", "content": "2.1 Разрешено устанавливать блокпосты на въездах/выездах с территории военного положения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.2", "number": "2.2", "title": "Использовать огнестрельное оружие разрешено только силовым государственным структурам - FIB/LSPD/LSSD/SANG/USSS.", "content": "2.2 Использовать огнестрельное оружие разрешено только силовым государственным структурам - FIB/LSPD/LSSD/SANG/USSS. | Demorgan 45 минут.\nПримечание: сотрудникам EMS/WN/Government запрещено участвовать в перестрелках.", "punishment": "Demorgan 45 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.3", "number": "2.3", "title": "Губернатору/министрам и старшим рангам Government запрещено присутствовать на территории военного положения.", "content": "2.3 Губернатору/министрам и старшим рангам Government запрещено присутствовать на территории военного положения. | WARN / Выговор лидеру.\nИсключение: начало и конец военного положения.", "punishment": "WARN / Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.4", "number": "2.4", "title": "Силовым государственным структурам, на территории военного положения необходимо установить штаб.", "content": "2.4 Силовым государственным структурам, на территории военного положения необходимо установить штаб.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.5", "number": "2.5", "title": "Во время военного положения, запрещено совершать рейды на криминальные организации на которые нет никаких расследован...", "content": "2.5 Во время военного положения, запрещено совершать рейды на криминальные организации на которые нет никаких расследований/открытых дел. | Выговор лидеру.\nПояснение: расследование / открытое дело - официальный IC документ, в котором есть все необходимые доказательства, с соответствующими РП отыгровками.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.6", "number": "2.6", "title": "Рейд на респаун любой криминальной организации могут проводиться не чаще, чем один раз в час.", "content": "2.6 Рейд на респаун любой криминальной организации могут проводиться не чаще, чем один раз в час. | Выговор лидеру.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.7", "number": "2.7", "title": "Материал, который будет заснят во время рейдов можно использовать для дальнейшего рассекречивания криминальной органи...", "content": "2.7 Материал, который будет заснят во время рейдов можно использовать для дальнейшего рассекречивания криминальной организации.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.8", "number": "2.8", "title": "По окончанию военного положения, государственным структурам необходимо покинуть территорию в течение часа.", "content": "2.8 По окончанию военного положения, государственным структурам необходимо покинуть территорию в течение часа. | Demorgan 15 минут.", "punishment": "Demorgan 15 минут.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.9", "number": "2.9", "title": "Главнокомандующим на данном мероприятии являются старшие ранги FIB, все операции и само военное положение происходит ...", "content": "2.9 Главнокомандующим на данном мероприятии являются старшие ранги FIB, все операции и само военное положение происходит под их контролем. | Выговор лидеру.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-2.10", "number": "2.10", "title": "Сотрудники государственных структур имеют право останавливать любых подозрительных граждан с целью проверки.", "content": "2.10 Сотрудники государственных структур имеют право останавливать любых подозрительных граждан с целью проверки.\nПример: люди в масках, люди с оружием, скопление людей.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-3", "number": "3", "title": "Правила для криминальных организаций", "content": "3. Правила для криминальных организаций\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-3.1", "number": "3.1", "title": "Разрешено объединение криминальных организаций / семей для противостояния государственным структурам.", "content": "3.1 Разрешено объединение криминальных организаций / семей для противостояния государственным структурам.\nПримечания: все объединения должны происходить IC путем. | Выговор лидеру.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-3.2", "number": "3.2", "title": "Запрещено уходить на респауны фракций / семей во время погони/перестрелки.", "content": "3.2 Запрещено уходить на респауны фракций / семей во время погони/перестрелки. | Ban 2 дня.", "punishment": "Ban 2 дня.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "martial-3.3", "number": "3.3", "title": "Запрещено во время военного положения совершать нападения на остров Кайо-Перико/территории Форта-Занкудо", "content": "3.3 Запрещено во время военного положения совершать нападения на остров Кайо-Перико/территории Форта-Занкудо | Demorgan 90 минут всем участникам / Выговор лидеру + изъятие предметов.", "punishment": "Demorgan 90 минут всем участникам / Выговор лидеру + изъятие предметов.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}], "leaders": [{"id": "leaders-1", "number": "1", "title": "Общее положение", "content": "1. Общее положение\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.1", "number": "1.1", "title": "Лидерский срок составляет один месяц (30 дней), для лидера Government - 45 дней.", "content": "1.1 Лидерский срок составляет один месяц (30 дней), для лидера Government - 45 дней.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.2", "number": "1.2", "title": "Если лидер не справляется со своими обязанностями, то заносится в черный список лидеров.", "content": "1.2 Если лидер не справляется со своими обязанностями, то заносится в черный список лидеров.\nИсключение: р. 1, п. 3.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.3", "number": "1.3", "title": "Лидер может быть снят по РП-расследованию или государственным переворотом, в этом случае на него не будет наложено ни...", "content": "1.3 Лидер может быть снят по РП-расследованию или государственным переворотом, в этом случае на него не будет наложено никаких санкций.\nПримечание: запрещено подставные РП расследования для обхода р. 1, п. 2. | Ban 7 дней всем участникам.\n*Примечание: наказание может варьироваться в зависимости от нарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.4.1", "number": "1.4.1", "title": "На усмотрение главного куратора фракций с лидера организации может быть снят один выговор за активность фракции, но н...", "content": "1.4.1 На усмотрение главного куратора фракций с лидера организации может быть снят один выговор за активность фракции, но не чаще, чем раз в неделю.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.4.2", "number": "1.4.2", "title": "На усмотрение главного куратора фракций с лидера организации может быть снят один выговор за снятый проморолик или ак...", "content": "1.4.2 На усмотрение главного куратора фракций с лидера организации может быть снят один выговор за снятый проморолик или активный лидерский срок но не чаще, чем раз в 1 лидерский срок.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.4.3", "number": "1.4.3", "title": "За активное участие / организацию внутриигрового теракта, а также активное участие (либо победе) в мероприятиях от ад...", "content": "1.4.3 За активное участие / организацию внутриигрового теракта, а также активное участие (либо победе) в мероприятиях от администрации, лидер может снять выговор, но не более 2 раз за один лидерский срок.\nПримечание: выговор снимается на усмотрение главного куратора фракций.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.4.4", "number": "1.4.4", "title": "На усмотрение Главного администратора, лидер может быть убран с черного списка лидеров.", "content": "1.4.4 На усмотрение Главного администратора, лидер может быть убран с черного списка лидеров.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.5", "number": "1.5", "title": "Если лидер, по мнению администрации, успешно отстоял срок, то он имеет возможность продолжить его.", "content": "1.5 Если лидер, по мнению администрации, успешно отстоял срок, то он имеет возможность продолжить его.\nИсключение: лидер City Hall всегда избирается путем выборов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.6", "number": "1.6", "title": "Лидер может занимать только 3 срока подряд на одной фракции.", "content": "1.6 Лидер может занимать только 3 срока подряд на одной фракции.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.7", "number": "1.7", "title": "Лидер несет ответственность за весь свой состав.", "content": "1.7 Лидер несет ответственность за весь свой состав. | Беседа / Выговор / Снятие.", "punishment": "Беседа / Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.8", "number": "1.8", "title": "Лидер имеет право иметь не более 3-х заместителей.", "content": "1.8 Лидер имеет право иметь не более 3-х заместителей. | Выговор.\nИсключение: лидер правительства имеет право поставить только одного заместителя.", "punishment": "Выговор.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.9", "number": "1.9", "title": "В течении первых суток после постановления лидера, он имеет право назначать любой ранг человеку.", "content": "1.9 В течении первых суток после постановления лидера, он имеет право назначать любой ранг человеку.\nПримечание: день блата работает только при становлении на первый срок.\nИсключение: одобрение гл. куратора; р.4 пункт 3.3, р.4 пункт 4; увольнение игрока во время дня блата.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-1.10", "number": "1.10", "title": "Запрещено подавать заявление на пост лидера занимая лидерский пост (на момент подачи заявки).", "content": "1.10 Запрещено подавать заявление на пост лидера занимая лидерский пост (на момент подачи заявки). | Снятие.\nИсключение: лидер фракции Government, в случае подачи заявки на тот же пост.\n\n", "punishment": "Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2", "number": "2", "title": "Обязанности лидера", "content": "2. Обязанности лидера\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.1", "number": "2.1", "title": "Соблюдение правил сервера со стороны своей фракции.", "content": "2.1 Соблюдение правил сервера со стороны своей фракции. | Беседа / Выговор / Снятие.", "punishment": "Беседа / Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.1.1", "number": "2.1.1", "title": "Иметь оформленный форумный раздел.", "content": "2.1.1 Иметь оформленный форумный раздел. | Выговор.", "punishment": "Выговор.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.1.2", "number": "2.1.2", "title": "Модерация форумного раздела и фракционного дискорда.", "content": "2.1.2 Модерация форумного раздела и фракционного дискорда. | Беседа / Выговор.\nПримечание: на актуализацию информации дается 48 часов.\nИсключение: в случае изменения дипломатических отношений информация должна быть обновлена в течении 12 часов.", "punishment": "Беседа / Выговор.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.2", "number": "2.2", "title": "Придерживаться минимального суточного онлайна в 2 часа.", "content": "2.2 Придерживаться минимального суточного онлайна в 2 часа. | Выговор / Снятие.\nИсключение: одобрение главного куратора; лидер Government и Судебной власти.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.3", "number": "2.3", "title": "Поддерживать онлайн и активность фракции.", "content": "2.3 Поддерживать онлайн и активность фракции. | Выговор / Снятие.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.4", "number": "2.4", "title": "Повышать досуг и RP уровень своей фракции.", "content": "2.4 Повышать досуг и RP уровень своей фракции. | Выговор / Снятие.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.5", "number": "2.5", "title": "Быть в курсе всех проблем своей фракции, устранять и пресекать внутрифракционные конфликты.", "content": "2.5 Быть в курсе всех проблем своей фракции, устранять и пресекать внутрифракционные конфликты. | Выговор / Снятие.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.6.1", "number": "2.6.1", "title": "По окончанию лидерского срока, лидер обязан оставить на балансе фракции минимум:", "content": "2.6.1 По окончанию лидерского срока, лидер обязан оставить на балансе фракции минимум: | WARN.\nПримечание: на усмотрение главного куратора значения могут отличаться, как в меньшую, так и в большую сторону.\nДеньги - 200.000$\nОружейные материалы - 3000\nТехнические материалы - 3000\nМедицинские материалы - 1500", "punishment": "WARN.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.6.2", "number": "2.6.2", "title": "По окончанию лидерского срока запрещено забирать более 50% денежных средств / материалов / предметов с целью личной в...", "content": "2.6.2 По окончанию лидерского срока запрещено забирать более 50% денежных средств / материалов / предметов с целью личной выгоды.\nПримечание: только для криминальных организаций при одобрении главного куратора фракций.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-2.7", "number": "2.7", "title": "На усмотрение главного куратора фракция может быть заморожена, как частично, так и полностью.", "content": "2.7 На усмотрение главного куратора фракция может быть заморожена, как частично, так и полностью.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3", "number": "3", "title": "Лидерам запрещено", "content": "3. Лидерам запрещено\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.1", "number": "3.1", "title": "Иметь в составе игроков с nonRP никами на руководящих должностях.", "content": "3.1 Иметь в составе игроков с nonRP никами на руководящих должностях. | Понижение игрока до 2 ранга + Demorgan 30 минут / Выговор.\nИсключение: разрешено иметь неподходящую по лору банды фамилию.", "punishment": "Понижение игрока до 2 ранга + Demorgan 30 минут / Выговор.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.2", "number": "3.2", "title": "Использовать деньги с баланса фракции в личных целях.", "content": "3.2 Использовать деньги с баланса фракции в личных целях. | Выговор / Снятие.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.3.1", "number": "3.3.1", "title": "Играть на твинках.", "content": "3.3.1 Играть на твинках. | Выговор / Снятие.\nИсключение: одобрение главного куратора фракций.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.3.2", "number": "3.3.2", "title": "Игра на других мультиплеерах и серверах проекта разрешена при выполненной суточной нормы онлайна, а так же активной ф...", "content": "3.3.2 Игра на других мультиплеерах и серверах проекта разрешена при выполненной суточной нормы онлайна, а так же активной фракции.\nПримечание: требуется разрешение главного куратора.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.4", "number": "3.4", "title": "Любое nonRP движение во фракции.", "content": "3.4 Любое nonRP движение во фракции. | Выговор / Снятие.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.5", "number": "3.5", "title": "Грубое нарушение правил сервера.", "content": "3.5 Грубое нарушение правил сервера. | Беседа / Выговор / Снятие.\nПримечание: возможны исключения; грубым нарушением правил сервера считаются наказания, где игрок получает Ban / HardBan.", "punishment": "Беседа / Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.6", "number": "3.6", "title": "Грубые унизительные/оскорбительные высказывания в сторону других игроков/администраторов на форуме и в официальных 'd...", "content": "3.6 Грубые унизительные/оскорбительные высказывания в сторону других игроков/администраторов на форуме и в официальных 'discord' серверах проекта. | Выговор / Снятие.", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.7", "number": "3.7", "title": "Трансфер состава.", "content": "3.7 Трансфер состава. | WARN / Выговор / Снятие.", "punishment": "WARN / Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.8", "number": "3.8", "title": "Запрещено расформировывать состав.", "content": "3.8 Запрещено расформировывать состав. | Выговор.\nИсключение: одобрение главного куратора фракции.", "punishment": "Выговор.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.9", "number": "3.9", "title": "Запрещено первым оскорблять, а так же провоцировать на оскорбление других игроков в личных сообщениях Discord'a.", "content": "3.9 Запрещено первым оскорблять, а так же провоцировать на оскорбление других игроков в личных сообщениях Discord'a. | Беседа / Выговор / Снятие.", "punishment": "Беседа / Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-3.10", "number": "3.10", "title": "Запрещено иметь дневной онлайн менее 20 человек.", "content": "3.10 Запрещено иметь дневной онлайн менее 20 человек. | Выговор / Снятие.\nПримечание: возможны исключения, необходимо уточнять у главного куратора фракций.\nПояснение: дневной онлайн считается с 15:00 до 22:00.\nИсключение: окончательное количество минимального онлайна определяется главным куратором / ГА.\n", "punishment": "Выговор / Снятие.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4", "number": "4", "title": "Повышения/Увольнения", "content": "4. Повышения/Увольнения\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.1", "number": "4.1", "title": "Лидеру правительства разрешается повышать ключевых работников фракции на соответствующий ранг в обход общей системы п...", "content": "4.1 Лидеру правительства разрешается повышать ключевых работников фракции на соответствующий ранг в обход общей системы повышения.\nПример: министры, вице-губернатор, генеральный прокурор.\nИсключение: отклонение повышения от главного куратора фракций; игроки снятые по IC делу (суд, ордер, делопроизводство и т.д.); p.4 пункты 3.3 и 4.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.2", "number": "4.2", "title": "Лидеру государственных организаций разрешено принимать только на 1 ранг.", "content": "4.2 Лидеру государственных организаций разрешено принимать только на 1 ранг. | Выговор лидеру + понижение игрока на 1 ранг.\nИсключение: перевод или восстановление.", "punishment": "Выговор лидеру + понижение игрока на 1 ранг.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.3.1", "number": "4.3.1", "title": "Восстановления в должности допускаются лишь при условии, что игрок оставит заявление на восстановление с доказательст...", "content": "4.3.1 Восстановления в должности допускаются лишь при условии, что игрок оставит заявление на восстановление с доказательствами о пребывании на ранге. | WARN / Выговор лидеру + увольнение игрока.", "punishment": "WARN / Выговор лидеру + увольнение игрока.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.3.2", "number": "4.3.2", "title": "Восстановление в должности допускается не позднее, чем 30 дней после увольнения.", "content": "4.3.2 Восстановление в должности допускается не позднее, чем 30 дней после увольнения. | Demorgan 50-90 минут / WARN / Выговор лидеру + увольнение игрока.", "punishment": "Demorgan 50-90 минут / WARN / Выговор лидеру + увольнение игрока.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.3.3", "number": "4.3.3", "title": "Если сотрудник был снят по IC-расследованию (суд, увольнение за нарушение законодательства, решение прокурора и т.п.)...", "content": "4.3.3 Если сотрудник был снят по IC-расследованию (суд, увольнение за нарушение законодательства, решение прокурора и т.п.), либо на момент его увольнения в отношении него имелись активный суд, делопроизводство, ордер или иные аналогичные IC-разбирательства, он подлежит восстановлению / принятию только на первый ранг, независимо от наличия диплома. | WARN / Выговор лидеру + понижение игрока на 1 ранг.\nИсключение: обжалование увольнения в IC инстанциях (прокуратура / суд).", "punishment": "WARN / Выговор лидеру + понижение игрока на 1 ранг.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.4", "number": "4.4", "title": "Восстановление в гос. фракции после получения увольнения администратором, WARN'a либо BAN'a допускается лишь на первы...", "content": "4.4 Восстановление в гос. фракции после получения увольнения администратором, WARN'a либо BAN'a допускается лишь на первый ранг. | Demorgan 60-90 минут / WARN / Выговор лидеру + понижение игрока на 1 ранг.\nИсключение: одобрение главного куратора гос. фракций или его заместителя.", "punishment": "Demorgan 60-90 минут / WARN / Выговор лидеру + понижение игрока на 1 ранг.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "leaders-4.5", "number": "4.5", "title": "Лидер имеет право уволить игрока из фракции, имея на то вескую IC причину.", "content": "4.5 Лидер имеет право уволить игрока из фракции, имея на то вескую IC причину.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}], "terror": [{"id": "terror-1.1", "number": "1.1", "title": "Инициатором террористического акта может быть только банда (при одобрении главного куратора фракции).", "content": "1.1 Инициатором террористического акта может быть только банда (при одобрении главного куратора фракции).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.2.1", "number": "1.2.1", "title": "Террористические акты разрешено проводить не чаще одного раза в 3 дня (общий интервал).", "content": "1.2.1 Террористические акты разрешено проводить не чаще одного раза в 3 дня (общий интервал).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.2.2", "number": "1.2.2", "title": "После организации теракта, на фракцию-организатора накладывается заморозка на 7 дней (на теракт), союзные фракции пол...", "content": "1.2.2 После организации теракта, на фракцию-организатора накладывается заморозка на 7 дней (на теракт), союзные фракции получают заморозку на 7 дней.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.3.1", "number": "1.3.1", "title": "Банда-организатор может привлечь союзную банду в целях повышения боевой мощи.", "content": "1.3.1 Банда-организатор может привлечь союзную банду в целях повышения боевой мощи.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.3.2", "number": "1.3.2", "title": "Банда-организатор может привлечь семейную организацию на совместное мероприятие.", "content": "1.3.2 Банда-организатор может привлечь семейную организацию на совместное мероприятие.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.3.3", "number": "1.3.3", "title": "Семейная организация, привлекаемая в качестве союзника на теракт, может поехать без участия банды-организатора.", "content": "1.3.3 Семейная организация, привлекаемая в качестве союзника на теракт, может поехать без участия банды-организатора.\nПримечание: в такой ситуации заморозка накладывается и на банду, и на семью.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.3.4", "number": "1.3.4", "title": "Банда-организатор вправе выставлять свои условия семье за участие или проведение теракта.", "content": "1.3.4 Банда-организатор вправе выставлять свои условия семье за участие или проведение теракта.\nПримечание: смена/нарушение условий после или в процессе проведения мероприятий является полностью IC составляющей.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.4", "number": "1.4", "title": "Максимальное количество преступных организаций при акте - 3.", "content": "1.4 Максимальное количество преступных организаций при акте - 3.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.5", "number": "1.5", "title": "Минимальное количество участников со стороны террора - 15.", "content": "1.5 Минимальное количество участников со стороны террора - 15.\nВозможны исключения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.6", "number": "1.6", "title": "На террористическом акте обязан присутствовать лидер организации со стороны фракции организатора.", "content": "1.6 На террористическом акте обязан присутствовать лидер организации со стороны фракции организатора.\nВозможны исключения. Однако в таком случае должно быть не менее двух заместителей.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.7", "number": "1.7", "title": "Разрешено использование любого вида оружия и амуниции.", "content": "1.7 Разрешено использование любого вида оружия и амуниции.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.8", "number": "1.8", "title": "Для организации террористического акта необходимо получить одобрение гл. куратора, ГА. Лидеру организации, которая ор...", "content": "1.8 Для организации террористического акта необходимо получить одобрение гл. куратора, ГА. Лидеру организации, которая организует мероприятие, первоначально необходимо обратиться к гл. куратору своей структуры по форме:\nНикнейм лидера-организатора:\nКоличество участников и перечень организаций:\nПодробное описание плана и пути отхода:\nВыдвигаемые требования:", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.9", "number": "1.9", "title": "Максимальные требования выкупа за одного заложника: 30.000$ + 3 эпинефрина.", "content": "1.9 Максимальные требования выкупа за одного заложника: 30.000$ + 3 эпинефрина.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.10", "number": "1.10", "title": "При террористическом акте работают все основные правила сервера.", "content": "1.10 При террористическом акте работают все основные правила сервера.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.11", "number": "1.11", "title": "Слив информации о террористическом акте должен происходить исключительно через IC-взаимодействие. Полученные данные д...", "content": "1.11 Слив информации о террористическом акте должен происходить исключительно через IC-взаимодействие. Полученные данные должны быть зафиксированы на видеозаписи и храниться не менее 48 часов. | Выговор лидеру.\nПримечание: администрация вправе запросить запись с игрока в течении 48 часов без объяснения причин. Видеозапись должна быть цельной, без каких-либо редакций и обработок. Качество видео должно быть не менее 480p, видео должно иметь оригинальный звук.", "punishment": "Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-1.12", "number": "1.12", "title": "Террористические акты, которые не указаны в правилах, можно провести по инициативе лидера(-ов), для подобного меропри...", "content": "1.12 Террористические акты, которые не указаны в правилах, можно провести по инициативе лидера(-ов), для подобного мероприятия требуется полноценное оформление (см. раздел 1, пункт 8), а так же одобрение ГА / ПМ.\nПримечание: при подобных терактах сохраняется общее ограничение на время проведения (см. р. 1, п. 2.1 и 2.2).\n\nПравила для нападающей стороны\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-2.1", "number": "2.1", "title": "У каждого агрессора должно быть огнестрельное оружие.", "content": "2.1 У каждого агрессора должно быть огнестрельное оружие. | Demorgan 35 минут / Выговор лидеру.", "punishment": "Demorgan 35 минут / Выговор лидеру.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-2.2", "number": "2.2", "title": "Разрешено убивать заложника один раз в 7 минут.", "content": "2.2 Разрешено убивать заложника один раз в  заложники или убили.", "content": "3.4.2 Разрешено нападать, если переговорщика взяли в заложники или убили.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-3.5", "number": "3.5", "title": "Разрешено преследовать агрессоров, перекрывать шоссе/автострады, патрулировать улицы вне зоны радиуса выдвигаемых тре...", "content": "3.5 Разрешено преследовать агрессоров, перекрывать шоссе/автострады, патрулировать улицы вне зоны радиуса выдвигаемых требований. | Выговор лидеру в случае нарушения.\nПримечание: см. пояснение р. 3, п. 3.1.", "punishment": "Выговор лидеру в случае нарушения.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "terror-3.6", "number": "3.6", "title": "Хотя бы одной силовой структуре необходимо отреагировать на террористический акт.", "content": "3.6 Хотя бы одной силовой структуре необходимо отреагировать на террористический акт. | Устный выговорам всем лидерам силовых структур, в случае игнорирования.\nИсключение: сотрудники USSS, National Guard.\n\nОграбление федерального реестра\nRP мероприятие нацеленное на захват здания правительства (мэрии) с целью массового захвата заложников, взлома федерального реестра, а так же изменения политического или экономического строя штата.\n\nhttps://forum.majestic-rp.ru/proxy.php?image=https%3A%2F%2Fi.ibb.co%2FgLcdK5K0%2Fimage-2026-03-31-12-41-45.png&hash=1c28d96376723fc8e83899c0e2393621\n\nЗахват LSPD / LSCSD\n\nЗахват полицейского и шерифского департамента - RP мероприятие нацеленное на подрыв авторитета государственных силовых структур, а так же на получение оружейного арсенала данных организаций.\n\n\nhttps://forum.majestic-rp.ru/proxy.php?image=https%3A%2F%2Fi.ibb.co%2FSb07q9G%2Fimage-2026-03-31-12-38-09.png&hash=b36732f85ddbc5f655a7b37c89e00e0c\n\n\nhttps://forum.majestic-rp.ru/proxy.php?image=https%3A%2F%2Fi.ibb.co%2FKj0FB36S%2Fimage-2026-03-31-12-48-24.png&hash=c289cc78a9fcb0a9db402e6bd5f3328b\n\n\nМероприятие нацеленное на захват заложников внутри здания, а так же получение необходимого арсенала.\n\nВзлом оружейного склада производится путем отыгрывания команды /try, всего в департаментах находится 10 шкафчиков, на взлом каждого дается 1 попытка.\n\nВозможные предметы в шкафчиках: технические, медицинские и оружейные материалы, Heavy Sniper, Heavy Sniper Mk2.\n\nПри захвате LSPD / LSCSD у игроков криминальной фракции есть возможность выпустить заключенных (из КПЗ), путем отыгровки /try (1 человек - 1 попытка /try).\n\n\n\n\n\nЗахват офиса LS News\n\nRP мероприятие направленное на массовый захват заложников, а так же на подрыв репутации государства.\n\n\nhttps://forum.majestic-rp.ru/proxy.php?image=https%3A%2F%2Fi.ibb.co%2F93GspDFm%2Fimage-2026-03-31-12-49-10.png&hash=7d5a5f5c1053656e6e06eacb1297c2bb\n\n\nЗахват происходит путем взятие под контроль всего офиса, атакующая сторона имеет право взять в заложники всех людей, которые находились на тот момент в офисе. Так же, у атакующей стороны есть возможность взломать главный компьютер (2 компьютера - 4 попытки /try), при удачном взломе у них появляется возможность 1 раз использовать глобальную волну (/wnews). Посыл не должен нести оскорбительный характер и должен соответствовать всем правилами сервера.\n\nТак же, сотрудники криминальный организаций могут прихватить с собой от 2 до 4 планов ограбления банка и от 2 до 4 электронных-карточек Fleeca (ключ-карта, позволяющая открыть хранилище банка).\n\nЗа ограбление офиса Weazel News криминальная фракция также получает технические материалы.\n\n\n\n\n\nЗахват грузового поезда\n\nRP мероприятие направленное на получение самых необходимых для фракций предметов.\n\nЗадача банально, но не так уж и проста - захват движущегося по всему штату поезда.\n\nhttps://forum.majestic-rp.ru/proxy.php?image=https%3A%2F%2Fi.ibb.co%2FCtTQHcc%2F2a31037ef52dead87094b11167b92582.png&hash=e4e6fdcf2612f65bd9f234f113bfaf24\n\n\n\nГлавная и наверное самая сложная задача - попасть и удерживаться на данном поезде.\n\nПоэтому не переборщите с количеством людей, ведь оно тут играет самую важную роль.\n\nПоезд перевозит только самые ценные и необходимые материалы (военное снаряжение, амуницию, медикаменты, продовольственную помощь), какой поезд перехватить - решать только Вам.\n\nЧтоб начать процесс перехвата поезда необходимо добраться до самого первого вагона (с машинистом) и наставить оружие на машиниста, сделали? Отлично, процесс запущен, машинист нажимает кнопку тревоги (объявляется в глобальный чат) и сотрудники выдвигаются на ваши поиски.\n\nВсе перевозимые контейнеры плотно заперты, поэтому необходимо их подготовить, в течении 15 минут необходимо срезать петли с вагонов (можно одновременно все, на каждый вагон дается 2 попытки /try), дабы было легче их вскрывать (RP отыгровки, не забудьте взять какой-то предмет, так же в рамках РП).\n\nПосле этого - бинго, начинаем вскрывать.\n\n(Куратору сообщите заранее в чем нуждаетесь, дабы смогли распределить).\n\n\n\n\n\nЗахват городской газовой компании\n\nЧто может быть приятней, чем захват государственного предприятия? Разве что нефть или газ, а если это государственная компания владеет подобным? Бинго - ничего.\n\nОставить город без газа, с упавшими акциями, репутацией и подорвать доверие людей к правоохранительным органам звучит как мечта и сказка, но нет, это новая реальность.\n\n\nhttps://forum.majestic-rp.ru/proxy.php?image=https%3A%2F%2Fi.ibb.co%2F5Whp0Dhv%2Fimage-2026-03-31-12-51-40.png&hash=3eb995e6fc91a809982879f0c9d75a96\n\n\n\n\nПеред началом, необходимо тщательно подготовиться. Необходим минимум 1 водный транспорт, желательно баржа побольше, иначе как увезти всё горючее?\n\nПосле того, как на горизонте будет замечена лодка, вероятнее всего, сработает сигнализация. Это значит мы на правильном пути, деньги идут к нам.\n\nНеобходимо подойти ко всем доступным резервуарам и попробовать открыть краник для выкачки (/try 2 попытки на каждую).\n\nПолучилось? Ожидаем погружения ресурсов на лодку и отплываем, каждый резервуар выкачивается в лодку 5 минут, поэтому рассчитайте своё время заранее.\n\nЧто же по наградам? Нефть и газ всегда ценились на рынке, можете обменять их на деньги, можете обменять на материалы.\n\nПродавец на черном рынке предложит Вам много всего, главное не переборщить с торгами, иначе можете остаться ни с чем.", "punishment": "Устный выговорам всем лидерам силовых структур, в случае игнорирования.", "stars": "", "stars_count": 0, "category": "", "type": "rule"}], "forum": [{"id": "forum-1", "number": "1", "title": "Общее положение", "content": "1. Общее положение\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "forum-1.1", "number": "1.1", "title": "Данные правила являются обязательными для ознакомления.", "content": "1.1 Данные правила являются обязательными для ознакомления.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "forum-1.2", "number": "1.2", "title": "Модератор форума согласно регламентом самостоятельно определяют наказание за нарушение данных правил пользователями.", "content": "1.2 Модератор форума согласно регламентом самостоятельно определяют наказание за нарушение данных правил пользователями.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "forum-1.3", "number": "1.3", "title": "Незнание правил не освобождает от ответственности.", "content": "1.3 Незнание правил не освобождает от ответственности.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "forum-1.4", "number": "1.4", "title": "Данные правила могут быть изменены и дополнены.", "content": "1.4 Данные правила могут быть изменены и дополнены.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "rule"}, {"id": "forum-1.5", "number": "1.5", "title": "В некоторых разделах допускается создание локальных актов, которые устанавливают дополнительные правила для данного р...", "content": "1.5 В некоторых разделах допускаетс let currentSection = "uk";
let currentQuery = "";

// Рендер вкладок
function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  const mainKeys = ["uk", ...LAW_KEYS];
  for (const key of mainKeys) {
    const sec = SECTIONS[key]; if(!sec) continue;
    const btn = document.createElement("button");
    btn.className = "tab" + (key === currentSection ? " active" : "");
    btn.style.color = key === currentSection ? sec.color : "";
    btn.innerHTML = sec.icon + " " + sec.title;
    btn.onclick = (k => () => { currentSection=k; currentQuery=""; document.getElementById("searchInput").value=""; render(); })(key);
    tabs.appendChild(btn);
  }
  const tgbtn = document.getElementById("tgbtn");
  if(tgbtn) tgbtn.style.color = GENERAL_KEYS.includes(currentSection) ? (SECTIONS[currentSection]?.color||"var(--accent)") : "";
}

function getBadge(category) {
  if (!category) return "";
  const c = category.toLowerCase();
  let cls = "badge";
  if (c.includes("федеральн")) cls += " federal";
  else if (c.includes("региональн")) cls += " regional";
  else if (c.includes("военн")) cls += " military";
  return `<div class="${cls}">${category}</div>`;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return text.replace(re, "<mark>$1</mark>");
}

function renderList(items) {
  const list = document.getElementById("list");
  const sec = SECTIONS[currentSection];
  const q = currentQuery.toLowerCase();

  if (!items.length && q) {
    list.innerHTML = `<div class="empty"><h2>Ничего не найдено</h2><p>По запросу «${currentQuery}» ничего нет.</p></div>`;
    return;
  }

  list.innerHTML = items.map((item, i) => {
    const prefix = sec.type === "article" ? "Ст." : "п.";
    const punHtml = item.punishment ? `<div class="card-pun"><b>⚖</b> ${item.punishment.slice(0,160)}</div>` : "";
    const titleHtml = highlight(item.title || "", currentQuery);
    const contentHtml = item.content || "";
    return `
    <div class="card-wrap" id="wrap${i}">
      <div class="card" onclick="togglePin(${i})">
        <div class="card-num" style="color:${sec.color}">${prefix} ${item.number}</div>
        <div class="card-body">
          <div class="card-title">${titleHtml}</div>
          ${punHtml}
        </div>
        <div class="card-meta">
          ${item.stars ? `<div class="stars">${item.stars}</div>` : ""}
          ${getBadge(item.category)}
        </div>
      </div>
      <div class="popup">${contentHtml}</div>
    </div>`;
  }).join("");
}

function togglePin(i) {
  document.getElementById("wrap"+i).classList.toggle("pinned");
}

function doSearch() {
  currentQuery = document.getElementById("searchInput").value.trim();
  render();
}

function clearSearch() {
  currentQuery = "";
  document.getElementById("searchInput").value = "";
  render();
}

function render() {
  const sec = SECTIONS[currentSection];
  renderTabs();

  document.getElementById("heroTitle").textContent = sec.icon + " " + sec.title;
  document.getElementById("heroTitle").style.color = sec.color;

  let items = DATA[currentSection] || [];
  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    items = items.filter(x =>
      (x.number||"").toLowerCase().includes(q) ||
      (x.title||"").toLowerCase().includes(q) ||
      (x.content||"").toLowerCase().includes(q) ||
      (x.punishment||"").toLowerCase().includes(q)
    );
  }

  const sb = document.getElementById("statusBar");
  if (currentQuery) {
    sb.style.display = "flex";
    document.getElementById("statusCount").textContent = items.length + " найдено";
    document.getElementById("statusQuery").textContent = currentQuery;
  } else {
    sb.style.display = "none";
  }

  renderList(items);
}

document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
    e.preventDefault(); document.getElementById("searchInput").focus();
  }
  if (e.key === "Escape") {
    document.querySelectorAll(".card-wrap.pinned").forEach(el => el.classList.remove("pinned"));
  }
});

const LAW_KEYS=["admin", "proc", "court", "labor", "road", "ethics", "civil", "const"];
const GENERAL_KEYS=["proj", "family", "rob2", "banks2", "biz2", "kaio", "fort", "shops", "zones", "martial", "leaders", "terror", "forum", "cheat", "admins"];
function toggleTG(e){
  e.stopPropagation();
  const m=document.getElementById("tgmenu"),a=document.getElementById("tgarrow");
  const open=m.classList.toggle("open");a.classList.toggle("open",open);
  if(open)buildTGMenu();
}
function buildTGMenu(){
  const m=document.getElementById("tgmenu");m.innerHTML="";
  for(const key of GENERAL_KEYS){
    const sec=SECTIONS[key];if(!sec)continue;
    const b=document.createElement("button");
    b.textContent=sec.icon+" "+sec.title;
    if(key===currentSection)b.classList.add("tgactive");
    b.onclick=()=>{currentSection=key;currentQuery="";document.getElementById("searchInput").value="";document.getElementById("tgmenu").classList.remove("open");document.getElementById("tgarrow").classList.remove("open");render();};
    m.appendChild(b);
  }
}
document.addEventListener("click",function(e){
  const btn=document.getElementById("tgbtn");
  if(btn&&!btn.contains(e.target)){document.getElementById("tgmenu").classList.remove("open");document.getElementById("tgarrow").classList.remove("open");}
});

render();
</script>
