: "52", "title": "Разметка надписями No Parking и Keep Clear запрещает постановку любого транспорта в пределах разметки,", "content": "Статья 52. Разметка надписями No Parking и Keep Clear запрещает постановку любого транспорта в пределах разметки,\nкроме транспорта экстренных служб.\n\n\nПримечание: Цвет разметки может быть как желтый, так и белой.\n\n\n\nНаказание: штраф до $9.000.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-53", "number": "53", "title": "Разделительная полоса. Может выделятся конструктивно: бордюром и зелеными насаждениями, а также может выделяется желт...", "content": "Статья 53. Разделительная полоса. Может выделятся конструктивно: бордюром и зелеными насаждениями, а также может выделяется желтой сплошной линией по контуру. Пересекать и двигаться по разделительной полосе запрещено.\n\n\nПримечание: разделительная полоса может выделяться одинарной желтой сплошной, двойной желтой сплошной и белой сплошной линиями.\n\n\n\nНаказание: штраф до $8.000.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-54", "number": "54", "title": "Табличка \"Wrong Way\" запрещает дальнейшее движение, предупреждая о том, что впереди вы будете двигаться по полосе вст...", "content": "Статья 54. Табличка \"Wrong Way\" запрещает дальнейшее движение, предупреждая о том, что впереди вы будете двигаться по полосе встречного движения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-55", "number": "55", "title": "Сплошная красная линия (красный бордюр) запрещает остановку/стоянку в этом месте.", "content": "Статья 55. Сплошная красная линия (красный бордюр) запрещает остановку/стоянку в этом месте.\n\n\nНаказание: Эвакуация транспортного средства и штраф до 9000$\n\n\n\nГлава XIII. Регистрация транспортного средства\n\nКаждое транспортное средство штата San-Andreas должно иметь собственный идентификационный знак (Государственный номер) и должно пройти процедуру Государственного учета.\nПриобретение номеров и процесс Государственного учета транспортного средства проходит в Департаменте LSPD в городе Los-Santos.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-56", "number": "56", "title": "Запрещается использование транспортного средства не прошедшее процедуру Государственного учета (актуальную регистрацию).", "content": "Статья 56. Запрещается использование транспортного средства не прошедшее процедуру Государственного учета (актуальную регистрацию).\n\n\nНаказание: лишение прав, штраф до 20.000$", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-57", "number": "57", "title": "Утратила силу", "content": "Статья 57. Утратила силу\n\n\nГлава XIV. Задержание транспортного средства\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-58", "number": "58", "title": "В целях пресечения нарушений правил дорожного движения, в том числе нарушение предусмотренных в части несоблюдения тр...", "content": "Статья 58. В целях пресечения нарушений правил дорожного движения, в том числе нарушение предусмотренных в части несоблюдения требований, предписанных дорожными знаками или разметкой, запрещающими остановку или стоянку транспортных средств, правил эксплуатации, использования транспортного средства и управления транспортным средством соответствующего вида, предусмотренных Главой IX, Главой XII, Главой XIII и другими главами настоящего Кодекса, применяется задержание(эвакуация) транспортного средства, то есть исключение транспортного средства из процесса перевозки людей и грузов путем перемещения его при помощи другого транспортного средства и помещения на ближайшую свободную парковку общего пользования.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-59", "number": "59", "title": "В случае, если транспортное средство, будет создавать препятствия для движения других транспортных средств или пешехо...", "content": "Статья 59. В случае, если транспортное средство, будет создавать препятствия для движения других транспортных средств или пешеходов, оно до начала задержания может быть перемещено путем управления транспортным средством его водителем либо лицами, уполномоченными составлять протоколы об административных правонарушениях, в ближайшее место, где данное транспортное средство таких препятствий создавать не будет.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-60", "number": "60", "title": "Задержание транспортного средства прекращается непосредственно на месте задержания транспортного средства в присутств...", "content": "Статья 60. Задержание транспортного средства прекращается непосредственно на месте задержания транспортного средства в присутствии лица, которое может управлять данным транспортным средством, если причина задержания транспортного средства устранена до начала движения транспортного средства или выплачен штраф.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-61", "number": "61", "title": "Решение о задержании транспортного средства соответствующего вида, о прекращении указанного задержания или о возврате...", "content": "Статья 61. Решение о задержании транспортного средства соответствующего вида, о прекращении указанного задержания или о возврате транспортного средства принимается должностными лицами, уполномоченными составлять протоколы о соответствующих административных правонарушениях.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-62", "number": "62", "title": "Задержание транспортного средства может проходить без присутствия владельца, представителя владельца или лиц, имеющих...", "content": "Статья 62. Задержание транспортного средства может проходить без присутствия владельца, представителя владельца или лиц, имеющих при себе документы, необходимые для управления данным транспортным средством.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-63", "number": "63", "title": "Транспортные средства с номерами государственного образца не подлежат эвакуации.", "content": "Статья 63. Транспортные средства с номерами государственного образца не подлежат эвакуации.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-64", "number": "64", "title": "Владелец (водитель) транспортного средства обязан своевременно оплачивать все имеющиеся штрафы, наложенные в соответс...", "content": "Статья 64. Владелец (водитель) транспортного средства обязан своевременно оплачивать все имеющиеся штрафы, наложенные в соответствии с действующим законодательством.\n\nВ случае, если количество неуплаченных штрафов превышает десять (10) единиц, транспортное средство подлежит эвакуации на специализированную штрафную стоянку до момента полной оплаты задолженности.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-65", "number": "65", "title": "Обязанность владельца (водителя) транспортного средства соблюдать требования Главы XIII настоящего Кодекса", "content": "Статья 65. Обязанность владельца (водителя) транспортного средства соблюдать требования Главы XIII настоящего Кодекса\n\n\n1. Владелец (водитель) транспортного средства обязан соблюдать положения Главы XIII настоящего Кодекса, касающиеся регистрации и иных обязательных требований к эксплуатации транспортного средства.\n\n\n\n2. В случае нахождения транспортного средства вне зоны регистрации или специализированной штрафной стоянки, оно подлежит эвакуации уполномоченными органами в установленном порядке.\n\n\n\nГлава XV. Техническое состояние и оборудование транспортных средств", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-66", "number": "66", "title": "Водителю запрещено управлять транспортным средством в неисправном состоянии.", "content": "Статья 66. Водителю запрещено управлять транспортным средством в неисправном состоянии.\n\n\nНаказание: штраф до $4.000 и эвакуация транспортного средства на штрафстоянку.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "ethics": [{"id": "ethics-1", "number": "1", "title": "Основная цель настоящего кодекса - регламентация поведения и формирование облика государственного служащего при испол...", "content": "Статья 1. Основная цель настоящего кодекса - регламентация поведения и формирование облика государственного служащего при исполнении им должностных обязанностей", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-2", "number": "2", "title": "Каждый государственный служащий обязан принимать все необходимые меры для соблюдения положений настоящего кодекса, а ...", "content": "Статья 2. Каждый государственный служащий обязан принимать все необходимые меры для соблюдения положений настоящего кодекса, а каждый гражданин вправе ожидать от государственного служащего поведения в отношениях с ним в соответствии с положениями этического кодекса.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-3", "number": "3", "title": "Положениями настоящего кодекса должны руководствоваться все государственные служащие независимо от занимаемой ими дол...", "content": "Статья 3. Положениями настоящего кодекса должны руководствоваться все государственные служащие независимо от занимаемой ими должности.\n\nГЛАВА 2. ОБЩИЕ ПРИНЦИПЫ ПРОФЕССИОНАЛЬНОЙ ЭТИКИ\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-4", "number": "4", "title": "Государственные служащие призваны исполнять свои обязанности, в полной мере осознавая ответственность перед государст...", "content": "Статья 4. Государственные служащие призваны исполнять свои обязанности, в полной мере осознавая ответственность перед государством, обществом и гражданами.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-5", "number": "5", "title": "В случае возникновения конфликта каких-либо интересов государственные служащие обязаны придерживаться принципов объек...", "content": "Статья 5. В случае возникновения конфликта каких-либо интересов государственные служащие обязаны придерживаться принципов объективности, руководствоваться правовыми нормами и действующим законодательством.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-6", "number": "6", "title": "Государственный служащий первостепенно должен быть честен по отношению к самому себе, своему руководству и обществу, ...", "content": "Статья 6. Государственный служащий первостепенно должен быть честен по отношению к самому себе, своему руководству и обществу, которому он присягнул служить.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-7", "number": "7", "title": "Государственный служащий должен осознавать личную и непосредственную ответственность за свои действия, понимать, что ...", "content": "Статья 7. Государственный служащий должен осознавать личную и непосредственную ответственность за свои действия, понимать, что они влекут за собой соответствующую реакцию со стороны отдельных граждан и общества в целом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-8", "number": "8", "title": "Государственный служащий призван способствовать своим служебным поведением формированию деловых взаимоотношений и кон...", "content": "Статья 8. Государственный служащий призван способствовать своим служебным поведением формированию деловых взаимоотношений и конструктивного сотрудничества как в коллективе, так и по отношению к гражданам.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-9", "number": "9", "title": "Государственный служащий должен осуществлять свои непосредственные обязанности, опираясь на публикуемые указы и поста...", "content": "Статья 9. Государственный служащий должен осуществлять свои непосредственные обязанности, опираясь на публикуемые указы и постановления Правительства, федеральное и региональное законодательство, иные нормативно-правовые акты штата Сан-Андреас и действовать в соответствии с ними.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-10", "number": "10", "title": "Любое проявление безразличия по отношению к жителям штата со стороны государственного служащего во время исполнения и...", "content": "Статья 10. Любое проявление безразличия по отношению к жителям штата со стороны государственного служащего во время исполнения им своих должностных обязанностей недопустимо и приравнивается к халатности.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-11", "number": "11", "title": "При исполнении своих должностных обязанностей государственный служащий обязан:", "content": "Статья 11. При исполнении своих должностных обязанностей государственный служащий обязан:\n\na) соблюдать законодательство штата Сан-Андреас;\n\nб) исполнять должностные обязанности в соответствии с внутренним уставом ведомства и другими нормативно-правовыми актами штата Сан-Андреас;\n\nв) исполнять поручения руководителей, данные в пределах их полномочий;\n\nг) соблюдать служебный распорядок государственного органа;\n\nд) поддерживать уровень квалификации, необходимый для надлежащего исполнения должностных обязанностей;\n\nе) не разглашать информацию, составляющую государственную и иную охраняемую законом тайну или ставшую известной в связи с исполнением служащим должностных обязанностей, в том числе сведения, касающиеся частной жизни и здоровья граждан или затрагивающие их честь и достоинство;\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-12", "number": "12", "title": "Государственный служащий обязан использовать рабочее время исключительно для исполнения своих непосредственных профес...", "content": "Статья 12. Государственный служащий обязан использовать рабочее время исключительно для исполнения своих непосредственных профессиональных обязанностей и выполнения поставленных руководством задач.\n\nГЛАВА 3. ПРИНЦИПЫ ЭТИКИ ДЛЯ РУКОВОДИТЕЛЕЙ\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-13", "number": "13", "title": "Власть, данная руководителю в пределах его полномочий, не должна использоваться для укрепления своего социального ста...", "content": "Статья 13. Власть, данная руководителю в пределах его полномочий, не должна использоваться для укрепления своего социального статуса и роли в обществе.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-14", "number": "14", "title": "Руководитель государственной организации несет ответственность за формирование благоприятной рабочей атмосферы в колл...", "content": "Статья 14. Руководитель государственной организации несет ответственность за формирование благоприятной рабочей атмосферы в коллективе, предоставление подчиненному надлежащих условий труда, должен быть открыт к проявлению разумной инициативности со стороны подчиненных, поощрять конструктивную деятельность во благо развития своей организации и на благо штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-15", "number": "15", "title": "Руководитель государственной организации непосредственно отвечает за её престиж в глазах общества.", "content": "Статья 15. Руководитель государственной организации непосредственно отвечает за её престиж в глазах общества.\n\nГЛАВА 4. ДРЕСС-КОД", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-16", "number": "16", "title": "Внешний облик государственных служащих при исполнении ими должностных обязанностей должен способствовать уважительном...", "content": "Статья 16. Внешний облик государственных служащих при исполнении ими должностных обязанностей должен способствовать уважительному отношению граждан к органам государственной власти, соответствовать общепринятому деловому стилю, который отличают официальность, сдержанность, традиционность, аккуратность.\n\nИсключение: разрешена маска с черепом у силовых структур и подразделений.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-17", "number": "17", "title": "Прическа и борода государственного служащего должна быть аккуратной, отвечать требованиям гигиены и не мешать использ...", "content": "Статья 17. Прическа и борода государственного служащего должна быть аккуратной, отвечать требованиям гигиены и не мешать использованию средств индивидуальной защиты.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-18", "number": "18", "title": "Государственному служащему при исполнении им должностных обязанностей разрешается носить ювелирные украшения, за искл...", "content": "Статья 18. Государственному служащему при исполнении им должностных обязанностей разрешается носить ювелирные украшения, за исключением громоздких, вульгарных и вызывающих аксессуаров.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-19", "number": "19", "title": "Государственному служащему при исполнении им должностных обязанностей запрещено ношение линз неестественных цветов, о...", "content": "Статья 19. Государственному служащему при исполнении им должностных обязанностей запрещено ношение линз неестественных цветов, окрашивание волос в яркие или неестественные цвета, а также нанесение яркого и выделяющегося макияжа и (или) грима.\nПримечание: сотрудникам женского пола допускается нанесение неяркого макияжа (туши, помады и пудры).", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-20", "number": "20", "title": "Государственному служащему при исполнении им должностных обязанностей разрешено ношение солнцезащитных очков и очков ...", "content": "Статья 20. Государственному служащему при исполнении им должностных обязанностей разрешено ношение солнцезащитных очков и очков для коррекции зрения при условии того, что линзы и оправа очков должны быть неяркими и однотонными.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-21", "number": "21", "title": "Государственному служащему разрешено наличие татуировок, кроме татуировок, расположенных на голове, шее и кистях рук,...", "content": "Статья 21. Государственному служащему разрешено наличие татуировок, кроме татуировок, расположенных на голове, шее и кистях рук, а также татуировок на тему смерти, азартных игр, криминала.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-22", "number": "22", "title": "Государственному служащему при исполнении им должностных обязанностей разрешено носить рюкзаки и сумки.", "content": "Статья 22. Государственному служащему при исполнении им должностных обязанностей разрешено носить рюкзаки и сумки.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-23", "number": "23", "title": "Государственный служащий мужского пола при исполнении им должностных обязанностей обязан носить исключительно следующ...", "content": "Статья 23. Государственный служащий мужского пола при исполнении им должностных обязанностей обязан носить исключительно следующие элементы одежды:\n\n– служебная форма либо установленный внутренним актами костюм;\n– компоненты строгого и делового костюма неярких тонов, жилет или джемпер;\n– классические рубашки с длинным или коротким рукавом неярких тонов, водолазки или рубашки-поло;\n– футболки неярких тонов, если они являются компонентом служебного костюма;\n– аккуратные джинсы или штаны хаки, с отсутствием ярко выраженных узоров и логотипов;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-24", "number": "24", "title": "Государственный служащий мужского пола при исполнении им должностных обязанностей обязан носить исключительно следующ...", "content": "Статья 24. Государственный служащий мужского пола при исполнении им должностных обязанностей обязан носить исключительно следующую обувь:\n\n– строгие и деловые туфли нейтральных цветов;\n– мокасины нейтральных цветов;\n– кроссовки и кеды нейтральных цветов без неоновой подсветки, с отсутствием ярко выраженных узоров и логотипов;\n– берцы в случае, с отсутствием ярко выраженных узоров и логотипов;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-25", "number": "25", "title": "Государственный служащий женского пола при исполнении им должностных обязанностей обязан носить исключительно следующ...", "content": "Статья 25. Государственный служащий женского пола при исполнении им должностных обязанностей обязан носить исключительно следующие элементы одежды:\n\n– служебная форма либо установленный внутренним актами костюм;\n– деловой костюм неярких тонов, аккуратное платье, корсет, жилет или кардиган;\n– классические рубашки с длинным или коротким рукавом неярких тонов, водолазки или рубашки-поло;\n– футболки неярких тонов, если они являются компонентом служебного костюма;\n– аккуратные джинсы или штаны хаки и бриджи милитари, с отсутствием ярко выраженных узоров и логотипов;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-26", "number": "26", "title": "Государственный служащий женского пола при исполнении им должностных обязанностей обязан носить исключительно следующ...", "content": "Статья 26. Государственный служащий женского пола при исполнении им должностных обязанностей обязан носить исключительно следующую обувь:\n\n– строгие и деловые туфли неярких цветов;\n– кроссовки и кеды нейтральных цветов без неоновой подсветки в случае, с отсутствием ярко выраженных узоров и логотипов;\n– берцы в случае, с отсутствием ярко выраженных узоров и логотипов;\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-27", "number": "27", "title": "В прохладную погоду государственному служащему при исполнении им должностных обязанностей позволяется носить пальто и...", "content": "Статья 27. В прохладную погоду государственному служащему при исполнении им должностных обязанностей позволяется носить пальто или куртку нейтральных тонов, шапку ушанку.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-27.1", "number": "27.1", "title": "Губернатор штата Сан-Андреас вправе установить дополнительные ограничения и связанные с ними обязанности для государс...", "content": "Статья 27.1. Губернатор штата Сан-Андреас вправе установить дополнительные ограничения и связанные с ними обязанности для государственных служащих соответствующим указом. При наличии противоречий между указом губернатора и статьями 23-27 применяются нормы Указа.\n\nГЛАВА 5. ОТВЕТСТВЕННОСТЬ", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-28", "number": "28", "title": "Ответственность за нарушение данного этического кодекса предусмотрена в виде штрафа в казну правительства, который ва...", "content": "Статья 28. Ответственность за нарушение данного этического кодекса предусмотрена в виде штрафа в казну правительства, который варьируется от 10.000 $ до 50.000 $ в зависимости от тяжести и серьезности нарушения. Штраф может быть оплачен через Казначейство или Офис Генерального прокурора штата Сан-Андреас.\n\nч. 1. Право привлекать к административной ответственности, предусмотренной настоящим кодексом, имеет Офис Генерального прокурора штата Сан-Андреас. Ответственность также может быть назначена по решению суда или органов, осуществляющих административный надзор внутри структуры, служащим которой является правонарушитель, а также руководителями профильных правительственных департаментов, в составе (под руководством) которых находится организация, служащим которой является правонарушитель.\n\nч. 2. В случае обнаружения нарушения Этического кодекса от сотрудника из руководящего состава государственной организации Генеральный прокурор, его заместители, суд, а также руководители профильных правительственных департаментов, в составе (под руководством) которых находится организация, служащим которой является правонарушитель, вправе наложить на организацию штраф в размере до 50.000$.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-29", "number": "29", "title": "При установлении нарушения положений данного кодекса государственным служащим в присутствии вышестоящего должностного...", "content": "Статья 29. При установлении нарушения положений данного кодекса государственным служащим в присутствии вышестоящего должностного лица, последнее обязано принять все необходимые меры для пресечения данного нарушения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "ethics-30", "number": "30", "title": "Игнорирование руководителем или уполномоченным лицом внутри государственной структуры факта нарушения данного кодекса...", "content": "Статья 30. Игнорирование руководителем или уполномоченным лицом внутри государственной структуры факта нарушения данного кодекса со стороны его подчинённого запрещено.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "civil": [{"id": "civil-1", "number": "1", "title": "Основные начала гражданского законодательства", "content": "Статья 1. Основные начала гражданского законодательства\n\n1. Гражданское законодательство основывается на признании равенства участников регулируемых им отношений, неприкосновенности собственности, свободы договора, недопустимости произвольного вмешательства кого-либо в частные дела, необходимости беспрепятственного осуществления гражданских прав, обеспечения восстановления нарушенных прав, их судебной защиты.\n\n2. Граждане (физические лица) и юридические лица приобретают и осуществляют свои гражданские права своей волей и в своем интересе. Они свободны в установлении своих прав и обязанностей на основе договора и в определении любых не противоречащих законодательству условий договора.\n\nГражданские права могут быть ограничены на основании закона и только в той мере, в какой это необходимо в целях защиты основ конституционного строя, нравственности, здоровья, прав и законных интересов других лиц, обеспечения обороны страны и безопасности государства.\n\n3. При установлении, осуществлении и защите гражданских прав и при исполнении гражданских обязанностей участники гражданских правоотношений должны действовать добросовестно.\n\n4. Никто не вправе извлекать преимущество из своего незаконного или недобросовестного поведения.\n\n5. Товары, услуги и финансовые средства свободно перемещаются на всей территории Штата Сан-Андреас.\n\nОграничения перемещения товаров и услуг могут вводиться в соответствии с законом, если это необходимо для обеспечения безопасности, защиты жизни и здоровья людей, охраны природы и культурных ценностей.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-2", "number": "2", "title": "Отношения, регулируемые гражданским законодательством", "content": "Статья 2. Отношения, регулируемые гражданским законодательством\n\n1. Гражданское законодательство определяет правовое положение участников гражданского оборота, основания возникновения и порядок осуществления права собственности и других вещных прав, прав на результаты интеллектуальной деятельности и приравненные к ним средства индивидуализации (интеллектуальных прав), регулирует отношения, связанные с участием в корпоративных организациях или с управлением ими (корпоративные отношения), договорные и иные обязательства, а также другие имущественные и личные неимущественные отношения, основанные на равенстве, автономии воли и имущественной самостоятельности участников.\n\nУчастниками регулируемых гражданским законодательством отношений являются граждане и юридические лица. В регулируемых гражданским законодательством отношениях могут участвовать также Штата Сан-Андреас.\n\nГражданское законодательство регулирует отношения между лицами, осуществляющими предпринимательскую деятельность, или с их участием, исходя из того, что предпринимательской является самостоятельная, осуществляемая на свой риск деятельность, направленная на систематическое получение прибыли от пользования имуществом, продажи товаров, выполнения работ или оказания услуг. Лица, осуществляющие предпринимательскую деятельность, должны быть зарегистрированы в этом качестве в установленном законом порядке, если иное не предусмотрено настоящим Кодексом.\n\n2. Неотчуждаемые права и свободы человека и другие нематериальные блага защищаются гражданским законодательством, если иное не вытекает из существа этих нематериальных благ.\n\n3. К имущественным отношениям, основанным на административном или ином властном подчинении одной стороны другой, в том числе к налоговым и другим финансовым и административным отношениям, гражданское законодательство не применяется, если иное не предусмотрено законодательством.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-3", "number": "3", "title": "Действие гражданского законодательства во времени", "content": "Статья 3. Действие гражданского законодательства во времени\n\n1. Акты гражданского законодательства не имеют обратной силы и применяются к отношениям, возникшим после введения их в действие.\n\nДействие закона распространяется на отношения, возникшие до введения его в действие, только в случаях, когда это прямо предусмотрено законом.\n\n2. По отношениям, возникшим до введения в действие акта гражданского законодательства, он применяется к правам и обязанностям, возникшим после введения его в действие.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-4", "number": "4", "title": "Обычаи", "content": "Статья 4. Обычаи\n\n1. Обычаем признается сложившееся и широко применяемое в какой-либо области предпринимательской или иной деятельности, не предусмотренное законодательством правило поведения, независимо от того, зафиксировано ли оно в каком-либо документе.\n\n2. Обычаи, противоречащие обязательным для участников соответствующего отношения положениям законодательства или договору, не применяются.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-5", "number": "5", "title": "Применение гражданского законодательства по аналогии", "content": "Статья 5. Применение гражданского законодательства по аналогии\n\n1. В случаях, когда предусмотренные пунктами 1 и 2 статьи 2 настоящего Кодекса отношения прямо не урегулированы законодательством или соглашением сторон и отсутствует применимый к ним обычай, к таким отношениям, если это не противоречит их существу, применяется гражданское законодательство, регулирующее сходные отношения (аналогия закона).\n\n2. При невозможности использования аналогии закона права и обязанности сторон определяются исходя из общих начал и смысла гражданского законодательства (аналогия права) и требований добросовестности, разумности и справедливости.\n\n\nГлава 2. Возникновение гражданских прав и обязанностей, осуществление и защита гражданских прав\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-6", "number": "6", "title": "Основания возникновения гражданских прав и обязанностей", "content": "Статья 6. Основания возникновения гражданских прав и обязанностей\n\n1. Гражданские права и обязанности возникают из оснований, предусмотренных законом и иными правовыми актами, а также из действий граждан и юридических лиц, которые хотя и не предусмотрены законом или такими актами, но в силу общих начал и смысла гражданского законодательства порождают гражданские права и обязанности.\n\nВ соответствии с этим гражданские права и обязанности возникают:\n\n1) из договоров и иных сделок, предусмотренных законом, а также из договоров и иных сделок, хотя и не предусмотренных законом, но не противоречащих ему;\n2) из актов государственных органов, которые предусмотрены законом в качестве основания возникновения гражданских прав и обязанностей;\n3) из судебного решения, установившего гражданские права и обязанности;\n4) в результате приобретения имущества по основаниям, допускаемым законом;\n5) вследствие причинения вреда другому лицу;\n6) вследствие неосновательного обогащения;\n7) вследствие иных действий граждан и юридических лиц;\n8) вследствие событий, с которыми закон или иной правовой акт связывает наступление гражданско-правовых последствий.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-7", "number": "7", "title": "Пределы осуществления гражданских прав", "content": "Статья 7. Пределы осуществления гражданских прав\n\n1. Не допускаются осуществление гражданских прав исключительно с намерением причинить вред другому лицу, действия в обход закона с противоправной целью, а также иное заведомо недобросовестное осуществление гражданских прав (злоупотребление правом).\n\nНе допускается использование гражданских прав в целях ограничения конкуренции, а также злоупотребление доминирующим положением на рынке.\n\n2. Если злоупотребление правом повлекло нарушение права другого лица, такое лицо вправе требовать возмещения причиненных этим убытков.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-8", "number": "8", "title": "Судебная защита гражданских прав", "content": "Статья 8. Судебная защита гражданских прав\n\n1. Защиту нарушенных или оспоренных гражданских прав осуществляет суд в соответствии с их компетенцией.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-9", "number": "9", "title": "Способы защиты гражданских прав", "content": "Статья 9. Способы защиты гражданских прав\n\n1. Защита гражданских прав осуществляется путем:\n\nпризнания права;\nвосстановления положения, существовавшего до нарушения права, и пресечения действий, нарушающих право или создающих угрозу его нарушения;\nпризнания оспоримой сделки недействительной и применения последствий ее недействительности, применения последствий недействительности ничтожной сделки;\nпризнания недействительным акта государственного органа;\nсамозащиты права;\nприсуждения к исполнению обязанности в натуре;\nвозмещения убытков;\nвзыскания неустойки;\nкомпенсации морального вреда;\nпрекращения или изменения правоотношения;\nнеприменения судом акта государственного органа, противоречащего закону;\nиными способами, предусмотренными законом.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-10", "number": "10", "title": "Признание недействительным акта государственного органа", "content": "Статья 10. Признание недействительным акта государственного органа\n\n1. Ненормативный акт государственного органа, а в случаях, предусмотренных законом, также нормативный акт, не соответствующие закону или иным правовым актам и нарушающие гражданские права и охраняемые законом интересы гражданина или юридического лица, могут быть признаны судом недействительными.\n\n2. В случае признания судом акта недействительным нарушенное право подлежит восстановлению либо защите иными способами, предусмотренными статьей 9 настоящего Кодекса.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-11", "number": "11", "title": "Самозащита гражданских прав", "content": "Статья 11. Самозащита гражданских прав\n\n1. Допускается самозащита гражданских прав.\n\n2. Способы самозащиты должны быть соразмерны нарушению и не выходить за пределы действий, необходимых для его пресечения.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-12", "number": "12", "title": "Возмещение убытков", "content": "Статья 12. Возмещение убытков\n\n1. Лицо, право которого нарушено, может требовать полного возмещения причиненных ему убытков, если законом или договором не предусмотрено возмещение убытков в меньшем размере.\n\n2. Под убытками понимаются расходы, которые лицо, чье право нарушено, произвело или должно будет произвести для восстановления нарушенного права, утрата или повреждение его имущества (реальный ущерб), а также неполученные доходы, которые это лицо получило бы при обычных условиях гражданского оборота, если бы его право не было нарушено (упущенная выгода).\n\nЕсли лицо, нарушившее право, получило вследствие этого доходы, лицо, право которого нарушено, вправе требовать возмещения наряду с другими убытками упущенной выгоды в размере не меньшем, чем такие доходы.\n\n\nПодраздел 2. Лица\n\nГлава 3. Граждане (физические лица) и юридические лица\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-13", "number": "13", "title": "Правоспособность гражданина", "content": "Статья 13. Правоспособность гражданина\n\n1. Способность иметь гражданские права и нести обязанности (гражданская правоспособность) признается в равной мере за всеми гражданами.\n\n2. Правоспособность гражданина возникает в момент его рождения и прекращается смертью.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-14", "number": "14", "title": "Содержание правоспособности граждан", "content": "Статья 14. Содержание правоспособности граждан\n\nГраждане могут иметь имущество на праве собственности; заниматься предпринимательской и любой иной не запрещенной законом деятельностью; создавать юридические лица самостоятельно или совместно с другими гражданами и юридическими лицами; совершать любые не противоречащие закону сделки и участвовать в обязательствах; избирать место жительства; иметь иные имущественные и личные неимущественные права.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-15", "number": "15", "title": "Дееспособность гражданина", "content": "Статья 15. Дееспособность гражданина\n\n1. Способность гражданина своими действиями приобретать и осуществлять гражданские права, создавать для себя гражданские обязанности и исполнять их (гражданская дееспособность) возникает в полном объеме с наступлением совершеннолетия, то есть по достижении восемнадцатилетнего возраста.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-16", "number": "16", "title": "Недопустимость лишения и ограничения правоспособности и дееспособности гражданина", "content": "Статья 16. Недопустимость лишения и ограничения правоспособности и дееспособности гражданина\n\n1. Никто не может быть ограничен в правоспособности и дееспособности иначе, как в случаях и в порядке, установленных законом.\n\n2. Несоблюдение установленных законом условий и порядка ограничения дееспособности граждан или их права заниматься предпринимательской либо иной деятельностью влечет недействительность акта государственного или иного органа, устанавливающего соответствующее ограничение.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-17", "number": "17", "title": "Предпринимательская деятельность гражданина", "content": "Статья 17. Предпринимательская деятельность гражданина\n\n1. Гражданин вправе заниматься предпринимательской деятельностью без образования юридического лица с момента государственной регистрации в качестве индивидуального предпринимателя, за исключением случаев, предусмотренных законом.\n\nВ отношении отдельных видов предпринимательской деятельности законом могут быть предусмотрены условия осуществления гражданами такой деятельности без государственной регистрации в качестве индивидуального предпринимателя.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-18", "number": "18", "title": "Понятие юридического лица", "content": "Статья 18. Понятие юридического лица\n\n1. Юридическим лицом признается организация, которая имеет обособленное имущество и отвечает им по своим обязательствам, может от своего имени приобретать и осуществлять гражданские права и нести гражданские обязанности, быть истцом и ответчиком в суде.\n\n2. Юридическое лицо должно быть зарегистрировано в едином государственном реестре юридических лиц.\n\n\nГлава 4. Участие штата Сан-Андреас в отношениях, регулируемых гражданским законодательством \n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-19", "number": "19", "title": "Штат Сан-Андреас - субъект гражданского права", "content": "Статья 19. Штат Сан-Андреас - субъект гражданского права\n\n1. Штат Сан-Андреас выступает в отношениях, регулируемых гражданским законодательством, на равных началах с иными участниками этих отношений - гражданами и юридическими лицами.\n\n2. К субъектам гражданского права, указанным в пункте 1 настоящей статьи, применяются нормы, определяющие участие юридических лиц в отношениях, регулируемых гражданским законодательством, если иное не вытекает из закона или особенностей данных субъектов.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-20", "number": "20", "title": "Порядок участия штата Сан-Андреас в отношениях, регулируемых гражданским законодательством", "content": "Статья 20. Порядок участия штата Сан-Андреас в отношениях, регулируемых гражданским законодательством\n\n1. От имени штата Сан-Андреас могут своими действиями приобретать и осуществлять имущественные и личные неимущественные права и обязанности, выступать в суде органы государственной власти в рамках их компетенции, установленной актами, определяющими статус этих органов.\n\n\nПодраздел 3. Объекты гражданских прав\n\nГлава 5. Общие положения\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-21", "number": "21", "title": "Объекты гражданских прав", "content": "Статья 21. Объекты гражданских прав\n\nК объектам гражданских прав относятся вещи (включая наличные деньги), иное имущество, в том числе имущественные права (включая безналичные денежные средства); результаты работ и оказание услуг; охраняемые результаты интеллектуальной деятельности и приравненные к ним средства индивидуализации (интеллектуальная собственность); нематериальные блага.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-22", "number": "22", "title": "Недвижимые и движимые вещи", "content": "Статья 22. Недвижимые и движимые вещи\n\n1. К недвижимым вещам (недвижимое имущество, недвижимость) относятся земельные участки, участки недр и все, что прочно связано с землей, то есть объекты, перемещение которых без несоразмерного ущерба их назначению невозможно, в том числе здания, сооружения, объекты незавершенного строительства.\n\nЗаконом к недвижимым вещам может быть отнесено и иное имущество.\n\nК недвижимым вещам относятся жилые и нежилые помещения, а также предназначенные для размещения транспортных средств части зданий или сооружений (машино-места), если границы таких помещений, частей зданий или сооружений описаны в установленном законодательством.\n\n2. Вещи, не относящиеся к недвижимости, включая деньги, признаются движимым имуществом. Регистрация прав на движимые вещи не требуется, кроме случаев, указанных в законе.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-23", "number": "23", "title": "Неделимые вещи", "content": "Статья 23. Неделимые вещи\n\n1. Вещь, раздел которой в натуре невозможен без разрушения, повреждения вещи или изменения ее назначения и которая выступает в обороте как единый объект вещных прав, является неделимой вещью и в том случае, если она имеет составные части.\n\n2. Замена одних составных частей неделимой вещи другими составными частями не влечет возникновения иной вещи, если при этом существенные свойства вещи сохраняются.\n\n3. Взыскание может быть обращено на неделимую вещь только в целом, если законом или судебным актом не установлена возможность выделения из вещи ее составной части, в том числе в целях продажи ее отдельно.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-24", "number": "24", "title": "Сложные вещи", "content": "Статья 24. Сложные вещи\n\nЕсли различные вещи соединены таким образом, который предполагает их использование по общему назначению (сложная вещь), то действие сделки, совершенной по поводу сложной вещи, распространяется на все входящие в нее вещи, поскольку условиями сделки не предусмотрено иное.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-25", "number": "25", "title": "Животные", "content": "Статья 25. Животные\n\nК животным применяются общие правила об имуществе постольку, поскольку законом или иными правовыми актами не установлено иное.\n\nПри осуществлении прав не допускается жестокое обращение с животными, противоречащее принципам гуманности.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-26", "number": "26", "title": "Деньги (валюта)", "content": "Статья 26. Деньги (валюта)\n\n1. Доллар США является законным платежным средством, обязательным к приему по нарицательной стоимости на всей территории штата Сан-Андреас.\n\nПлатежи на территории штата Сан-Андреас осуществляются путем наличных и безналичных расчетов.\n\n\nГлава 6. Нематериальные блага и их защита\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-27", "number": "27", "title": "Нематериальные блага", "content": "Статья 27. Нематериальные блага\n\n1. Жизнь и здоровье, достоинство личности, личная неприкосновенность, и доброе имя, деловая репутация, неприкосновенность частной жизни, неприкосновенность жилища, личная и семейная тайна, свобода передвижения, свобода выбора места пребывания и жительства, имя гражданина, авторство, иные нематериальные блага, принадлежащие гражданину от рождения или в силу закона, неотчуждаемы и непередаваемы иным способом.\n\n2. Нематериальные блага защищаются в соответствии с настоящим Кодексом и другими законами в случаях и в порядке, ими предусмотренных, а также в тех случаях и пределах, в каких использование способов защиты гражданских прав вытекает из существа нарушенного нематериального блага или личного неимущественного права и характера последствий этого нарушения.\n\nВ случаях, если того требуют интересы гражданина, принадлежащие ему нематериальные блага могут быть защищены, в частности, путем признания судом факта нарушения его личного неимущественного права, опубликования решения суда о допущенном нарушении, а также путем пресечения или запрещения действий, нарушающих или создающих угрозу нарушения личного неимущественного права либо посягающих или создающих угрозу посягательства на нематериальное благо.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-28", "number": "28", "title": "Компенсация морального вреда", "content": "Статья 28. Компенсация морального вреда\n\nЕсли гражданину причинен моральный вред (физические или нравственные страдания) действиями, нарушающими его личные неимущественные права либо посягающими на принадлежащие гражданину нематериальные блага, а также в других случаях, предусмотренных законом, суд может возложить на нарушителя обязанность денежной компенсации указанного вреда.\n\nПри определении размеров компенсации морального вреда суд принимает во внимание степень вины нарушителя и иные заслуживающие внимания обстоятельства. Суд должен также учитывать степень физических и нравственных страданий, связанных с индивидуальными особенностями гражданина, которому причинен вред.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-28.1", "number": "28.1", "title": "Право регресса к лицу, причинившему вред", "content": "Статья 28.1 Право регресса к лицу, причинившему вред\n\nЛицо, возместившее вред, причиненный другим лицом (работником при исполнении им служебных, должностных или иных трудовых обязанностей, лицом, управляющим транспортным средством, и т.п.), имеет право обратного требования (регресса) к этому лицу в размере выплаченного возмещения, если иной размер не установлен законом.\n\nПричинитель вреда, возместивший совместно причиненный вред, вправе требовать с каждого из других причинителей вреда долю выплаченного потерпевшему возмещения в размере, соответствующем степени вины этого причинителя вреда. При невозможности определить степень вины доли признаются равными.\n\nОрганы государственной власти или государственные органы в случае возмещения ими вреда, причиненного лицом (работником при исполнении им служебных, должностных или иных трудовых обязанностей, лицом, управляющим транспортным средством, и т.п.), имеют право регресса к этому лицу, если его вина установлена соответствующим судебным актом, вступившим в законную силу либо в связи с незаконными действиями (бездействием) которого произведено указанное возмещение.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-29", "number": "29", "title": "Защита чести, достоинства и деловой репутации", "content": "Статья 29. Защита чести, достоинства и деловой репутации\n\n1. Гражданин вправе требовать по суду опровержения порочащих его честь, достоинство или деловую репутацию сведений, если распространивший такие сведения не докажет, что они соответствуют действительности. Опровержение должно быть сделано тем же способом, которым были распространены сведения о гражданине, или другим аналогичным способом.\n\nПо требованию заинтересованных лиц допускается защита чести, достоинства и деловой репутации гражданина и после его смерти.\n\n2. Сведения, порочащие честь, достоинство или деловую репутацию гражданина и распространенные в средствах массовой информации, должны быть опровергнуты в тех же средствах массовой информации. Гражданин, в отношении которого в средствах массовой информации распространены указанные сведения, имеет право потребовать наряду с опровержением также опубликования своего ответа в тех же средствах массовой информации.\n\n3. Если сведения, порочащие честь, достоинство или деловую репутацию гражданина, содержатся в документе, исходящем от организации, такой документ подлежит замене или отзыву.\n\n4. В случаях, когда сведения, порочащие честь, достоинство или деловую репутацию гражданина, стали широко известны и в связи с этим опровержение невозможно довести до всеобщего сведения, гражданин вправе требовать удаления соответствующей информации, а также пресечения или запрещения дальнейшего распространения указанных сведений путем изъятия и уничтожения без какой бы то ни было компенсации изготовленных в целях введения в гражданский оборот экземпляров материальных носителей, содержащих указанные сведения, если без уничтожения таких экземпляров материальных носителей удаление соответствующей информации невозможно.\n\n5. Если сведения, порочащие честь, достоинство или деловую репутацию гражданина, оказались после их распространения доступными в сети \"Интернет\", гражданин вправе требовать удаления соответствующей информации, а также опровержения указанных сведений способом, обеспечивающим доведение опровержения до пользователей сети \"Интернет\".\n\n6. Порядок опровержения сведений, порочащих честь, достоинство или деловую репутацию гражданина, в иных случаях, кроме указанных в пунктах 2 - 5 настоящей статьи, устанавливается судом.\n\n7. Применение к нарушителю мер ответственности за неисполнение судебного решения не освобождает его от обязанности совершить предусмотренное решением суда действие.\n\n8. Если установить лицо, распространившее сведения, порочащие честь, достоинство или деловую репутацию гражданина, невозможно, гражданин, в отношении которого такие сведения распространены, вправе обратиться в суд с заявлением о признании распространенных сведений не соответствующими действительности.\n\n9. Гражданин, в отношении которого распространены сведения, порочащие его честь, достоинство или деловую репутацию, наряду с опровержением таких сведений или опубликованием своего ответа вправе требовать возмещения убытков и компенсации морального вреда, причиненных распространением таких сведений.\n\n10. Правила пунктов 1 - 9 настоящей статьи, за исключением положений о компенсации морального вреда, могут быть применены судом также к случаям распространения любых не соответствующих действительности сведений о гражданине, если такой гражданин докажет несоответствие указанных сведений действительности. \n\n11. Правила настоящей статьи о защите деловой репутации гражданина, за исключением положений о компенсации морального вреда, соответственно применяются к защите деловой репутации юридического лица.\n\n\nПодраздел 4. Сделки\n\nГлава 7. Сделки\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-30", "number": "30", "title": "Понятие сделки", "content": "Статья 30. Понятие сделки\n\nСделками признаются действия граждан и юридических лиц, направленные на установление, изменение или прекращение гражданских прав и обязанностей.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-31", "number": "31", "title": "Договоры и односторонние сделки", "content": "Статья 31. Договоры и односторонние сделки\n\n1. Сделки могут быть двух- или многосторонними (договоры) и односторонними.\n\n2. Односторонней считается сделка, для совершения которой в соответствии с законом, иными правовыми актами или соглашением сторон необходимо и достаточно выражения воли одной стороны.\n\n3. Для заключения договора необходимо выражение согласованной воли двух сторон (двусторонняя сделка) либо трех или более сторон (многосторонняя сделка).\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-32", "number": "32", "title": "Обязанности по односторонней сделке", "content": "Статья 32. Обязанности по односторонней сделке\n\nОдносторонняя сделка создает обязанности для лица, совершившего сделку. Она может создавать обязанности для других лиц лишь в случаях, установленных законом либо соглашением с этими лицами.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-33", "number": "33", "title": "Форма сделок", "content": "Статья 33. Форма сделок\n\n1. Сделки совершаются устно или в письменной форме.\n\n2. Сделка, которая может быть совершена устно, считается совершенной и в том случае, когда из поведения лица явствует его воля совершить сделку.\n\n3. Молчание признается выражением воли совершить сделку в случаях, предусмотренных законом или соглашением сторон.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-34", "number": "34", "title": "Устные сделки", "content": "Статья 34. Устные сделки\n\n1. Сделка, для которой законом или соглашением сторон не установлена письменная форма, может быть совершена устно.\n\n2. Если иное не установлено соглашением сторон, могут совершаться устно все сделки, исполняемые при самом их совершении, за исключением сделок, для которых установлена нотариальная форма, и сделок, несоблюдение простой письменной формы которых влечет их недействительность.\n\n3. Сделки во исполнение договора, заключенного в письменной форме, могут по соглашению сторон совершаться устно, если это не противоречит закону, иным правовым актам и договору.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-35", "number": "35", "title": "Письменная форма сделки", "content": "Статья 35. Письменная форма сделки\n\n1. Сделка в письменной форме должна быть совершена путем составления документа, выражающего ее содержание и подписанного лицом или лицами, совершающими сделку, либо должным образом уполномоченными ими лицами.\n\nПисьменная форма сделки считается соблюденной также в случае совершения лицом сделки с помощью электронных либо иных технических средств, позволяющих воспроизвести на материальном носителе в неизменном виде содержание сделки, при этом требование о наличии подписи считается выполненным, если использован любой способ, позволяющий достоверно определить лицо, выразившее волю. Законом, иными правовыми актами и соглашением сторон может быть предусмотрен специальный способ достоверного определения лица, выразившего волю.\n\nЗаконом, иными правовыми актами и соглашением сторон могут устанавливаться дополнительные требования, которым должна соответствовать форма сделки (совершение на бланке определенной формы, скрепление печатью и тому подобное), и предусматриваться последствия несоблюдения этих требований. \n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-36", "number": "36", "title": "Сделки, совершаемые в простой письменной форме", "content": "Статья 36. Сделки, совершаемые в простой письменной форме\n\n1. Должны совершаться в простой письменной форме, за исключением сделок, требующих государственного удостоверения:\n1) сделки юридических лиц между собой и с гражданами.\n\n2. Соблюдение простой письменной формы не требуется для сделок, которые могут быть совершены устно.\n\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "civil-37", "number": "37", "title": "Государственная регистрация сделок", "content": "Статья 37. Государственная регистрация сделок\n\n1. В случаях, если законом предусмотрена государственная регистрация сделок, правовые последствия сделки наступают после ее регистрации.\n", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "const": [{"id": "const-1", "number": "1", "title": "Человек, его права и свободы являются высшей ценностью. Признание, соблюдение и защита прав и свобод человека и гражд...", "content": "Статья 1 \n\nЧеловек, его права и свободы являются высшей ценностью. Признание, соблюдение и защита прав и свобод человека и гражданина — обязанность государства.\nВсе права и свободы гарантируются и регулируются действующим законодательством штата Сан-Андреас.\nВ штате Сан-Андреас признаются и гарантируются права и свободы человека и гражданина согласно настоящей Конституцией.\nОсновные права и свободы человека неотчуждаемы и принадлежат каждому от рождения.\nОсуществление прав и свобод человека и гражданина не должно нарушать права и свободы других лиц.\nПрава и свободы человека и гражданина являются непосредственно действующими. Они определяют смысл, содержание и применение законов, деятельность законодательной и исполнительной власти, местного самоуправления и обеспечиваются правосудием.\nСенат не вправе издавать ни одного закона, относящегося к установлению религии либо запрещающего свободное ее исповедание, ограничивающего свободу слова или печати, право народа мирно собираться и обращаться к правительству с петициями об удовлетворении жалоб.\nКаждый должен соблюдать Конституцию штата Сан-Андреас и законы, уважать права и свободы других лиц, нести иные установленные законом обязанности.\nНезнание официально опубликованного закона не освобождает от ответственности за его несоблюдение. Исполнение явно преступного приказа влечет за собой ответственность по закону.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-2", "number": "2", "title": "Всякая политическая власть присуща народу. Правительство учреждено для защиты, безопасности и пользы людей.", "content": "Статья 2\n\nВсякая политическая власть присуща народу. Правительство учреждено для защиты, безопасности и пользы людей.\nВсе равны перед законом и судом.\nГосударство гарантирует равенство прав и свобод человека и гражданина независимо от пола, расы, национальности, языка, происхождения, имущественного и должностного положения, места жительства, отношения к религии, убеждений, принадлежности к общественным объединениям, а также других обстоятельств. Запрещаются любые формы ограничения прав граждан по признакам социальной, расовой, национальной, языковой или религиозной принадлежности.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-3", "number": "3", "title": "Штат Сан-Андреас является неотъемлемой частью Соединенных Штатов Америки.", "content": "Статья 3 \n\nШтат Сан-Андреас является неотъемлемой частью Соединенных Штатов Америки.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-4", "number": "4", "title": "Закон, устанавливающий или отягчающий ответственность, обратной силы не имеет.", "content": "Статья 4 \nЗакон, устанавливающий или отягчающий ответственность, обратной силы не имеет.\nНикто не может нести ответственность за деяние, которое в момент его совершения не признавалось правонарушением. Если после совершения правонарушения ответственность за него устранена или смягчена, применяется новый закон.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-5", "number": "5", "title": "Право на свободное вероисповедание без дискриминации или предпочтения навсегда гарантируется в штате.", "content": "Статья 5 \n\nПраво на свободное вероисповедание без дискриминации или предпочтения навсегда гарантируется в штате.\nКаждый гражданин может свободно говорить, писать и публиковать свое мнение на любую тему, если это не противоречит действующему законодательству.\nНарод имеет право свободно собираться вместе для обсуждения общего блага или для проведения протестных акций если это не противоречит действующему законодательству штата Сан-Андреас, за исключением периода действия чрезвычайного или военного положения в Штате.\nКаждый гражданин штата Сан-Андреас имеет право подавать петиции государственным чиновникам с предложениями по реформам и законодательными инициативами.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-6", "number": "6", "title": "В уголовном преследовании, досудебном разбирательстве и Суде, обвиняемая сторона имеет право на скорое и независимое ...", "content": "Статья 6 \n\nВ уголовном преследовании, досудебном разбирательстве и Суде, обвиняемая сторона имеет право на скорое и независимое разбирательство. Суд обязан предоставить обвиняемому адвоката по запросу. Ни одно лицо не может дважды преследоваться за одно и то же преступление.\nНикто не обязан свидетельствовать против себя самого и своего супруга.\nКаждый имеет право на жизнь.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-7", "number": "7", "title": "Частная собственность неприкосновенна и не может быть изъята без достойной компенсации за исключением случаев, когда ...", "content": "Статья 7\n\nЧастная собственность неприкосновенна и не может быть изъята без достойной компенсации за исключением случаев, когда владение им противоречит действующему законодательству штата Сан-Андреас.\nПраво людей защищать свою собственность, документы и персональные данные от незаконных изъятий и обысков, не должно быть нарушено.\nЧеловек имеет право защищать себя, свою собственность, права и свободы любым законным способом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-8", "number": "8", "title": "Людям гарантируется свобода труда. Рабство запрещено. Принудительный труд запрещается, за исключением случаев, когда ...", "content": "Статья 8 \n\nЛюдям гарантируется свобода труда. Рабство запрещено. Принудительный труд запрещается, за исключением случаев, когда это является мерой наказания за преступление.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-9", "number": "9", "title": "Измена против государства заключается в войне против него, поддержке врагов государства или оказание им помощи.", "content": "Статья 9\n\nИзмена против государства заключается в войне против него, поддержке врагов государства или оказание им помощи.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-10", "number": "10", "title": "Достоинство личности охраняется государством. Ничто не может быть основанием для его умаления.", "content": "Статья 10\n\nДостоинство личности охраняется государством. Ничто не может быть основанием для его умаления.\nНикто не должен подвергаться пыткам, насилию, другому жестокому или унижающему человеческое достоинство обращению или наказанию. Никто не может быть без добровольного согласия подвергнут медицинским, научным или иным опытам", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-11", "number": "11", "title": "Положения настоящей Конституции являются обязательными к исполнению. Конституция это закон прямого действия.", "content": "Статья 11\n\nПоложения настоящей Конституции являются обязательными к исполнению. Конституция это закон прямого действия.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-1 неприкосновенностью.", "content": "Статья 26\n\nГубернатор штата Сан-Андреас обладает неприкосновенностью.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-27", "number": "27", "title": "Очерёдность преемственности губернаторства в штате является порядком, определяющий кто может занять пост губернатора ...", "content": "Статья 27\n\nОчерёдность преемственности губернаторства в штате является порядком, определяющий кто может занять пост губернатора или исполнять его обязанности, по причине нетрудоспособности, смерти, отставки или отстранения от должности действующего губернатора.\nОчередность преемственности губернаторства определяется следующим списком:\nа) Вице-губернатор;\nб) Генеральный прокурор (Глава Департамента юстиции);\nв) Глава департамента национальной безопасности;\nг) Государственный казначей;\nд) Глава департамента культуры.\n\n\nГлава 4. Органы исполнительной власти штата Сан-Андреас", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-28", "number": "28", "title": "Исполнительную власть штата Сан-Андреас осуществляет Правительство штата Сан-Андреас во главе с Губернатором штата Са...", "content": "Статья 28\n\nИсполнительную власть штата Сан-Андреас осуществляет Правительство штата Сан-Андреас во главе с Губернатором штата Сан-Андреас.\nВсе органы исполнительной власти входят в состав Правительства штата Сан-Андреас.\nОрганами исполнительной власти являются:\n\nа) Полицейский Департамент города Лос-Сантос;\nб) Департамент Шерифа округа Блэйн;\nв) Экстренная Медицинская Служба;\nг) Национальная гвардия;\nд) Федеральное Расследовательское Бюро;\nе) Правительство штата Сан-Андреас.\nж) Секретная Служба США.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-29", "number": "29", "title": "Все государственные органы штата Сан-Андреас вместе с их руководителями являются подконтрольными и подотчетными Прави... сности и его заместители осуществляют непосредственный контроль за деятельность...", "content": "Статья 35\n\nГлава Департамента национальной безопасности и его заместители осуществляют непосредственный контроль за деятельностью Национальной гвардии штата Сан-Андреас, а также за деятельностью Секретной службы. Глава Департамента национальной безопасности и его заместители являются непосредственными руководителями этих органов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-36", "number": "36", "title": "Государственный казначей и его заместители ведут контроль за исполнением финансовых операций с бюджетом штата Сан-Анд...", "content": "Статья 36\n\nГосударственный казначей и его заместители ведут контроль за исполнением финансовых операций с бюджетом штата Сан-Андреас, а также их легитимностью, вырабатывают экономическую политику штата Сан-Андреас, обеспечивают финансовое благосостояние и финансовую поддержку граждан штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-37", "number": "37", "title": "Глава Департамента культуры и его заместители осуществляют контроль за развитием культуры и проведением мероприятий в...", "content": "Статья 37\n\nГлава Департамента культуры и его заместители осуществляют контроль за развитием культуры и проведением мероприятий в штате.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-38", "number": "38", "title": "Коллегия адвокатов - публичная коллегия дипломированных специалистов, ведущих деятельность по защите прав юридических...", "content": "Статья 38\n\nКоллегия адвокатов - публичная коллегия дипломированных специалистов, ведущих деятельность по защите прав юридических и физических лиц, представлении их интересов в суде и иных внесудебных органах в соответствии с законодательством штата Сан-Андреас.\nВмешательство в профессиональную деятельность членов Коллег , "content": "Статья 42\n\nСудьи неприкосновенны.\nСудья не может быть привлечен к уголовной или иной ответственности иначе как в порядке, определяемом законом.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-43", "number": "43", "title": "Финансирование судов производится за счет бюджета штата Сан-Андреас и должно обеспечивать возможность полного и незав...", "content": "Статья 43\n\nФинансирование судов производится за счет бюджета штата Сан-Андреас и должно обеспечивать возможность полного и независимого осуществления правосудия.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-44", "number": "44", "title": "Всякое вмешательство в деятельность судьи по осуществлению правосудия преследуется по закону.", "content": "Статья 44\n\nВсякое вмешательство в деятельность судьи по осуществлению правосудия преследуется по закону.\nПроявление неуважения к суду или судьям влечет установленную законом ответственность.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-45", "number": "45", "title": "Требования и распоряжения судов и судей при осуществлении ими полномочий обязательны для всех без исключения государс...", "content": "Статья 45\n\nТребования и распоряжения судов и судей при осуществлении ими полномочий обязательны для всех без исключения государственных органов, должностных лиц, организаций и граждан.\nСудебные акты, за исключением решений, вступают в законную силу немедленно после их вынесения\nСудебные акты, не отмененные в установленном законом порядке, имеют законную силу и обязательны к исполнению.\nПризнается прецедентное право", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-46", "number": "46", "title": "Разбирательство дел во всех судах открытое. Слушание дела в закрытом заседании допускается в случаях, предусмотренных...", "content": "Статья 46\n\nРазбирательство дел во всех судах открытое. Слушание дела в закрытом заседании допускается в случаях, предусмотренных законом.\nСудопроизводство осуществляется на основе состязательности и равноправия сторон.\nРешением суда лицо, признанное виновным в совершении преступления, может быть освобождено от уголовной ответственности с назначением судебного штрафа.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-47", "number": "47", "title": "Судебная власть в штате Сан-Андреас осуществляется Окружным, Апелляционным, Верховным и Федеральным судами штата Сан-...", "content": "Статья 47\n\nСудебная власть в штате Сан-Андреас осуществляется Окружным, Апелляционным, Верховным и Федеральным судами штата Сан-Андреас", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-48", "number": "48", "title": "Председатель Верховного суда назначается Федеральным правительством штата Сан-Андреас и может быть освобожден от зани...", "content": "Статья 48\n\nПредседатель Верховного суда назначается Федеральным правительством штата Сан-Андреас и может быть освобожден от занимаемой должности в случае прошения об отставке, смерти, признания виновным в совершении преступления или решения Федерального правительства.\nПорядок назначения и освобождения от иных судейских должностей определяется Конституционным законом, определяющим судебную систему в штате Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-49", "number": "49", "title": "Судебные акты Президиума Верховного суда штата Сан-Андреас могут быть обжалованы в Федеральном суде.", "content": "Статья 49\n\nСудебные акты Президиума Верховного суда штата Сан-Андреас могут быть обжалованы в Федеральном суде.\nСудебные акты Верховного Суда штата Сан-Андреас могут быть обжалованы в Президиум Верховного Суда штата Сан-Андреас.\nСудебные акты Апелляционного Суда штата Сан-Андреас могут быть обжалованы в Верховный Суд штата Сан-Андреас.\nСудебные акты Окружного Суда штата Сан-Андреас могут быть обжалованы в Апелляционный Суд штата Сан-Андреас.\nОбжалование постановления суда не приостанавливает его действие и не ограничивает его законную силу. Действие обжалуемого судебного акта может быть приостановлено вышестоящим судом по ходатайству лиц, участвующих в деле.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-50", "number": "50", "title": "Верховный Суд штата Сан-Андреас состоит из Председателя Верховного Суда штата Сан-Андреас и его заместителя, судей Ве...", "content": "Статья 50\n\nВерховный Суд штата Сан-Андреас состоит из Председателя Верховного Суда штата Сан-Андреас и его заместителя, судей Верховного Суда штата Сан-Андреас.\nВерховный Суд штата Сан-Андреас рассматривает дела в отношении высокопоставленных должностных лиц штата Сан-Андреас, а также является регулятором в спорах по законодательству штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-51", "number": "51", "title": "Ни один судья не должен занимать любую иную оплачиваемую должность во время исполнения своих обязанностей.", "content": "Статья 51\n\nНи один судья не должен занимать любую иную оплачиваемую должность во время исполнения своих обязанностей.\n\nГлава 6. Законодательная власть", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-52", "number": "52", "title": "Единственным органом законодательной власти в штате Сан-Андреас является Сенат штата Сан Андреас во главе со Спикером...", "content": "Статья 52\n\nЕдинственным органом законодательной власти в штате Сан-Андреас является Сенат штата Сан Андреас во главе со Спикером Сената.\nСенат является независимым государственным органом и подчиняется только законодательству штата.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-53", "number": "53", "title": "Сенатор может быть лишен мандата путем открытого голосования большинством голосов, а также с санкции Верховного суда ...", "content": "Статья 53\n\nСенатор может быть лишен мандата путем открытого голосования большинством голосов, а также с санкции Верховного суда в случае, если в отношении него имеются обоснованные обвинения в совершении им преступления.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-54", "number": "54", "title": "Процесс формирования Сената штата Сан-Андреас регламентируется Конституционным законом “О Сенате штата Сан-Андреас”.", "content": "Статья 54\n\nПроцесс формирования Сената штата Сан-Андреас регламентируется Конституционным законом “О Сенате штата Сан-Андреас”.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-55", "number": "55", "title": "К ведению Сената относится принятие законодательных актов и постановлений, имеющих общеобязательный характер.", "content": "Статья 55\n\nК ведению Сената относится принятие законодательных актов и постановлений, имеющих общеобязательный характер.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-56", "number": "56", "title": "Заседания Сената проходит в открытом помещении, под защитой сотрудников Секретной Службы или Федерального Расследоват...", "content": "Статья 56\n\nЗаседания Сената проходит в открытом помещении, под защитой сотрудников Секретной Службы или Федерального Расследовательского Бюро.\nГраждане и СМИ могут беспрепятственно присутствовать на заседаниях Сената для освещения деятельности этого органа.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-57", "number": "57", "title": "Правом законодательной инициативы обладают:", "content": "Статья 57\n\nПравом законодательной инициативы обладают:\nа) Сенаторы и Спикер Сената;\nб) Верховный суд штата San-Andreas;\nв) Губернатор штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-58", "number": "58", "title": "Законопроекты, постановления и прочие решения принимаются большинством голосов сенаторов.", "content": "Статья 58\n\nЗаконопроекты, постановления и прочие решения принимаются большинством голосов сенаторов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-59", "number": "59", "title": "Губернатор имеет абсолютное право «вето» в отношении любых решений Сената, включая законы, постановления и иные акты,...", "content": "Статья 59\nГубернатор имеет абсолютное право «вето» в отношении любых решений Сената, включая законы, постановления и иные акты, без ограничения сроков и условий.\nРешение, на которое Губернатором наложено вето, немедленно утрачивает юридическую силу и не может быть повторно принято без письменного согласия Губернатора.\n\nГлава 7. Муниципалитеты и округа", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-60", "number": "60", "title": "Штат Сан-Андреас является субъектом Соединённых Штатов Америки со столицей в городе Лос-Сантос, где располагается Пра...", "content": "Статья 60\n\nШтат Сан-Андреас является субъектом Соединённых Штатов Америки со столицей в городе Лос-Сантос, где располагается Правительство штата Сан-Андреас.\nШтат Сан-Андреас делится на округ Блэйн, город Лос-Сантос и остров Кайо-Перико, которые являются административно-территориальными единицами штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-61", "number": "61", "title": "Запрещено любое стремление округов к сепаратизму.", "content": "Статья 61\n\nЗапрещено любое стремление округов к сепаратизму.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "const-62", "number": "62", "title": "Каждый окр
