) обеспечивать безопасность труда;\n\n\nг) обеспечивать работников оборудованием, инструментами, технической документацией и иными средствами, необходимыми для исполнения ими трудовых обязанностей;\n\n\nд) выплачивать в полном размере причитающуюся работникам заработную плату в сроки, установленные в соответствии с настоящим Кодексом, трудовыми договорами;\n\n\nе) знакомить работников с принимаемыми локальными нормативными актами, непосредственно связанными с их трудовой деятельностью;\n\n\nж) своевременно выполнять предписания Правительства Штата Сан-Андреас и иных органов исполнительной власти, осуществляющих государственный контроль (надзор) в установленной сфере деятельности, уплачивать штрафы, наложенные за нарушения трудового законодательства и иных нормативных правовых актов, содержащих нормы трудового права;\n\n\nз) обеспечивать бытовые нужды работников, связанные с исполнением ими трудовых обязанностей;\n\n\nи) возмещать вред, причиненный работникам в связи с исполнением ими трудовых обязанностей, а также компенсировать моральный вред в порядке и на условиях, которые установлены настоящим Кодексом, другими законами и иными нормативными правовыми актами Штата Сан-Андреас;\n\n\nк) исполнять иные обязанности, предусмотренные трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, уставами и трудовыми договорами;\n\n\nл) создавать условия, необходимые для соблюдения работниками дисциплины труда.\n\n\nм) вести отчетность премирования сотрудников в виде премиального списка.\n\n\n\nГлава IV. Трудовой договор", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-15", "number": "15", "title": "Понятие трудового договора. Стороны трудового договора", "content": "Статья 15. Понятие трудового договора. Стороны трудового договора\n\n\n\nч. 1 Трудовой договор - соглашение между работодателем и работником, в соответствии с которым работодатель обязуется предоставить работнику работу по обусловленной трудовой функции, обеспечить условия труда, предусмотренные трудовым законодательством и иными нормативными правовыми актами, содержащими нормы трудового права, уставами и данным соглашением, своевременно и в полном размере выплачивать работнику заработную плату, а работник обязуется лично выполнять определенную этим соглашением трудовую функцию в интересах, под управлением и контролем работодателя, соблюдать уставы, действующие у данного работодателя.\n\n\n\n\n\nч. 2 Сторонами трудового договора являются работодатель и работник.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-16", "number": "16", "title": "Документы, предъявляемые при заключении трудового договора", "content": "Статья 16. Документы, предъявляемые при заключении трудового договора\n\n\n\nч. 1 При заключении трудового договора лицо, поступающее на работу, предъявляет работодателю:\n\n\n\n\n\nа) паспорт, удостоверяющий личность;\n\n\nб) военный билет, если его наличия требует внутренний устав работодателя;\n\n\nв) необходимые для трудоустройства лицензии;\n\n\nг) действующую медицинскую карту.\n\n\n\n\n\nч. 2 В отдельных случаях с учетом специфики работы может предусматриваться необходимость предъявления при заключении трудового договора дополнительных документов.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-17", "number": "17", "title": "Приостановление действия трудового договора", "content": "Статья 17. Приостановление действия трудового договора\n\n\nч. 1 Действие трудового договора может быть приостановлено:\n\n\n\n\n\nа) по инициативе работодателя;\n\n\nб) по решению органов государственного надзора;\n\n\n\n\n\nч. 2 Основаниями для приостановки действия трудового договора являются:\n\n\n\n\n\nа) судебные и досудебные разбирательства в отношении работника;\n\n\nб) оперативно-розыскные и иные следственные мероприятия в отношении работника;\n\n\nв) не пройденный работником в обязательном порядке медицинский осмотр;\n\n\nг) просроченная медицинская карта работника;\n\n\nд) переаттестация работника;\n\n\nе) профессиональная непригодность по медицинским показателям;\n\n\nж) отсутствие у работника лицензий, без которых трудовые обязанности работника не могут выполняться;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-18", "number": "18", "title": "Прекращение действия трудового договора", "content": "Статья 18. Прекращение действия трудового договора\n\n\nч. 1 Действие трудового договора может быть прекращено:\n\n\n\n\n\nа) по инициативе работника;\n\n\nб) по инициативе работодателя;\n\n\nв) по решению органов государственного надзора;\n\n\nг) при переводе работника на другое место работы по согласованию сторон.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-19", "number": "19", "title": "Прекращение действия трудового договора по инициативе работника", "content": "Статья 19. Прекращение действия трудового договора по инициативе работника\n\n\nч. 1 Трудовые отношение должны быть прекращены работодателем в случае, если работник написал заявление на имя работодателя для увольнения по собственному желанию. Или заявил работодателю об желании увольнения в устной форме.\n\n\n\n\n\nч. 2 Работодатель вправе обязать работника отработать до 3 дней с момента поступления заявления для увольнения, по истечению которых обязуется прекратить с работником трудовые отношения.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-20", "number": "20", "title": "Прекращение действия трудового договора по инициативе работодателя", "content": "Статья 20. Прекращение действия трудового договора по инициативе работодателя\n\n\nч. 1 Трудовые отношение могут быть прекращены работодателем в следующих случаях:\n\n\n\n\n\nа) неоднократного нарушения работником правил внутреннего устава организации;\n\n\nб) нарушения работником законодательства Штата Сан-Андреас;\n\n\nв) неоднократного неисполнения работником своих обязанностей;\n\n\nг) прогула работником рабочего дня;\n\n\nд) появления работника на работе в состоянии алкогольного или наркотического опьянения;\n\n\nе) разжигания работником конфликтов внутри организации;\n\n\nж) совершение действий, и установленных внутренней служебной проверкой, в результате которых работник утратил доверие работодателя, связанное с нарушением должностных обязанностей, злоупотреблением полномочиями, введением в заблуждение руководства или иными фактами, наносящими ущерб интересам организации.;\n\n\nз) профессиональной непригодности работника;\n\n\nи) окончания срока пребывания на должности в случае, если работник был назначен на должность на определенный срок;\n\n\nй) непрохождения работником стажировки;\n\n\nк) В случае повторного выявления просроченной медицинской карты\n\n\n\n\n\nч. 2 Работодатель, осуществляющий увольнение по основаниям, указанным в ч. 1 настоящей статьи, непосредственно перед этим обязан уведомить уволенного о расторжении трудовых отношений и основаниях для такового посредством одного из нижеуказанных способов:\n\n\n\n\n\nа) Личное уведомление \n\n\nб) Уведомление посредством сообщения по номеру телефона уволенного\n\n\nв) Уведомление посредством телефонного звонка\n\n\nг) Уведомление посредством отправления сообщения по адресу электронной почты уволенного\n\n\n\n\n\nч. 3 Работодатель, уведомивший уволенного работника о факте расторжения трудовых отношений и основаниях для такового, обязан иметь доказательства такого уведомления и хранить их на протяжение 72-х часов после такового. \n\n\n\n\n\nПримечание: В случае уведомления Офисом генерального прокурора штата Сан-Андреас лица, осуществившего увольнение, уведомившего уволенного сотрудника о факте расторжения с ним трудовых отношений и основании для такого, о необходимости продления сроков хранения доказательств, указанных в ч. 3 ст. 20 настоящего кодекса, такое лицо обязуется хранить необходимые данные до дальнейшего уведомления.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-21", "number": "21", "title": "Прекращение действия трудового договора по инициативе органов государственного надзора", "content": "Статья 21. Прекращение действия трудового договора по инициативе органов государственного надзора\n\n\nч. 1 Трудовые отношение могут быть прекращены сотрудником органов государственного надзора в следующих случаях:\n\n\n\n\n\nа) подтвержденного факта нарушения работником законодательства Штата Сан-Андреас;\n\n\nб) участия работника в экстремистских и иных незаконных формированиях;\n\n\nв) непройденной работником проверки от органов государственного надзора;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-21.1", "number": "21.1", "title": "Перечень нежелательных лиц государственных органах", "content": "Статья 21.1 Перечень нежелательных лиц государственных органах\n\n\nч. 1 Каждый государственный орган вправе вести собственный перечень нежелательных лиц (далее - Перечень).\n\n\n\n\n\nч. 2 Главы государственных органов, а также органы государственного надзора вправе вносить определенных лиц в Перечень в следующих случаях:\n\n\n\n\n\nа) подтвержденного факта нарушения лицом законодательства штата Сан-Андреас;\n\n\nб) участия лица в экстремистских и иных незаконных формированиях;\n\n\nв) непройденная стажировка в государственном органе.\n\n\n\n\n\nч. 3 Главы государственных органов, а также органы государственного надзора на свое усмотрение принимают решение о внесении лиц в Перечень.\n\n\n\n\n\nч. 4 Лица, внесенные в Перечень, не имеют право работать в государственных органах.\n\n\n\n\n\nч. 5 Органы государственного надзора вправе выносить лиц из Перечня на свое усмотрение, при наличии веских оснований полагать, что лицо исправилось и раскаивается в содеянном.\n\n\n\nГлава V. Общие положения рабочего времени", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-22", "number": "22", "title": "Рабочее время", "content": "Статья 22. Рабочее время\n\n\nч. 1 Работник обязан находиться на рабочем месте или выполнять рабочие обязанности в соответствии с правилами внутреннего трудового распорядка организации.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-23", "number": "23", "title": "Продолжительность рабочего дня", "content": "Статья 23. Продолжительность рабочего дня\n\n\n\nч. 1 Продолжительность ежедневной работы регламентируется правилами внутреннего трудового распорядка (уставом).\n\n\n\n\n\nч. 2 Работник вправе по собственному желанию продолжать работу после окончания рабочего дня.\n\n\n\nч. 3 По соглашению между работником и работодателем, работнику может устанавливаться неполный рабочий день или неполная рабочая неделя.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-24", "number": "24", "title": "Время отдыха и его виды", "content": "Статья 24. Время отдыха и его виды\n\n\nч. 1 Время отдыха - время, в течение которого работник свободен от исполнения трудовых обязанностей.\n\n\n\n\n\nч. 2 Существуют следующие виды времени отдыха:\n\n\n\n\n\nа) Обеденный перерыв и иные перерывы в течение рабочего дня;\n\n\nб) Отпуска;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-25", "number": "25", "title": "Обеденный перерыв", "content": "Статья 25. Обеденный перерыв\n\n\n\nч. 1 В течение рабочего дня работнику по его запросу должен быть предоставлен перерыв для отдыха и питания продолжительностью не менее одного и не более двух часов при условии, что работник находился до этого на рабочем месте не менее, чем 2 часа;\n\n\n\n\n\nч. 2 Сотрудники правоохранительных структур могут быть отозваны с перерыва по указанию руководства в случае оперативной необходимости.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-26", "number": "26", "title": "Перерыв за отработанное время", "content": "Статья 26. Перерыв за отработанное время\n\n\n\nч. 1 Если работник в течение рабочего дня пребывал на службе более 6 часов, то он имеет право на дополнительный перерыв длительностью не более 2 часов, без учета времени основного обеденного перерыва;\n\n\n\n\n\nч. 2 Работодатель, либо непосредственный начальник, вправе отказать сотруднику в предоставлении такого перерыва и вернуть к исполнению обязательств, если на то имеется весомая причина.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-27", "number": "27", "title": "Отпуск", "content": "Статья 27. Отпуск\n\n\nч. 1 Каждый работник, прошедший стажировку, имеет право на отпуск длительностью не более 7 суток в 1 календарный месяц;\n\n\n\n\n\nч. 2 Работодатель, получив от работника запрос на отпуск, обязан предоставить его в случае, если он соответствует нормам настоящего Кодекса;\n\n\n\n\n\nч. 3 Работодатель вправе отказать сотруднику, если его отпуск превышает ежемесячную норму;\n\n\n\n\n\nч. 4 Отпуск за выдающиеся успехи на работе/службе предоставляется на усмотрение работодателя.\n\n\n\nГлва VI. Оплата труда", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-28", "number": "28", "title": "Формы оплаты труда", "content": "Статья 28. Формы оплаты труда\n\n\n\nч. 1 Оплата труда работников осуществляется в виде почасовой оплаты и премий.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-29", "number": "29", "title": "Премиальные выплаты", "content": "Статья 29. Премиальные выплаты\n\n\n\nч. 1 Сумма премиальных выплат напрямую зависит от должности работника, его профессиональной квалификации и отработанного времени в организации.\n\n\n\n\n\nч. 2 Работодатель сам определяет список премированных сотрудников, исходя из проделанной ими работы;\n\n\n\n\n\nч. 3 Правительство штата Сан-Андреас осуществляет еженедельное дополнительное финансовое премирование органов государственной власти путем перевода денежных средств на расчетный счет государственной организации;\n\n\n\n\n\nч. 4 Размер такой премии определяется на усмотрение Губернатора штата Сан-Андреас либо же Вице-Губернатора штата Сан-Андреас, исходя из предоставленной каждой государственных организацией недельной отчетности;\n\n\n\n\n\nч. 5 В случае отсутствия такой отчетности или результатов работы, в выплате премии может быть отказано;\n\n\nч. 6 В случае возникновения кризисной ситуации, премиальные выплаты могут быть задержаны на неопределённый срок.\n\n\n\nГлава VII. Дисциплина труда", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-30", "number": "30", "title": "Дисциплина труда и трудовой распорядок", "content": "Статья 30. Дисциплина труда и трудовой распорядок\n\n\nч. 1 Дисциплина труда - обязательное для всех работников подчинение правилам внутреннего трудового распорядка (устава) и законодательству Штата Сан-Андреас.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-31", "number": "31", "title": "Поощрение за труд", "content": "Статья 31. Поощрение за труд\n\n\n\nч. 1 Работодатель вправе поощрять работников , добросовестно исполняющих свои трудовые обязанности. Видами поощрения являются:\n\n\n\n\n\nа) объявление благодарности;\n\n\nб) вручение сертификата или грамоты;\n\n\nв) награждение ценным подарком;\n\n\nг) выплата финансового премирования во внеочередном порядке;", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "labor-32", "number": "32", "title": "Дисциплинарные взыскания", "content": "Статья 32. Дисциплинарные взыскания\n\n\n\nч. 1 За совершение дисциплинарного проступка, то есть за неисполнение или недолжное исполнение работником своих трудовых обязанностей, или нарушений внутреннего нормативного акта (устава), работодатель имеет право применить следующие дисциплинарные взыскания:\n\n\n\n\n\nа) выговор;\n\n\nб) строгий выговор\n\n\nв) понижение в должности;\n\n\nг) увольнение.\n\n\n\n\n\nч. 2 Работник с неснятым дисциплинарным взысканием не может быть повышен в должности либо поощрен премией.\n\n\n\n\n\nч. 3 Если со дня получения дисциплинарного взыскания прошло 3 дня, в течение которой работник хорошо проявлял себя и не получил нового дисциплинарного взыскания, то работодатель вправе снять дисциплинарное взыскание с работника.\n\n\n\n\n\nч. 4 Частные и государственные организации вправе назначать и отменять особые дисциплинарные взыскания, в соответствии с внутренними нормативными актами.\nСнятие дисциплинарного взыскания допускается при наличии восстановительных или компенсирующих действий со стороны работника, включая, но не ограничиваясь:\n– устранением последствий нарушения;\n– предоставлением организации материального возмещения, оборудования, ресурсов;\n– добровольным пожертвованием в пользу организации;\n– выполнением иной компенсационной инициативы, одобренной руководством.\n\n\n\nПримечание:\nВсе случаи снятия взысканий по основаниям, связанным с имущественным или материальным вкладом работника, должны оформляться документально и соответствовать внутреннему порядку, утвержденному в организации.\n\n\n\n\n\nч. 5 Лица, осуществляющие дисциплинарное производство в ходе которого было назначено дисциплинарное наказание обязаны в течение 72 часов с окончания такового иметь доказательства, которые послужили основанием для применения ими санкций.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}], "road": [{"id": "road-1", "number": "1", "title": "Водитель должен предъявить и передать по первому требованию сотрудника правоохранительных органов свою лицензию на уп...", "content": "Статья 1. Водитель должен предъявить и передать по первому требованию сотрудника правоохранительных органов свою лицензию на у давать управление лицам, не имеющим право на вождение автомобиля (лицу...", "content": "Статья 6. Владельцу транспортного средства запрещено передавать управление лицам, не имеющим право на вождение автомобиля (лицу без лицензии, под алкогольным или наркотическим опьянении, находящемуся в утомленном состоянии).\n\nНаказание: штраф до $10.000 для владельца Т/С и управляющего транспортным средством.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-7", "number": "7", "title": "Водителю запрещено пересекать и занимать место в организованных колоннах или кортежах.", "content": "Статья 7. Водителю запрещено пересекать и занимать место в организованных колоннах или кортежах.\n\nНаказание: штраф до $20.000.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-8", "number": "8", "title": "Водителю запрещается пользоваться во время движения телефоном.", "content": "Статья 8. Водителю запрещается пользоваться во время движения телефоном.\n\nНаказание: штраф до $5.000.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-9", "number": "9", "title": "Водителю запрещено совершать безрассудное вождение, которое выражается в:", "content": "Статья 9. Водителю запрещено совершать безрассудное вождение, которое выражается в:\n\nа) невыполнение требования уступить дорогу во время перестроения (подрезание);\nб) несоблюдении безопасной дистанции;\nв) резком торможении, если такое торможение не требуется для предотвращения аварии;\nг) препятствовании обгону;\nд) целенаправленном нарушении нескольких положений Дорожного Кодекса подряд.\n\nНаказание: штраф до $10.000.", "punishment": "", "stars": "", "stars_count": 0, "category": "", "type": "article"}, {"id": "road-11", "number": "11", "title": "Утратила силу.", "content": "Статья 11. Утратила силу.\n\nГлава II. Специальные сигналы", "punishment": "", "stars": "", "stars_count": 0, "category": "",
